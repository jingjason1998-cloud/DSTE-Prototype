<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面标题 - DSTE 战略管理平台</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    /* ===== 基础布局（复制自 cockpit.html） ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .app { display: flex; flex-direction: column; height: 100vh; }
    .top-nav {
      height: 56px; background: var(--bg-card); border-bottom: 1px solid var(--border-color);
      display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
      flex-shrink: 0; z-index: 100;
    }
    .top-nav-brand { display: flex; align-items: center; gap: 10px; }
    .top-nav-logo {
      width: 30px; height: 30px; background: var(--primary); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 14px;
    }
    .top-nav-title { font-weight: 600; color: var(--text-primary); font-size: 15px; }
    .top-nav-links { display: flex; gap: 2px; list-style: none; }
    .top-nav-links a {
      padding: 6px 14px; border-radius: 6px; color: var(--text-tertiary);
      text-decoration: none; font-size: 13px; font-weight: 500;
      transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    }
    .top-nav-links a:hover { color: var(--text-secondary); background: var(--bg-hover); }
    .top-nav-links a.active { color: var(--primary); background: var(--bg-active); font-weight: 600; }
    .app-body { display: flex; flex: 1; overflow: hidden; }
    .sidebar {
      width: 220px; background: var(--bg-card); border-right: 1px solid var(--border-color);
      overflow-y: auto; padding: 12px 0; flex-shrink: 0;
    }
    .sidebar-group-title {
      padding: 8px 16px; font-size: 11px; font-weight: 600;
      color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px;
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 16px; margin: 2px 8px; border-radius: 6px;
      color: var(--text-tertiary); text-decoration: none; font-size: 13px;
      transition: all 0.2s; cursor: pointer;
    }
    .sidebar-item:hover { background: var(--bg-hover); color: var(--text-secondary); }
    .sidebar-item.active { background: var(--bg-active); color: var(--primary); font-weight: 500; }
    .sidebar-item .icon { font-size: 15px; width: 20px; text-align: center; }
    .content-area { flex: 1; overflow-y: auto; padding: 20px 24px; background: var(--bg-page); }
    .page-content { animation: fadeIn 0.25s ease; max-width: 1200px; margin: 0 auto; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .breadcrumb { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 13px; color: var(--text-tertiary); }
    .breadcrumb a { color: var(--text-tertiary); text-decoration: none; }
    .breadcrumb a:hover { color: var(--primary); }
    .breadcrumb-separator { opacity: 0.4; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .page-title { font-size: 22px; font-weight: 600; color: var(--text-primary); }
    .card {
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: 8px; padding: 16px;
    }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .card-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
  </style>
</head>
<body>
  <div class="app">
    <!-- 顶部导航 -->
    <nav class="top-nav">
      <div class="top-nav-brand">
        <div class="top-nav-logo">D</div>
        <span class="top-nav-title">DSTE 战略管理平台</span>
      </div>
      <ul class="top-nav-links">
        <li><a href="cockpit.html#dashboard"><span>🎛️</span><span>驾驶舱</span></a></li>
        <li><a href="cockpit.html#sp/strategy-map" class="active"><span>🎯</span><span>SP</span></a></li>
        <li><a href="cockpit.html#bp/kpi"><span>🔧</span><span>BP</span></a></li>
        <li><a href="cockpit.html#exe/tasks"><span>🚀</span><span>执行</span></a></li>
        <li><a href="cockpit.html#rev/performance"><span>📊</span><span>评估</span></a></li>
        <li><a href="cockpit.html#ai"><span>🤖</span><span>AI</span></a></li>
      </ul>
    </nav>

    <div class="app-body">
      <!-- 左侧边栏 -->
      <aside class="sidebar">
        <div class="sidebar-group-title">战略制定 (SP)</div>
        <a class="sidebar-item active" href="#"><span class="icon">🗺️</span><span>战略地图</span></a>
        <a class="sidebar-item" href="cockpit.html#sp/strategy-topics"><span class="icon">📋</span><span>战略专题</span></a>
        <a class="sidebar-item" href="cockpit.html#sp/market-insight"><span class="icon">🔭</span><span>市场洞察</span></a>
      </aside>

      <!-- 内容区 -->
      <main class="content-area">
        <div class="page-content">
          <!-- 面包屑 -->
          <div class="breadcrumb">
            <a href="cockpit.html#dashboard">驾驶舱</a>
            <span class="breadcrumb-separator">/</span>
            <a href="cockpit.html#sp/strategy-map">战略制定</a>
            <span class="breadcrumb-separator">/</span>
            <span>页面标题</span>
          </div>

          <!-- 页面标题 -->
          <div class="page-header">
            <h1 class="page-title">页面标题</h1>
          </div>

          <!-- ===== 在这里写你的页面内容 ===== -->
          <div class="card">
            <div class="card-header">
              <div class="card-title">示例卡片</div>
            </div>
            <p style="color: var(--text-secondary); font-size: 14px;">在这里写你的页面内容...</p>
          </div>
          <!-- ===== 页面内容结束 ===== -->

        </div>
      </main>
    </div>
  </div>

  <script>
    // 主题同步
    (function(){
      const theme = localStorage.getItem('dste-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</body>
</html>
