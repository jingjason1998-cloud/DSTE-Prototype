name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    needs: []
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          echo "=== dist 目录内容 ==="
          ls -la dist/
          if [ ! -f dist/index.html ]; then
            echo "❌ 构建失败: dist/index.html 不存在"
            exit 1
          fi
          echo "✅ dist/index.html 存在"

      - name: Deploy dist to server via rsync
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/dste-v042/

      - name: Restart nginx
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            echo '=== 验证部署文件 ==='
            ls -la /opt/dste-v042/ | head -15
            if [ ! -f /opt/dste-v042/index.html ]; then
              echo '❌ /opt/dste-v042/index.html 不存在'
              exit 1
            fi
            echo '✅ /opt/dste-v042/index.html 存在'
            echo '重启 nginx...'
            sudo systemctl restart nginx || sudo nginx -s reload
            echo '✅ nginx 重启完成'
            echo '✅ 部署完成: $(date)'
          "

      - name: Verify Deployment
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://dste.fineres.com || echo "000")
          echo "首页状态码: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ 首页验证失败"
            exit 1
          fi
          echo "✅ 首页验证通过"

      - name: Notify Success
        if: success()
        run: |
          echo "DSTE 生产环境部署成功！"
          echo "版本: v0.4.9"
          echo "时间: $(date)"
