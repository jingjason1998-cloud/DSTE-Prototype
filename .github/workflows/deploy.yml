name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    needs: []
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          echo "=== dist 目录内容 ==="
          ls -la dist/
          if [ ! -f dist/index.html ]; then
            echo "❌ 构建失败: dist/index.html 不存在"
            exit 1
          fi
          echo "✅ dist/index.html 存在"

      - name: Deploy dist to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "dist/"
          target: "/var/www/dste/"
          rm: true

      - name: Restart nginx
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "=== 验证部署文件 ==="
            ls -la /var/www/dste/ | head -15
            if [ ! -f /var/www/dste/index.html ]; then
              echo "❌ /var/www/dste/index.html 不存在"
              exit 1
            fi
            echo "✅ /var/www/dste/index.html 存在"
            echo "重启 nginx..."
            sudo systemctl restart nginx || sudo nginx -s reload
            echo "✅ nginx 重启完成"
            echo "✅ 部署完成: $(date)"

      - name: Verify Deployment
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://dste.fineres.com || echo "000")
          echo "首页状态码: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ 首页验证失败"
            exit 1
          fi
          echo "✅ 首页验证通过"

      - name: Notify Success
        if: success()
        run: |
          echo "DSTE 生产环境部署成功！"
          echo "版本: v0.4.3"
          echo "时间: $(date)"
