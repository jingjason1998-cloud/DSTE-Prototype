# SonarQube 配置 — DSTE 战略管理平台
# 接入 SonarQube Cloud（免费开源项目）
# 文档: https://docs.sonarqube.org/latest/analysis/analysis-parameters/

# 项目标识
sonar.projectKey=dste-platform
sonar.projectName=DSTE 战略管理平台
sonar.projectVersion=0.3.1

# 源码路径
sonar.sources=src,assets
sonar.tests=tests

# 排除路径
sonar.exclusions=\
  node_modules/**,\
  dist/**,\
  .pytest_cache/**,\
  playwright-report/**,\
  test-results/**,\
  **/*.bak,\
  docs/**

# 语言设置
sonar.language=js
sonar.javascript.file.suffixes=.js,.jsx,.html
sonar.css.file.suffixes=.css

# 编码
sonar.sourceEncoding=UTF-8

# 测试覆盖（LCOV 报告路径，后续配置）
# sonar.javascript.lcov.reportPaths=coverage/lcov.info

# 质量门禁（Quality Gate）
# 以下标准需在 SonarQube Cloud Web UI 中配置：
# - Bugs = 0
# - Vulnerabilities = 0
# - Code Smells < 50
# - Duplications < 5%
# - Cognitive Complexity < 15/函数
# - Coverage > 60%（长期目标）
