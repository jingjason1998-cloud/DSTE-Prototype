# SonarQube Cloud 项目配置
# 文档: https://docs.sonarcloud.io/advanced-setup/analysis-parameters/

# 项目标识
sonar.projectKey=jingjason1998-cloud_DSTE-Prototype
sonar.organization=jingjason1998-cloud

# 项目名称和描述
sonar.projectName=DSTE Strategic Management Platform
sonar.projectVersion=0.7.1

# 源码路径
sonar.sources=src,assets
sonar.exclusions=node_modules/**,dist/**,tests/**,docs/**

# 测试路径
sonar.tests=tests
sonar.test.inclusions=tests/**/*.spec.js,tests/**/*.test.js,tests/**/*.py

# 语言设置
sonar.language=js,html,css

# 编码
sonar.sourceEncoding=UTF-8

# JavaScript/TypeScript 特定配置
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.file.suffixes=.js,.jsx,.mjs,.cjs

# HTML 配置
sonar.html.file.suffixes=.html,.htm

# CSS 配置
sonar.css.file.suffixes=.css,.scss,.less

# 质量门禁（可选，严格模式）
# sonar.qualitygate.wait=true

# 忽略规则（根据项目需要调整）
# sonar.issue.ignore.multicriteria=e1
# sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:Sxxx
# sonar.issue.ignore.multicriteria.e1.resourceKey=src/cockpit.html
