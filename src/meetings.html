<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSTE 战略管理平台</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="./styles/shell.css">
  <style>
    /* ===== cockpit.html 页面级响应式覆盖 ===== */

    /* Tablet (<1024px) */
    @media (max-width: 1024px) {
      #page-content [style*="grid-template-columns: repeat(4, 1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: 2fr 1fr"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(3, 1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: repeat(7, 1fr)"] {
        grid-template-columns: repeat(4, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: repeat(5, 1fr)"] {
        grid-template-columns: repeat(3, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: 280px 1fr"] {
        grid-template-columns: 1fr !important;
      }
      /* Roadmap 时间线节点缩小 */
      #dev-timeline .timeline-node {
        min-width: 90px !important;
        padding: 6px !important;
      }
    }

    /* Mobile (<768px) */
    @media (max-width: 768px) {
      #page-content [style*="grid-template-columns: repeat(4, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(2, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(3, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(7, 1fr)"] {
        grid-template-columns: repeat(3, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: repeat(5, 1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: 280px 1fr"] {
        grid-template-columns: 1fr !important;
      }
      /* Roadmap 时间线节点进一步缩小 */
      #dev-timeline .timeline-node {
        min-width: 80px !important;
        padding: 4px !important;
      }
      #dev-timeline .timeline-node > div:nth-child(2) {
        font-size: 12px !important;
      }
      #dev-timeline .timeline-node > div:nth-child(3),
      #dev-timeline .timeline-node > div:nth-child(4) {
        font-size: 10px !important;
      }
      /* 卡片 padding 缩小 */
      #page-content .card {
        padding: 12px !important;
      }
      /* 看板列从 4 列变为可滚动 */
      #page-content [style*="grid-template-columns: repeat(4, 1fr)"][class*="kanban"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
    }

    /* Small Phone (<480px) */
    @media (max-width: 480px) {
      #page-content [style*="grid-template-columns: repeat(2, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(7, 1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: repeat(5, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(4, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #dev-timeline .timeline-node {
        min-width: 70px !important;
      }
      #page-content .card {
        padding: 10px !important;
      }
      /* 看板单列 */
      #page-content [style*="grid-template-columns: repeat(4, 1fr)"][class*="kanban"] {
        grid-template-columns: 1fr !important;
      }
    }

    /* 表格横向滚动容器 */
    .table-scroll-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .table-scroll-wrapper table {
      min-width: 600px;
    }

    /* 减少动画偏好 */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <!-- 顶部导航 -->
    <nav class="top-nav">
      <div style="display: flex; align-items: center;">
        <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="打开菜单">☰</button>
        <div class="top-nav-brand">
          <div class="top-nav-logo">D</div>
          <span class="top-nav-title">DSTE 战略管理平台</span>
        </div>
      </div>
      <ul class="top-nav-links" id="top-nav-links"></ul>
      <div class="top-nav-actions">
        <button class="icon-btn" id="theme-toggle" title="切换主题">🌙</button>
        <button class="icon-btn" title="通知">🔔</button>
        <div class="user-avatar" id="user-avatar" style="position:relative;">张</div>
        <div class="user-dropdown" id="user-dropdown">
          <div class="user-dropdown-name" id="user-dropdown-name">张总</div>
          <div class="user-dropdown-divider"></div>
          <button class="user-dropdown-item" id="user-logout">🚪 退出登录</button>
        </div>
      </div>
    </nav>

    <div class="app-body">
      <!-- 侧边栏遮罩层 -->
      <div class="sidebar-overlay" id="sidebar-overlay"></div>

      <!-- 左侧边栏 -->
      <aside class="sidebar" id="sidebar"></aside>

      <!-- 内容区 -->
      <main class="content-area" id="content-area">
        <div class="page-content" id="page-content"></div>
      </main>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
  <script>
    (function() {
      'use strict';

      // ===== 配置 =====
      const API_BASE = (() => {
        const host = window.location.hostname;
        if (host === 'localhost' || host === '127.0.0.1') {
          return localStorage.getItem('dste_api_base') || '';
        }
        return 'https://dste-api.jasonxspace.workers.dev';
      })();

      async function apiSave(endpoint, data) {
        // 无论 API 是否可用，都先保存到 localStorage 作为兜底，防止数据丢失
        if (endpoint === '/api/meetings') {
          try {
            localStorage.setItem('dste_meetings', JSON.stringify(data));
          } catch (e) {
            console.warn('localStorage save failed:', e.message);
          }
        }
        if (!API_BASE) return;
        try {
          const token = localStorage.getItem('dste-token');
          const headers = { 'Content-Type': 'application/json' };
          if (token) headers['Authorization'] = `Bearer ${token}`;
          const resp = await fetch(API_BASE + endpoint, {
            method: 'POST',
            headers,
            body: JSON.stringify(data),
          });
          if (resp.status === 401) {
            redirectToCasLogin();
            return;
          }
        } catch (e) {
          console.warn('API save failed:', e.message);
        }
      }

      // CAS 登录跳转
      function redirectToCasLogin() {
        const service = encodeURIComponent(window.location.origin + window.location.pathname);
        window.location.href = `https://passport.fanruan.com/cas/login?service=${service}`;
      }

      // CAS 回调处理：从 URL 提取 ticket，调用后端换取 token
      async function handleCasCallback() {
        const urlParams = new URLSearchParams(window.location.search);
        const ticket = urlParams.get('ticket');
        if (!ticket) return false;

        const cleanUrl = window.location.pathname + window.location.hash;
        history.replaceState(null, '', cleanUrl);

        try {
          const service = encodeURIComponent(window.location.origin + window.location.pathname);
          const resp = await fetch(`${API_BASE}/api/auth/cas/login?ticket=${encodeURIComponent(ticket)}&service=${service}`);
          const json = await resp.json();
          if (json.success && json.token) {
            localStorage.setItem('dste-token', json.token);
            localStorage.setItem('dste-user', json.user?.name || json.user?.username || '');
            sessionStorage.setItem('dste-user', json.user?.name || json.user?.username || '');
            updateUserUI();
            return true;
          }
        } catch (e) {
          console.error('CAS callback failed:', e);
        }
        return false;
      }

      // 检查登录状态：验证 token 是否有效
      async function checkLoginStatus() {
        const token = localStorage.getItem('dste-token');
        if (!token) return false;

        try {
          const resp = await fetch(`${API_BASE}/api/auth/me`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (resp.ok) {
            const json = await resp.json();
            if (json.success && json.user) {
              localStorage.setItem('dste-user', json.user.name || json.user.username || '');
              sessionStorage.setItem('dste-user', json.user.name || json.user.username || '');
              updateUserUI();
              return true;
            }
          }
        } catch (e) {
          console.warn('Login status check failed:', e);
        }

        localStorage.removeItem('dste-token');
        localStorage.removeItem('dste-user');
        sessionStorage.removeItem('dste-user');
        return false;
      }

      // 更新用户 UI（头像、下拉菜单名）
      function updateUserUI() {
        const user = localStorage.getItem('dste-user') || sessionStorage.getItem('dste-user') || '张';
        const avatar = document.getElementById('user-avatar');
        const dropdownName = document.getElementById('user-dropdown-name');
        if (avatar) avatar.textContent = user.charAt(0);
        if (dropdownName) dropdownName.textContent = user;
      }

      // 登出
      async function logout() {
        const token = localStorage.getItem('dste-token');
        if (token) {
          try {
            await fetch(`${API_BASE}/api/auth/logout`, {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${token}` }
            });
          } catch (e) {
            console.warn('Logout API failed:', e);
          }
        }
        localStorage.removeItem('dste-token');
        localStorage.removeItem('dste-user');
        sessionStorage.removeItem('dste-user');
        window.location.reload();
      }

      async function apiLoad(endpoint) {
        let apiData = null;
        if (API_BASE) {
          try {
            const token = localStorage.getItem('dste-token');
            const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
            const resp = await fetch(API_BASE + endpoint, { headers });
            if (resp.status === 401) {
              redirectToCasLogin();
              return null;
            }
            const json = await resp.json();
            if (json.success && json.data) apiData = json.data;
          } catch (e) {
            console.warn('API load failed:', e.message);
          }
        }
        if (apiData && apiData.length > 0) return apiData;
        // API 无数据或失败时 fallback 到 localStorage
        if (endpoint === '/api/meetings') {
          const local = localStorage.getItem('dste_meetings');
          if (local) {
            try {
              const parsed = JSON.parse(local);
              if (parsed && parsed.length > 0) return parsed;
            } catch (e) {
              console.warn('localStorage parse failed:', e);
            }
          }
        }
        return null;
      }

      const TOP_NAV = [
        { id: 'dashboard', icon: '🎛️', label: '驾驶舱', full: '驾驶舱', defaultPage: 'dashboard' },
        { id: 'sp', icon: '🎯', label: 'SP', full: '战略制定', defaultPage: 'sp/strategy-map' },
        { id: 'bp', icon: '🔧', label: 'BP', full: '战略解码', defaultPage: 'bp/kpi' },
        { id: 'exe', icon: '🚀', label: '执行', full: '战略执行', defaultPage: 'exe/tasks' },
        { id: 'rev', icon: '📊', label: '评估', full: '战略评估', defaultPage: 'rev/performance' },
        { id: 'ai', icon: '🤖', label: 'AI', full: 'AI 助手', defaultPage: 'ai' }
      ];

      const SIDEBAR_CONFIG = {
        dashboard: [
          { type: 'item', id: 'dashboard', icon: '🎛️', label: '驾驶舱概览' },
          { type: 'quick', label: '快捷入口' },
          { type: 'item', id: 'sp/strategy-map', icon: '🗺️', label: '战略地图' },
          { type: 'item', id: 'bp/kpi', icon: '📈', label: 'KPI 看板' },
          { type: 'item', id: 'exe/tasks', icon: '✅', label: '重点工作' },
          { type: 'item', id: 'exe/meetings', icon: '🎯', label: '经营分析会' },
          { type: 'item', id: 'exe/meeting-review', icon: '📋', label: '会议审核' },
          { type: 'group', title: '系统管理', items: [
            { id: 'dashboard/roadmap', icon: '📊', label: '开发路线图 Road Map' }
          ]}
        ],
        sp: [
          { type: 'group', title: '战略制定 (SP)', items: [
            { id: 'sp/strategy-map', icon: '🗺️', label: '战略地图' },
            { id: 'sp/insights-topics', icon: '🔭', label: '战略洞察与专题' }
          ]},
          { type: 'quick', label: '快捷工具' },
          { type: 'item', id: 'exe/meeting-review', icon: '📋', label: '会议材料审核' }
        ],
        bp: [
          { type: 'group', title: '战略解码 (BP)', items: [
            { id: 'bp/kpi', icon: '📈', label: 'KPI 指标体系' },
            { id: 'bp/bem', icon: '🔧', label: 'BEM 战略解码' },
            { id: 'bp/annual-plan', icon: '📅', label: '年度经营计划' }
          ]},
          { type: 'quick', label: '快捷工具' },
          { type: 'item', id: 'exe/meeting-review', icon: '📋', label: '会议材料审核' }
        ],
        exe: [
          { type: 'group', title: '战略执行', items: [
            { id: 'exe/tasks', icon: '✅', label: '重点工作管理' },
            { id: 'exe/business-topics', icon: '📂', label: '业务专题管理' },
            { id: 'exe/meetings', icon: '🎯', label: '经营分析会 ⭐' },
            { id: 'exe/report-center', icon: '📊', label: '报表中心' }
          ]},
          { type: 'quick', label: '快捷工具' },
          { type: 'item', id: 'exe/meeting-review', icon: '📋', label: '会议材料审核' }
        ],
        rev: [
          { type: 'group', title: '战略评估', items: [
            { id: 'rev/performance', icon: '🏆', label: '绩效与激励' },
            { id: 'rev/cadre', icon: '👔', label: '干部管理' },
            { id: 'rev/review', icon: '🔄', label: '战略复盘' },
            { id: 'rev/gap-analysis', icon: '📉', label: '差距分析' }
          ]},
          { type: 'quick', label: '快捷工具' },
          { type: 'item', id: 'exe/meeting-review', icon: '📋', label: '会议材料审核' }
        ],
        ai: []
      };

      // ===== 外部页面映射 =====
      const EXTERNAL_PAGES = {
        'exe/meeting-review': 'reviewer.html',
        'exe/business-topics': 'business-topics.html',
        'exe/meetings': 'meetings.html'
      };

      // ===== 页面内容 =====

      // ===== 渲染顶部导航 =====
      function renderTopNav(activePhase) {
        const container = document.getElementById('top-nav-links');
        container.innerHTML = TOP_NAV.map(item => `
          <li><a href="${EXTERNAL_PAGES[item.defaultPage] || (item.defaultPage === 'dashboard' ? 'cockpit.html' : 'cockpit.html')}" data-phase="${item.id}" class="top-nav-item ${item.id === activePhase ? 'active' : ''}">
            <span>${item.icon}</span>
            <span>${item.label}</span>
            <span class="nav-full-label">${item.full}</span>
          </a></li>
        `).join('');
      }

      // ===== 面包屑 =====
      function renderBreadcrumb(pageName) {
        return `
          <div class="breadcrumb">
            <a href="cockpit.html">驾驶舱</a>
            <span class="breadcrumb-separator">/</span>
            <a href="meetings.html">战略执行</a>
            <span class="breadcrumb-separator">/</span>
            <span>${pageName}</span>
          </div>
        `;
      }

      // ===== 渲染左侧栏 =====
      function renderSidebar(activePhase, activePage) {
        const container = document.getElementById('sidebar');
        const config = SIDEBAR_CONFIG[activePhase] || [];
        container.classList.remove('collapsed');

        let html = '';
        config.forEach(item => {
          if (item.type === 'item') {
            const target = EXTERNAL_PAGES[item.id] || '#' + item.id;
            html += `<a class="sidebar-item ${item.id === activePage ? 'active' : ''}" data-page="${item.id}" href="${target}">
              <span class="icon">${item.icon}</span><span>${item.label}</span>
            </a>`;
          } else if (item.type === 'quick') {
            html += `<div class="sidebar-quick">${item.label}</div>`;
          } else if (item.type === 'group') {
            html += `<div class="sidebar-group">
              <div class="sidebar-group-title">${item.title}</div>
              ${item.items.map(sub => {
                const target = EXTERNAL_PAGES[sub.id] || '#' + sub.id;
                return `<a class="sidebar-item ${sub.id === activePage ? 'active' : ''}" data-page="${sub.id}" href="${target}">
                  <span class="icon">${sub.icon}</span><span>${sub.label}</span>
                </a>`;
              }).join('')}
            </div>`;
          }
        });
        container.innerHTML = html;

        container.querySelectorAll('.sidebar-item').forEach(item => {
          item.addEventListener('click', (e) => {
            e.preventDefault();
            const page = item.dataset.page;
            if (EXTERNAL_PAGES[page]) {
              window.location.href = EXTERNAL_PAGES[page];
            } else if (page === 'exe/meetings') {
              const content = document.getElementById('page-content');
              content.innerHTML = renderMeetings();
              bindPageEvents(content);
            } else {
              window.location.href = 'cockpit.html#' + page;
            }
          });
        });
      }

      // ===== 事件委托（替代内联 onclick）=====
      function bindPageEvents(container) {
        container.addEventListener('click', (e) => {
          // data-navigate: 面包屑/相关链接导航
          const navLink = e.target.closest('[data-navigate]');
          if (navLink) {
            e.preventDefault();
            const page = navLink.dataset.navigate;
            if (page === 'exe/meetings') {
              document.getElementById('page-content').innerHTML = renderMeetings();
              bindPageEvents(document.getElementById('page-content'));
            } else if (EXTERNAL_PAGES[page]) {
              window.location.href = EXTERNAL_PAGES[page];
            }
            return;
          }
          // data-edit-meeting: 会议列表编辑按钮
          const editBtn = e.target.closest('[data-edit-meeting]');
          if (editBtn) {
            e.preventDefault();
            e.stopPropagation();
            window._editMeetingId = editBtn.dataset.editId;
            const m = window._meetingsData?.find(x => x.id === window._editMeetingId);
            if (!m) {
              document.getElementById('page-content').innerHTML = renderMeetings();
              bindPageEvents(document.getElementById('page-content'));
            } else {
              window._meetingEditData = JSON.parse(JSON.stringify(m));
              document.getElementById('page-content').innerHTML = renderMeetingEditPage();
              renderEditorForm();
              bindPageEvents(document.getElementById('page-content'));
            }
            return;
          }
        });
      }

      // ===== 简化导航（独立页面内部路由）=====
      function navigate(pageId) {
        if (pageId === 'exe/meetings') {
          const content = document.getElementById('page-content');
          content.innerHTML = renderMeetings();
          bindPageEvents(content);
        } else if (pageId === 'exe/meetings/edit') {
          const m = window._meetingsData?.find(x => x.id === window._editMeetingId);
          if (!m) {
            navigate('exe/meetings');
            return;
          }
          window._meetingEditData = JSON.parse(JSON.stringify(m));
          const content = document.getElementById('page-content');
          content.innerHTML = renderMeetingEditPage();
          renderEditorForm();
          bindPageEvents(content);
        } else if (EXTERNAL_PAGES[pageId]) {
          window.location.href = EXTERNAL_PAGES[pageId];
        }
      }

      // ===== 经营分析会页面 =====

      function renderMeetings() {
        // ---- 场景配置 ----
        const SCENARIO_CONFIG = {
          union_quarterly: { label: '片联季度会议', color: '#8b5cf6', icon: '🏛️', pipelineEnabled: false },
          hq_routine:      { label: '营销本部月/双周会', color: '#3b82f6', icon: '📅', pipelineEnabled: false },
          region_routine:  { label: '战区月度经营分析会', color: '#0ea5e9', icon: '🗺️', pipelineEnabled: true },
          lagging_region:  { label: '落后战区业绩承诺会', color: '#dc2626', icon: '🚨', pipelineEnabled: true },
          lagging_vertical:{ label: '落后垂直客群经分会', color: '#ef4444', icon: '⚠️', pipelineEnabled: true }
        };
        const STATUS_CONFIG = {
          completed:   { label: '已完成', badgeClass: 'status-success', color: 'var(--success)' },
          planned:     { label: '规划中', badgeClass: 'status-default', color: 'var(--text-disabled)' },
          in_progress: { label: '准备中', badgeClass: 'status-warning', color: 'var(--warning)' },
          cancelled:   { label: '已取消', badgeClass: 'status-archived', color: 'var(--text-tertiary)' }
        };
        const AGENDA_TYPE_LABELS = {
          financial_review: '财务复盘', kpi_tracking: 'KPI 追踪', market_insight: '市场洞察',
          risk_warning: '风险预警', org_review: '组织复盘', resource_allocation: '资源调配',
          action_review: '行动复盘', customer_success: '客户成功', product_roadmap: '产品路线',
          cost_optimization: '成本优化', talent_development: '人才发展', digital_transform: '数字化',
          esg_sustainability: 'ESG'
        };
        const AGENDA_TYPE_COLORS = {
          financial_review: 'var(--primary)', kpi_tracking: 'var(--primary)', digital_transform: 'var(--primary)',
          market_insight: 'var(--warning)', talent_development: 'var(--warning)', org_review: 'var(--warning)', product_roadmap: 'var(--warning)',
          resource_allocation: 'var(--success)', action_review: 'var(--success)', customer_success: 'var(--success)', cost_optimization: 'var(--success)',
          risk_warning: '#dc2626', esg_sustainability: '#10b981'
        };
        const PIPELINE_STEPS = [
          { key: 'reportGenerated', label: '报告生成', icon: '📝' },
          { key: 'preReviewDone',   label: '会前评审', icon: '👀' },

          { key: 'lagging_region', label: '落后战区业绩承诺会', icon: '🚨', color: '#dc2626' },

        const KNOWN_SCENES = ['union_quarterly', 'hq_routine', 'region_routine', 'lagging_region', 'lagging_vertical'];

        const sceneCards = SCENE_CARD_CONFIG.map(s => {

        window.filterByScene = function(sceneKey) {
          if (window._meetingsFilterScene === sceneKey) {

            window._meetingsFilterScene = sceneKey;

          // 同步筛选栏
          const filterScenario = document.getElementById('filter-scenario');

          applyFilters();
          // 刷新场景卡片高亮（通过重新渲染整个页面实现，因为场景卡片在HTML模板中）

        // ---- 会议卡片 ----

        // ---- 决议跟踪（全量） ----
        const decisionRows = allDecisions.map(d => `
          <div style="display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border-light);">

        // ---- 纪要卡片 ----
        const minutesCards = meetings.filter(m => m.hasMinutes).map(m => {

            </div>
            <div style="display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px;">
              ${Object.entries(e.dimensions).map(([key, val]) => `
                <div style="display: flex; align-items: center; gap: 8px;">
                  <div style="font-size: 11px; color: var(--text-tertiary); width: 56px; text-align: right;">${{preparation:'准备度',discussion:'讨论度',decision:'决议质量',execution:'执行落地'}[key]}</div>
                  <div style="flex: 1; height: 6px; background: var(--bg-page); border-radius: 3px; overflow: hidden;">
                    <div style="width: ${val}%; height: 100%; background: ${val >= 90 ? 'var(--success)' : val >= 80 ? 'var(--primary)' : val >= 70 ? 'var(--warning)' : 'var(--danger)'}; border-radius: 3px;"></div>
                  </div>
                  <div style="font-size: 11px; color: var(--text-secondary); width: 28px; text-align: right; font-weight: 600;">${val}</div>
                </div>
              `).join('')}
            </div>
            <div style="padding-top: 8px; border-top: 1px solid var(--border-light);">
              <div style="font-size: 11px; color: var(--text-tertiary); margin-bottom: 4px;">💬 参会反馈</div>
              ${e.feedback.map(fb => `<div style="font-size: 12px; color: var(--text-secondary); padding-left: 8px; border-left: 2px solid var(--primary-light); margin-bottom: 3px;">${fb}</div>`).join('')}
            </div>
          </div>
        `).join('');

        // ---- 待办提醒 ----
        const todoItems = [];
        meetings.filter(m => m.status === 'in_progress').forEach(m => {
          if (!m.pipeline.preReviewDone) todoItems.push({ icon: '👀', text: `${m.title} 待会前评审`, color: 'var(--warning)' });
          if (m.pipeline.meetingHeld && !m.hasMinutes) todoItems.push({ icon: '📄', text: `${m.title} 待生成纪要`, color: 'var(--warning)' });
        });
        meetings.filter(m => m.status === 'planned').forEach(m => {
          if (!m.pipeline.reportGenerated) todoItems.push({ icon: '📝', text: `${m.title} 待生成经营分析报告`, color: 'var(--danger)' });
        });
        allActions.filter(a => a.status === 'pending' || a.status === 'in_progress').forEach(a => {
          const daysLeft = Math.ceil((new Date(a.deadline) - new Date('2026-04-15')) / (1000 * 60 * 60 * 24));
          if (daysLeft <= 7 && daysLeft > 0) todoItems.push({ icon: '⏰', text: `${a.content} 即将到期（${daysLeft} 天）`, color: 'var(--warning)' });
        });
        if (todoItems.length === 0) todoItems.push({ icon: '✅', text: '当前暂无待办事项', color: 'var(--success)' });
        const todoListHtml = todoItems.map(t => `
          <div style="display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border-light); font-size: 12px; color: var(--text-secondary);">
            <span style="color: ${t.color};">${t.icon}</span>
            <span style="flex: 1;">${t.text}</span>
            ${t.link ? `<a href="${t.link}" style="color: var(--primary); font-size: 11px; text-decoration: none;">去处理 →</a>` : ''}
          </div>

        // ---- 会议详情函数 ----
        // ---- 日历视图状态与渲染 ----
        window._calendarState = { year: new Date().getFullYear(), month: new Date().getMonth(), view: 'month' };

        function renderCalendarMonth(year, month) {
          console.log('[Calendar] renderCalendarMonth called:', year, month);
          const header = document.getElementById('calendar-header');
          const body = document.getElementById('calendar-body');
          const footer = document.getElementById('calendar-footer');
          console.log('[Calendar] DOM elements:', { header: !!header, body: !!body, footer: !!footer });
          if (!header || !body || !footer) {
            const container = document.getElementById('meetings-calendar-container');
            if (container) container.innerHTML = '<div style="padding:20px;color:var(--danger)">日历渲染错误：DOM元素未找到</div>';
            return;
          }

          const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
          const monthMeetings = meetings.filter(m => m.date && m.date.startsWith(`${year}-${String(month + 1).padStart(2, '0')}`));

          // 头部：导航 + 视图切换
          header.innerHTML = `
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
              <div style="display: flex; align-items: center; gap: 12px;">
                <button onclick="changeCalendarMonth(-1)" style="padding: 4px 10px; font-size: 12px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-card); color: var(--text-secondary); cursor: pointer;">← 上一月</button>
                <span style="font-size: 16px; font-weight: 700; color: var(--text-primary);">${year}年${monthNames[month]}</span>
                <button onclick="changeCalendarMonth(1)" style="padding: 4px 10px; font-size: 12px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-card); color: var(--text-secondary); cursor: pointer;">下一月 →</button>
                <button onclick="goCalendarToday()" style="padding: 4px 10px; font-size: 12px; border: 1px solid var(--primary); border-radius: 4px; background: var(--primary-light); color: var(--primary); cursor: pointer;">📅 今天</button>
              </div>
              <div style="display: flex; align-items: center; gap: 8px;">
                <span style="font-size: 12px; color: var(--text-tertiary);">本月 ${monthMeetings.length} 场会议</span>
                <button onclick="switchCalendarView('year')" style="padding: 4px 10px; font-size: 12px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-card); color: var(--text-secondary); cursor: pointer;">📆 年视图</button>
              </div>
            </div>
          `;

          // 主体：日历网格
          const firstDay = new Date(year, month, 1).getDay();
          const daysInMonth = new Date(year, month + 1, 0).getDate();
          const today = new Date();
          const isCurrentMonth = year === today.getFullYear() && month === today.getMonth();

          let gridHtml = `<div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border-light); border-radius: 8px; overflow: hidden;">`;
          ['日','一','二','三','四','五','六'].forEach(d => {
            gridHtml += `<div style="text-align: center; padding: 6px 0; font-size: 12px; font-weight: 600; color: var(--text-secondary); background: var(--bg-card);">${d}</div>`;
          });

          for (let i = 0; i < firstDay; i++) {
            gridHtml += `<div style="min-height: 100px; padding: 6px; background: var(--bg-page);"></div>`;
          }

          for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const dayMeetings = meetings.filter(m => m.date === dateStr);
            const isToday = isCurrentMonth && d === today.getDate();

            gridHtml += `<div style="min-height: 100px; padding: 6px; background: var(--bg-card); position: relative;">
              <div style="font-size: 12px; font-weight: ${isToday ? '700' : '400'}; color: ${isToday ? '#fff' : 'var(--text-primary)'}; background: ${isToday ? 'var(--primary)' : 'transparent'}; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 50%; margin-bottom: 4px;">${d}</div>
              <div style="display: flex; flex-direction: column; gap: 3px;">

                  return `<div onclick="openMeetingDetail('${m.id}')" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'" style="padding: 2px 5px; border-radius: 3px; font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; background: ${sc.color}18; color: ${sc.color}; border-left: 3px solid ${sc.color};">${m.title.slice(0, 10)}${m.title.length > 10 ? '...' : ''}</div>`;

              </div>
            </div>`;
          }
          gridHtml += `</div>`;
          console.log('[Calendar] gridHtml length:', gridHtml.length);
          body.innerHTML = gridHtml;
          console.log('[Calendar] body.innerHTML set, body children:', body.children.length);
          // 强制给日历容器加边框以便调试可见性
          document.getElementById('meetings-calendar-container').style.border = '2px solid blue';

          // 底部：当月会议清单

                  const st = STATUS_CONFIG[m.status] || STATUS_CONFIG.planned;
                  return `<div onclick="openMeetingDetail('${m.id}')" onmouseover="this.style.background='var(--bg-hover)'" onmouseout="this.style.background='transparent'" style="display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 6px; cursor: pointer; transition: background 0.15s; border-left: 3px solid ${sc.color};">
                    <span style="font-size: 12px; color: var(--text-tertiary); min-width: 60px;">${m.date.slice(5)}</span>

                    <span class="status-badge ${st.badgeClass}" style="font-size: 11px;">${st.label}</span>
                  </div>`;
                }).join('')}
              </div>
            </div>
          `;

        window.renderCalendarMonth = renderCalendarMonth;

        function renderCalendarYear(year) {
          const header = document.getElementById('calendar-header');
          const body = document.getElementById('calendar-body');

          if (!header || !body || !footer) return;

          const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
          const today = new Date();

          header.innerHTML = `
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
              <div style="display: flex; align-items: center; gap: 12px;">
                <button onclick="changeCalendarYear(-1)" style="padding: 4px 10px; font-size: 12px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-card); color: var(--text-secondary); cursor: pointer;">← 上一年</button>

                <button onclick="switchCalendarView('month')" style="padding: 4px 10px; font-size: 12px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-card); color: var(--text-secondary); cursor: pointer;">📅 月视图</button>
              </div>

          let gridHtml = `<div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;">`;

          for (let m = 0; m < 12; m++) {
            const firstDay = new Date(year, m, 1).getDay();
            const daysInMonth = new Date(year, m + 1, 0).getDate();
            const monthMeetings = meetings.filter(mt => mt.date && mt.date.startsWith(`${year}-${String(m + 1).padStart(2, '0')}`));
            const isCurrentMonth = year === today.getFullYear() && m === today.getMonth();

            let miniGrid = '';
            for (let i = 0; i < firstDay; i++) {
              miniGrid += `<div></div>`;
            }
            for (let d = 1; d <= daysInMonth; d++) {
              const dateStr = `${year}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
              const dayMeetings = meetings.filter(mt => mt.date === dateStr);
              const isToday = isCurrentMonth && d === today.getDate();
              const hasMeeting = dayMeetings.length > 0;
              const sc = hasMeeting ? SCENARIO_CONFIG[dayMeetings[0].scenario] : null;
              miniGrid += `<div style="position: relative; display: flex; align-items: center; justify-content: center; height: 22px; font-size: 10px; color: ${isToday ? '#fff' : hasMeeting ? sc.color : 'var(--text-tertiary)'}; background: ${isToday ? 'var(--primary)' : 'transparent'}; border-radius: 3px; cursor: ${hasMeeting ? 'pointer' : 'default'};" ${hasMeeting ? `onclick="switchCalendarView('month'); window._calendarState.year=${year}; window._calendarState.month=${m}; renderCalendarMonth(${year}, ${m});" title="${dayMeetings.map(dm => dm.title).join(', ')}"` : ''}>
                ${d}

            }

            gridHtml += `
              <div onclick="switchCalendarView('month'); window._calendarState.year=${year}; window._calendarState.month=${m}; renderCalendarMonth(${year}, ${m});" onmouseover="this.style.borderColor='var(--primary)'" onmouseout="this.style.borderColor='var(--border-light)'" style="padding: 10px; background: var(--bg-card); border-radius: 8px; border: 1px solid ${isCurrentMonth ? 'var(--primary)' : 'var(--border-light)'}; cursor: pointer; transition: border-color 0.15s;">

                <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; text-align: center;">
                  ${miniGrid}
                </div>
              </div>
            `;
          }

          gridHtml += `</div>`;
          body.innerHTML = gridHtml;
          footer.innerHTML = '';
        }

        window.switchCalendarView = function(mode) {
          window._calendarState.view = mode;
          const state = window._calendarState;
          if (mode === 'month') {
            renderCalendarMonth(state.year, state.month);
          } else {
            renderCalendarYear(state.year);
          }
        };

        window.changeCalendarMonth = function(delta) {
          const state = window._calendarState;
          state.month += delta;
          if (state.month > 11) { state.month = 0; state.year++; }
          if (state.month < 0) { state.month = 11; state.year--; }
          renderCalendarMonth(state.year, state.month);
        };

        window.changeCalendarYear = function(delta) {
          window._calendarState.year += delta;
          renderCalendarYear(window._calendarState.year);
        };

        window.goCalendarToday = function() {
          const now = new Date();
          window._calendarState.year = now.getFullYear();
          window._calendarState.month = now.getMonth();
          if (window._calendarState.view === 'month') {
            renderCalendarMonth(now.getFullYear(), now.getMonth());
          } else {
            renderCalendarYear(now.getFullYear());
          }
        };

        window.toggleMeetingsView = function() {
          console.log('[Calendar] toggleMeetingsView called, current mode:', window._meetingsViewMode);
          const btn = document.getElementById('btn-toggle-view');
          const listContainer = document.getElementById('meetings-list-container');
          const calContainer = document.getElementById('meetings-calendar-container');
          console.log('[Calendar] containers:', { list: !!listContainer, cal: !!calContainer });
          if (window._meetingsViewMode === 'calendar') {
            window._meetingsViewMode = 'list';
            if (btn) btn.textContent = '📅 日历视图';
            if (listContainer) listContainer.style.display = 'block';
            if (calContainer) calContainer.style.display = 'none';
          } else {
            window._meetingsViewMode = 'calendar';
            if (btn) btn.textContent = '📋 列表视图';
            if (listContainer) listContainer.style.display = 'none';
            if (calContainer) calContainer.style.display = 'block';
            // 渲染日历
            const state = window._calendarState;
            console.log('[Calendar] rendering calendar, state:', state);
            if (state.view === 'month') {
              renderCalendarMonth(state.year, state.month);
            } else {
              renderCalendarYear(state.year);
            }
          }
        };

            title: '', date: new Date().toISOString().split('T')[0], month: new Date().toISOString().slice(0, 7),
            level: 'L1', scope: 'hq', scenario: 'union_quarterly',
            status: 'planned', location: '', host: '', recorder: '',
            pipeline: { reportGenerated: false, preReviewDone: false, meetingHeld: false, minutesDrafted: false, minutesApproved: false, actionsTracked: false },
            upstreamMeeting: null, downstreamMeeting: null,
            agenda_items: [{ type: 'financial_review', title: '', duration: 30, owner: '', material_link: '' }],
            actions: [], decisions: [], hasMinutes: false, minutesStatus: null,
            metrics: { materialTimeliness: 0, resolutionTimeliness: 0, actionClosure: 0, satisfaction: 0 },
            effectiveness: null
          };
          window._meetingEditData = JSON.parse(JSON.stringify(newMeeting));
          renderEditorForm();
          const ov = document.getElementById('meeting-editor-overlay');
          if (ov) {

        window._currentDetailMeetingId = null;

        function getMaterialScore(url) {
          if (!url) return null;
          try {
            const map = JSON.parse(localStorage.getItem('dste_review_scores') || '{}');

          } catch (e) { return null; }
        }
        function getScoreColor(score) {
          if (score === null || score === undefined) return 'var(--text-tertiary)';
          if (score >= 80) return 'var(--success)';
          if (score >= 60) return 'var(--warning)';
          return 'var(--danger)';
        }
        window.closeMeetingDetail = function() {

                      <div style="display: flex; flex-direction: column; align-items: center; min-width: 60px;">

                          ${a.material_link ? `<span>📎 <a href="${a.material_link}" target="_blank" style="color: var(--primary); text-decoration: underline;">会议材料</a></span>` : ''}

                  <div style="display: flex; flex-direction: column;">

                ${decisionTab}

        // ---- 一报一会流程交互 ----
        window.togglePipelineStep = function(meetingId, stepKey) {
          const meeting = meetings.find(m => m.id === meetingId);
          if (!meeting || !meeting.pipeline) return;
          const newValue = !meeting.pipeline[stepKey];
          const stepIdx = PIPELINE_STEPS.findIndex(s => s.key === stepKey);
          if (newValue) {
            // 标记完成：检查前面步骤是否都已完成
            for (let i = 0; i < stepIdx; i++) {
              if (!meeting.pipeline[PIPELINE_STEPS[i].key]) {
                if (!confirm(`「${PIPELINE_STEPS[i].label}」尚未完成，确定要直接完成「${PIPELINE_STEPS[stepIdx].label}」吗？`)) return;
                break;
              }
            }
          } else {
            // 取消完成：检查后面是否有已完成步骤
            for (let i = stepIdx + 1; i < PIPELINE_STEPS.length; i++) {
              if (meeting.pipeline[PIPELINE_STEPS[i].key]) {
                if (!confirm(`「${PIPELINE_STEPS[i].label}」已完成，取消「${PIPELINE_STEPS[stepIdx].label}」将同时取消后续所有步骤。确定吗？`)) return;
                for (let j = stepIdx; j < PIPELINE_STEPS.length; j++) {
                  meeting.pipeline[PIPELINE_STEPS[j].key] = false;
                }
                apiSave('/api/meetings', meetings);
                openMeetingDetail(meetingId);
                return;
              }
            }
          }
          meeting.pipeline[stepKey] = newValue;
          apiSave('/api/meetings', meetings);
          openMeetingDetail(meetingId);
        };

        // ---- 编辑弹窗函数 ----
        window._meetingEditData = null;
        window.openMeetingEditor = function(id) {
          const m = meetings.find(x => x.id === id);
          if (!m) return;
          window._meetingEditData = JSON.parse(JSON.stringify(m));
          renderEditorForm();
          const ov = document.getElementById('meeting-editor-overlay');
          if (ov) ov.style.display = 'flex';
        };
        window.closeMeetingEditor = function() {
          const ov = document.getElementById('meeting-editor-overlay');
          if (ov) {
            ov.style.display = 'none';
            ov.dataset.isNew = '';
          }
          window._meetingEditData = null;
        };
        // ---- 智能填充：根据会议名称自动匹配历史模板 / 关键词规则 ----
        function extractTitleKeywords(title) {
          if (!title) return [];
          return title
            .replace(/\d+月份?/g, '').replace(/Q\d/gi, '').replace(/[\d年月日]/g, '')
            .split(/[\s_\-\/]+/).filter(w => w.length >= 2);
        }
        function findBestMeetingMatch(inputTitle) {
          if (!window._meetingsData || window._meetingsData.length === 0) return null;
          const inputWords = extractTitleKeywords(inputTitle);
          if (inputWords.length === 0) return null;
          let best = null, bestScore = 0;
          for (const m of window._meetingsData) {
            const histWords = extractTitleKeywords(m.title);
            const common = inputWords.filter(w => histWords.includes(w));
            const score = common.length / Math.max(inputWords.length, histWords.length, 1);
            if (score > bestScore && score >= 0.3) { bestScore = score; best = m; }
          }
          return best;
        }
        function applyKeywordRules(title) {
          // 按具体程度排序：多关键词 > 单关键词，先匹配先返回
          const rules = [
            { keywords: ['落后','垂直'], scenario: 'lagging_vertical', level: 'L3' },
            { keywords: ['落后','行业'], scenario: 'lagging_vertical', level: 'L3' },
            { keywords: ['落后','客群'], scenario: 'lagging_vertical', level: 'L3' },
            { keywords: ['落后'], scenario: 'lagging_region', level: 'L3' },
            { keywords: ['营销本部'], scenario: 'hq_routine', level: 'L2' },
            { keywords: ['片联'], scenario: 'union_quarterly', level: 'L1' },
            { keywords: ['战区'], scenario: 'region_routine', level: 'L2' },
            { keywords: ['本部'], scenario: 'hq_routine', level: 'L2' },
            { keywords: ['经分会'], scenario: 'region_routine', level: 'L2' },
          ];
          for (const r of rules) {
            if (r.keywords.every(k => title.includes(k))) return { scenario: r.scenario, level: r.level };
          }
          return null;
        }
        function inferDateFromTitle(title) {
          const m = title.match(/(\d{1,2})月份?/);
          if (m) {
            const month = parseInt(m[1]);
            const year = new Date().getFullYear();
            return `${year}-${String(month).padStart(2,'0')}-01`;
          }
          const qm = title.match(/Q(\d)/i);
          if (qm) {
            const q = parseInt(qm[1]);
            const year = new Date().getFullYear();
            const month = (q - 1) * 3 + 1;
            return `${year}-${String(month).padStart(2,'0')}-01`;
          }
          return null;
        }
        function autoFillMeetingForm() {
          const titleInput = document.getElementById('edit-title');
          if (!titleInput) return;
          const title = titleInput.value.trim();
          if (!title || title.length < 1) return;
          const isNew = document.getElementById('edit-meeting-id')?.value?.startsWith('new_');
          if (!isNew) return; // 仅新建会议时自动填充

          const fieldMap = {
            'edit-date': 'date', 'edit-location': 'location', 'edit-host': 'host',
            'edit-recorder': 'recorder', 'edit-scenario': 'scenario', 'edit-level': 'level'
          };
          let source = null, matched = false;

          // 1. 历史模板匹配
          const hist = findBestMeetingMatch(title);
          if (hist) { source = hist; matched = true; }
          else {
            // 2. 关键词规则兜底
            const rule = applyKeywordRules(title);
            if (rule) source = rule;
          }
          const inferredDate = inferDateFromTitle(title);

          // 新建会议时的默认值，可被智能填充覆盖
          const DEFAULT_OVERRIDES = {
            'edit-scenario': ['union_quarterly'],
            'edit-level': ['L1'],
            'edit-status': ['planned']
          };

          // 填充空字段（或默认值）
          const filledIds = [];
          for (const [id, key] of Object.entries(fieldMap)) {
            const el = document.getElementById(id);
            if (!el) continue;
            const isDefaultOverride = isNew && (DEFAULT_OVERRIDES[id] || []).includes(el.value);
            const isUserEdited = window._userEditedFields?.has(key);
            if (el.value && !isDefaultOverride && !isUserEdited) continue;
            let val = null;
            if (key === 'date' && inferredDate) val = inferredDate;
            else if (source && source[key] !== undefined && source[key] !== '') val = source[key];
            if (!val && key === 'date' && inferredDate) val = inferredDate;
            if (val) {
              el.value = val;
              if (window._meetingEditData) window._meetingEditData[key] = val;
              filledIds.push(id);
            }
          }

          // 议程项模板（仅当议程为空或只有1个空白项时）
          if (matched && source.agenda_items && source.agenda_items.length > 0) {
            const agendaList = window._meetingEditData?.agenda_items || [];
            const hasRealAgenda = agendaList.some(a => a.title && a.title.trim());
            if (!hasRealAgenda) {
              const templateItems = source.agenda_items.map(a => ({
                type: a.type || 'financial_review', title: '',
                duration: a.duration || 30, owner: '', material_link: ''
              }));
              if (window._meetingEditData) window._meetingEditData.agenda_items = templateItems;
              renderAgendaList();
              // 视觉提示：议程区域
              const agendaContainer = document.getElementById('edit-agenda-list');
              if (agendaContainer) {
                agendaContainer.style.border = '1px solid var(--primary)';
                agendaContainer.style.borderRadius = '6px';
                agendaContainer.style.padding = '4px';
                setTimeout(() => { agendaContainer.style.border = ''; agendaContainer.style.padding = ''; }, 2000);
              }
            }
          }

          // 视觉提示：被填充的字段边框变蓝
          filledIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) { el.style.borderColor = 'var(--primary)'; el.style.transition = 'border-color 0.3s'; setTimeout(() => { el.style.borderColor = ''; }, 2000); }
          });
        }

        window.renderEditorForm = function() {
          const d = window._meetingEditData;
          if (!d) return;
          // 每次打开编辑弹窗时清空用户编辑记录，避免弹窗间互相影响
          window._userEditedFields = new Set();
          document.getElementById('edit-meeting-id').value = d.id;
          document.getElementById('edit-title').value = d.title || '';
          document.getElementById('edit-date').value = d.date || '';
          document.getElementById('edit-location').value = d.location || '';
          document.getElementById('edit-host').value = d.host || '';
          document.getElementById('edit-recorder').value = d.recorder || '';
          document.getElementById('edit-scenario').value = d.scenario || 'hq_routine';
          document.getElementById('edit-level').value = d.level || 'L2';
          document.getElementById('edit-status').value = d.status || 'planned';
          renderAgendaList();
          renderActionList();

          // 草稿自动保存：表单变化实时同步到 _meetingEditData
          const fieldMap = {
            'edit-title': 'title', 'edit-date': 'date', 'edit-location': 'location',
            'edit-host': 'host', 'edit-recorder': 'recorder',
            'edit-scenario': 'scenario', 'edit-level': 'level', 'edit-status': 'status'
          };
          // 追踪用户手动编辑的字段（autoFill 不覆盖用户手改的值）
          window._userEditedFields = window._userEditedFields || new Set();
          Object.entries(fieldMap).forEach(([id, key]) => {
            const el = document.getElementById(id);
            if (el) {
              el.oninput = () => {
                if (window._meetingEditData) {
                  window._meetingEditData[key] = el.value;
                }
                if (key !== 'title') {
                  window._userEditedFields.add(key);
                }
              };
            }
          });

          // 会议名称输入防抖自动填充（停止输入 500ms 后触发）
          const titleEl = document.getElementById('edit-title');
          if (titleEl) {
            let _autoFillTimer = null;
            titleEl.oninput = () => {
              if (window._meetingEditData) {
                window._meetingEditData.title = titleEl.value;
              }
              clearTimeout(_autoFillTimer);
              _autoFillTimer = setTimeout(() => { autoFillMeetingForm(); }, 500);
            };
          }
        }
        function renderAgendaList() {
          const d = window._meetingEditData;
          const container = document.getElementById('edit-agenda-list');
          if (!d || !container) return;
          const list = d.agenda_items || [];
          container.innerHTML = list.map((item, idx) => `
            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
              <span style="font-size: 12px; color: var(--text-tertiary); width: 22px;">${idx + 1}.</span>
              <select onchange="updateAgendaType(${idx}, this.value)" style="padding: 5px 8px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 12px; background: var(--bg-card); color: var(--text-primary); width: 110px;">
                ${Object.entries(AGENDA_TYPE_LABELS).map(([k, v]) => `<option value="${k}" ${item.type === k ? 'selected' : ''}>${v}</option>`).join('')}
              </select>
              <input type="text" value="${item.title}" onchange="updateAgendaTitle(${idx}, this.value)" placeholder="议程标题" style="flex: 1; padding: 5px 8px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 12px; background: var(--bg-card); color: var(--text-primary);" />
              <input type="number" value="${item.duration}" onchange="updateAgendaDuration(${idx}, this.value)" placeholder="分钟" min="1" style="width: 60px; padding: 5px 8px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 12px; background: var(--bg-card); color: var(--text-primary);" />
              <input type="text" value="${item.material_link || ''}" onchange="updateAgendaMaterialLink(${idx}, this.value)" placeholder="材料链接" style="width: 120px; padding: 5px 8px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 12px; background: var(--bg-card); color: var(--text-primary);" />
              <input type="text" value="${item.owner}" onchange="updateAgendaOwner(${idx}, this.value)" placeholder="负责人" style="width: 80px; padding: 5px 8px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 12px; background: var(--bg-card); color: var(--text-primary);" />
              <button type="button" onclick="moveAgendaItem(${idx}, -1)" ${idx === 0 ? 'disabled' : ''} style="padding: 4px 8px; font-size: 12px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-page); cursor: pointer; color: var(--text-secondary);">↑</button>
              <button type="button" onclick="moveAgendaItem(${idx}, 1)" ${idx === list.length - 1 ? 'disabled' : ''} style="padding: 4px 8px; font-size: 12px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-page); cursor: pointer; color: var(--text-secondary);">↓</button>
              <button type="button" onclick="removeAgendaItem(${idx})" ${list.length <= 1 ? 'disabled' : ''} style="padding: 4px 8px; font-size: 12px; border: 1px solid var(--danger); border-radius: 4px; background: rgba(245,34,45,0.08); cursor: pointer; color: var(--danger);">×</button>
            </div>
          `).join('');
          const total = list.reduce((s, a) => s + (parseInt(a.duration) || 0), 0);
          document.getElementById('edit-agenda-total').textContent = '总时长：' + total + ' 分钟';
        }
        window.updateAgendaType = function(idx, val) { if (window._meetingEditData?.agenda_items?.[idx]) window._meetingEditData.agenda_items[idx].type = val; };
        window.updateAgendaTitle = function(idx, val) { if (window._meetingEditData?.agenda_items?.[idx]) window._meetingEditData.agenda_items[idx].title = val; };
        window.updateAgendaDuration = function(idx, val) { if (window._meetingEditData?.agenda_items?.[idx]) window._meetingEditData.agenda_items[idx].duration = parseInt(val) || 0; renderAgendaList(); };
        window.updateAgendaOwner = function(idx, val) { if (window._meetingEditData?.agenda_items?.[idx]) window._meetingEditData.agenda_items[idx].owner = val; };
        window.updateAgendaMaterialLink = function(idx, val) { if (window._meetingEditData?.agenda_items?.[idx]) window._meetingEditData.agenda_items[idx].material_link = val; };
        window.addAgendaItem = function() {
          if (!window._meetingEditData) return;
          if (!window._meetingEditData.agenda_items) window._meetingEditData.agenda_items = [];
          window._meetingEditData.agenda_items.push({ type: 'financial_review', title: '新议程项', duration: 15, owner: '' });
          renderAgendaList();
        };
        window.removeAgendaItem = function(idx) {
          if (!window._meetingEditData?.agenda_items) return;
          if (window._meetingEditData.agenda_items.length <= 1) { alert('至少保留一个议程项'); return; }
          window._meetingEditData.agenda_items.splice(idx, 1);
          renderAgendaList();
        };
        window.moveAgendaItem = function(idx, dir) {
          if (!window._meetingEditData?.agenda_items) return;
          const arr = window._meetingEditData.agenda_items;
          const newIdx = idx + dir;
          if (newIdx < 0 || newIdx >= arr.length) return;
          [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
          renderAgendaList();
        };

        // ---- 行动项编辑 ----
        function renderActionList() {
          const d = window._meetingEditData;
          const container = document.getElementById('edit-action-list');
          if (!d || !container) return;
          const list = d.actions || [];
          if (list.length === 0) {
            container.innerHTML = '<div style="font-size: 12px; color: var(--text-tertiary); padding: 8px 0;">暂无行动项，点击上方按钮添加</div>';
            return;
          }
          container.innerHTML = list.map((item, idx) => `
            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
              <input type="text" value="${item.content}" onchange="updateActionContent(${idx}, this.value)" placeholder="行动内容" style="flex: 1; padding: 5px 8px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 12px; background: var(--bg-card); color: var(--text-primary);" />
              <input type="text" value="${item.owner}" onchange="updateActionOwner(${idx}, this.value)" placeholder="负责人" style="width: 80px; padding: 5px 8px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 12px; background: var(--bg-card); color: var(--text-primary);" />
              <input type="date" value="${item.deadline}" onchange="updateActionDeadline(${idx}, this.value)" style="width: 120px; padding: 5px 8px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 12px; background: var(--bg-card); color: var(--text-primary);" />
              <select onchange="updateActionStatus(${idx}, this.value)" style="width: 90px; padding: 5px 8px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 12px; background: var(--bg-card); color: var(--text-primary);">
                <option value="pending" ${item.status === 'pending' ? 'selected' : ''}>待办</option>
                <option value="in_progress" ${item.status === 'in_progress' ? 'selected' : ''}>进行中</option>
                <option value="completed" ${item.status === 'completed' ? 'selected' : ''}>已完成</option>
              </select>
              <button type="button" onclick="removeActionItem(${idx})" style="padding: 4px 8px; font-size: 12px; border: 1px solid var(--danger); border-radius: 4px; background: rgba(245,34,45,0.08); cursor: pointer; color: var(--danger);">×</button>
            </div>
          `).join('');
        }
        window.updateActionContent = function(idx, val) { if (window._meetingEditData?.actions?.[idx]) window._meetingEditData.actions[idx].content = val; };
        window.updateActionOwner = function(idx, val) { if (window._meetingEditData?.actions?.[idx]) window._meetingEditData.actions[idx].owner = val; };
        window.updateActionDeadline = function(idx, val) { if (window._meetingEditData?.actions?.[idx]) window._meetingEditData.actions[idx].deadline = val; };
        window.updateActionStatus = function(idx, val) { if (window._meetingEditData?.actions?.[idx]) window._meetingEditData.actions[idx].status = val; };
        window.addActionItem = function() {
          if (!window._meetingEditData) return;
          if (!window._meetingEditData.actions) window._meetingEditData.actions = [];
          const today = new Date().toISOString().split('T')[0];
          window._meetingEditData.actions.push({ content: '', owner: '', deadline: today, status: 'pending' });
          renderActionList();
        };
        window.removeActionItem = function(idx) {
          if (!window._meetingEditData?.actions) return;
          window._meetingEditData.actions.splice(idx, 1);
          renderActionList();
        };

        window.saveMeeting = function() {
          const d = window._meetingEditData;
          if (!d) return;
          const id = document.getElementById('edit-meeting-id').value;
          const isNew = id.startsWith('new_');
          const idx = meetings.findIndex(m => m.id === id);
          const titleVal = document.getElementById('edit-title').value.trim();
          const dateVal = document.getElementById('edit-date').value.trim();
          if (!titleVal) { alert('会议名称不能为空'); return; }
          if (!dateVal) { alert('会议日期不能为空'); return; }
          const scenarioVal = document.getElementById('edit-scenario').value;
          const statusVal = document.getElementById('edit-status').value;
          if (isNew || idx === -1) {
            const newMeeting = {
              id: dateVal.replace(/-/g, '') + '_' + Math.floor(Math.random() * 1000),

              effectiveness: d.effectiveness || null
            };
            if (newMeeting.agenda_items.length === 0) newMeeting.agenda_items = [{ type: 'financial_review', title: '未设置议程', duration: 15, owner: '' }];
            meetings.push(newMeeting);
            const editorOverlay = document.getElementById('meeting-editor-overlay');

            apiSave('/api/meetings', meetings);
            openMeetingDetail(newMeeting.id);
          } else {
            meetings[idx].title = titleVal;
            meetings[idx].date = dateVal;
            meetings[idx].month = dateVal.slice(0, 7);
            meetings[idx].location = document.getElementById('edit-location').value.trim() || '待确认';
            meetings[idx].host = document.getElementById('edit-host').value.trim() || '待定';

            const editorOverlay = document.getElementById('meeting-editor-overlay');
            if (editorOverlay && editorOverlay.style.display === 'flex') closeMeetingEditor();
            apiSave('/api/meetings', meetings);
            navigate('exe/meetings');
          }
        };
        window.deleteMeeting = function() {
          const d = window._meetingEditData;
          if (!d) return;
          if (!confirm('确定要删除该会议吗？此操作不可撤销。')) return;
          const idx = meetings.findIndex(m => m.id === d.id);

          const editorOverlay = document.getElementById('meeting-editor-overlay');
          if (editorOverlay && editorOverlay.style.display === 'flex') closeMeetingEditor();
          navigate('exe/meetings');

        return `
          ${renderBreadcrumb('经营分析会')}

            <h1 class="page-title">经营分析会</h1>

              <button class="btn btn-secondary" id="btn-toggle-view" onclick="toggleMeetingsView()">📅 日历视图</button>

            <div style="position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between;">

                <div style="font-size: 16px; font-weight: 700; color: #ffffff; letter-spacing: 0.3px; margin-bottom: 4px;">🎯 战略执行核心引擎</div>

          <div style="display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; margin-bottom: 12px;">
            <div style="padding: 8px 4px; background: var(--bg-card); border-radius: 6px; border: 1px solid var(--border-light); text-align: center;">

                <button type="button" onclick="saveMeeting()" style="padding: 8px 18px; font-size: 13px; border: none; border-radius: 6px; background: var(--primary); color: #fff; cursor: pointer; font-weight: 500;">保存</button>
              </div>
            </div>
          </div>
        `;
      }

      // ===== 会议编辑页面（独立路由）=====
      function renderMeetingEditPage() {
        return `

                </div>

                  <input type="date" id="edit-date" style="width: 100%; padding: 8px 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 13px; background: var(--bg-page); color: var(--text-primary); box-sizing: border-box;" />
                </div>
                <div>
                  <label style="display: block; font-size: 12px; color: var(--text-tertiary); margin-bottom: 4px;">地点</label>
                  <input type="text" id="edit-location" placeholder="例如 会议室 A" style="width: 100%; padding: 8px 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 13px; background: var(--bg-page); color: var(--text-primary); box-sizing: border-box;" />
                </div>
                <div>
                  <label style="display: block; font-size: 12px; color: var(--text-tertiary); margin-bottom: 4px;">主持人</label>
                  <input type="text" id="edit-host" placeholder="例如 张总" style="width: 100%; padding: 8px 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 13px; background: var(--bg-page); color: var(--text-primary); box-sizing: border-box;" />
                </div>
                <div>
                  <label style="display: block; font-size: 12px; color: var(--text-tertiary); margin-bottom: 4px;">记录人</label>
                  <input type="text" id="edit-recorder" placeholder="例如 Jason.Jing" style="width: 100%; padding: 8px 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 13px; background: var(--bg-page); color: var(--text-primary); box-sizing: border-box;" />
                </div>
                <div>
                  <label style="display: block; font-size: 12px; color: var(--text-tertiary); margin-bottom: 4px;">会议场景</label>
                  <select id="edit-scenario" style="width: 100%; padding: 8px 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 13px; background: var(--bg-page); color: var(--text-primary); box-sizing: border-box;">
                    <option value="union_quarterly">🏛️ 片联季度会议</option>
                    <option value="hq_routine">📅 营销本部月/双周会</option>
                    <option value="region_routine">🗺️ 战区月度经营分析会</option>
                    <option value="lagging_region">🚨 落后战区业绩承诺会</option>
                    <option value="lagging_vertical">⚠️ 落后垂直客群经分会</option>
                  </select>
                </div>
                <div>
                  <label style="display: block; font-size: 12px; color: var(--text-tertiary); margin-bottom: 4px;">层级</label>
                  <select id="edit-level" style="width: 100%; padding: 8px 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 13px; background: var(--bg-page); color: var(--text-primary); box-sizing: border-box;">
                    <option value="L1">L1 — 片联</option>
                    <option value="L2">L2 — 营销本部/战区常规</option>
                    <option value="L3">L3 — 落后整改（战区/垂直）</option>
                  </select>
                </div>
                <div>
                  <label style="display: block; font-size: 12px; color: var(--text-tertiary); margin-bottom: 4px;">状态</label>
                  <select id="edit-status" style="width: 100%; padding: 8px 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 13px; background: var(--bg-page); color: var(--text-primary); box-sizing: border-box;">
                    <option value="planned">规划中</option>
                    <option value="in_progress">准备中</option>
                    <option value="completed">已完成</option>
                    <option value="cancelled">已取消</option>
                  </select>
                </div>
              </div>

              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <div style="font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;">议程项</div>
                <div id="edit-agenda-total" style="font-size: 12px; color: var(--text-tertiary);">总时长：0 分钟</div>
              </div>
              <div id="edit-agenda-list" style="margin-bottom: 10px;"></div>
              <button type="button" onclick="addAgendaItem()" style="padding: 6px 14px; font-size: 12px; border: 1px dashed var(--primary); border-radius: 6px; background: var(--primary-light); color: var(--primary); cursor: pointer; font-weight: 500;">+ 添加议程项</button>

              <div style="display: flex; justify-content: space-between; align-items: center; margin: 20px 0 12px;">
                <div style="font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;">行动项</div>
              </div>
              <div id="edit-action-list" style="margin-bottom: 10px;"></div>
              <button type="button" onclick="addActionItem()" style="padding: 6px 14px; font-size: 12px; border: 1px dashed var(--success); border-radius: 6px; background: rgba(34,197,94,0.08); color: var(--success); cursor: pointer; font-weight: 500;">+ 添加行动项</button>
            </div>
          </div>
          <div style="max-width: 960px; margin: 16px auto 0; padding: 12px 24px; background: var(--bg-card); border-radius: 10px; border: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center;">
            <button type="button" onclick="deleteMeeting()" style="padding: 8px 16px; font-size: 13px; border: 1px solid var(--danger); border-radius: 6px; background: rgba(245,34,45,0.08); color: var(--danger); cursor: pointer; font-weight: 500;">🗑️ 删除</button>
            <div style="display: flex; gap: 10px;">
              <button type="button" onclick="navigate('exe/meetings')" style="padding: 8px 18px; font-size: 13px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-card); color: var(--text-secondary); cursor: pointer;">取消</button>
              <button type="button" onclick="saveMeeting()" style="padding: 8px 18px; font-size: 13px; border: none; border-radius: 6px; background: var(--primary); color: #fff; cursor: pointer; font-weight: 500;">保存</button>
            </div>
          </div>
        `;
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      // 开发路线图筛选
      window.filterRoadmap = function(filter) {
        const rows = document.querySelectorAll('[data-module-status]');
        rows.forEach(row => {
          const status = row.dataset.moduleStatus;
          if (filter === 'all' || status === filter) {
            row.style.display = '';
          } else {
            row.style.display = 'none';
          }
        });
      }

      // 暴露全局 navigate
      window.navigate = navigate;


      // ===== 独立页面初始化 =====
      async function init() {
        const casHandled = await handleCasCallback();
        if (!casHandled) {
          const isLoggedIn = await checkLoginStatus();
          const isLocalDev = ['localhost', '127.0.0.1'].includes(window.location.hostname);
          if (!isLoggedIn && !isLocalDev) {
            redirectToCasLogin();
            return;
          }
        }

        renderTopNav('exe');
        renderSidebar('exe', 'exe/meetings');

        const remoteMeetings = await apiLoad('/api/meetings');
        if (remoteMeetings && remoteMeetings.length > 0) {
          window._meetingsData = remoteMeetings;
        }

        const content = document.getElementById('page-content');
        if (content) {
          content.innerHTML = renderMeetings();
          bindPageEvents(content);
        }

        updateUserUI();

        const avatar = document.getElementById('user-avatar');
        const dropdown = document.getElementById('user-dropdown');
        const logoutBtn = document.getElementById('user-logout');
        if (avatar && dropdown) {
          avatar.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('open');
          });
          document.addEventListener('click', (e) => {
            if (!avatar.contains(e.target) && !dropdown.contains(e.target)) {
              dropdown.classList.remove('open');
            }
          });
        }
        if (logoutBtn) {
          logoutBtn.addEventListener('click', logout);
        }

        const menuToggle = document.getElementById('mobile-menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        if (menuToggle && sidebar && overlay) {
          menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('open');
          });
          overlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('open');
          });
        }
      }

      init();
      console.log('DSTE Meetings v' + (typeof __APP_VERSION__ !== 'undefined' ? __APP_VERSION__ : 'dev'));
    })();
  </script>
  <div id="app-version" style="position:fixed;bottom:4px;right:8px;font-size:11px;color:var(--text-tertiary);opacity:0.6;z-index:9999;pointer-events:none;"></div>
  <script type="module">
    (function() {
      var v = typeof __APP_VERSION__ !== 'undefined' ? __APP_VERSION__ : 'dev';
      var el = document.getElementById('app-version');
      if (el) el.textContent = 'v' + v;
    })();
  </script>
</body>
</html>
