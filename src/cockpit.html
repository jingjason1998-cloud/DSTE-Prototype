        // 渲染五看卡片
        const fiveViewsHtml = fiveViews.map(v => {
          const count = insights.filter(i => i.type === v.type).length;
          return `
            <div class="insight-card" data-view="${v.type}" style="cursor:pointer;border-radius:8px;padding:16px;background:var(--bg-card);border:1px solid var(--border-color);transition:all 0.2s;" onmouseover="this.style.borderColor='${v.color}';this.style.transform='translateY(-2px)'" onmouseout="this.style.borderColor='var(--border-color)';this.style.transform='translateY(0)'">
              <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
                <div style="width:40px;height:40px;border-radius:8px;background:${v.color}15;display:flex;align-items:center;justify-content:center;font-size:20px;">${v.icon}</div>
                <div>
                  <div style="font-weight:600;font-size:15px;">${v.label}</div>
                  <div style="font-size:12px;color:var(--text-tertiary);">${v.desc}</div>
                </div>
              </div>
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <span style="font-size:24px;font-weight:700;color:${v.color};">${count}</span>
                <span style="font-size:12px;color:var(--text-tertiary);">条洞察</span>
              </div>
            </div>
          `;
        }).join('');

        // 渲染洞察列表
        const insightsHtml = insights.map(i => {
          const linkedTopic = topics.find(t => t.id === i.linkedTopicId);
          return `
            <div class="insight-item" data-insight-id="${i.id}" style="padding:12px;border-radius:6px;background:var(--bg-page);margin-bottom:8px;cursor:pointer;transition:background 0.2s;" onmouseover="this.style.background='var(--bg-secondary)'" onmouseout="this.style.background='var(--bg-page)'">
              <div style="display:flex;justify-content:space-between;align-items:start;gap:12px;">
                <div style="flex:1;">
                  <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                    <span style="font-size:12px;padding:2px 6px;border-radius:4px;background:${impactColor[i.impact]}15;color:${impactColor[i.impact]};font-weight:500;">${impactLabel[i.impact]}影响</span>
                    <span style="font-size:12px;color:var(--text-tertiary);">置信度 ${i.confidence}%</span>
                    <span style="font-size:12px;color:var(--text-tertiary);">${i.createdAt}</span>
                  </div>
                  <div style="font-weight:600;margin-bottom:4px;">${i.title}</div>
                  <div style="font-size:13px;color:var(--text-secondary);line-height:1.5;">${i.content}</div>
                  <div style="font-size:12px;color:var(--text-tertiary);margin-top:4px;">来源: ${i.source}</div>
                  ${linkedTopic ? `<div style="margin-top:6px;">
                    <span style="font-size:12px;padding:2px 8px;border-radius:4px;background:var(--primary);color:var(--text-inverse);">已生成专题: ${linkedTopic.name}</span>
                  </div>` : ''}
                </div>
                <div style="display:flex;gap:4px;flex-shrink:0;">
                  ${!linkedTopic ? `<button class="btn btn-sm btn-primary generate-topic-btn" data-insight-id="${i.id}" style="padding:4px 12px;font-size:12px;white-space:nowrap;">生成专题</button>` : ''}
                  <button class="btn btn-sm btn-secondary edit-insight-btn" data-insight-id="${i.id}" style="padding:4px 8px;font-size:12px;">编辑</button>
                  <button class="btn btn-sm btn-danger delete-insight-btn" data-insight-id="${i.id}" style="padding:4px 8px;font-size:12px;">删除</button>
                </div>
              </div>
            </div>
          `;
        }).join('');

        // 渲染专题表格
        const topicRows = topics.map(t => `
          <tr data-topic-id="${t.id}">
            <td><strong>${t.name}</strong></td>
            <td><span style="padding:2px 8px;border-radius:4px;background:var(--bg-page);font-size:12px;">${t.dimension}</span></td>
            <td>${typeLabel[t.type]}</td>
            <td>${priorityIcon[t.priority]} ${t.priority}</td>
            <td>${escapeHtml(window.renderPerson ? window.renderPerson(t.owner) : (t.owner || ''))}</td>
            <td><span class="status-badge ${statusClass[t.status]}">${statusLabel[t.status]}</span></td>
            <td><div style="display:flex;align-items:center;gap:8px"><div class="progress-bar" style="width:80px"><div class="progress-bar-fill ${t.progress < 50 && t.progress > 0 ? 'warning' : ''}" style="width:${t.progress}%"></div></div><span style="font-size:12px">${t.progress}%</span></div></td>
            <td style="font-size:12px;color:var(--text-tertiary)">${t.updatedAt}</td>
            <td>
              <button class="btn btn-sm btn-secondary view-topic-btn" data-topic-id="${t.id}" style="padding:4px 8px;font-size:12px;">查看</button>
              <button class="btn btn-sm btn-primary edit-topic-btn" data-topic-id="${t.id}" style="padding:4px 8px;font-size:12px;">编辑</button>
              <button class="btn btn-sm btn-danger delete-topic-btn" data-topic-id="${t.id}" style="padding:4px 8px;font-size:12px;">删除</button>
            </td>
          </tr>
        `).join('');

        // Tab切换脚本 - 使用全局函数避免嵌套script
        window.switchInsightsTab = function(tabName) {
          window._insightsActiveTab = tabName;
          const container = document.getElementById('insights-topics-container');
          if (!container) return;
          const tabs = container.querySelectorAll('.insights-tab');
          const panels = container.querySelectorAll('.insights-panel');
          tabs.forEach(t => {
            if (t.dataset.tab === tabName) {
              t.style.borderBottom = '2px solid var(--primary)';
              t.style.color = 'var(--primary)';
              t.style.fontWeight = '600';
            } else {
              t.style.borderBottom = '2px solid transparent';
              t.style.color = 'var(--text-secondary)';
              t.style.fontWeight = '500';
            }
          });
          panels.forEach(p => p.style.display = p.id === 'panel-' + tabName ? 'block' : 'none');
        };

        window.filterTopicsByYear = function(year) {
          window._insightsSelectedYear = year === 'all' ? 'all' : parseInt(year, 10);
          window._insightsActiveTab = 'topics';
          navigate('sp/insights-topics');
        };

        // ===== 专题 CRUD 全局函数 =====

        // 当前编辑/查看的专题ID
        window._topicEditId = null;

        // 获取未删除的专题（loadTopics/saveTopics 已在上方定义，避免重复声明导致默认数据无法加载）
        function getActiveTopics() {
          return loadTopics().filter(t => !t.deleted);
        }

        // 查看专题详情
        window.viewTopicDetail = function(topicId) {
          const topics = getActiveTopics();
          const topic = topics.find(t => t.id === topicId);
          if (!topic) return;

          const typeLabel = { breakthrough: '突破型', incremental: '增量型', maintenance: '维持型' };
        const statusClass = { insight: 'status-default', planning: 'status-primary', execution: 'status-warning', closed: 'status-success' };
        const statusLabel = { insight: '洞察阶段', planning: '规划阶段', execution: '执行阶段', closed: '已闭环' };

          const milestonesHtml = (topic.milestones || []).map((m, idx) => `
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-light);${idx === (topic.milestones || []).length - 1 ? 'border-bottom:none;' : ''}">
              <span style="font-size:16px;">${m.completed ? '✅' : '○'}</span>
              <div style="flex:1;">
                <div style="font-size:13px;font-weight:500;">${m.title}</div>
                <div style="font-size:12px;color:var(--text-tertiary);">${m.date || '未设定日期'}</div>
              </div>
              <span style="font-size:12px;padding:2px 8px;border-radius:4px;background:${m.completed ? 'var(--success-bg)' : 'var(--bg-page)'};color:${m.completed ? 'var(--success)' : 'var(--text-secondary)'};">${m.completed ? '已完成' : '待办'}</span>
            </div>
          `).join('') || '<div style="padding:20px;text-align:center;color:var(--text-tertiary);font-size:13px;">暂无里程碑</div>';

          const insightsData = loadInsights();
          const linkedInsightsHtml = (topic.insights || []).map(insightId => {
            const ins = insightsData.find(i => i.id === insightId);
            if (!ins) return '';
            return `<div style="padding:8px 12px;border-radius:6px;background:var(--bg-page);margin-bottom:6px;font-size:13px;"><strong>${ins.source}</strong>: ${ins.title}</div>`;
          }).join('') || '<div style="padding:12px;text-align:center;color:var(--text-tertiary);font-size:13px;">未关联洞察</div>';

          const overlay = document.createElement('div');
          overlay.id = 'topic-detail-overlay';
          overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;';
          overlay.innerHTML = `
            <div id="topic-detail-modal" style="background:var(--bg-card);border-radius:12px;max-width:640px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
              <div style="display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border-color);">
                <h2 style="margin:0;font-size:18px;">专题详情</h2>
                <button onclick="document.getElementById('topic-detail-overlay').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-secondary);">×</button>
              </div>
              <div style="padding:24px;">
                <div style="font-size:20px;font-weight:700;margin-bottom:4px;">${topic.name}</div>
                <div style="font-size:13px;color:var(--text-secondary);margin-bottom:20px;">${topic.year}年 · ${typeLabel[topic.type] || topic.type} · ${priorityIcon[topic.priority]} ${topic.priority}</div>

                <div style="display:grid;grid-template-columns:repeat(2, 1fr);gap:16px;margin-bottom:20px;">
                  <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">负责人</div><div style="font-size:14px;font-weight:500;">${escapeHtml(window.renderPerson ? window.renderPerson(topic.owner) : (topic.owner || ''))}</div></div>
                  <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">战略维度</div><div style="font-size:14px;font-weight:500;">${topic.dimension}</div></div>
                  <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">阶段</div><div style="font-size:14px;font-weight:500;">${statusLabel[topic.status] || topic.status}</div></div>
                  <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">进度</div><div style="font-size:14px;font-weight:500;">${topic.progress}%</div></div>
                  <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">预算</div><div style="font-size:14px;font-weight:500;">${topic.budget || '未设定'}</div></div>
                  <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">实际成本</div><div style="font-size:14px;font-weight:500;">${topic.actualCost || '未记录'}</div></div>
                  <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">开始日期</div><div style="font-size:14px;font-weight:500;">${topic.startDate}</div></div>
                  <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">结束日期</div><div style="font-size:14px;font-weight:500;">${topic.endDate}</div></div>
                </div>

                <div style="margin-bottom:20px;">
                  <div style="font-size:14px;font-weight:600;margin-bottom:10px;">📌 里程碑</div>
                  <div style="border:1px solid var(--border-light);border-radius:8px;padding:0 12px;">${milestonesHtml}</div>
                </div>

                <div style="margin-bottom:20px;">
                  <div style="font-size:14px;font-weight:600;margin-bottom:10px;">🔗 关联洞察</div>
                  <div>${linkedInsightsHtml}</div>
                </div>

                <div style="display:flex;gap:10px;justify-content:flex-end;padding-top:16px;border-top:1px solid var(--border-color);">
                  <button class="btn btn-secondary" onclick="document.getElementById('topic-detail-overlay').remove()">关闭</button>
                  <button class="btn btn-primary" onclick="document.getElementById('topic-detail-overlay').remove(); window.openTopicEdit('${topic.id}')">编辑</button>
                </div>
              </div>
            </div>
          `;
          document.body.appendChild(overlay);
          overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
        };

        // 打开编辑弹窗
        window.openTopicEdit = function(topicId) {
          const topics = getActiveTopics();
          const topic = topics.find(t => t.id === topicId);
          if (!topic) return;
          window._topicEditId = topicId;

          const insightsData = loadInsights();
          const typeOptions = [['breakthrough','突破型'],['incremental','增量型'],['maintenance','维持型']].map(([v,l]) => `<option value="${v}" ${topic.type === v ? 'selected' : ''}>${l}</option>`).join('');
          const priorityOptions = [['P0','🔴 P0 - 最高'],['P1','🟡 P1 - 高'],['P2','🟢 P2 - 中']].map(([v,l]) => `<option value="${v}" ${topic.priority === v ? 'selected' : ''}>${l}</option>`).join('');
          const statusOptions = [['insight','洞察阶段'],['planning','规划阶段'],['execution','执行阶段'],['closed','已闭环']].map(([v,l]) => `<option value="${v}" ${topic.status === v ? 'selected' : ''}>${l}</option>`).join('');

          const milestoneRows = (topic.milestones || []).map((m, idx) => `
            <div class="milestone-row" data-idx="${idx}" style="display:flex;gap:8px;align-items:center;margin-bottom:8px;">
              <input type="checkbox" class="ms-completed" ${m.completed ? 'checked' : ''} style="width:16px;height:16px;">
              <input type="text" class="ms-title" value="${m.title}" placeholder="里程碑标题" style="flex:1;padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
              <input type="date" class="ms-date" value="${m.date || ''}" style="padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
              <button type="button" onclick="this.parentElement.remove()" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px;">×</button>
            </div>
          `).join('') || '';

          const insightOptions = insightsData.map(i => `<option value="${i.id}" ${(topic.insights || []).includes(i.id) ? 'selected' : ''}>${i.source}: ${i.title}</option>`).join('');

          const overlay = document.createElement('div');
          overlay.id = 'topic-edit-overlay';
          overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;';
          overlay.innerHTML = `
            <div id="topic-edit-modal" style="background:var(--bg-card);border-radius:12px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
              <div style="display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border-color);">
                <h2 style="margin:0;font-size:18px;">编辑专题</h2>
                <button onclick="document.getElementById('topic-edit-overlay').remove(); window._topicEditId = null;" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-secondary);">×</button>
              </div>
              <div style="padding:24px;">
                <div style="display:grid;grid-template-columns:repeat(2, 1fr);gap:16px;margin-bottom:16px;">
                  <div>
                    <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">专题名称</label>
                    <input type="text" id="edit-topic-name" value="${topic.name}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
                  </div>
                  <div>
                    <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">负责人</label>
                    <input type="text" id="edit-topic-owner" value="${typeof topic.owner === 'object' ? (topic.owner.displayName || topic.owner.name || '') : (topic.owner || '')}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
                  </div>
                  <div>
                    <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">战略维度</label>
                    <input type="text" id="edit-topic-dimension" value="${topic.dimension}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
                  </div>
                  <div>
                    <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">类型</label>
                    <select id="edit-topic-type" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">${typeOptions}</select>
                  </div>
                  <div>
                    <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">优先级</label>
                    <select id="edit-topic-priority" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">${priorityOptions}</select>
                  </div>
                  <div>
                    <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">阶段</label>
                    <select id="edit-topic-status" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">${statusOptions}</select>
                  </div>
                  <div>
                    <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">开始日期</label>
                    <input type="date" id="edit-topic-startDate" value="${topic.startDate}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
                  </div>
                  <div>
                    <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">结束日期</label>
                    <input type="date" id="edit-topic-endDate" value="${topic.endDate}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
                  </div>
                  <div>
                    <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">预算</label>
                    <input type="text" id="edit-topic-budget" value="${topic.budget || ''}" placeholder="例如: 50万" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
                  </div>
                  <div>
                    <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">进度 (%)</label>
                    <input type="number" id="edit-topic-progress" value="${topic.progress}" min="0" max="100" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
                  </div>
                </div>

                <div style="margin-bottom:16px;">
                  <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">年份 (不可修改)</label>
                  <input type="text" value="${topic.year}年" disabled style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-page);color:var(--text-tertiary);cursor:not-allowed;">
                </div>

                <div style="margin-bottom:16px;">
                  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                    <label style="font-size:12px;color:var(--text-tertiary);">📌 里程碑</label>
                    <button type="button" class="btn btn-sm btn-secondary" onclick="window.addMilestoneRow()">+ 添加里程碑</button>
                  </div>
                  <div id="edit-topic-milestones">${milestoneRows}</div>
                </div>

                <div style="margin-bottom:20px;">
                  <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">🔗 关联洞察 (多选)</label>
                  <select id="edit-topic-insights" multiple style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);min-height:80px;">${insightOptions}</select>
                </div>

                <div style="display:flex;gap:10px;justify-content:flex-end;padding-top:16px;border-top:1px solid var(--border-color);">
                  <button class="btn btn-secondary" onclick="document.getElementById('topic-edit-overlay').remove(); window._topicEditId = null;">取消</button>
                  <button class="btn btn-primary" onclick="window.saveTopicEdit()">保存</button>
                </div>
              </div>
            </div>
          `;
          document.body.appendChild(overlay);
          overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.remove(); window._topicEditId = null; } });
          if (window.ensurePersonInput) window.ensurePersonInput('edit-topic-owner', topic.owner || '');
        };

        // 删除里程碑（inline 调用，此处为测试兼容声明）
        window.removeMilestone = function(rowEl) { if(rowEl) rowEl.remove(); };

        // 添加里程碑行
        window.addMilestoneRow = function() {
          const container = document.getElementById('edit-topic-milestones');
          if (!container) return;
          const row = document.createElement('div');
          row.className = 'milestone-row';
          row.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px;';
          row.innerHTML = `
            <input type="checkbox" class="ms-completed" style="width:16px;height:16px;">
            <input type="text" class="ms-title" placeholder="里程碑标题" style="flex:1;padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
            <input type="date" class="ms-date" style="padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">

        // 保存编辑
        window.saveTopicEdit = function() {
          const topicId = window._topicEditId;
          if (!topicId) return;
          const topics = loadTopics();
          const idx = topics.findIndex(t => t.id === topicId);
          if (idx === -1) return;

          // 收集里程碑
          const milestoneRows = document.querySelectorAll('#edit-topic-milestones .milestone-row');
          const milestones = Array.from(milestoneRows).map(row => ({
            title: row.querySelector('.ms-title').value.trim(),
            date: row.querySelector('.ms-date').value,
            completed: row.querySelector('.ms-completed').checked
          })).filter(m => m.title);

          // 收集关联洞察
          const insightSelect = document.getElementById('edit-topic-insights');
          const selectedInsights = insightSelect ? Array.from(insightSelect.selectedOptions).map(o => o.value) : [];

          topics[idx] = {
            ...topics[idx],
            name: document.getElementById('edit-topic-name').value.trim() || topics[idx].name,
            dimension: document.getElementById('edit-topic-dimension').value.trim() || topics[idx].dimension,
            type: document.getElementById('edit-topic-type').value,
            priority: document.getElementById('edit-topic-priority').value,
            owner: (window.getPersonValue ? window.getPersonValue('edit-topic-owner') : null) || document.getElementById('edit-topic-owner').value.trim() || topics[idx].owner,

            endDate: document.getElementById('edit-topic-endDate').value,
            budget: document.getElementById('edit-topic-budget').value.trim(),
            progress: parseInt(document.getElementById('edit-topic-progress').value, 10) || 0,
            milestones: milestones,
            insights: selectedInsights,
            updatedAt: new Date().toISOString().slice(0, 10)
          };

          saveTopics(topics);

          // 同步关联洞察的 linkedTopicId
          const allInsights = loadInsights();
          let insightsChanged = false;
          allInsights.forEach(insight => {
            const inTopic = selectedInsights.includes(insight.id);
            if (inTopic && insight.linkedTopicId !== topicId) {
              insight.linkedTopicId = topicId;
              insightsChanged = true;
            } else if (!inTopic && insight.linkedTopicId === topicId) {
              insight.linkedTopicId = null;
              insightsChanged = true;
            }
          });
          if (insightsChanged) saveInsights(allInsights);

          window._topicEditId = null;
          const overlay = document.getElementById('topic-edit-overlay');
          if (overlay) overlay.remove();
          navigate('sp/insights-topics');

              </div>
            </div>

          document.body.appendChild(overlay);
          overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
        };

        // 执行软删除
        window.executeDeleteTopic = function(topicId) {
          const topics = loadTopics();
          const idx = topics.findIndex(t => t.id === topicId);
          if (idx > -1) {
            topics[idx].deleted = true;
            topics[idx].updatedAt = new Date().toISOString().slice(0, 10);
            saveTopics(topics);

            // 清理关联洞察的 linkedTopicId
            const insights = loadInsights();
            let insightsChanged = false;
            insights.forEach(insight => {
              if (insight.linkedTopicId === topicId) {
                insight.linkedTopicId = null;
                insightsChanged = true;
              }
            });
            if (insightsChanged) saveInsights(insights);
          }
          const overlay = document.getElementById('delete-confirm-overlay');
          if (overlay) overlay.remove();
          navigate('sp/insights-topics');
        };

            showToast('请填写标题和内容', 'warning');
            return;

          const insights = loadInsights();
          const type = document.getElementById('edit-insight-type').value;
          const source = document.getElementById('edit-insight-source').value.trim();
          const confidence = parseInt(document.getElementById('edit-insight-confidence').value, 10) || 80;
          const impactEl = document.querySelector('input[name="edit-insight-impact"]:checked');
          const impact = impactEl ? impactEl.value : 'medium';

          if (window._insightEditId) {
            const idx = insights.findIndex(i => i.id === window._insightEditId);
            if (idx > -1) {
              insights[idx] = { ...insights[idx], type, title, content, source, confidence, impact };

          } else {
            insights.push({
              id: generateInsightId(),
              type, title, content, source, confidence, impact,
              linkedTopicId: null,
              createdAt: new Date().toISOString().slice(0, 10)

          navigate('sp/insights-topics');

        window.executeDeleteInsight = function(insightId) {
          let insights = loadInsights();
          const insight = insights.find(i => i.id === insightId);
          if (!insight) return;

          // 清理关联专题
          if (insight.linkedTopicId) {
            const topics = loadTopics();
            const topicIdx = topics.findIndex(t => t.id === insight.linkedTopicId);
            if (topicIdx > -1) {
              topics[topicIdx].insights = (topics[topicIdx].insights || []).filter(id => id !== insightId);
              topics[topicIdx].updatedAt = new Date().toISOString().slice(0, 10);
              saveTopics(topics);

          }

          insights = insights.filter(i => i.id !== insightId);

      async function sendAIMessage() {
        const input = document.getElementById('ai-chat-input');
        if (!input) return;
        const text = input.value.trim();
        if (!text) return;

        const area = document.getElementById('ai-chat-area');
        appendMessage(area, 'user', text);
        const thinkingId = appendThinking(area);
        input.value = '';
        area.scrollTop = area.scrollHeight;

        try {
          const client = getAIClient();
          const context = gatherBusinessContext();
          const session = client.getCurrentSession();

          removeThinking(thinkingId);
          const botEl = appendMessage(area, 'bot', '', { streaming: true });
          let fullContent = '';

          for await (const chunk of client.streamChat(text, {
            session,
            context,
            systemPrompt: buildSystemPrompt(),
            tools: [AITools.navigateTo, AITools.searchKms],
          })) {
            if (chunk.done) break;
            fullContent += chunk.content;
            updateStreamingMessage(botEl, fullContent);
            area.scrollTop = area.scrollHeight;
          }

          finalizeMessage(botEl, fullContent);

          if (fullContent.includes('【mock 模式】') || fullContent.includes('当前为 mock')) {
            showToast('当前为 AI mock 模式，未调用真实模型', 'info', 3000);
          }
        } catch (err) {
          removeThinking(thinkingId);
          appendMessage(area, 'bot', `抱歉，AI 服务暂时不可用：${err.message}。请检查网络连接或稍后重试。`);
          console.error('[AI] send message error:', err);
        }
        area.scrollTop = area.scrollHeight;
      }

      function appendMessage(area, role, content, options = {}) {
        const el = document.createElement('div');
        el.className = `ai-message ${role}${options.streaming ? ' ai-streaming' : ''}`;
        if (options.id) el.id = options.id;
        el.innerHTML = `
          <div class="ai-avatar">${role === 'user' ? '👤' : '🤖'}</div>
          <div class="ai-message-content">${options.streaming ? '' : escapeHtml(content)}</div>
        `;
        area.appendChild(el);
        area.scrollTop = area.scrollHeight;
        return el;
      }

      function appendThinking(area) {
        const id = 'ai-thinking-' + Date.now();
        const el = document.createElement('div');
        el.className = 'ai-message bot ai-thinking';
        el.id = id;
        el.innerHTML = `
          <div class="ai-avatar">🤖</div>
          <div class="ai-message-content">正在分析战略数据…</div>
        `;
        area.appendChild(el);
        area.scrollTop = area.scrollHeight;
        return id;
      }

      function removeThinking(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
        return el;
      }

      function updateStreamingMessage(elOrId, content) {
        const el = typeof elOrId === 'string' ? document.getElementById(elOrId) : elOrId;
        if (!el) return;
        const contentEl = el.querySelector('.ai-message-content');
        if (contentEl) contentEl.textContent = content;
      }

      function finalizeMessage(elOrId, content) {
        const el = typeof elOrId === 'string' ? document.getElementById(elOrId) : elOrId;
        if (!el) return;
        el.classList.remove('ai-streaming');
        const contentEl = el.querySelector('.ai-message-content');
        if (contentEl) contentEl.textContent = content;
      }

        const statusLabels = { planning: '规划中', active: '进行中', at_risk: '有风险', delayed: '已延期', done: '已完成', closed: '已关闭' };

        if (activeTab === 'milestones') {

              <span style="font-size:12px;padding:2px 8px;border-radius:4px;background:${m.status === 'completed' ? 'var(--success-bg)' : 'var(--bg-page)'};color:${m.status === 'completed' ? 'var(--success)' : m.status === 'delayed' ? 'var(--danger)' : 'var(--text-secondary)'}">${m.status === 'completed' ? '已完成' : m.status === 'delayed' ? '已延期' : '待办'}</span>
            </div>`).join('') || '<div style="padding:20px;text-align:center;color:var(--text-tertiary);">暂无里程碑</div>';
          const recHtml = records.map(r => `
            <div style="padding:12px;background:var(--bg-page);border-radius:8px;margin-bottom:8px;">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;"><span style="font-size:13px;font-weight:600;">进度 ${r.progress}%</span><span style="font-size:12px;color:var(--text-tertiary);">${r.date} · ${r.reporter}</span></div>
              <div style="font-size:13px;color:var(--text-secondary);">${r.content}</div>${r.problems ? `<div style="margin-top:6px;font-size:12px;color:var(--danger);">⚠️ ${r.problems}</div>` : ''}
            </div>`).join('') || '<div style="padding:20px;text-align:center;color:var(--text-tertiary);">暂无进度记录</div>';
          return `
            <div style="margin-bottom:20px;"><div style="font-size:14px;font-weight:600;margin-bottom:10px;">📌 里程碑</div><div style="border:1px solid var(--border-light);border-radius:8px;padding:0 12px;">${msHtml}</div></div>
            <div style="margin-bottom:20px;"><div style="font-size:14px;font-weight:600;margin-bottom:10px;">📝 进度记录</div><div>${recHtml}</div></div>`;
        }

        if (activeTab === 'subtasks') {
          const subtasks = omp_getSubtasks(taskId);
          const subRows = subtasks.map(s => {
            const ownerName = escapeHtml(window.renderPerson ? window.renderPerson(s.owner) : (s.owner || ''));
            const memberCount = (s.members || []).filter(Boolean).length;
            return `
              <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border-light);border-radius:8px;margin-bottom:8px;background:var(--bg-card);">
                <div style="flex:1;min-width:0;">
                  <div style="font-size:13px;font-weight:600;color:var(--text-primary);">${escapeHtml(s.name)}</div>
                  <div style="font-size:12px;color:var(--text-secondary);margin-top:2px;">负责人: ${ownerName} · 成员 ${memberCount} 人 · 权重 ${s.weight || 1}</div>

                <div style="display:flex;align-items:center;gap:8px;width:120px;">
                  <div style="flex:1;height:6px;background:var(--bg-page);border-radius:3px;overflow:hidden;"><div style="width:${s.progress || 0}%;height:100%;background:var(--primary);border-radius:3px;"></div></div>
                  <span style="font-size:12px;font-weight:500;">${s.progress || 0}%</span>
                </div>
                <button class="btn btn-sm btn-secondary" data-action="omp-edit-subtask" data-id="${s.id}" style="font-size:12px;padding:3px 8px;">编辑</button>
              </div>`;
          }).join('');
          return `
            <div style="margin-bottom:16px;">
              <div style="font-size:14px;font-weight:600;margin-bottom:10px;">子任务 (${subtasks.length})</div>
              ${subtasks.length > 0 ? subRows : '<div style="padding:30px;text-align:center;color:var(--text-tertiary);">暂无子任务</div>'}
            </div>`;
        }

        if (activeTab === 'resources') {
          const ms = (task.members || []).filter(Boolean);
          return `
            <div style="margin-bottom:16px;">
              <div style="font-size:14px;font-weight:600;margin-bottom:10px;">资源成员</div>
              <div style="display:flex;flex-wrap:wrap;gap:8px;">
                ${ms.length > 0 ? ms.map(m => `
                  <div style="display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border:1px solid var(--border-light);border-radius:20px;background:var(--bg-page);">
                    ${renderAvatar(m, 22, resolvePersonDisplayName(m))}
                    <span style="font-size:13px;color:var(--text-primary);">${escapeHtml(resolvePersonDisplayName(m))}</span>
                  </div>`).join('') : '<div style="color:var(--text-tertiary);">暂无成员，请在「人员配置」视图中拖拽分配</div>'}
              </div>
            </div>`;
        }

        // basic tab
        const relatedKpiNames = task.relatedKpiIds.map(id => { const kpi = kpis.find(k => k.id === id); return kpi ? omp_getIndicatorName(id) : ''; }).filter(Boolean).join(', ');
        const overrideTag = task.progressOverridden ? `<span style="font-size:11px;padding:2px 6px;border-radius:4px;background:var(--warning-bg);color:var(--warning);margin-left:8px;">已手动覆盖</span>` : '';
        return `
          <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:20px;">
            <div style="grid-column:1 / -1;"><div style="font-size:20px;font-weight:700;">${task.name}</div><div style="font-size:13px;color:var(--text-secondary);margin-top:4px;">${task.description}</div></div>
            ${task.annualPlanTaskId ? `<div style="grid-column:1 / -1;"><div style="font-size:12px;color:var(--text-tertiary);">来源</div><div>📋 年度经营计划 <span style="font-size:12px;color:var(--text-tertiary);">(${escapeHtml(task.annualPlanTaskId)})</span> — <a href="#bp/annual-plan" data-navigate="bp/annual-plan" style="color:var(--primary);">查看源头</a></div></div>` : ''}
            <div><div style="font-size:12px;color:var(--text-tertiary);">类型</div><div style="font-weight:500;">${typeLabels[task.type]}</div></div>
            <div><div style="font-size:12px;color:var(--text-tertiary);">优先级</div><div style="font-weight:500;color:${task.priority === 'P0' ? 'var(--danger)' : task.priority === 'P1' ? 'var(--warning)' : 'var(--success)'}">${task.priority}</div></div>
            <div><div style="font-size:12px;color:var(--text-tertiary);">负责人</div><div>${escapeHtml(window.renderPerson ? window.renderPerson(task.owner) : (task.owner || ''))}</div></div>
            <div><div style="font-size:12px;color:var(--text-tertiary);">成员</div><div>${(() => { const ms = (task.members || []).filter(Boolean); return ms.length > 0 ? ms.map(m => escapeHtml(window.renderPerson ? window.renderPerson(m) : m)).join('、') : '无'; })()}</div></div>
            <div><div style="font-size:12px;color:var(--text-tertiary);">部门</div><div>${task.dept}</div></div>
            <div><div style="font-size:12px;color:var(--text-tertiary);">开始日期</div><div>${task.startDate}</div></div>
            <div><div style="font-size:12px;color:var(--text-tertiary);">截止日期</div><div>${task.endDate}</div></div>
            <div><div style="font-size:12px;color:var(--text-tertiary);">预算</div><div>${task.budget}万</div></div>
            <div><div style="font-size:12px;color:var(--text-tertiary);">实际成本</div><div>${task.actualCost}万</div></div>
            <div><div style="font-size:12px;color:var(--text-tertiary);">关联KPI</div><div>${relatedKpiNames || '无'}</div></div>
            <div><div style="font-size:12px;color:var(--text-tertiary);">状态</div><div style="font-weight:600;color:${statusColors[task.status]}">${statusLabels[task.status]}</div></div>
            <div style="grid-column:1 / -1;"><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">年度目标</div><div>${task.annualTarget ? escapeHtml(task.annualTarget) : '无'}</div></div>
            <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">关联 SP 链接</div><div>${task.spLink ? `<a href="${escapeHtml(task.spLink)}" target="_blank" rel="noopener noreferrer" style="color:var(--primary);">${escapeHtml(task.spLink)}</a>` : '无'}</div></div>
            <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">主 BI 看板</div><div>${task.biDashboard ? `<a href="${escapeHtml(task.biDashboard)}" target="_blank" rel="noopener noreferrer" style="color:var(--primary);">${escapeHtml(task.biDashboard)}</a>` : '无'}</div></div>
            <div style="grid-column:1 / -1;"><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">进度 ${task.progress}%${overrideTag}</div><div style="width:100%;height:8px;background:var(--bg-page);border-radius:4px;overflow:hidden;"><div style="width:${task.progress}%;height:100%;background:${statusColors[task.status]};border-radius:4px;"></div></div></div>
          </div>`;

            <div style="margin-bottom:16px;">
              <div style="font-size:14px;font-weight:600;margin-bottom:10px;">资源成员</div>
              <div style="padding:12px;border:1px solid var(--border-light);border-radius:8px;background:var(--bg-page);">
                ${ms.length > 0 ? ms.map(m => `<div style="display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border:1px solid var(--border-light);border-radius:20px;background:var(--bg-card);margin:4px;">${renderAvatar(m, 22, resolvePersonDisplayName(m))}<span style="font-size:13px;">${escapeHtml(resolvePersonDisplayName(m))}</span></div>`).join('') : '<div style="color:var(--text-tertiary);">暂无成员</div>'}
              </div>
              <div style="margin-top:8px;font-size:12px;color:var(--text-secondary);">提示：请前往「人员配置」视图拖拽分配或移除成员。</div>
            </div>`;
        }
        // basic
        const overrideTag = task.progressOverridden ? `<span style="font-size:11px;padding:2px 6px;border-radius:4px;background:var(--warning-bg);color:var(--warning);margin-left:8px;">已手动覆盖</span>` : '';
        const restoreBtn = (!omp_isSubtask(task) && omp_hasSubtasks(task.id) && task.progressOverridden) ? `<button type="button" class="btn btn-sm btn-secondary" onclick="window.omp_restoreAutoProgress('${task.id}')" style="margin-left:8px;font-size:11px;">恢复自动计算</button>` : '';
        const kpis = omp_load('kpiInstances');
        return `
          <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px;">
            <div style="grid-column:1 / -1;"><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">工作名称 *</label><input type="text" id="omp-task-name" value="${task.name}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            <div style="grid-column:1 / -1;"><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">描述</label><textarea id="omp-task-desc" rows="2" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;resize:vertical;">${task.description}</textarea></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">类型 *</label><select id="omp-task-type" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"><option value="strategic" ${task.type === 'strategic' ? 'selected' : ''}>🎯 战略举措</option><option value="improvement" ${task.type === 'improvement' ? 'selected' : ''}>🔧 业务改进</option><option value="capability" ${task.type === 'capability' ? 'selected' : ''}>📚 能力建设</option><option value="risk_response" ${task.type === 'risk_response' ? 'selected' : ''}>⚠️ 风险应对</option></select></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">优先级 *</label><select id="omp-task-priority" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"><option value="P0" ${task.priority === 'P0' ? 'selected' : ''}>🔴 P0</option><option value="P1" ${task.priority === 'P1' ? 'selected' : ''}>🟡 P1</option><option value="P2" ${task.priority === 'P2' ? 'selected' : ''}>🟢 P2</option></select></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">负责人 *</label><input type="text" id="omp-task-owner" value="${typeof task.owner === 'object' ? (task.owner.displayName || task.owner.name || '') : (task.owner || '')}" ${task.annualPlanTaskId ? 'disabled' : ''} style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:${task.annualPlanTaskId ? 'var(--bg-page)' : 'var(--bg-card)'};color:var(--text-primary);font-size:13px;"></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">部门 *</label><input type="text" id="omp-task-dept" value="${task.dept}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            ${task.annualPlanTaskId ? `<div style="grid-column:1 / -1;font-size:12px;color:var(--text-tertiary);padding:8px 12px;background:var(--bg-page);border-radius:6px;">ℹ️ 负责人由年度经营计划同步，如需修改请前往「年度经营计划」页面</div>` : ''}
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">开始日期</label><input type="date" id="omp-task-start" value="${task.startDate}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">截止日期 *</label><input type="date" id="omp-task-end" value="${task.endDate}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">进度 (%) ${overrideTag}${restoreBtn}</label><input type="number" id="omp-task-progress" value="${task.progress}" min="0" max="100" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">状态</label><select id="omp-task-status" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"><option value="planning" ${task.status === 'planning' ? 'selected' : ''}>规划中</option><option value="active" ${task.status === 'active' ? 'selected' : ''}>进行中</option><option value="at_risk" ${task.status === 'at_risk' ? 'selected' : ''}>有风险</option><option value="delayed" ${task.status === 'delayed' ? 'selected' : ''}>已延期</option><option value="done" ${task.status === 'done' ? 'selected' : ''}>已完成</option><option value="closed" ${task.status === 'closed' ? 'selected' : ''}>已关闭</option></select></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">预算 (万)</label><input type="number" id="omp-task-budget" value="${task.budget}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">实际成本 (万)</label><input type="number" id="omp-task-cost" value="${task.actualCost}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            <div style="grid-column:1 / -1;"><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">关联 KPI (多选)</label><select id="omp-task-kpis" multiple style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;min-height:80px;">${task.relatedKpiIds.map(id => { const k = kpis.find(x => x.id === id); return `<option value="${id}" selected>${k ? omp_getIndicatorName(k.indicatorId) + ' (' + k.dept + ')' : id}</option>`; }).join('')}${kpis.filter(k => !task.relatedKpiIds.includes(k.id)).map(k => `<option value="${k.id}">${omp_getIndicatorName(k.indicatorId)} (${k.dept})</option>`).join('')}</select></div>
            <div style="grid-column:1 / -1;"><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">年度目标</label><input type="text" id="omp-task-annual-target" value="${escapeHtml(task.annualTarget || '')}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">关联 SP 链接</label><input type="text" id="omp-task-sp-link" value="${escapeHtml(task.spLink || '')}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">主 BI 看板</label><input type="text" id="omp-task-bi-dashboard" value="${escapeHtml(task.biDashboard || '')}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
          </div>`;
      }

      function omp_renderSubtaskTab(parentTaskId) {
        const subtasks = omp_getSubtasks(parentTaskId);
        const rowHtml = subtasks.map((s, idx) => {
          const ownerInputId = 'omp-subtask-owner-' + s.id;
          return `
          <div class="omp-subtask-row" data-subtask-id="${s.id}" style="display:flex;gap:8px;align-items:center;padding:10px 12px;border:1px solid var(--border-light);border-radius:8px;margin-bottom:8px;background:var(--bg-card);">
            <div style="display:flex;flex-direction:column;gap:2px;">
              <button type="button" onclick="window.omp_moveSubtaskRow(this, 'up')" ${idx === 0 ? 'disabled style="visibility:hidden;"' : ''} style="background:none;border:none;cursor:pointer;color:var(--text-tertiary);font-size:10px;line-height:1;" title="上移">▲</button>
              <button type="button" onclick="window.omp_moveSubtaskRow(this, 'down')" ${idx === subtasks.length - 1 ? 'disabled style="visibility:hidden;"' : ''} style="background:none;border:none;cursor:pointer;color:var(--text-tertiary);font-size:10px;line-height:1;" title="下移">▼</button>
            </div>
            <input type="text" class="omp-subtask-name" value="${escapeHtml(s.name)}" placeholder="子任务名称 *" style="flex:1;min-width:80px;padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
            <input type="text" id="${ownerInputId}" class="omp-subtask-owner" value="${typeof s.owner === 'object' ? (s.owner.displayName || s.owner.name || '') : (s.owner || '')}" placeholder="负责人 *" style="width:90px;padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
            <input type="date" class="omp-subtask-start" value="${s.startDate || ''}" style="width:120px;padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
            <input type="date" class="omp-subtask-end" value="${s.endDate || ''}" style="width:120px;padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
            <input type="number" class="omp-subtask-progress" value="${s.progress || 0}" min="0" max="100" placeholder="进度" style="width:60px;padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
            <input type="number" class="omp-subtask-weight" value="${s.weight || 1}" min="1" placeholder="权重" style="width:55px;padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
            <input type="number" class="omp-subtask-budget" value="${s.budget || ''}" placeholder="预算" style="width:60px;padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
            <button type="button" onclick="window.omp_removeSubtaskRow(this)" style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:16px;width:24px;" title="删除">✕</button>
          </div>`;
        }).join('');
        return `
          <div style="margin-bottom:16px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
              <div style="font-size:14px;font-weight:600;">子任务 (${subtasks.length})</div>
              <button type="button" class="btn btn-sm btn-primary" onclick="window.omp_addSubtaskRow('${parentTaskId}')" style="font-size:12px;">+ 添加子任务</button>
            </div>
            <div id="omp-subtask-list">${subtasks.length > 0 ? rowHtml : '<div style="padding:24px;text-align:center;color:var(--text-tertiary);">暂无子任务，点击上方按钮添加</div>'}</div>
          </div>`;
      }

      function omp_switchTaskEditTab(tab) {
        window._ompState.taskEditActiveTab = tab;
        const modal = document.getElementById('omp-active-modal');
        if (!modal) return;
        const taskId = window._ompState.editingTaskId;
        const tasks = omp_load('tasks');
        const task = tasks.find(t => t.id === taskId);
        if (!task) return;
        // Re-render tabs and content
        const isSubtask = omp_isSubtask(task);
        const tabs = [
          { id: 'basic', label: '基本信息' },
          { id: 'milestones', label: '里程碑' },
          { id: 'subtasks', label: `子任务 (${omp_getSubtasks(taskId).length})` },
          { id: 'resources', label: '资源' },
        ].filter(t => !isSubtask || t.id !== 'subtasks');
        const tabContainer = modal.querySelector('.omp-task-edit-tab')?.parentElement;
        if (tabContainer) {
          tabContainer.innerHTML = tabs.map(t => `
            <button type="button" class="omp-task-edit-tab ${tab === t.id ? 'active' : ''}" onclick="window.omp_switchTaskEditTab('${t.id}')" style="padding:10px 16px;font-size:13px;background:transparent;border:none;border-bottom:2px solid ${tab === t.id ? 'var(--primary)' : 'transparent'};color:${tab === t.id ? 'var(--primary)' : 'var(--text-secondary)'};cursor:pointer;">${t.label}</button>
          `).join('');
        }
        const contentContainer = modal.querySelector('#omp-task-edit-tab-content');
        if (contentContainer) {
          contentContainer.innerHTML = omp_renderTaskEditTabContent(task);
        }
        if (tab === 'basic' && window.ensurePersonInput) {
          window.ensurePersonInput('omp-task-owner', task.owner || '');
        }
        if (tab === 'subtasks' && window.ensurePersonInput) {
          omp_getSubtasks(taskId).forEach(s => {
            window.ensurePersonInput('omp-subtask-owner-' + s.id, s.owner || '');
          });
        }
      }

      function omp_switchTaskViewTab(tab) {
        window._ompState.taskViewActiveTab = tab;
        const modal = document.getElementById('omp-active-modal');
        if (!modal) return;
        const taskId = window._ompState.viewingTaskId;
        const tasks = omp_load('tasks');
        const task = tasks.find(t => t.id === taskId);
        if (!task) return;
        const tabs = [
          { id: 'basic', label: '基本信息' },
          { id: 'milestones', label: '里程碑' },
          { id: 'subtasks', label: `子任务 (${omp_getSubtasks(taskId).length})` },
          { id: 'resources', label: '资源' },
        ];
        const tabContainer = modal.querySelector('.omp-task-view-tab')?.parentElement;
        if (tabContainer) {
          tabContainer.innerHTML = tabs.map(t => `
            <button type="button" class="omp-task-view-tab ${tab === t.id ? 'active' : ''}" onclick="window.omp_switchTaskViewTab('${t.id}')" style="padding:10px 16px;font-size:13px;background:transparent;border:none;border-bottom:2px solid ${tab === t.id ? 'var(--primary)' : 'transparent'};color:${tab === t.id ? 'var(--primary)' : 'var(--text-secondary)'};cursor:pointer;">${t.label}</button>
          `).join('');
        }
        const contentContainer = modal.querySelector('#omp-task-view-tab-content');
        if (contentContainer) {
          contentContainer.innerHTML = omp_renderTaskViewTabContent(task);
        }
      }

      function omp_addSubtaskRow(parentId) {
        const container = document.getElementById('omp-subtask-list');
        if (!container) return;
        const placeholder = container.querySelector(':scope > div[style*="暂无子任务"]');
        if (placeholder) placeholder.remove();
        const tasks = omp_load('tasks');
        const parent = tasks.find(t => t.id === parentId);
        const row = document.createElement('div');
        row.className = 'omp-subtask-row';
        row.dataset.subtaskId = 'new_' + Date.now();
        row.style.cssText = 'display:flex;gap:8px;align-items:center;padding:10px 12px;border:1px solid var(--border-light);border-radius:8px;margin-bottom:8px;background:var(--bg-card);';
        const ownerInputId = 'omp-subtask-owner-' + Date.now();
        row.innerHTML = `
          <div style="display:flex;flex-direction:column;gap:2px;"><span style="width:18px;"></span></div>
          <input type="text" class="omp-subtask-name" placeholder="子任务名称 *" style="flex:1;min-width:80px;padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
          <input type="text" id="${ownerInputId}" class="omp-subtask-owner" placeholder="负责人 *" style="width:90px;padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
          <input type="date" class="omp-subtask-start" value="${parent ? parent.startDate : ''}" style="width:120px;padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
          <input type="date" class="omp-subtask-end" value="${parent ? parent.endDate : ''}" style="width:120px;padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
          <input type="number" class="omp-subtask-progress" value="0" min="0" max="100" placeholder="进度" style="width:60px;padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
          <input type="number" class="omp-subtask-weight" value="1" min="1" placeholder="权重" style="width:55px;padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
          <input type="number" class="omp-subtask-budget" placeholder="预算" style="width:60px;padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
          <button type="button" onclick="window.omp_removeSubtaskRow(this)" style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:16px;width:24px;" title="删除">✕</button>
        `;
        container.appendChild(row);
        if (window.ensurePersonInput) window.ensurePersonInput(ownerInputId, '');
      }

      function omp_removeSubtaskRow(btn) {
        const row = btn.closest('.omp-subtask-row');
        if (!row) return;
        const subtaskId = row.dataset.subtaskId;
        row.remove();
        const container = document.getElementById('omp-subtask-list');
        if (container && !container.querySelector('.omp-subtask-row')) {
          container.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text-tertiary);">暂无子任务，点击上方按钮添加</div>';
        }
        // If editing existing subtask, delete from storage immediately
        if (subtaskId && !subtaskId.startsWith('new_')) {
          window.omp_deleteSubtask(subtaskId);
        }
      }

      function omp_moveSubtaskRow(btn, direction) {
        const row = btn.closest('.omp-subtask-row');
        if (!row) return;
        const container = document.getElementById('omp-subtask-list');
        const rows = Array.from(container.querySelectorAll('.omp-subtask-row'));
        const idx = rows.indexOf(row);
        if (direction === 'up' && idx > 0) {
          container.insertBefore(row, rows[idx - 1]);
        } else if (direction === 'down' && idx < rows.length - 1) {
          container.insertBefore(row, rows[idx + 1].nextSibling);
        }
      }

      function omp_collectSubtasks(parentId) {
        const container = document.getElementById('omp-subtask-list');
        if (!container) return [];
        const tasks = omp_load('tasks');
        const parent = tasks.find(t => t.id === parentId);
        const rows = Array.from(container.querySelectorAll('.omp-subtask-row'));
        const existingSubtasks = omp_getSubtasks(parentId);
        const result = [];
        rows.forEach((row, idx) => {
          const rawId = row.dataset.subtaskId;
          const isNew = rawId && rawId.startsWith('new_');
          const name = row.querySelector('.omp-subtask-name')?.value?.trim();
          const ownerInput = row.querySelector('.omp-subtask-owner');
          const ownerRaw = ownerInput?.value?.trim();
          const owner = (ownerInput?.id && window.getPersonValue) ? window.getPersonValue(ownerInput.id) : ownerRaw;
          const startDate = row.querySelector('.omp-subtask-start')?.value || '';
          const endDate = row.querySelector('.omp-subtask-end')?.value || '';
          const progress = parseInt(row.querySelector('.omp-subtask-progress')?.value, 10) || 0;
          const weight = parseInt(row.querySelector('.omp-subtask-weight')?.value, 10) || 1;
          const budget = parseFloat(row.querySelector('.omp-subtask-budget')?.value) || 0;
          if (!name || !owner) return;
          if (isNew) {
            result.push({
              id: omp_generateSubtaskId(),
              cycleId: parent ? parent.cycleId : window._dsteState.currentCycleId,
              source: 'omp',
              parentId,
              seq: idx,
              name,
              description: '',
              type: parent ? parent.type : 'improvement',
              priority: 'P1',
              status: 'planning',
              progress,
              owner,
              dept: parent ? parent.dept : '',
              startDate,
              endDate,
              budget,
              actualCost: 0,
              relatedKpiIds: [],
              members: [],
              weight,
            });
          } else {
            const existing = existingSubtasks.find(s => s.id === rawId);
            if (existing) {
              result.push({ ...existing, name, owner, startDate, endDate, progress, budget, weight, seq: idx });
            }
          }
        });
        return result;
      }

      function omp_deleteSubtask(subtaskId) {
        if (!subtaskId) return;
        const tasks = omp_load('tasks');
        const subtask = tasks.find(t => t.id === subtaskId);
        if (!subtask) return;
        const parentId = subtask.parentId;
        const filtered = tasks.filter(t => t.id !== subtaskId);
        omp_save('tasks', filtered);
        // Delete associated milestones and progress records
        const milestones = omp_load('milestones');
        omp_save('milestones', milestones.filter(m => m.taskId !== subtaskId));
        const records = omp_load('progressRecords');
        omp_save('progressRecords', records.filter(r => r.taskId !== subtaskId));

      window.omp_saveKpi = function() {
        const indicatorId = document.getElementById('omp-kpi-indicator')?.value;
        const dept = document.getElementById('omp-kpi-dept')?.value?.trim();
        const owner = window.getPersonValue ? window.getPersonValue('omp-kpi-owner') : (document.getElementById('omp-kpi-owner')?.value?.trim() || '');
        const actual = parseFloat(document.getElementById('omp-kpi-actual')?.value) || 0;
        const period = document.getElementById('omp-kpi-period')?.value?.trim() || `${getCurrentCycle().year}-Q1`;
        const assessmentLevel = document.getElementById('omp-kpi-assessment-level')?.value || 'marketing-line';
        if (!dept || !owner) { showToast('请填写必填项（部门、责任人）', 'warning'); return; }
        const kpis = omp_load('kpiInstances');
        const editId = window._ompState.editingKpiId;
        if (editId === 'new') {
          // Note: new KPI creation is not available from OMP UI anymore;
          // kept for backward compatibility / programmatic use
          const target = parseFloat(document.getElementById('omp-kpi-target')?.value);
          const challenge = parseFloat(document.getElementById('omp-kpi-challenge')?.value) || 0;
          const weight = parseFloat(document.getElementById('omp-kpi-weight')?.value) || 20;
          if (!indicatorId) { showToast('请选择指标', 'warning'); return; }
          if (isNaN(target)) { showToast('请输入目标值', 'warning'); return; }
          const achievementRate = target > 0 ? Math.round((actual / target) * 100 * 10) / 10 : 0;
          kpis.push({ id: 'kpi_' + Date.now(), indicatorId, period, targetValue: target, challengeValue: challenge, actualValue: actual, achievementRate, weight, owner, dept, status: omp_getKpiStatus(achievementRate, actual), parentId: null, level: 0, assessmentLevel, source: 'omp', annualPlanKpiId: null });
        } else {
          const idx = kpis.findIndex(k => k.id === editId);
          if (idx > -1) {
            const oldKpi = kpis[idx];
            // Plan fields (targetValue, challengeValue, weight, indicatorId, assessmentLevel for derived) are locked;
            // only execution fields are editable in OMP
            const target = oldKpi.targetValue;
            const challenge = oldKpi.challengeValue || 0;
            const weight = oldKpi.weight;
            const achievementRate = target > 0 ? Math.round((actual / target) * 100 * 10) / 10 : 0;
            let history = oldKpi.history || [];
            if (oldKpi.achievementRate !== achievementRate) {
              history = [...history, oldKpi.achievementRate];
              if (history.length > 6) history = history.slice(-6);
            }
            const isDerived = !!oldKpi.annualPlanKpiId;
            const updates = { dept, owner, period, actualValue: actual, achievementRate, status: omp_getKpiStatus(achievementRate, actual), history };
            if (!isDerived) updates.assessmentLevel = assessmentLevel;
            kpis[idx] = { ...oldKpi, ...updates };
          }
        }
        omp_save('kpiInstances', kpis);
        window._ompState.editingKpiId = null;
        document.getElementById('omp-active-modal')?.remove();
        navigate('exe/kpi');
      };

      window.omp_saveTask = function() {
        const tasks = omp_load('tasks');
        const editId = window._ompState.editingTaskId;
        const activeTab = window._ompState.taskEditActiveTab || 'basic';
        const isNewTask = editId === 'new';

        if (isNewTask) {
          // 新建任务必须从基本信息页读取全部字段
          const name = document.getElementById('omp-task-name')?.value?.trim();
          const description = document.getElementById('omp-task-desc')?.value?.trim();
          const type = document.getElementById('omp-task-type')?.value;
          const priority = document.getElementById('omp-task-priority')?.value;
          const owner = window.getPersonValue ? window.getPersonValue('omp-task-owner') : (document.getElementById('omp-task-owner')?.value?.trim() || '');
          const dept = document.getElementById('omp-task-dept')?.value?.trim();
          const startDate = document.getElementById('omp-task-start')?.value || '';
          const endDate = document.getElementById('omp-task-end')?.value || '';
          const progress = parseInt(document.getElementById('omp-task-progress')?.value, 10) || 0;
          const status = document.getElementById('omp-task-status')?.value || 'planning';
          const budget = parseFloat(document.getElementById('omp-task-budget')?.value) || 0;
          const actualCost = parseFloat(document.getElementById('omp-task-cost')?.value) || 0;
          const kpiSelect = document.getElementById('omp-task-kpis');
          const relatedKpiIds = kpiSelect ? Array.from(kpiSelect.selectedOptions).map(o => o.value) : [];
          const annualTarget = document.getElementById('omp-task-annual-target')?.value?.trim() || '';
          const spLink = document.getElementById('omp-task-sp-link')?.value?.trim() || '';
          const biDashboard = document.getElementById('omp-task-bi-dashboard')?.value?.trim() || '';
          if (!name || !owner || !dept || !endDate) { showToast('请填写必填项（名称、负责人、部门、截止日期）', 'warning'); return; }
          tasks.push({ id: 'task_' + Date.now(), cycleId: window._dsteState.currentCycleId, source: 'omp', name, description, type, priority, status, progress, owner, dept, startDate, endDate, relatedKpiIds, budget, actualCost, annualTarget, spLink, biDashboard, members: [] });
        } else {
          const idx = tasks.findIndex(t => t.id === editId);
          if (idx > -1) {
            const existing = tasks[idx];
            const existingMembers = Array.isArray(existing.members) ? existing.members : [];
            const isDerived = existing.annualPlanTaskId;
            const isParentTask = !omp_isSubtask(existing);

            if (activeTab === 'basic') {
              // 基本信息页：读取并校验表单字段
              const name = document.getElementById('omp-task-name')?.value?.trim();
              const description = document.getElementById('omp-task-desc')?.value?.trim();
              const type = document.getElementById('omp-task-type')?.value;
              const priority = document.getElementById('omp-task-priority')?.value;
              const owner = window.getPersonValue ? window.getPersonValue('omp-task-owner') : (document.getElementById('omp-task-owner')?.value?.trim() || '');
              const dept = document.getElementById('omp-task-dept')?.value?.trim();
              const startDate = document.getElementById('omp-task-start')?.value || '';
              const endDate = document.getElementById('omp-task-end')?.value || '';
              const progress = parseInt(document.getElementById('omp-task-progress')?.value, 10) || 0;
              const status = document.getElementById('omp-task-status')?.value || 'planning';
              const budget = parseFloat(document.getElementById('omp-task-budget')?.value) || 0;
              const actualCost = parseFloat(document.getElementById('omp-task-cost')?.value) || 0;
              const kpiSelect = document.getElementById('omp-task-kpis');
              const relatedKpiIds = kpiSelect ? Array.from(kpiSelect.selectedOptions).map(o => o.value) : [];
              const annualTarget = document.getElementById('omp-task-annual-target')?.value?.trim() || '';
              const spLink = document.getElementById('omp-task-sp-link')?.value?.trim() || '';
              const biDashboard = document.getElementById('omp-task-bi-dashboard')?.value?.trim() || '';
              if (!name || !owner || !dept || !endDate) { showToast('请填写必填项（名称、负责人、部门、截止日期）', 'warning'); return; }
              const finalOwner = isDerived ? existing.owner : owner;
              let progressOverridden = existing.progressOverridden;
              if (isParentTask && progress !== existing.progress) {
                progressOverridden = true;
              }
              tasks[idx] = { ...existing, name, description, type, priority, owner: finalOwner, dept, startDate, endDate, status, progress, relatedKpiIds, budget, actualCost, annualTarget, spLink, biDashboard, members: existingMembers, progressOverridden };
            }

            // 父任务统一处理子任务增删改（子任务标签页保存时不应因基本信息字段缺失而失败）
            if (isParentTask) {
              const collected = omp_collectSubtasks(editId);
              const existingSubIds = new Set(collected.map(s => s.id));
              const filtered = tasks.filter(t => t.parentId !== editId || existingSubIds.has(t.id));
              const parentIdx = filtered.findIndex(t => t.id === editId);
              if (parentIdx > -1) filtered[parentIdx] = tasks[idx];
              const filteredIds = new Set(filtered.map(t => t.id));
              collected.forEach(s => {
                if (!filteredIds.has(s.id)) filtered.push(s);
              });
              tasks.length = 0;
              tasks.push(...filtered);
            }
          }
        }
        omp_save('tasks', tasks);
        if (editId !== 'new' && !omp_isSubtask(tasks.find(t => t.id === editId))) {
          omp_recalculateParentProgress(editId);
        }
        window._ompState.editingTaskId = null;
        window._ompState.taskEditActiveTab = 'basic';
        document.getElementById('omp-active-modal')?.remove();
        navigate('exe/tasks');
      };

      window.omp_toggleTaskExpand = function(taskId) {
        if (!window._ompState.taskExpandedIds) window._ompState.taskExpandedIds = new Set();
        if (window._ompState.taskExpandedIds.has(taskId)) {

      window.omp_staffingAssignDrag = async function(taskIds, personRef, mode) {
        if (!taskIds || taskIds.length === 0 || !personRef) return;
        const tasks = omp_load('tasks');
        let changed = false;
        let skippedAsOwner = 0;
        const changedTaskIds = [];
        tasks.forEach(t => {
          if (!taskIds.includes(t.id)) return;
          t.members = Array.isArray(t.members) ? t.members : [];
          if (mode === 'owner') {
            // PRD v1.8：人员配置台不处理负责人变更
            return;
          }
          if (t.owner === personRef) { skippedAsOwner++; return; }
          if (!t.members.includes(personRef)) {
            t.members.push(personRef);
            changed = true;
            changedTaskIds.push(t.id);
          }
        });
        if (changed) {
          omp_save('tasks', tasks);
          showToast(`已分配 ${changedTaskIds.length} 项任务`, 'success');
        } else if (skippedAsOwner > 0) {
          showToast('该人员已是这些任务的负责人，无需添加为成员', 'warning');
        }
        navigate('exe/tasks');
      };
      window.omp_staffingRemoveMember = async function(taskId, personRef) {
        if (!taskId || !personRef) return;
        const tasks = omp_load('tasks');
        const task = tasks.find(t => t.id === taskId);
        if (!task || !Array.isArray(task.members)) return;
        const idx = task.members.indexOf(personRef);
        if (idx === -1) return;
        task.members.splice(idx, 1);
        omp_save('tasks', tasks);
        showToast('已移除成员', 'success');
        navigate('exe/tasks');
      };
      window.omp_staffingReorderMember = async function(taskId, sourceRef, targetRef, before) {
        if (!taskId || !sourceRef || !targetRef || sourceRef === targetRef) return;
        const tasks = omp_load('tasks');
        const task = tasks.find(t => t.id === taskId);
        if (!task || !Array.isArray(task.members)) return;
        const members = task.members.filter(m => m);
        const fromIdx = members.indexOf(sourceRef);
        const toIdx = members.indexOf(targetRef);
        if (fromIdx === -1 || toIdx === -1) return;
        members.splice(fromIdx, 1);
        let insertIdx = members.indexOf(targetRef);
        if (!before) insertIdx++;
        members.splice(insertIdx, 0, sourceRef);
        task.members = members;
        omp_save('tasks', tasks);
        showToast('已调整成员顺序', 'success');
        navigate('exe/tasks');
      };

      window.omp_toggleDimension = function(dimKey) {
        window._ompState.kpiDimCollapsed = window._ompState.kpiDimCollapsed || {};
        const wasCollapsed = window._ompState.kpiDimCollapsed[dimKey];
        window._ompState.kpiDimCollapsed[dimKey] = !wasCollapsed;
        const dimEl = document.querySelector(`.omp-bsc-dimension[data-dim="${dimKey}"]`);
        if (!dimEl) return;
