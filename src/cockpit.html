          document.getElementById('edit-scenario').value = d.scenario || 'hq_routine';
          document.getElementById('edit-level').value = d.level || 'L2';
          document.getElementById('edit-status').value = d.status || 'planned';
          renderAgendaList();
          renderActionList();

          // 草稿自动保存：表单变化实时同步到 _meetingEditData
          const fieldMap = {
            'edit-title': 'title', 'edit-date': 'date', 'edit-location': 'location',
            'edit-host': 'host', 'edit-recorder': 'recorder',
            'edit-scenario': 'scenario', 'edit-level': 'level', 'edit-status': 'status'
          };
          // 追踪用户手动编辑的字段（autoFill 不覆盖用户手改的值）
          window._userEditedFields = window._userEditedFields || new Set();
          Object.entries(fieldMap).forEach(([id, key]) => {
            const el = document.getElementById(id);
            if (el) {
              el.oninput = () => {
                if (window._meetingEditData) {
                  window._meetingEditData[key] = el.value;
                }
                if (key !== 'title') {
                  window._userEditedFields.add(key);
                }
              };
            }
          });

          // 会议名称输入防抖自动填充（停止输入 500ms 后触发）
          const titleEl = document.getElementById('edit-title');
          if (titleEl) {
            let _autoFillTimer = null;
            titleEl.oninput = () => {
              if (window._meetingEditData) {
                window._meetingEditData.title = titleEl.value;
              }
              clearTimeout(_autoFillTimer);
              _autoFillTimer = setTimeout(() => { autoFillMeetingForm(); }, 500);
            };
          }
        }
        function renderAgendaList() {

              </select>

              <input type="number" value="${item.duration}" onchange="updateAgendaDuration(${idx}, this.value)" placeholder="分钟" min="1" style="width: 60px; padding: 5px 8px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 12px; background: var(--bg-card); color: var(--text-primary);" />
              <input type="text" value="${item.material_link || ''}" onchange="updateAgendaMaterialLink(${idx}, this.value)" placeholder="材料链接" style="width: 120px; padding: 5px 8px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 12px; background: var(--bg-card); color: var(--text-primary);" />

              <button type="button" onclick="moveAgendaItem(${idx}, -1)" ${idx === 0 ? 'disabled' : ''} style="padding: 4px 8px; font-size: 12px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-page); cursor: pointer; color: var(--text-secondary);">↑</button>
              <button type="button" onclick="moveAgendaItem(${idx}, 1)" ${idx === list.length - 1 ? 'disabled' : ''} style="padding: 4px 8px; font-size: 12px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-page); cursor: pointer; color: var(--text-secondary);">↓</button>
              <button type="button" onclick="removeAgendaItem(${idx})" ${list.length <= 1 ? 'disabled' : ''} style="padding: 4px 8px; font-size: 12px; border: 1px solid var(--danger); border-radius: 4px; background: rgba(245,34,45,0.08); cursor: pointer; color: var(--danger);">×</button>
            </div>

          document.getElementById('edit-agenda-total').textContent = '总时长：' + total + ' 分钟';
        }
        window.updateAgendaType = function(idx, val) { if (window._meetingEditData?.agenda_items?.[idx]) window._meetingEditData.agenda_items[idx].type = val; };
        window.updateAgendaTitle = function(idx, val) { if (window._meetingEditData?.agenda_items?.[idx]) window._meetingEditData.agenda_items[idx].title = val; };
        window.updateAgendaDuration = function(idx, val) { if (window._meetingEditData?.agenda_items?.[idx]) window._meetingEditData.agenda_items[idx].duration = parseInt(val) || 0; renderAgendaList(); };
        window.updateAgendaOwner = function(idx, val) { if (window._meetingEditData?.agenda_items?.[idx]) window._meetingEditData.agenda_items[idx].owner = val; };

        window.addAgendaItem = function() {

          renderAgendaList();
        };

        window.saveMeeting = function() {

        const insightsHtml = insights.map(i => {
          const linkedTopic = topics.find(t => t.id === i.linkedTopicId);
          return `
            <div class="insight-item" data-insight-id="${i.id}" style="padding:12px;border-radius:6px;background:var(--bg-page);margin-bottom:8px;cursor:pointer;transition:background 0.2s;" onmouseover="this.style.background='var(--bg-secondary)'" onmouseout="this.style.background='var(--bg-page)'">
              <div style="display:flex;justify-content:space-between;align-items:start;gap:12px;">
                <div style="flex:1;">
                  <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                    <span style="font-size:12px;padding:2px 6px;border-radius:4px;background:${impactColor[i.impact]}15;color:${impactColor[i.impact]};font-weight:500;">${impactLabel[i.impact]}影响</span>
                    <span style="font-size:12px;color:var(--text-tertiary);">置信度 ${i.confidence}%</span>

                  </div>
                  <div style="font-weight:600;margin-bottom:4px;">${i.title}</div>
                  <div style="font-size:13px;color:var(--text-secondary);line-height:1.5;">${i.content}</div>
                  <div style="font-size:12px;color:var(--text-tertiary);margin-top:4px;">来源: ${i.source}</div>
                  ${linkedTopic ? `<div style="margin-top:6px;">
                    <span style="font-size:12px;padding:2px 8px;border-radius:4px;background:var(--primary);color:#fff;">已生成专题: ${linkedTopic.name}</span>
                  </div>` : ''}
                </div>
                <div style="display:flex;gap:4px;flex-shrink:0;">
                  ${!linkedTopic ? `<button class="btn btn-sm btn-primary generate-topic-btn" data-insight-id="${i.id}" style="padding:4px 12px;font-size:12px;white-space:nowrap;">生成专题</button>` : ''}
                  <button class="btn btn-sm btn-secondary edit-insight-btn" data-insight-id="${i.id}" style="padding:4px 8px;font-size:12px;">编辑</button>
                  <button class="btn btn-sm btn-danger delete-insight-btn" data-insight-id="${i.id}" style="padding:4px 8px;font-size:12px;">删除</button>
                </div>
              </div>
            </div>
          `;

        // 渲染专题表格
        const topicRows = topics.map(t => `
          <tr data-topic-id="${t.id}">
            <td><strong>${t.name}</strong></td>
            <td><span style="padding:2px 8px;border-radius:4px;background:var(--bg-page);font-size:12px;">${t.dimension}</span></td>
            <td>${typeLabel[t.type]}</td>
            <td>${priorityIcon[t.priority]} ${t.priority}</td>
            <td>${t.owner}</td>
            <td><span class="status-badge ${statusClass[t.status]}">${statusLabel[t.status]}</span></td>
            <td><div style="display:flex;align-items:center;gap:8px"><div class="progress-bar" style="width:80px"><div class="progress-bar-fill ${t.progress < 50 && t.progress > 0 ? 'warning' : ''}" style="width:${t.progress}%"></div></div><span style="font-size:12px">${t.progress}%</span></div></td>
            <td style="font-size:12px;color:var(--text-tertiary)">${t.updatedAt}</td>
            <td>
              <button class="btn btn-sm btn-secondary view-topic-btn" data-topic-id="${t.id}" style="padding:4px 8px;font-size:12px;">查看</button>
              <button class="btn btn-sm btn-primary edit-topic-btn" data-topic-id="${t.id}" style="padding:4px 8px;font-size:12px;">编辑</button>
              <button class="btn btn-sm btn-danger delete-topic-btn" data-topic-id="${t.id}" style="padding:4px 8px;font-size:12px;">删除</button>
            </td>
          </tr>
        `).join('');

        // Tab切换脚本 - 使用全局函数避免嵌套script
        window.switchInsightsTab = function(tabName) {
          window._insightsActiveTab = tabName;
          const container = document.getElementById('insights-topics-container');
          if (!container) return;
          const tabs = container.querySelectorAll('.insights-tab');
          const panels = container.querySelectorAll('.insights-panel');
          tabs.forEach(t => {
            if (t.dataset.tab === tabName) {
              t.style.borderBottom = '2px solid var(--primary)';
              t.style.color = 'var(--primary)';
              t.style.fontWeight = '600';
            } else {
              t.style.borderBottom = '2px solid transparent';
              t.style.color = 'var(--text-secondary)';
              t.style.fontWeight = '500';
            }
          });
          panels.forEach(p => p.style.display = p.id === 'panel-' + tabName ? 'block' : 'none');
        };

        window.filterTopicsByYear = function(year) {
          window._insightsSelectedYear = parseInt(year, 10);
          window._insightsActiveTab = 'topics';
          navigate('sp/insights-topics');
        };

        // ===== 专题 CRUD 全局函数 =====

        // 当前编辑/查看的专题ID
        window._topicEditId = null;

        // 加载专题数据
        function loadTopics() {
          try {
            const data = localStorage.getItem(STORAGE_KEY_TOPICS);
            if (data) return JSON.parse(data);
          } catch(e) {}
          return [];
        }

        // 保存专题数据
        function saveTopics(topics) {
          localStorage.setItem(STORAGE_KEY_TOPICS, JSON.stringify(topics));
        }

        // 获取未删除的专题
        function getActiveTopics() {
          return loadTopics().filter(t => !t.deleted);
        }

        // 查看专题详情
        window.viewTopicDetail = function(topicId) {
          const topics = getActiveTopics();
          const topic = topics.find(t => t.id === topicId);
          if (!topic) return;

          const typeLabel = { breakthrough: '突破型', incremental: '增量型', maintenance: '维持型' };
        const statusClass = { insight: 'status-default', planning: 'status-primary', execution: 'status-warning', closed: 'status-success' };
        const statusLabel = { insight: '洞察阶段', planning: '规划阶段', execution: '执行阶段', closed: '已闭环' };

          const milestonesHtml = (topic.milestones || []).map((m, idx) => `
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-light);${idx === (topic.milestones || []).length - 1 ? 'border-bottom:none;' : ''}">
              <span style="font-size:16px;">${m.completed ? '✅' : '○'}</span>
              <div style="flex:1;">
                <div style="font-size:13px;font-weight:500;">${m.title}</div>
                <div style="font-size:12px;color:var(--text-tertiary);">${m.date || '未设定日期'}</div>
              </div>
              <span style="font-size:12px;padding:2px 8px;border-radius:4px;background:${m.completed ? 'var(--success-bg)' : 'var(--bg-page)'};color:${m.completed ? 'var(--success)' : 'var(--text-secondary)'};">${m.completed ? '已完成' : '待办'}</span>
            </div>
          `).join('') || '<div style="padding:20px;text-align:center;color:var(--text-tertiary);font-size:13px;">暂无里程碑</div>';

          const insightsData = loadInsights();
          const linkedInsightsHtml = (topic.insights || []).map(insightId => {
            const ins = insightsData.find(i => i.id === insightId);
            if (!ins) return '';
            return `<div style="padding:8px 12px;border-radius:6px;background:var(--bg-page);margin-bottom:6px;font-size:13px;"><strong>${ins.source}</strong>: ${ins.title}</div>`;
          }).join('') || '<div style="padding:12px;text-align:center;color:var(--text-tertiary);font-size:13px;">未关联洞察</div>';

          const overlay = document.createElement('div');
          overlay.id = 'topic-detail-overlay';
          overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;';
          overlay.innerHTML = `
            <div id="topic-detail-modal" style="background:var(--bg-card);border-radius:12px;max-width:640px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
              <div style="display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border-color);">
                <h2 style="margin:0;font-size:18px;">专题详情</h2>
                <button onclick="document.getElementById('topic-detail-overlay').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-secondary);">×</button>
              </div>
              <div style="padding:24px;">
                <div style="font-size:20px;font-weight:700;margin-bottom:4px;">${topic.name}</div>
                <div style="font-size:13px;color:var(--text-secondary);margin-bottom:20px;">${topic.year}年 · ${typeLabel[topic.type] || topic.type} · ${priorityIcon[topic.priority]} ${topic.priority}</div>

                <div style="display:grid;grid-template-columns:repeat(2, 1fr);gap:16px;margin-bottom:20px;">
                  <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">负责人</div><div style="font-size:14px;font-weight:500;">${topic.owner}</div></div>
                  <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">战略维度</div><div style="font-size:14px;font-weight:500;">${topic.dimension}</div></div>
                  <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">阶段</div><div style="font-size:14px;font-weight:500;">${statusLabel[topic.status] || topic.status}</div></div>
                  <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">进度</div><div style="font-size:14px;font-weight:500;">${topic.progress}%</div></div>
                  <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">预算</div><div style="font-size:14px;font-weight:500;">${topic.budget || '未设定'}</div></div>
                  <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">实际成本</div><div style="font-size:14px;font-weight:500;">${topic.actualCost || '未记录'}</div></div>
                  <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">开始日期</div><div style="font-size:14px;font-weight:500;">${topic.startDate}</div></div>
                  <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">结束日期</div><div style="font-size:14px;font-weight:500;">${topic.endDate}</div></div>
                </div>

                <div style="margin-bottom:20px;">
                  <div style="font-size:14px;font-weight:600;margin-bottom:10px;">📌 里程碑</div>
                  <div style="border:1px solid var(--border-light);border-radius:8px;padding:0 12px;">${milestonesHtml}</div>
                </div>

                <div style="margin-bottom:20px;">
                  <div style="font-size:14px;font-weight:600;margin-bottom:10px;">🔗 关联洞察</div>
                  <div>${linkedInsightsHtml}</div>
                </div>

                <div style="display:flex;gap:10px;justify-content:flex-end;padding-top:16px;border-top:1px solid var(--border-color);">
                  <button class="btn btn-secondary" onclick="document.getElementById('topic-detail-overlay').remove()">关闭</button>
                  <button class="btn btn-primary" onclick="document.getElementById('topic-detail-overlay').remove(); window.openTopicEdit('${topic.id}')">编辑</button>
                </div>
              </div>
            </div>
          `;
          document.body.appendChild(overlay);
          overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
        };

        // 打开编辑弹窗
        window.openTopicEdit = function(topicId) {
          const topics = getActiveTopics();
          const topic = topics.find(t => t.id === topicId);
          if (!topic) return;
          window._topicEditId = topicId;

          const insightsData = loadInsights();
          const typeOptions = [['breakthrough','突破型'],['incremental','增量型'],['maintenance','维持型']].map(([v,l]) => `<option value="${v}" ${topic.type === v ? 'selected' : ''}>${l}</option>`).join('');
          const priorityOptions = [['P0','🔴 P0 - 最高'],['P1','🟡 P1 - 高'],['P2','🟢 P2 - 中']].map(([v,l]) => `<option value="${v}" ${topic.priority === v ? 'selected' : ''}>${l}</option>`).join('');
          const statusOptions = [['insight','洞察阶段'],['planning','规划阶段'],['execution','执行阶段'],['closed','已闭环']].map(([v,l]) => `<option value="${v}" ${topic.status === v ? 'selected' : ''}>${l}</option>`).join('');

          const milestoneRows = (topic.milestones || []).map((m, idx) => `
            <div class="milestone-row" data-idx="${idx}" style="display:flex;gap:8px;align-items:center;margin-bottom:8px;">
              <input type="checkbox" class="ms-completed" ${m.completed ? 'checked' : ''} style="width:16px;height:16px;">
              <input type="text" class="ms-title" value="${m.title}" placeholder="里程碑标题" style="flex:1;padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
              <input type="date" class="ms-date" value="${m.date || ''}" style="padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
              <button type="button" onclick="this.parentElement.remove()" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px;">×</button>
            </div>
          `).join('') || '';

          const insightOptions = insightsData.map(i => `<option value="${i.id}" ${(topic.insights || []).includes(i.id) ? 'selected' : ''}>${i.source}: ${i.title}</option>`).join('');

          const overlay = document.createElement('div');
          overlay.id = 'topic-edit-overlay';
          overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;';
          overlay.innerHTML = `
            <div id="topic-edit-modal" style="background:var(--bg-card);border-radius:12px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
              <div style="display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border-color);">
                <h2 style="margin:0;font-size:18px;">编辑专题</h2>
                <button onclick="document.getElementById('topic-edit-overlay').remove(); window._topicEditId = null;" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-secondary);">×</button>
              </div>
              <div style="padding:24px;">
                <div style="display:grid;grid-template-columns:repeat(2, 1fr);gap:16px;margin-bottom:16px;">
                  <div>
                    <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">专题名称</label>
                    <input type="text" id="edit-topic-name" value="${topic.name}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
                  </div>
                  <div>
                    <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">负责人</label>
                    <input type="text" id="edit-topic-owner" value="${topic.owner}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
                  </div>
                  <div>
                    <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">战略维度</label>
                    <input type="text" id="edit-topic-dimension" value="${topic.dimension}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
                  </div>
                  <div>
                    <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">类型</label>
                    <select id="edit-topic-type" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">${typeOptions}</select>
                  </div>
                  <div>
                    <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">优先级</label>
                    <select id="edit-topic-priority" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">${priorityOptions}</select>
                  </div>
                  <div>
                    <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">阶段</label>
                    <select id="edit-topic-status" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">${statusOptions}</select>
                  </div>
                  <div>
                    <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">开始日期</label>
                    <input type="date" id="edit-topic-startDate" value="${topic.startDate}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
                  </div>
                  <div>
                    <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">结束日期</label>
                    <input type="date" id="edit-topic-endDate" value="${topic.endDate}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
                  </div>
                  <div>
                    <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">预算</label>
                    <input type="text" id="edit-topic-budget" value="${topic.budget || ''}" placeholder="例如: 50万" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
                  </div>
                  <div>
                    <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">进度 (%)</label>
                    <input type="number" id="edit-topic-progress" value="${topic.progress}" min="0" max="100" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
                  </div>
                </div>

                <div style="margin-bottom:16px;">
                  <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">年份 (不可修改)</label>
                  <input type="text" value="${topic.year}年" disabled style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-page);color:var(--text-tertiary);cursor:not-allowed;">
                </div>

                <div style="margin-bottom:16px;">
                  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                    <label style="font-size:12px;color:var(--text-tertiary);">📌 里程碑</label>
                    <button type="button" class="btn btn-sm btn-secondary" onclick="window.addMilestoneRow()">+ 添加里程碑</button>
                  </div>
                  <div id="edit-topic-milestones">${milestoneRows}</div>
                </div>

                <div style="margin-bottom:20px;">
                  <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">🔗 关联洞察 (多选)</label>
                  <select id="edit-topic-insights" multiple style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);min-height:80px;">${insightOptions}</select>
                </div>

                <div style="display:flex;gap:10px;justify-content:flex-end;padding-top:16px;border-top:1px solid var(--border-color);">
                  <button class="btn btn-secondary" onclick="document.getElementById('topic-edit-overlay').remove(); window._topicEditId = null;">取消</button>
                  <button class="btn btn-primary" onclick="window.saveTopicEdit()">保存</button>
                </div>
              </div>
            </div>
          `;
          document.body.appendChild(overlay);
          overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.remove(); window._topicEditId = null; } });
        };

        // 删除里程碑（inline 调用，此处为测试兼容声明）
        window.removeMilestone = function(rowEl) { if(rowEl) rowEl.remove(); };

        // 添加里程碑行
        window.addMilestoneRow = function() {
          const container = document.getElementById('edit-topic-milestones');
          if (!container) return;
          const row = document.createElement('div');
          row.className = 'milestone-row';
          row.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px;';
          row.innerHTML = `
            <input type="checkbox" class="ms-completed" style="width:16px;height:16px;">
            <input type="text" class="ms-title" placeholder="里程碑标题" style="flex:1;padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
            <input type="date" class="ms-date" style="padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
            <button type="button" onclick="this.parentElement.remove()" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px;">×</button>
          `;
          container.appendChild(row);
        };

        // 保存编辑
        window.saveTopicEdit = function() {
          const topicId = window._topicEditId;
          if (!topicId) return;
          const topics = loadTopics();
          const idx = topics.findIndex(t => t.id === topicId);
          if (idx === -1) return;

          // 收集里程碑
          const milestoneRows = document.querySelectorAll('#edit-topic-milestones .milestone-row');
          const milestones = Array.from(milestoneRows).map(row => ({
            title: row.querySelector('.ms-title').value.trim(),
            date: row.querySelector('.ms-date').value,
            completed: row.querySelector('.ms-completed').checked
          })).filter(m => m.title);

          // 收集关联洞察
          const insightSelect = document.getElementById('edit-topic-insights');
          const selectedInsights = insightSelect ? Array.from(insightSelect.selectedOptions).map(o => o.value) : [];

          topics[idx] = {
            ...topics[idx],
            name: document.getElementById('edit-topic-name').value.trim() || topics[idx].name,
            dimension: document.getElementById('edit-topic-dimension').value.trim() || topics[idx].dimension,
            type: document.getElementById('edit-topic-type').value,
            priority: document.getElementById('edit-topic-priority').value,
            owner: document.getElementById('edit-topic-owner').value.trim() || topics[idx].owner,
            status: document.getElementById('edit-topic-status').value,
            startDate: document.getElementById('edit-topic-startDate').value,
            endDate: document.getElementById('edit-topic-endDate').value,
            budget: document.getElementById('edit-topic-budget').value.trim(),
            progress: parseInt(document.getElementById('edit-topic-progress').value, 10) || 0,
            milestones: milestones,
            insights: selectedInsights,
            updatedAt: new Date().toISOString().slice(0, 10)
          };

          saveTopics(topics);
          window._topicEditId = null;
          const overlay = document.getElementById('topic-edit-overlay');
          if (overlay) overlay.remove();
          navigate('sp/insights-topics');
        };

        // 删除确认
        window.confirmDeleteTopic = function(topicId) {
          const topics = getActiveTopics();
          const topic = topics.find(t => t.id === topicId);
          if (!topic) return;

          const overlay = document.createElement('div');
          overlay.id = 'delete-confirm-overlay';
          overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;';
          overlay.innerHTML = `
            <div id="delete-confirm-modal" style="background:var(--bg-card);border-radius:12px;max-width:400px;width:100%;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.3);text-align:center;">

                <button class="btn btn-secondary" onclick="document.getElementById('delete-confirm-overlay').remove()">取消</button>
                <button class="btn btn-danger" onclick="window.executeDeleteTopic('${topicId}')">确认删除</button>

          `;

          overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

        window.executeDeleteTopic = function(topicId) {
          const topics = loadTopics();
          const idx = topics.findIndex(t => t.id === topicId);
          if (idx > -1) {
            topics[idx].deleted = true;
            topics[idx].updatedAt = new Date().toISOString().slice(0, 10);

      // ===== 面包屑辅助函数 =====
      const PHASE_MAP = {

      // ===== AI 聊天交互 =====
      document.addEventListener('click', (e) => {

        if (e.target.id === 'ai-chat-input' && e.key === 'Enter') sendAIMessage();

      function sendAIMessage() {
        const input = document.getElementById('ai-chat-input');
        if (!input) return;
        const text = input.value.trim();
        if (!text) return;

                      <div style="font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px;">${kanbanIcons[col]} ${col}</div>
                      ${kanbanCards[col]}
                    </div>
                  `).join('')}
                </div>
              </div>
            `;
          })()}

          <div class="related-links">
            <div class="related-links-label">关联功能</div>
            <div class="related-links-row">
              <a class="related-link" href="#dashboard" data-navigate="dashboard">🎛️ 驾驶舱概览</a>
              <a class="related-link" href="reviewer.html">📋 会议材料审核</a>
              <a class="related-link" href="business-topics.html">📂 业务专题管理</a>
            </div>
          </div>

          <style>
            @keyframes pulse {
              0%, 100% { box-shadow: 0 0 0 4px rgba(250,173,20,0.2); }
              50% { box-shadow: 0 0 0 8px rgba(250,173,20,0.05); }
            }
            @keyframes pulse-dot {
              0%, 100% { box-shadow: 0 0 0 2px rgba(24,144,255,0.25); }
              50% { box-shadow: 0 0 0 6px rgba(24,144,255,0.08); }
            }
          </style>
        `;
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      // 开发路线图筛选
      window.filterRoadmap = function(filter) {
        const rows = document.querySelectorAll('[data-module-status]');
        rows.forEach(row => {
          const status = row.dataset.moduleStatus;
          if (filter === 'all' || status === filter) {
            row.style.display = '';
          } else {
            row.style.display = 'none';
          }
        });
      }

      // 暴露全局 navigate
      window.navigate = navigate;

      // 启动
      init();

      // 显示版本号
      console.log('DSTE Platform v' + (typeof __APP_VERSION__ !== 'undefined' ? __APP_VERSION__ : 'dev'));
    })();
  </script>
  <div id="app-version" style="position:fixed;bottom:4px;right:8px;font-size:11px;color:var(--text-tertiary);opacity:0.6;z-index:9999;pointer-events:none;"></div>
  <script type="module">
    (function() {
      var v = typeof __APP_VERSION__ !== 'undefined' ? __APP_VERSION__ : 'dev';
      var el = document.getElementById('app-version');
      if (el) el.textContent = 'v' + v;
    })();
  </script>
</body>
</html>
