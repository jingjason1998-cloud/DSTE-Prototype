<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSTE 战略管理平台</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="./styles/shell.css">
  <link rel="stylesheet" href="./styles/ai-chat.css">
  <style>
    /* ===== cockpit.html 页面级响应式覆盖 ===== */

    /* Tablet (<1024px) */
    @media (max-width: 1024px) {
      #page-content [style*="grid-template-columns: repeat(4, 1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: 2fr 1fr"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(3, 1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: repeat(7, 1fr)"] {
        grid-template-columns: repeat(4, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: repeat(5, 1fr)"] {
        grid-template-columns: repeat(3, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: 280px 1fr"] {
        grid-template-columns: 1fr !important;
      }
      /* Roadmap 时间线节点缩小 */
      #dev-timeline .timeline-node {
        min-width: 90px !important;
        padding: 6px !important;
      }
    }

    /* Mobile (<768px) */
    @media (max-width: 768px) {
      #page-content [style*="grid-template-columns: repeat(4, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(2, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(3, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(7, 1fr)"] {
        grid-template-columns: repeat(3, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: repeat(5, 1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: 280px 1fr"] {
        grid-template-columns: 1fr !important;
      }
      /* Roadmap 时间线节点进一步缩小 */
      #dev-timeline .timeline-node {
        min-width: 80px !important;
        padding: 4px !important;
      }
      #dev-timeline .timeline-node > div:nth-child(2) {
        font-size: 12px !important;
      }
      #dev-timeline .timeline-node > div:nth-child(3),
      #dev-timeline .timeline-node > div:nth-child(4) {
        font-size: 10px !important;
      }
      /* 卡片 padding 缩小 */
      #page-content .card {
        padding: 12px !important;
      }
      /* 看板列从 4 列变为可滚动 */
      #page-content [style*="grid-template-columns: repeat(4, 1fr)"][class*="kanban"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
    }

    /* Small Phone (<480px) */
    @media (max-width: 480px) {
      #page-content [style*="grid-template-columns: repeat(2, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(7, 1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: repeat(5, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(4, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #dev-timeline .timeline-node {
        min-width: 70px !important;
      }
      #page-content .card {
        padding: 10px !important;
      }
      /* 看板单列 */
      #page-content [style*="grid-template-columns: repeat(4, 1fr)"][class*="kanban"] {
        grid-template-columns: 1fr !important;
      }
    }

    /* ===== OMP 专用 CSS 变量 ===== */
    :root {
      /* BSC 维度色 */
      --dim-financial: #1E3A5F;
      --dim-customer: #2E8B57;
      --dim-process: #D4A017;
      --dim-learning: #6B4C9A;
      /* KPI 层级色 */
      --kpi-level-0: #003087;
      --kpi-level-1: #005EB8;
      --kpi-level-2: #99C7E8;
      /* 画布背景 */
      --canvas-bg: var(--bg-page);
      --canvas-node-bg: var(--bg-card);
      --canvas-stroke: var(--border-color);
      --canvas-progress-track: var(--border-light);
      /* 辅助色 */
      --accent-pink: #EB2F96;
    }

    /* 表格横向滚动容器 */
    .table-scroll-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .table-scroll-wrapper table {
      min-width: 600px;
    }

    /* ===== 战略专题管理：紧凑表格 + 内容区滚动 ===== */
    .st-compact-table {
      font-size: 12px;
      line-height: 1.35;
    }
    .st-compact-table th {
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--bg-page);
    }
    .st-compact-table td {
      padding: 4px 8px;
      font-size: 12px;
      vertical-align: middle;
    }
    .st-compact-table .status-badge {
      font-size: 11px;
      padding: 1px 6px;
    }
    .st-compact-table .chain-badge {
      font-size: 10px;
      padding: 0 4px;
    }
    .st-action-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      width: 26px;
      height: 26px;
      padding: 0;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-secondary);
      text-decoration: none;
    }
    .st-action-link:hover {
      background: var(--bg-page);
      color: var(--primary);
      text-decoration: none;
    }
    .st-action-link.danger:hover {
      color: var(--danger);
    }
    .st-year-card {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .st-year-card .table-scroll-wrapper {
      flex: 1 1 auto;
      min-height: 0;
      max-height: min(58vh, 560px);
      overflow-y: auto;
    }
    .st-year-card .st-compact-table {
      min-width: 0;
      width: 100%;
    }

    /* ===== 全局弹窗样式 ===== */
    .omp-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .omp-modal { background: var(--bg-card); border-radius: 12px; max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .omp-modal-wide { max-width: 900px !important; }

    /* ===== 年度经营计划公用样式 ===== */
    .ap-card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 10px; overflow: hidden; }
    .ap-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .ap-table th, .ap-table td { padding: 10px; border-bottom: 1px solid var(--border-light); }
    .ap-dim-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
    .ap-level-badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 600; }
    .ap-level-marketing-line { background: color-mix(in srgb, var(--kpi-level-0) 15%, transparent); color: var(--kpi-level-0); }
    .ap-level-department { background: color-mix(in srgb, var(--kpi-level-1) 15%, transparent); color: var(--kpi-level-1); }
    .ap-level-team { background: color-mix(in srgb, var(--kpi-level-2) 15%, transparent); color: var(--kpi-level-2); }
    .ap-status-pill { display: inline-block; font-size: 12px; padding: 2px 8px; border-radius: 4px; }
    .ap-edit-panel { position: fixed; top: 0; right: 0; width: 360px; height: 100vh; background: var(--bg-card); border-left: 1px solid var(--border-color); z-index: 100; padding: 20px; overflow-y: auto; box-shadow: -4px 0 20px rgba(0,0,0,0.1); }
    .ap-section-title { font-size: 14px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 8px; margin-top: 24px; margin-bottom: 8px; }

    /* ===== KPI 指标树 — 卡片式层级视图 ===== */
    /* ===== Canvas 自由画布 KPI 树 ===== */
    .omp-kpi-canvas {
      position: relative;
      width: 100%;
      height: 700px;
      overflow: hidden;
      background: var(--canvas-bg);
      border-radius: 12px;
      border: 1px solid var(--border-color);
      cursor: grab;
      user-select: none;
    }
    .omp-kpi-canvas:active { cursor: grabbing; }
    .omp-kpi-canvas-inner {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
    }
    /* SVG 连接线层 */
    .omp-canvas-svg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    .omp-canvas-svg path {
      fill: none;
      stroke: var(--canvas-stroke);
      stroke-width: 2;
      transition: d 0.2s ease;
    }
    /* 画布节点卡片 */
    .omp-canvas-node {
      position: absolute;
      min-width: 160px;
      min-height: 90px;
      border-radius: 10px;
      padding: 12px;
      background: var(--canvas-node-bg);
      border: 1px solid var(--canvas-stroke);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      cursor: grab;
      z-index: 2;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.2s, border-color 0.2s;
      overflow: hidden;
      resize: both;
    }
    .omp-canvas-node:active { cursor: grabbing; }
    .omp-canvas-node:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .omp-canvas-node.selected { border-color: var(--primary); box-shadow: 0 0 0 2px color-mix(in srgb, var(--primary) 30%, transparent); }
    /* 维度角标 */
    .omp-dim-badge {
      position: absolute;
      top: -1px; right: -1px;
      width: 0; height: 0;
      border-style: solid;
      border-width: 0 24px 24px 0;
      border-color: transparent;
    }
    .omp-dim-badge.financial { border-right-color: var(--dim-financial); }
    .omp-dim-badge.customer { border-right-color: var(--dim-customer); }
    .omp-dim-badge.internal { border-right-color: var(--dim-process); }
    .omp-dim-badge.learning { border-right-color: var(--dim-learning); }
    /* 顶部状态色条 */
    .omp-canvas-node.status-achieved { border-top: 3px solid var(--success); }
    .omp-canvas-node.status-warning { border-top: 3px solid var(--warning); }
    .omp-canvas-node.status-lagging { border-top: 3px solid var(--danger); }
    .canvas-node-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: 6px;
      word-break: break-all;
    }
    .canvas-node-dept {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }
    .canvas-node-metric {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .canvas-node-metric strong { color: var(--text-primary); font-size: 13px; }
    .canvas-node-progress {
      margin-top: auto;
      padding-top: 6px;
    }
    .canvas-node-progress-bar {
      height: 4px;
      border-radius: 2px;
      background: var(--canvas-progress-track);
      overflow: hidden;
      margin-bottom: 4px;
    }
    .canvas-node-progress-bar > div {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    .canvas-node-progress-bar > div.achieved { background: var(--success); }
    .canvas-node-progress-bar > div.warning { background: var(--warning); }
    .canvas-node-progress-bar > div.lagging { background: var(--danger); }
    .canvas-node-progress-text {
      font-size: 11px;
      font-weight: 600;
      text-align: right;
    }
    .canvas-node-progress-text.achieved { color: var(--success); }
    .canvas-node-progress-text.warning { color: var(--warning); }
    .canvas-node-progress-text.lagging { color: var(--danger); }
    /* 展开折叠按钮 */
    .canvas-node-expand {
      position: absolute;
      bottom: 6px;
      left: 6px;
      font-size: 14px;
      color: var(--text-tertiary);
      cursor: pointer;
      line-height: 1;
      z-index: 3;
    }
    /* 画布工具栏 */
    .omp-canvas-toolbar {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 6px;
      z-index: 10;
      background: rgba(255,255,255,0.9);
      padding: 6px 10px;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      font-size: 12px;
    }
    .omp-canvas-toolbar button {
      background: var(--bg-page);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-primary);
    }
    .omp-canvas-toolbar button:hover { background: var(--bg-card); }
    /* 缩放指示器 */
    .omp-canvas-zoom {
      position: absolute;
      bottom: 12px;
      right: 12px;
      z-index: 10;
      background: rgba(255,255,255,0.9);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      color: var(--text-secondary);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    /* 状态药丸（保留兼容） */
    .omp-status-pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
      letter-spacing: 0.5px;
    }
    .omp-status-pill.achieved { background: color-mix(in srgb, var(--success) 12%, transparent); color: var(--success); }
    .omp-status-pill.warning { background: color-mix(in srgb, var(--warning) 12%, transparent); color: var(--warning); }
    .omp-status-pill.lagging { background: color-mix(in srgb, var(--danger) 12%, transparent); color: var(--danger); }
    /* 展开按钮（保留兼容） */
    .omp-expand-btn {
      transition: transform 0.2s ease;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      padding: 0;
      width: 20px;
      text-align: center;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .omp-expand-btn.expanded { transform: rotate(90deg); }
    /* 保留兼容：层级差异化 */
    .omp-kpi-card[data-level="0"] { border-left: 4px solid var(--kpi-level-0); }
    .omp-kpi-card[data-level="1"] { border-left: 3px solid var(--kpi-level-1); }
    .omp-kpi-card[data-level="2"] { border-left: 2px solid var(--kpi-level-2); }
    /* 响应式 */
    @media (max-width: 768px) {
      .omp-kpi-card.mindmap-node { width: 140px; min-height: 80px; padding: 10px; }
      .omp-kpi-children-row { gap: 10px; }
    }

    /* 减少动画偏好 */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ===== 站内标签栏 ===== */
    .content-area--tabs {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .content-area--tabs .page-tabs {
      flex: none;
      display: flex;
      align-items: flex-end;
      gap: 4px;
      padding: 8px 16px 0;
      background: var(--color-bg-page);
      border-bottom: 1px solid var(--color-border);
      overflow-x: auto;
      overflow-y: hidden;
      min-height: 38px;
    }
    .content-area--tabs .page-tabs::-webkit-scrollbar { height: 4px; }
    .content-area--tabs .page-tabs::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 2px; }
    .page-tabs .tab {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border: 1px solid transparent;
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      white-space: nowrap;
      font-size: 13px;
      color: var(--color-text-secondary);
      background: transparent;
      user-select: none;
      transition: background .15s, color .15s, border-color .15s;
    }
    .page-tabs .tab:hover:not(.active) { background: var(--color-bg-hover); }
    .page-tabs .tab.active {
      background: var(--color-bg-card);
      border-color: var(--color-border);
      color: var(--color-text-primary);
    }
    .page-tabs .tab-close {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      line-height: 14px;
      border-radius: 3px;
      margin-left: 2px;
      font-size: 12px;
    }
    .page-tabs .tab-close:hover { background: var(--color-danger-bg); color: var(--color-danger); }
    .content-area--tabs .page-content {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }
    @media (max-width: 768px) {
      .content-area--tabs .page-tabs { padding: 8px 12px 0; }
      .page-tabs .tab { padding: 5px 8px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <!-- 顶部导航 -->
    <nav class="top-nav">
      <div style="display: flex; align-items: center;">
        <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="打开菜单"><span class="icon" data-icon="menu" data-icon-size="18"></span></button>
        <div class="top-nav-brand">
          <div class="top-nav-logo">D</div>
          <span class="top-nav-title">DSTE 战略管理平台</span>
        </div>
      </div>
      <ul class="top-nav-links" id="top-nav-links"></ul>
      <div class="top-nav-actions">
        <select id="global-cycle-select" data-action="global-switch-cycle" style="padding:4px 8px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;cursor:pointer;margin-right:8px;">
          <!-- 由 renderCycleSelector 填充 -->
        </select>
        <button class="icon-btn" id="theme-toggle" title="切换主题"><span class="icon" data-icon="moon" data-icon-size="18"></span></button>
        <button class="icon-btn" title="通知"><span class="icon" data-icon="notification" data-icon-size="18"></span></button>
        <div class="user-avatar" id="user-avatar" style="position:relative;">张</div>
        <div class="user-dropdown" id="user-dropdown">
          <div class="user-dropdown-name" id="user-dropdown-name">张总</div>
          <div class="user-dropdown-divider"></div>
          <button class="user-dropdown-item" id="user-logout"><span class="icon" data-icon="sign-out" data-icon-size="14"></span> 退出登录</button>
        </div>
      </div>
    </nav>

    <div class="app-body">
      <!-- 侧边栏遮罩层 -->
      <div class="sidebar-overlay" id="sidebar-overlay"></div>

      <!-- 左侧边栏 -->
      <aside class="sidebar" id="sidebar"></aside>

      <!-- 内容区 -->
      <main class="content-area content-area--tabs" id="content-area">
        <div class="page-tabs" id="page-tabs"></div>
        <div class="page-content" id="page-content"></div>
      </main>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
  <script src="../pages/dashboard/roadmap.js" defer></script>
  <script src="../pages/dashboard/version-audit.js" defer></script>
  <script type="module">
    import { renderTopNav, renderSidebar as shellRenderSidebar, getPhaseFromPage } from './lib/shell.js';
    import { hydrateIcons, icon } from '../assets/js/icons.js';
    import { EXTERNAL_PAGES } from './lib/config.js';
    import { createBackup, restoreFromBackup, cleanupOldBackups, getBackupKeys } from './lib/migration-utils.js';
    import { Repository, createOmpRepository } from './lib/repository.js';
    import { enhancePersonInput, getPersonInputValue } from './components/person-input.js';
    import { renderPerson, normalizePerson, getEmployees, getEmployeeById, getOrgTree, buildOrgHierarchy, searchEmployees } from './lib/employee-directory.js';
    import { createOrgSelector } from './components/org-selector.js';
    import { AIClient, AISession, AITools } from './lib/ai-client.js';
    import { buildSystemPrompt, gatherBusinessContext, getContextSummary, registerAiContextProvider } from './lib/ai-context.js';
    import { renderMarkdownLite } from './lib/markdown-lite.js';
    import {
      isSubtask,
      getSubtasks,
      hasSubtasks,
      generateSubtaskId,
      recalculateParentProgress,
      collectCascadeDeleteIds,
    } from './lib/subtask-utils.js';
    import {
      computeEntityDiff,
      mergeEntities,
      enqueuePerRecordSync,
      createPerItemExecutor,
      apiLoadArray,
      ensureLastModified,
    } from './lib/per-record-sync.js';
    import { getDefaultSyncQueue } from './lib/sync-queue.js';
    import { createSwrSync } from './lib/swr-local.js';

    (function() {
      'use strict';

      // 人员输入增强全局助手（与 meetings.html 保持相同 API）
      window.enhancePersonInput = enhancePersonInput;
      window.getPersonInputValue = getPersonInputValue;
      window.renderPerson = renderPerson;
      window.normalizePerson = normalizePerson;
      window._personInputApis = window._personInputApis || {};
      window.ensurePersonInput = function(inputId, value) {
        if (!window.enhancePersonInput) return;
        const input = document.getElementById(inputId);
        if (!input) return;
        let api = window._personInputApis[inputId];
        // 弹窗每次打开都会创建新的 input DOM，需检测 input 是否与缓存 API 关联；
        // 若不一致，销毁旧 API 并重新增强，否则人员选择器不会绑定到新 input。
        if (!api || input._personInputApi !== api) {
          if (api && typeof api.destroy === 'function') {
            try { api.destroy(); } catch (e) {}
          }
          api = window.enhancePersonInput(input, {
            placeholder: input.getAttribute('placeholder') || '',
            allowFreeText: true,
          });

            if (isCasLoginTrustWindow()) {

      // 带 CAS 登录信任窗口重试的 fetch：401 时如果在 30 秒信任窗口内，延迟重试，给 KV 同步留时间
      async function fetchWithAuthRetry(url, options = {}, retries = 3, delayMs = 1000) {
        const token = DSTE.Storage.getString('dste-token');
        const headers = { ...(options.headers || {}) };
        if (token) headers['Authorization'] = `Bearer ${token}`;
        let lastResp = null;
        for (let i = 0; i <= retries; i++) {
          const resp = await fetch(url, { ...options, headers });
          if (resp.status !== 401) return resp;
          lastResp = resp;
          if (i < retries && isCasLoginTrustWindow()) {
            console.warn(`[Auth] fetch ${url} returned 401 within CAS trust window, retry ${i + 1}/${retries}`);
            await new Promise(r => setTimeout(r, delayMs));
            continue;
          }
          break;
        }
        return lastResp;
      }
      const CAS_LANDING_PAGE = '/src/cockpit.html';
      const CAS_REDIRECT_HISTORY_KEY = 'dste-cas-redirect-history';
      const CAS_LOGIN_AT_KEY = 'dste-cas-login-at';
      const CAS_RETURN_TO_KEY = 'dste-cas-return-to';

      function getCasServiceUrl() {
        return window.location.origin + CAS_LANDING_PAGE;
      }

      // 检测是否在短时间内被 CAS 重定向多次，防止无限循环
      function isCasRedirectLoop() {
        try {
          const now = Date.now();
          const raw = sessionStorage.getItem(CAS_REDIRECT_HISTORY_KEY);
          const history = raw ? JSON.parse(raw) : [];
          const recent = history.filter(t => now - t < 10000);
          recent.push(now);
          sessionStorage.setItem(CAS_REDIRECT_HISTORY_KEY, JSON.stringify(recent));
          return recent.length > 2;
        } catch (e) {
          return false;
        }
      }

      function clearCasRedirectHistory() {
        try { sessionStorage.removeItem(CAS_REDIRECT_HISTORY_KEY); } catch (e) {}
      }

      // 刚完成 CAS 登录的 30 秒内，信任本地 token，避免 KV 跨节点一致性导致 API 401 误触发循环
      function isCasLoginTrustWindow() {
        try {
          const loginAt = parseInt(sessionStorage.getItem(CAS_LOGIN_AT_KEY) || '0', 10);
          return Date.now() - loginAt < 30000;
        } catch (e) {
          return false;
        }
      }

      function saveAuthReturnUrl() {
        try {
          const path = window.location.pathname;
          const search = window.location.search;
          const hash = window.location.hash;
          if (!path.includes(CAS_LANDING_PAGE)) {
            sessionStorage.setItem(CAS_RETURN_TO_KEY, path + search + hash);
          }
        } catch (e) {}
      }

      function restoreAuthReturnUrl() {
        try {
          const returnTo = sessionStorage.getItem(CAS_RETURN_TO_KEY);
          if (returnTo) {
            sessionStorage.removeItem(CAS_RETURN_TO_KEY);
            const current = window.location.pathname + window.location.search + window.location.hash;
            if (returnTo !== current) {
              window.location.replace(returnTo);
              return true;
            }
          }
        } catch (e) {}
        return false;
      }

      // CAS 登录跳转
      function redirectToCasLogin() {
        if (isCasRedirectLoop()) {
          showAuthError('登录验证出现循环，请关闭页面后重新打开，或联系管理员。');
          return;
        }
        saveAuthReturnUrl();

        window.location.href = `https://passport.fanruan.com/cas/login?service=${service}`;
      }

      function setAuthToken(token, user) {
        DSTE.Storage.setString('dste-token', token);
        DSTE.Storage.setString('dste-user', user?.name || user?.username || '');
        sessionStorage.setItem('dste-user', user?.name || user?.username || '');
        sessionStorage.setItem(CAS_LOGIN_AT_KEY, String(Date.now()));
        clearCasRedirectHistory();
        updateUserUI();
      }

      // CAS 回调处理：从 URL 提取 ticket，调用后端换取 token
      async function handleCasCallback() {
        const urlParams = new URLSearchParams(window.location.search);
        const ticket = urlParams.get('ticket');
        if (!ticket) return false;

        const cleanUrl = window.location.pathname + window.location.hash;
        history.replaceState(null, '', cleanUrl);

        try {
          const service = encodeURIComponent(getCasServiceUrl());
          const resp = await fetch(`${API_BASE}/api/auth/cas/login?ticket=${encodeURIComponent(ticket)}&service=${service}`);
          const json = await resp.json();
          if (json.success && json.token) {
            setAuthToken(json.token, json.user);
            // 登录成功后，若存在保存的返回地址，跳转回去
            if (restoreAuthReturnUrl()) {
              return true;
            }
            return true;
          }
        } catch (e) {
          console.error('CAS callback failed:', e);
        }
        return false;
      }

      // 检查登录状态：验证 token 是否有效
      async function checkLoginStatus() {
        const token = DSTE.Storage.getString('dste-token');
        if (!token) return false;

        // 刚完成 CAS 登录的 30 秒内，信任本地 token，避免 KV 跨节点一致性导致误删 token 并触发循环
        try {
          const loginAt = parseInt(sessionStorage.getItem(CAS_LOGIN_AT_KEY) || '0', 10);
          if (Date.now() - loginAt < 30000) {
            updateUserUI();
            return true;
          }
        } catch (e) {}

        try {
          const resp = await fetch(`${API_BASE}/api/auth/me`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (resp.ok) {
            const json = await resp.json();
            if (json.success && json.user) {
              DSTE.Storage.setString('dste-user', json.user.name || json.user.username || '');
              sessionStorage.setItem('dste-user', json.user.name || json.user.username || '');
              updateUserUI();
              return true;
            }
          }
        } catch (e) {
          console.warn('Login status check failed:', e);
        }

        DSTE.Storage.remove('dste-token');
        DSTE.Storage.remove('dste-user');
        sessionStorage.removeItem('dste-user');
        sessionStorage.removeItem(CAS_LOGIN_AT_KEY);
        return false;
      }

      /**

       * 规则：'omp_' + annualPlanTaskId；若本身已是 omp_ 前缀则直接返回。
       */
      function omp_deriveTaskIdFromAnnualPlan(annualPlanTaskId) {
        if (!annualPlanTaskId) return null;
        if (String(annualPlanTaskId).startsWith('omp_')) return annualPlanTaskId;
        return 'omp_' + annualPlanTaskId;
      }

      /**
       * 将当前周期的年度计划重点工作同步为 OMP 执行任务（幂等）。
       * 只处理没有 annualPlanTaskId 的源头任务（即年度计划侧任务）。
       */
      function omp_syncAnnualPlanTasksToExecution(cycleId) {
        const tasks = omp_load('tasks');
        const annualTasks = tasks.filter(t => t.cycleId === cycleId && t.source !== 'omp' && !t.annualPlanTaskId);
        let changed = false;
        const currentCycle = getCurrentCycle();
        const defaultYear = currentCycle ? currentCycle.year : new Date().getFullYear();

        annualTasks.forEach(at => {
          if (at.status === 'closed') return;
          // 标记年度计划源头任务，避免在 OMP 重点工作列表中显示重复行
          if (at.source !== 'annual_plan') { at.source = 'annual_plan'; changed = true; }
          const ompId = omp_deriveTaskIdFromAnnualPlan(at.id);
          const existing = tasks.find(t => t.id === ompId || t.annualPlanTaskId === at.id);
          if (existing) {
            // 若年度计划源头负责人变更，同步到 OMP 派生任务
            if (existing.owner !== at.owner) {
              existing.owner = at.owner || '';
              changed = true;
            }
          } else {
            tasks.push({
              id: ompId,
              cycleId: at.cycleId,
              source: 'omp',
              annualPlanTaskId: at.id,
              seq: typeof at.seq === 'number' ? at.seq : 0,
              name: at.name || '',
              bscDimension: at.bscDimension || 'customer',
              kmsUrl: at.kmsUrl || '#',
              owner: at.owner || '',
              members: Array.isArray(at.members) ? [...at.members] : [],
              status: 'planning',
              description: at.description || '',
              type: at.type || 'strategic',
              progress: 0,
              dept: at.dept || '',
              startDate: at.startDate || `${defaultYear}-01-01`,
              endDate: at.endDate || `${defaultYear}-12-31`,
              kpiAssociations: Array.isArray(at.kpiAssociations)
                ? at.kpiAssociations.map(a => ({ ...a, relationType: a.relationType === 'primary' ? 'primary' : 'supporting' }))
                : [],
              budget: typeof at.budget === 'number' ? at.budget : 0,
              actualCost: 0,
            });
            changed = true;
          }
        });

        if (changed) {
          omp_save('tasks', tasks);
        }
        return changed;
      }

      function omp_deriveKpiIdFromAnnualPlan(annualPlanKpiId) {

          if (ak.source !== 'annual_plan') { ak.source = 'annual_plan'; changed = true; }
          const ompId = omp_deriveKpiIdFromAnnualPlan(ak.id);
          const existing = kpis.find(k => k.id === ompId || k.annualPlanKpiId === ak.id);
          if (!existing) {
            kpis.push({
              ...ak,
              id: ompId,
              source: 'omp',
              annualPlanKpiId: ak.id,
              parentId: ak.parentId ? omp_deriveKpiIdFromAnnualPlan(ak.parentId) : null,

      /**
       * 一次性迁移：将里程碑/进度记录从年度计划任务 ID 关联到 OMP 执行任务 ID。
       * 背景：OMP 工作台只展示 source='omp' 的任务，若 milestone/progressRecord.taskId
       *       仍指向 source='annual_plan' 的源头任务，详情页就看不到里程碑与进度记录。
       * 幂等：已指向 OMP 任务 ID 的记录不会被重复修改。
       */
      function omp_syncMilestonesAndRecordsToOmpTasks() {
        const tasksForMigration = omp_load('tasks');
        const annualPlanTaskIdToOmpId = new Map();
        tasksForMigration.forEach(t => {
          if (t.annualPlanTaskId) {
            annualPlanTaskIdToOmpId.set(t.annualPlanTaskId, t.id);
          }
        });
        function migrateTaskId(records) {
          let changed = false;
          const migrated = records.map(r => {
            const ompId = annualPlanTaskIdToOmpId.get(r.taskId);
            if (ompId && ompId !== r.taskId) {
              changed = true;
              return { ...r, taskId: ompId };
            }
            return r;
          });
          return { changed, migrated };
        }
        const existingMilestones = omp_load('milestones');
        const msMigration = migrateTaskId(existingMilestones);
        if (msMigration.changed) omp_save('milestones', msMigration.migrated);
        const existingRecords = omp_load('progressRecords');
        const recMigration = migrateTaskId(existingRecords);
        if (recMigration.changed) omp_save('progressRecords', recMigration.migrated);
        return msMigration.changed || recMigration.changed;
      }

      function migrateTaskKpiAssociations(tasks) {
        let changed = false;
        tasks.forEach(task => {
          if (Array.isArray(task.relatedKpiIds) && task.relatedKpiIds.length > 0) {
            const associations = task.relatedKpiIds.map(id => ({
              kpiInstanceId: id,
              relationType: 'supporting'
            }));
            if (associations.length === 1) {
              associations[0].relationType = 'primary';
            }
            task.kpiAssociations = associations;
            delete task.relatedKpiIds;
            changed = true;
          }
          if (!Array.isArray(task.kpiAssociations)) {
            task.kpiAssociations = [];
            changed = true;
          }
          // 最多保留一个主指标
          const primaryIdx = task.kpiAssociations.findIndex(a => a.relationType === 'primary');
          if (primaryIdx > -1) {
            task.kpiAssociations.forEach((a, idx) => {
              if (idx !== primaryIdx && a.relationType === 'primary') {
                a.relationType = 'supporting';
                changed = true;
              }
            });
          }
        });
        return changed;
      }

      function omp_initData() {
        // 版本号检测：代码更新时尝试非破坏性迁移与备份
        const DATA_VERSION = 'canvas-v18'; // 重点工作接入 per-record 云端同步，补齐 version 字段
        const storedVersion = DSTE.Storage.getString('dste_omp_data_version');
        if (storedVersion !== DATA_VERSION) {
          // 1) 备份整个 OMP 数据快照（保留最近 5 份）
          const ompSnapshot = {};
          const entitiesToBackup = [
            'indicators', 'kpiInstances', 'tasks', 'milestones', 'progressRecords',
          ];
          entitiesToBackup.forEach(key => {
            const repo = omp_getRepo(key);
            const data = repo ? repo.getRaw() : null;
            if (data && Array.isArray(data) && data.length > 0) {
              ompSnapshot[OMP_STORAGE[key]] = data;
            }
          });
          const cyclesRaw = DSTE.Storage.getString('dste_cycles_v1');
          if (cyclesRaw) {
            try { ompSnapshot['dste_cycles_v1'] = JSON.parse(cyclesRaw); } catch (e) {}
          }
          if (Object.keys(ompSnapshot).length > 0) {
            createBackup('omp', ompSnapshot, storedVersion || 'unknown');
          }
          cleanupOldBackups('omp', 5);

          // 2) 清理旧版累积的扁平备份键，避免无限占用 quota

      async function ompSyncFromApi() {
        console.log('[OMP] Syncing from API...');
        const entities = ['indicators', 'kpiInstances', 'tasks', 'milestones', 'progressRecords', 'cycles'];
        for (const entity of entities) {
          const remote = await apiLoadOmp(entity);
          if (remote !== null) {
            const repo = omp_getRepo(entity);
            const local = repo ? repo.getRaw() : [];
            const merged = local && local.length > 0
              ? mergeEntities(ensureLastModified(local), ensureLastModified(remote))
              : remote;
            if (repo) repo.set(merged);
            window._ompApiCache[entity] = merged;

            // 若当前用户云端重点工作为空，且本地有数据，将本地数据作为来源推送到云端
            if (entity === 'tasks' && remote.length === 0 && merged.length > 0) {
              console.log('[OMP] Remote tasks empty, uploading local tasks to cloud');
              enqueuePerRecordSync('omp/tasks', { created: merged, updated: [], deleted: [] }, ompPerItemExecutor, ompSyncQueue);
            }
          }
        }
        console.log('[OMP] Sync complete');
      }

      function omp_load(key) {
        // 优先从内存缓存读取（API 同步后的最新数据）
        if (window._ompApiCache[key]) return window._ompApiCache[key];
        // Fallback 到 Repository（本地存储）
        const repo = omp_getRepo(key);
        if (repo) return repo.get();
        try { return DSTE.Storage.get(OMP_STORAGE[key], []); } catch(e) { return []; }
      }

      function omp_save(key, data) {
        // 1. 更新内存缓存
        window._ompApiCache[key] = data;
        // 2. 保存到 Repository（本地存储 fallback，保证离线可用）
        const repo = omp_getRepo(key);
        if (repo) {
          const oldData = repo.getRaw();
          ensureLastModified(data);
          const ok = repo.set(data);
          if (!ok) console.warn('[OMP] local save failed');

          // 3. per-record 单条同步
          const entityName = omp_getApiEntityName(key);
          if (entityName.startsWith('omp/')) {
            const { created, updated, deleted } = computeEntityDiff(oldData, data);
            enqueuePerRecordSync(entityName, { created, updated, deleted }, ompPerItemExecutor, ompSyncQueue);
          }
        } else {
          try { DSTE.Storage.set(OMP_STORAGE[key], data); } catch(e) { console.warn('[OMP] local save failed:', e); }
        }
      }

          <span class="omp-kpi-tag" data-kpi-id="${association.kpiInstanceId}" style="display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border:1px solid var(--border-color);border-radius:16px;background:var(--bg-page);font-size:13px;color:var(--text-primary);">

            ${disabled ? '' : `<button type="button" onclick="window.omp_removeKpiAssociation('${prefix}', '${type}', '${association.kpiInstanceId}')" style="background:none;border:none;cursor:pointer;color:var(--text-tertiary);font-size:14px;line-height:1;padding:0;">×</button>`}
          </span>`;
      }
      function omp_searchKpis(query, cycleId, excludeIds, taskDept) {
        const kpis = (omp_load('kpiInstances') || []).filter(k => k.cycleId === cycleId);
        const q = query.toLowerCase();
        const excludeSet = new Set(excludeIds || []);
        const matched = kpis.filter(k => !excludeSet.has(k.id)).filter(k => {
          const ind = omp_getIndicatorName(k.indicatorId) || '';
          const ownerStr = typeof k.owner === 'string' ? k.owner : (k.owner?.displayName || k.owner?.name || '');
          return ind.toLowerCase().includes(q) ||
                 (k.dept || '').toLowerCase().includes(q) ||
                 ownerStr.toLowerCase().includes(q);
        });
        matched.sort((a, b) => {
          if (taskDept) {
            const aSameDept = a.dept === taskDept ? 1 : 0;
            const bSameDept = b.dept === taskDept ? 1 : 0;
            if (aSameDept !== bSameDept) return bSameDept - aSameDept;
          }
          const aName = omp_getIndicatorName(a.indicatorId) || '';
          const bName = omp_getIndicatorName(b.indicatorId) || '';
          return aName.localeCompare(bName);
        });
        return matched.slice(0, 10);
      }
      window.omp_handleKpiSearch = function(prefix, type) {
        const input = document.getElementById(`${prefix}-${type}-kpi-search`);
        if (!input) return;
        const timerKey = `_ompKpiSearchTimer_${prefix}_${type}`;
        if (window[timerKey]) { clearTimeout(window[timerKey]); }
        window[timerKey] = setTimeout(() => {
          window[timerKey] = null;
          const dropdown = document.getElementById(`${prefix}-${type}-kpi-dropdown`);
          if (!dropdown) return;
          const query = input.value.trim();
          document.querySelectorAll('[id$="-kpi-dropdown"]').forEach(el => { if (el.id !== dropdown.id) el.style.display = 'none'; });
          if (!query) { dropdown.style.display = 'none'; return; }
          const dataInput = document.getElementById(`${prefix}-kpi-associations-data`);
          const cycleId = dataInput?.dataset?.cycleId || '';
          const taskDept = dataInput?.dataset?.taskDept || '';
          let associations = [];
          try { associations = JSON.parse(dataInput?.value || '[]'); } catch (e) { associations = []; }
          const selectedIds = associations.map(a => a.kpiInstanceId);
          if (type === 'supporting') {
            const primary = associations.find(a => a.relationType === 'primary');
            if (primary) selectedIds.push(primary.kpiInstanceId);
          }
          const results = omp_searchKpis(query, cycleId, selectedIds, taskDept);
          if (results.length === 0) {
            dropdown.innerHTML = `<div style="padding:10px 12px;font-size:13px;color:var(--text-tertiary);">未找到相关 KPI，请尝试其他关键词</div>`;
          } else {
            dropdown.innerHTML = results.map(k => `
              <div onmousedown="event.preventDefault();" onclick="window.omp_selectKpi('${prefix}', '${type}', '${k.id}')" style="padding:10px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border-light);">
                <div style="font-weight:500;">${escapeHtml(omp_getIndicatorName(k.indicatorId))}</div>
                <div style="font-size:12px;color:var(--text-tertiary);">${escapeHtml(k.dept || '-')} · ${escapeHtml(typeof k.owner === 'string' ? k.owner : (k.owner?.displayName || k.owner?.name || '-'))}</div>
              </div>`).join('');
          }
          dropdown.style.display = 'block';
        }, 200);
      };
      window.omp_selectKpi = function(prefix, type, kpiInstanceId) {
        const dataInput = document.getElementById(`${prefix}-kpi-associations-data`);
        let associations = [];
        try { associations = JSON.parse(dataInput?.value || '[]'); } catch (e) { associations = []; }
        if (type === 'primary') {
          const idx = associations.findIndex(a => a.relationType === 'primary');
          if (idx > -1) associations.splice(idx, 1);
          associations.unshift({ kpiInstanceId, relationType: 'primary' });
        } else {
          if (!associations.some(a => a.kpiInstanceId === kpiInstanceId)) {
            associations.push({ kpiInstanceId, relationType: 'supporting' });
          }
        }
        if (dataInput) dataInput.value = JSON.stringify(associations);
        const searchInput = document.getElementById(`${prefix}-${type}-kpi-search`);
        const dropdown = document.getElementById(`${prefix}-${type}-kpi-dropdown`);
        if (searchInput) searchInput.value = '';
        if (dropdown) dropdown.style.display = 'none';
        window.omp_refreshKpiAssociationUI(prefix);
      };
      window.omp_removeKpiAssociation = function(prefix, type, kpiInstanceId) {
        const dataInput = document.getElementById(`${prefix}-kpi-associations-data`);
        let associations = [];
        try { associations = JSON.parse(dataInput?.value || '[]'); } catch (e) { associations = []; }
        associations = associations.filter(a => !(a.kpiInstanceId === kpiInstanceId && (type === 'primary' ? a.relationType === 'primary' : a.relationType === 'supporting')));
        if (dataInput) dataInput.value = JSON.stringify(associations);
        window.omp_refreshKpiAssociationUI(prefix);
      };
      window.omp_refreshKpiAssociationUI = function(prefix) {
        const dataInput = document.getElementById(`${prefix}-kpi-associations-data`);
        let associations = [];
        try { associations = JSON.parse(dataInput?.value || '[]'); } catch (e) { associations = []; }
        const primary = associations.find(a => a.relationType === 'primary');
        const supporting = associations.filter(a => a.relationType === 'supporting');
        const primaryContainer = document.getElementById(`${prefix}-primary-kpi-selected`);
        const supportingContainer = document.getElementById(`${prefix}-supporting-kpi-selected`);
        const primarySearch = document.getElementById(`${prefix}-primary-kpi-search`);
        if (primaryContainer) {
          const primaryDisabled = primarySearch?.disabled || false;
          primaryContainer.innerHTML = primary ? omp_renderKpiSelectedTag(primary, prefix, 'primary', primaryDisabled) : '';
        }
        if (supportingContainer) {
          supportingContainer.innerHTML = supporting.map(a => omp_renderKpiSelectedTag(a, prefix, 'supporting', false)).join('');
        }
        window.omp_updateKpiDeptWarning(prefix);
      };
      window.omp_updateKpiDeptWarning = function(prefix) {
        const dataInput = document.getElementById(`${prefix}-kpi-associations-data`);
        let associations = [];
        try { associations = JSON.parse(dataInput?.value || '[]'); } catch (e) { associations = []; }
        const warning = document.getElementById(`${prefix}-kpi-dept-warning`);
        if (!warning) return;
        let taskDept = dataInput?.dataset?.taskDept || '';
        if (prefix === 'omp-task') {
          taskDept = document.getElementById('omp-task-dept')?.value?.trim() || taskDept;
        }
        let hasCrossDept = false;
        associations.forEach(a => {
          const kpi = omp_getKpiByInstanceId(a.kpiInstanceId);
          if (kpi && taskDept && kpi.dept !== taskDept) hasCrossDept = true;
        });
        warning.style.display = hasCrossDept ? 'block' : 'none';
      };
      window.omp_initKpiSearchFields = function(prefix, taskDept) {
        if (!window._ompKpiDropdownCloseBound) {
          document.addEventListener('click', function(e) {
            document.querySelectorAll('[id$="-kpi-dropdown"]').forEach(el => {
              const container = el.closest('[id$="-kpi-container"]');
              if (container && !container.contains(e.target)) el.style.display = 'none';
            });
          });
          window._ompKpiDropdownCloseBound = true;
        }
        const dataInput = document.getElementById(`${prefix}-kpi-associations-data`);
        if (dataInput && taskDept) dataInput.dataset.taskDept = taskDept;
        window.omp_updateKpiDeptWarning(prefix);
      };
      function omp_collectKpiAssociationsFromForm(prefix, existingAssociations, isDerived) {
        const dataInput = document.getElementById(`${prefix}-kpi-associations-data`);
        let associations = [];
        try { associations = JSON.parse(dataInput?.value || '[]'); } catch (e) { associations = []; }
        if (isDerived) {
          const existingPrimary = (existingAssociations || []).find(a => a.relationType === 'primary');
          const finalAssociations = [];
          if (existingPrimary) finalAssociations.push({ ...existingPrimary });
          associations.filter(a => a.relationType !== 'primary').forEach(a => {
            if (!finalAssociations.some(f => f.kpiInstanceId === a.kpiInstanceId)) finalAssociations.push({ ...a });
          });
          return finalAssociations;
        }
        return associations;
      }

        return 'lagging';

      function renderTabs() {
        const tabsEl = document.getElementById('page-tabs');
        if (!tabsEl) return;
        tabsEl.innerHTML = appTabs.map(tab => {
          const activeClass = tab.id === activeTabId ? 'active' : '';
          return `<div class="tab ${activeClass}" data-tab-id="${tab.id}">
            <span>${escapeHtml(tab.title)}</span>
            ${appTabs.length > 1 ? `<span class="tab-close" data-tab-id="${tab.id}" title="关闭">×</span>` : ''}
          </div>`;
        }).join('');
        hydrateIcons(tabsEl);
      }

      function switchTab(tabId) {
        const tab = appTabs.find(t => t.id === tabId);
        if (!tab) return;
        activeTabId = tabId;
        renderTabs();
        _renderPage(tab.pageId, true);
      }

      function closeTab(tabId) {
        const idx = appTabs.findIndex(t => t.id === tabId);
        if (idx === -1 || appTabs.length <= 1) return;
        const wasActive = activeTabId === tabId;
        appTabs.splice(idx, 1);
        if (wasActive) {
          const next = appTabs[Math.max(0, idx - 1)] || appTabs[0];
          activeTabId = next.id;
          switchTab(activeTabId);
        } else {
          renderTabs();
        }
      }

      function openTab(pageId) {
        const existing = appTabs.find(t => t.pageId === pageId);
        if (existing) {
          activeTabId = existing.id;
          renderTabs();
          _renderPage(pageId, true);
          return;
        }
        const newTab = { id: 'tab-' + tabCounter++, pageId, title: getPageTitle(pageId) };
        appTabs.push(newTab);
        activeTabId = newTab.id;
        renderTabs();
        _renderPage(pageId, true);
      }

          cycleSelect.addEventListener('change', (e) => {
            window._dsteState.currentCycleId = e.target.value;
            // 刷新当前页面以应用新周期
            const currentHash = window.location.hash.slice(1) || 'dashboard';
            navigate(currentHash);
          });
        }

        const hash = window.location.hash.slice(1) || 'dashboard';

        appTabs[0].pageId = hash;
        appTabs[0].title = getPageTitle(hash);
        renderTabs();
        navigate(hash, false);
        window.addEventListener('hashchange', () => navigate(window.location.hash.slice(1), false));

        // 非关键数据与远程同步放到首屏渲染之后后台执行，避免阻塞 strategy-topics 等页面打开
        void (async () => {
          try {
            // 加载会议数据：优先 API，其次本地存储（由 apiLoad 处理），最后由 renderMeetings 创建 mock
            const remoteMeetings = await apiLoad('/api/meetings');
            if (remoteMeetings && remoteMeetings.length > 0) {
              window._meetingsData = remoteMeetings;
            }
          } catch (e) {
            console.warn('[init] meetings load failed:', e.message);
          }

          try {
            // 同步 OMP 数据（指标库 / KPI / 重点工作等）
            await ompSyncFromApi();
          } catch (e) {
            console.warn('[init] OMP sync failed:', e.message);
          }

          try {
            // 预加载路线图数据，避免 renderDevTimeline 使用硬编码旧数据
            const roadmapRes = await fetch('/roadmap-data.json');
            window._roadmapData = roadmapRes.ok ? await roadmapRes.json() : null;
            // 若当前正在 Roadmap 页，用真实数据重新渲染，避免首次展示 fallback
            if (window.__dsteCurrentPageId === 'dashboard/roadmap') {
              navigate('dashboard/roadmap', false);

            console.warn('[init] roadmap data load failed:', e);
            window._roadmapData = null;
          }

          // 后台刷新战略专题与战略洞察数据
          await Promise.allSettled([
            siLoadRemoteTopics(),
            siLoadRemoteInsights(),
          ]);

          // 注册 cockpit 各页面的 AI 上下文提供者
          registerCockpitAiProviders();
        })();

        // 标签栏事件：切换 / 关闭
        const tabsEl = document.getElementById('page-tabs');
        if (tabsEl) {
          tabsEl.addEventListener('click', (e) => {
            const closeBtn = e.target.closest('.tab-close');
            if (closeBtn) {
              e.stopPropagation();
              closeTab(closeBtn.dataset.tabId);
              return;
            }
            const tab = e.target.closest('.tab');
            if (tab) {
              switchTab(tab.dataset.tabId);
            }
          });
        }

        // 显示用户名
        updateUserUI();

        // 用户下拉菜单
        const avatar = document.getElementById('user-avatar');
        const dropdown = document.getElementById('user-dropdown');
        const logoutBtn = document.getElementById('user-logout');
        if (avatar && dropdown) {
          avatar.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('open');
          });
          document.addEventListener('click', (e) => {
            if (!avatar.contains(e.target) && !dropdown.contains(e.target)) {

            }
          });

          logoutBtn.addEventListener('click', logout);

      // ===== 年度经营计划 — 分解视图 Tab =====
      function ap_renderDecompositionTab(kpis, indicators, childKpis, state) {
        const decomposeDim = state.decomposeDimension || 'warzone';
        const dimCfg = DECOMPOSE_DIMENSIONS[decomposeDim];
        const items = dimCfg ? dimCfg.items : [];
        const dimButtons = Object.entries(DECOMPOSE_DIMENSIONS).map(([key, cfg]) =>
          `<button class="btn btn-sm ${decomposeDim === key ? 'btn-primary' : 'btn-secondary'}" data-action="ap-switch-decompose-dim" data-dim="${key}" style="margin-right:6px;font-size:12px;">${cfg.label}</button>`
        ).join('');
        return `
          <div style="margin-bottom:16px;">${dimButtons}</div>
          <div class="ap-card">
            <table class="ap-table" style="font-size:12px;">
              <thead>
                <tr style="background:var(--bg-page);">
                  <th style="padding:10px;border-bottom:2px solid var(--border-color);text-align:center;">考核指标</th>
                  <th style="padding:10px;border-bottom:2px solid var(--border-color);text-align:center;">合计</th>
                  ${items.map(z => `<th style="padding:10px;border-bottom:2px solid var(--border-color);text-align:center;min-width:70px;">${z}</th>`).join('')}
                </tr>
              </thead>
              <tbody>
                ${kpis.map(parentKpi => {
                  // 支持部门级/小组级独立 KPI：只在当前维度与其归属匹配时显示
                  const isVisible = parentKpi.assessmentLevel === 'marketing-line' || items.includes(parentKpi.dept);
                  if (!isVisible) return '';
                  const ind = indicators.find(i => i.id === parentKpi.indicatorId);
                  const name = escapeHtml(ind ? ind.name : parentKpi.indicatorId);
                  const isMarketingLine = parentKpi.assessmentLevel === 'marketing-line';
                  const levelLabel = isMarketingLine ? '' : (ASSESSMENT_LEVELS[parentKpi.assessmentLevel]?.short || '部门');
                  const levelBadge = isMarketingLine ? '' : `<span style="font-size:11px;margin-left:6px;padding:2px 6px;border-radius:4px;background:color-mix(in srgb, var(--info) 12%, transparent);color:var(--info);">${levelLabel}</span>`;
                  const myChildren = isMarketingLine
                    ? childKpis.filter(k => k.parentId === parentKpi.id && items.includes(k.dept))
                    : [];
                  const actualTotal = isMarketingLine
                    ? myChildren.reduce((sum, k) => sum + (k.targetValue || 0), 0)
                    : (parentKpi.targetValue || 0);
                  const match = isMarketingLine ? Math.abs(actualTotal - parentKpi.targetValue) < 0.01 : true;
                  const totalColor = match ? 'var(--success)' : 'var(--danger)';
                  const totalTitle = isMarketingLine
                    ? `父级目标: ${parentKpi.targetValue.toLocaleString()} | 实际合计: ${actualTotal.toLocaleString()}`
                    : `本级目标: ${parentKpi.targetValue.toLocaleString()}`;
                  return `
                    <tr style="border-bottom:1px solid var(--border-light);">
                      <td style="padding:8px;text-align:center;font-weight:600;">${name}${levelBadge}</td>
                      <td style="padding:8px;text-align:center;color:${totalColor};font-weight:600;" title="${totalTitle}">
                        ${actualTotal.toLocaleString()}
                        ${isMarketingLine && !match ? '<span style="font-size:11px;margin-left:4px;">≠</span>' : ''}
                      </td>
                      ${items.map(z => {
                        if (isMarketingLine) {
                          const child = childKpis.find(k => k.parentId === parentKpi.id && k.dept === z);
                          return `<td style="padding:8px;text-align:center;">${child ? child.targetValue.toLocaleString() : '-'}</td>`;
                        }
                        const ownValue = parentKpi.dept === z ? (parentKpi.targetValue || 0).toLocaleString() : '-';
                        return `<td style="padding:8px;text-align:center;">${ownValue}</td>`;
                      }).join('')}
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        `;
      }

      // ===== 年度经营计划页面 =====
      function renderAnnualPlan() {
        omp_initData();
        const state = window._annualPlanState;
        const cycleId = window._dsteState.currentCycleId;
        let kpis = omp_load('kpiInstances').filter(k => k.cycleId === cycleId && k.parentId === null && k.source !== 'omp');
        if (state.assessmentLevelFilter !== 'all') {
          kpis = kpis.filter(k => k.assessmentLevel === state.assessmentLevelFilter);
        }
        const indicators = omp_load('indicators');
        const allTasks = omp_load('tasks').filter(t => t.cycleId === cycleId);
        const tasks = allTasks.filter(t => t.source !== 'omp');
        const tabs = [
          { id: 'overview', label: '<span class="icon" data-icon="chart-bar" data-icon-size="14"></span> 总览' },
          { id: 'decomposition', label: '<span class="icon" data-icon="shuffle" data-icon-size="14"></span> 分解视图' },
        ];
        const activeTab = state.activeTab;
        const cycle = getCurrentCycle();
        const phaseLabels = { planning: '规划中', execution: '执行中', review: '复盘', archived: '已归档' };

        let tabContent = '';
        if (activeTab === 'overview') {
          tabContent = ap_renderOverviewTab(kpis, indicators, allTasks, state);
        } else if (activeTab === 'decomposition') {
          const childKpis = omp_load('kpiInstances').filter(k => k.cycleId === cycleId && k.parentId !== null && k.source !== 'omp');
          tabContent = ap_renderDecompositionTab(kpis, indicators, childKpis, state);
        }

        return `

              <p style="margin:4px 0 0 0;font-size:13px;color:var(--text-secondary);">承接战略解码成果，完成组织绩效目标分解与资源配置</p>
            </div>
            <div class="page-actions">
              <span style="font-size:13px;color:var(--text-primary);font-weight:600;margin-right:12px;">${cycle.name}</span>
              <span style="font-size:13px;color:var(--text-tertiary);margin-right:12px;">阶段: ${phaseLabels[cycle.phase] || cycle.phase}</span>
              <button class="btn btn-secondary" data-action="ap-add-kpi" style="margin-right:8px;">+ 添加KPI</button>
              <button class="btn btn-secondary" data-action="ap-add-keytask" style="margin-right:8px;">+ 添加重点工作</button>
              <button class="btn btn-primary" data-action="ap-publish">发布到执行</button>
            </div>
          </div>
          <div style="display:flex;gap:0;border-bottom:1px solid var(--border-color);margin-bottom:20px;">
            ${tabs.map(t => `
              <button class="ap-tab-btn ${activeTab === t.id ? 'active' : ''}"
                      data-action="ap-switch-tab" data-tab="${t.id}"
                      style="padding:12px 24px;background:none;border:none;border-bottom:2px solid ${activeTab === t.id ? 'var(--primary)' : 'transparent'};color:${activeTab === t.id ? 'var(--primary)' : 'var(--text-secondary)'};font-weight:${activeTab === t.id ? '600' : '500'};cursor:pointer;font-size:14px;transition:all 0.2s;">
                ${t.label}
              </button>
            `).join('')}
          </div>
          <div id="ap-tab-content">${tabContent}</div>
          ${state.selectedKpiId ? ap_renderEditPanel(state.selectedKpiId) : ''}
        `;
      }

      // ===== 年度经营计划 — 编辑面板 =====

        return `

                  <option value="marketing-line" ${assessmentLevel === 'marketing-line' ? 'selected' : ''}>营销线级</option>
                  <option value="department" ${assessmentLevel === 'department' ? 'selected' : ''}>部门级</option>
                  <option value="team" ${assessmentLevel === 'team' ? 'selected' : ''}>小组级</option>

              <div id="ap-edit-dept-wrap" style="${isMarketingLine ? 'display:none;' : ''}">

              </div>
              <div>
                <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">权重（分值）</label>
                <input type="number" id="ap-edit-weight" value="${kpi.weight}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
              </div>
              <div>
                <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">H1 占比 (%)</label>
                <input type="number" id="ap-edit-h1" value="${Math.round((kpi.h1Ratio || 0.45) * 100)}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                <div>
                  <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">底线比例 (%)</label>
                  <input type="number" id="ap-edit-baseline-pct" value="${Math.round((kpi.baselinePct || 0.7) * 100)}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">

                  <input type="number" id="ap-edit-challenge-pct" value="${Math.round((kpi.challengePct || 1.2) * 100)}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">

              </div>

                <textarea id="ap-edit-scoring" rows="3" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;resize:vertical;">${escapeHtml(kpi.scoringRule || '')}</textarea>

                <button class="btn btn-sm btn-danger" style="width:100%;font-size:12px;" data-action="ap-delete-kpi" data-id="${kpi.id}"><span class="icon" data-icon="trash" data-icon-size="14"></span> 删除此 KPI</button>

            </div>
          </div>
        `;
      }

      // ===== 年度经营计划 — 保存 KPI 编辑 =====
      window.ap_saveKpi = function(kpiId) {
        const kpis = omp_load('kpiInstances');
        const idx = kpis.findIndex(k => k.id === kpiId);
        if (idx === -1) return;
        const targetValue = parseFloat(document.getElementById('ap-edit-target')?.value);
        const weight = parseFloat(document.getElementById('ap-edit-weight')?.value);
        const h1Ratio = parseFloat(document.getElementById('ap-edit-h1')?.value) / 100;
        const baselinePct = parseFloat(document.getElementById('ap-edit-baseline-pct')?.value) / 100;
        const challengePct = parseFloat(document.getElementById('ap-edit-challenge-pct')?.value) / 100;
        const scoringRule = document.getElementById('ap-edit-scoring')?.value?.trim();
        const assessmentLevel = document.getElementById('ap-edit-assessment-level')?.value || 'marketing-line';
        let dept = document.getElementById('ap-edit-dept-hidden')?.value?.trim() || kpis[idx].dept || '营销线';
        if (assessmentLevel === 'marketing-line' && !dept) dept = '营销线';
        if (!targetValue || isNaN(targetValue)) {
          showToast('请输入有效的目标值', 'warning');
          return;
        }
        if (assessmentLevel !== 'marketing-line' && !dept) {
          showToast('请选择部门/战区归属', 'warning');
          return;
        }
        const baselineValue = Math.round(targetValue * baselinePct);
        const challengeValue = Math.round(targetValue * challengePct);
        kpis[idx] = { ...kpis[idx], targetValue, weight, h1Ratio, baselinePct, challengePct, baselineValue, challengeValue, scoringRule, assessmentLevel, dept, source: 'annual_plan', annualPlanKpiId: kpis[idx].annualPlanKpiId || null };
        omp_save('kpiInstances', kpis);
        window._annualPlanState.selectedKpiId = null;
        navigate('bp/annual-plan');
      };

      // ===== 年度经营计划 — 重点工作 CRUD =====
      window._apEditingKeyTaskId = null;

      function ap_getAnnualPlanTasks() {
        const tasks = omp_load('tasks');
        const currentCycleId = window._dsteState.currentCycleId;
        return tasks
          .filter(t => t.source === 'annual_plan' && t.cycleId === currentCycleId)
          .sort((a, b) => {
            const seqDiff = (a.seq || 0) - (b.seq || 0);
            if (seqDiff !== 0) return seqDiff;
            return String(a.id).localeCompare(String(b.id));
          });
      }

      function ap_getNextKeyTaskSeq() {
        const annualTasks = ap_getAnnualPlanTasks();
        if (annualTasks.length === 0) return 1;
        return Math.max(...annualTasks.map(t => t.seq || 0)) + 1;
      }

      function ap_renumberKeyTasksAndSync(tasks) {
        const currentCycleId = window._dsteState.currentCycleId;
        const annualTasks = tasks
          .filter(t => t.source === 'annual_plan' && t.cycleId === currentCycleId)
          .sort((a, b) => {
            const seqDiff = (a.seq || 0) - (b.seq || 0);
            if (seqDiff !== 0) return seqDiff;
            return String(a.id).localeCompare(String(b.id));
          });
        annualTasks.forEach((t, idx) => {
          const newSeq = idx + 1;
          if (t.seq !== newSeq) {
            t.seq = newSeq;
            // 同步已派生的 OMP 执行任务 seq
            tasks.filter(dt => dt.annualPlanTaskId === t.id).forEach(dt => {
              dt.seq = newSeq;
            });
          }
        });
        return tasks;
      }

      window.ap_moveKeyTask = function(ktId, direction) {
        const tasks = omp_load('tasks');
        const annualTasks = ap_getAnnualPlanTasks();
        const idx = annualTasks.findIndex(t => t.id === ktId);
        if (idx === -1) return;
        if (direction === 'up' && idx > 0) {
          const temp = annualTasks[idx];
          annualTasks[idx] = annualTasks[idx - 1];
          annualTasks[idx - 1] = temp;
        } else if (direction === 'down' && idx < annualTasks.length - 1) {
          const temp = annualTasks[idx];
          annualTasks[idx] = annualTasks[idx + 1];
          annualTasks[idx + 1] = temp;
        } else {
          return;
        }
        // 重新编号并同步 OMP 派生任务
        annualTasks.forEach((t, i) => {
          const newSeq = i + 1;
          const task = tasks.find(x => x.id === t.id);
          if (task) task.seq = newSeq;
          tasks.filter(dt => dt.annualPlanTaskId === t.id).forEach(dt => {
            dt.seq = newSeq;
          });
        });
        omp_save('tasks', tasks);
        navigate('bp/annual-plan');
      };

        const bscDimension = document.getElementById('ap-kt-dim')?.value || 'customer';
        const name = document.getElementById('ap-kt-name')?.value?.trim();
        const kmsUrl = document.getElementById('ap-kt-kmsurl')?.value?.trim() || '#';
        const annualTarget = document.getElementById('ap-kt-annual-target')?.value?.trim() || '';
        const spLink = document.getElementById('ap-kt-sp-link')?.value?.trim() || '';
        const biDashboard = document.getElementById('ap-kt-bi-dashboard')?.value?.trim() || '';
        const owner = window.getPersonValue ? window.getPersonValue('ap-kt-owner') : (document.getElementById('ap-kt-owner')?.value?.trim() || '');
        const status = document.getElementById('ap-kt-status')?.value || 'planning';
        const kts = omp_load('tasks');
        const editId = window._apEditingKeyTaskId;
        const existingTask = editId !== 'new' ? kts.find(k => k.id === editId) : null;
        const kpiAssociations = omp_collectKpiAssociationsFromForm('ap-kt', existingTask?.kpiAssociations, false);
        if (!name) { showToast('请输入工作名称', 'warning'); return; }
        if (editId === 'new') {
          const cycle = getCurrentCycle();
          const defaultYear = cycle ? cycle.year : new Date().getFullYear();
          const seq = ap_getNextKeyTaskSeq();
          kts.push({
            id: 'kt_' + Date.now(),
            cycleId: window._dsteState.currentCycleId,
            source: 'annual_plan',
            seq,
            name,
            bscDimension,
            kmsUrl,
            annualTarget,
            spLink,
            biDashboard,
            owner,
            status,
            description: '',
            type: 'strategic',
            progress: 0,
            dept: '',
            startDate: `${defaultYear}-01-01`,
            endDate: `${defaultYear}-12-31`,
            kpiAssociations,
            budget: 0,
            actualCost: 0,
          });
        } else {
          const idx = kts.findIndex(k => k.id === editId);
          if (idx > -1) {
            kts[idx] = { ...kts[idx], name, bscDimension, kmsUrl, annualTarget, spLink, biDashboard, owner, status, kpiAssociations };
          }
        }
        omp_save('tasks', kts);
        window._apEditingKeyTaskId = null;
        document.getElementById('omp-active-modal')?.remove();

        // 同步更新派生的 OMP 执行任务负责人与 KPI 关联（若已存在）
        if (editId !== 'new') {
          const derivedTasks = kts.filter(t => t.annualPlanTaskId === editId);
          if (derivedTasks.length > 0) {
            let ompChanged = false;
            derivedTasks.forEach(dt => {

            });

          }
        }

        navigate('bp/annual-plan');
