      window.ap_updateDecomposeSummary = function() {
        const parentId = window._apDecomposeParentId;
        if (!parentId) return;
        const kpis = omp_load('kpiInstances');
        const parent = kpis.find(k => k.id === parentId);
        if (!parent) return;
        const dimKey = window._apDecomposeDim || 'warzone';
        const cfg = DECOMPOSE_DIMENSIONS[dimKey];
        if (!cfg) return;
        const items = cfg.items;
        let totalTarget = 0;
        let totalWeight = 0;
        for (let i = 0; i < items.length; i++) {
          totalTarget += parseFloat(document.getElementById(`ap-decomp-target-${i}`)?.value) || 0;
          totalWeight += parseFloat(document.getElementById(`ap-decomp-weight-${i}`)?.value) || 0;
        }
        const targetOk = Math.abs(totalTarget - parent.targetValue) < 0.01;
        // 战区维度：权重指各战区组织绩效中该 KPI 的占比，不做求和校验
        const isWarzone = dimKey === 'warzone';
        const targetColor = targetOk ? 'var(--success)' : 'var(--warning)';
        const targetIcon = targetOk ? icon('check', { size: 14 }) : icon('warning', { size: 14 });
        const targetTip = targetOk ? '(等于父级)' : '(与父级不一致，允许保存)';
        const el = document.getElementById('ap-decomp-summary');
        if (el) {
          let html = '<div style="display:flex;gap:16px;">' +
            '<span style="color:' + targetColor + '">' + targetIcon + ' 目标合计: ' + totalTarget.toLocaleString() + ' / ' + parent.targetValue.toLocaleString() + ' ' + targetTip + '</span>';
          if (!isWarzone) {
            const weightOk = Math.abs(totalWeight - 100) < 0.01;
            const weightColor = weightOk ? 'var(--success)' : 'var(--danger)';
            const weightIcon = weightOk ? icon('check', { size: 14 }) : icon('x', { size: 14 });
            const weightTip = weightOk ? '(= 100%)' : '(需 = 100%)';
            html += '<span style="color:' + weightColor + '">' + weightIcon + ' 权重合计: ' + totalWeight + '% ' + weightTip + '</span>';
          }
          html += '</div>';
          el.innerHTML = html;
        }
      };

      window.ap_confirmDecompose = function(parentId) {
        const kpis = omp_load('kpiInstances');
        const parent = kpis.find(k => k.id === parentId);
        if (!parent) return;
        const dimKey = window._apDecomposeDim || 'warzone';
        const isWarzone = dimKey === 'warzone';
        const dimCfg = DECOMPOSE_DIMENSIONS[dimKey];
        if (!dimCfg) { showToast('分解维度配置错误', 'error'); return; }
        const items = dimCfg.items;
        let totalTarget = 0;
        let totalWeight = 0;
        const children = [];
        const now = Date.now();
        items.forEach((item, i) => {
          const target = parseFloat(document.getElementById(`ap-decomp-target-${i}`)?.value) || 0;
          const weight = parseFloat(document.getElementById(`ap-decomp-weight-${i}`)?.value) || 0;
          totalTarget += target;
          totalWeight += weight;
          if (target > 0) {
            children.push({
              id: 'kpi_' + now + '_' + Math.random().toString(36).slice(2, 6) + '_' + i,
              cycleId: window._dsteState.currentCycleId,
              indicatorId: parent.indicatorId,
              period: parent.period,
              targetValue: target,
              challengeValue: Math.round(target * 1.2),
              actualValue: 0,
              achievementRate: 0,
              weight: weight,
              owner: '',
              dept: item,
              status: 'active',
              parentId: parentId,
              level: parent.level + 1,
              assessmentLevel: dimKey === 'team' ? 'team' : 'department',
              bscDimension: parent.bscDimension,
              decomposeBy: dimKey,
              source: 'annual_plan',
              annualPlanKpiId: null,
              history: [],
              x: null, y: null, width: 170, height: 100
            });
          }
        });
        if (Math.abs(totalTarget - parent.targetValue) > 0.01) {
          showToast(`子目标合计 (${totalTarget}) 与父目标 (${parent.targetValue}) 不一致，已保存但建议检查`, 'warning');
        }
        // 自动归一化权重：允许用户只改一个值，保存时按比例调整为合计 100%
        // 战区维度除外：权重为各战区组织绩效中该 KPI 的占比，不做求和校验与归一化
        if (!isWarzone && children.length > 0) {
          if (totalWeight === 0) {
            const equal = Math.floor(100 / children.length);
            let remainder = 100 - equal * children.length;
            children.forEach(child => {
              child.weight = equal + (remainder > 0 ? 1 : 0);
              if (remainder > 0) remainder--;
            });
          } else if (Math.abs(totalWeight - 100) > 0.01) {
            const scale = 100 / totalWeight;
            let newTotal = 0;
            children.forEach((child, idx) => {
              const isLast = idx === children.length - 1;
              child.weight = isLast ? 100 - newTotal : Math.round(child.weight * scale);
              newTotal += child.weight;
            });
          }
          const normalizedTotal = children.reduce((sum, c) => sum + c.weight, 0);
          if (Math.abs(normalizedTotal - 100) > 1) {
            showToast(`权重合计为 ${normalizedTotal}%，必须等于 100%`, 'warning');
            return;
          }
        }
        // 移除同一父级、同一维度下的旧分解子节点，避免重复
        const filteredKpis = kpis.filter(k => !(k.parentId === parentId && (k.decomposeBy || 'warzone') === dimKey));
        filteredKpis.push(...children);
        omp_save('kpiInstances', filteredKpis);
        window._apDecomposeDim = null;
        window._apDecomposeParentId = null;
        document.getElementById('omp-active-modal')?.remove();
        showToast(`已保存 ${children.length} 条分解目标`, 'success');
        navigate('bp/annual-plan');
      };

      // ===== 全局周期选择器渲染 =====
      function renderCycleSelector() {
        const select = document.getElementById('global-cycle-select');
        if (!select) return;
        try {
          let cycles = JSON.parse(DSTE.Storage.getString('dste_cycles_v1') || '[]');
          // fallback: 如果周期数据不存在，自动创建默认值
          if (!cycles || cycles.length === 0) {
            cycles = [2025, 2026, 2027].map(year => ({
              id: `cycle_${year}_marketing`,
              year,
              name: `${year}年度 — 营销线`,
              phase: year < 2026 ? 'archived' : 'planning',
              organization: '营销线',
              parentCycleId: null
            }));
            omp_save('cycles', cycles);
          }
          const currentId = window._dsteState.currentCycleId;
          select.replaceChildren();
          cycles.forEach(c => {
            const option = document.createElement('option');
            option.value = c.id;
            option.textContent = c.name;
            if (c.id === currentId) option.selected = true;
            select.appendChild(option);
          });
        } catch(e) {}
      }

      function getCurrentCycle() {
        try {
          const cycles = JSON.parse(DSTE.Storage.getString('dste_cycles_v1') || '[]');
          const found = cycles.find(c => c.id === window._dsteState.currentCycleId);
          if (found) return found;
          // Safe fallback: derive year from currentCycleId or use current calendar year
          const match = String(window._dsteState.currentCycleId || '').match(/cycle_(\d{4})_/);
          const year = match ? parseInt(match[1], 10) : new Date().getFullYear();
          return { id: window._dsteState.currentCycleId, year, name: `${year}年度 — 营销线`, phase: 'planning', organization: '营销线', parentCycleId: null };
        } catch(e) {
          const year = new Date().getFullYear();
          return { id: window._dsteState.currentCycleId, year, name: `${year}年度 — 营销线`, phase: 'planning', organization: '营销线', parentCycleId: null };
        }
      }

      // ===== 导航 =====
      // 外部页面映射
      function _renderPage(pageId, pushState = true) {
        if (!pageId) pageId = 'dashboard';
        if (!PAGES[pageId]) pageId = 'dashboard';

        // 同步 URL hash（避免和 hashchange 循环触发）
        if (pushState && window.location.hash.slice(1) !== pageId) {
          window.location.hash = pageId;
        }

        currentPage = pageId;
        window.__dsteCurrentPageId = pageId;

        // 确定当前 phase
        const phase = getPhaseFromPage(pageId);
        currentPhase = phase;

        // 更新顶部 active
        document.querySelectorAll('.top-nav-item').forEach(link => {
          link.classList.toggle('active', link.dataset.phase === phase);
        });

        // 更新左侧栏
        renderSidebar(phase);

        // 更新内容
        const contentEl = document.getElementById('page-content');

        // 保存当前焦点，避免 innerHTML 重建 DOM 后输入框失焦
        const activeEl = document.activeElement;
        const focusRestore = (activeEl && activeEl.id && contentEl.contains(activeEl) &&
          (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA' || activeEl.tagName === 'SELECT'))
          ? { id: activeEl.id, start: activeEl.selectionStart, end: activeEl.selectionEnd, dir: activeEl.selectionDirection }
          : null;

        contentEl.style.animation = 'none';
        contentEl.offsetHeight; // trigger reflow
        contentEl.innerHTML = PAGES[pageId]();
        hydrateIcons(contentEl);
        contentEl.style.animation = '';

        // 若从侧边栏子目录携带了待打开的报表，进入报表中心后自动打开
        if (pageId === 'exe/report-center' && window._pendingReportId) {
          const pendingId = window._pendingReportId;
          window._pendingReportId = null;
          // 延迟到 DOM 渲染完成后打开
          requestAnimationFrame(() => openReport(pendingId));
        }

        // Roadmap 时间线默认滚动到最左侧（显示最新版本）
        if (pageId === 'dashboard/roadmap') {
          requestAnimationFrame(() => {
            const tl = document.getElementById('dev-timeline');
            if (tl) tl.scrollLeft = 0;
          });
        }

        // 绑定事件委托（替代内联 onclick）
        bindPageEvents(contentEl);

        // 恢复焦点与光标位置
        if (focusRestore) {
          const el = document.getElementById(focusRestore.id);
          if (el) {
            el.focus();
            if (typeof el.setSelectionRange === 'function' && focusRestore.start !== null) {
              const len = (el.value || '').length;
              const start = Math.min(focusRestore.start, len);
              const end = Math.min(focusRestore.end, len);
              el.setSelectionRange(start, end, focusRestore.dir || 'forward');
            }
          }
        }

        // AI 页面已改为抽屉，无需初始化

        // 外部模块挂载钩子（如战略指标库）
        if (typeof window.__afterNavigate === 'function') {
          window.__afterNavigate(pageId, contentEl);
        }

        // 更新左侧 active
        document.querySelectorAll('.sidebar-item').forEach(item => {
          item.classList.toggle('active', item.dataset.page === pageId);
        });

        // 更新标题
        document.title = (getPageTitle(pageId) || 'DSTE') + ' - DSTE 战略管理平台';
      }

      function navigate(pageId, pushState = true) {
        if (!pageId) pageId = 'dashboard';

        // AI 全屏页已改为抽屉：#ai 打开 dashboard 并拉起抽屉
        if (pageId === 'ai') {
          if (typeof window !== 'undefined' && window.toggleGlobalAiDrawer) {
            window.toggleGlobalAiDrawer();
          }
          pageId = 'dashboard';
        }

        // 外部链接直接跳转
        if (EXTERNAL_PAGES[pageId]) {
          window.location.href = EXTERNAL_PAGES[pageId];
          return;
        }

        if (!PAGES[pageId]) pageId = 'dashboard';

        // 在当前 tab 内跳转，替换当前 tab 的页面
        const activeTab = appTabs.find(t => t.id === activeTabId);
        if (activeTab) {
          activeTab.pageId = pageId;
          activeTab.title = getPageTitle(pageId);
        } else {
          appTabs = [{ id: 'tab-' + tabCounter++, pageId, title: getPageTitle(pageId) }];
          activeTabId = appTabs[0].id;
        }
        renderTabs();

        _renderPage(pageId, pushState);
      }

      // ===== 事件委托（替代内联 onclick）=====
      function bindPageEvents(container) {
        if (container._dsteEventsBound) return;
        container._dsteEventsBound = true;
        container.addEventListener('click', (e) => {
          // data-navigate: 面包屑/相关链接导航
          const navLink = e.target.closest('[data-navigate]');
          if (navLink) {
            e.preventDefault();
            navigate(navLink.dataset.navigate);
            return;
          }
          // data-filter-roadmap: 路线图筛选
          const filterBtn = e.target.closest('[data-filter-roadmap]');
          if (filterBtn) {
            filterRoadmap(filterBtn.dataset.filterRoadmap);
            return;
          }
          // data-scroll-to: 平滑滚动到元素
          const scrollTrigger = e.target.closest('[data-scroll-to]');
          if (scrollTrigger) {
            const target = document.getElementById(scrollTrigger.dataset.scrollTo);
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            return;
          }
          // OMP: data-action 事件委托
          const actionBtn = e.target.closest('[data-action]');
          if (actionBtn) {
            try {
              const action = actionBtn.dataset.action;
              const id = actionBtn.dataset.id;
              const filter = actionBtn.dataset.filter;
              const view = actionBtn.dataset.view;
              switch(action) {
                case 'omp-switch-task-view': window.omp_switchTaskView(view); break;
                case 'omp-view-kpi': window.omp_viewKpi(id); break;
                case 'omp-edit-kpi': window.omp_editKpi(id); break;
                case 'omp-new-kpi': window.omp_newKpi(); break;
                case 'omp-view-task': window.omp_viewTask(id); break;
                case 'omp-edit-task': window.omp_editTask(id); break;
                case 'omp-new-task': window.omp_newTask(); break;
                case 'omp-delete-kpi': window.omp_deleteKpi(id); break;
                case 'omp-delete-task': window.omp_deleteTask(id); break;
                case 'omp-task-edit-tab': window.omp_switchTaskEditTab(actionBtn.dataset.tab); break;
                case 'omp-task-view-tab': window.omp_switchTaskViewTab(actionBtn.dataset.tab); break;
                case 'omp-add-subtask': window.omp_addSubtaskRow(actionBtn.dataset.parentId); break;
                case 'omp-remove-subtask': window.omp_removeSubtaskRow(actionBtn); break;
                case 'omp-move-subtask-up': window.omp_moveSubtaskRow(actionBtn, 'up'); break;
                case 'omp-move-subtask-down': window.omp_moveSubtaskRow(actionBtn, 'down'); break;
                case 'omp-delete-subtask': window.omp_deleteSubtask(actionBtn.dataset.id); break;
                case 'omp-edit-subtask': window.omp_editTask(actionBtn.dataset.id); break;
                case 'omp-restore-auto-progress': window.omp_restoreAutoProgress(actionBtn.dataset.id); break;
                case 'omp-toggle-task-expand': window.omp_toggleTaskExpand(actionBtn.dataset.id); break;
                case 'omp-export': window.omp_exportData(); break;
                case 'omp-edit-monthly-progress': window.omp_openMonthlyProgressModal(actionBtn.dataset.taskId, actionBtn.dataset.month); break;
                case 'omp-delete-monthly-progress': window.omp_deleteMonthlyProgress(actionBtn.dataset.recordId); break;
                case 'omp-toggle-view':
                  window._ompState.kpiViewMode = actionBtn.dataset.view;
                  navigate('exe/kpi');
                  break;
                case 'omp-decompose-kpi': window.omp_openDecomposeModal(id); break;
                case 'omp-filter-kpi':
                  if (filter) { window._ompState.kpiFilter[filter] = actionBtn.value; navigate('exe/kpi'); }
                  break;
                case 'omp-filter-task':
                  if (filter) { window._ompState.taskFilter[filter] = actionBtn.value; navigate('exe/tasks'); }
                  break;
                case 'omp-staffing-remove-member':
                  window.omp_staffingRemoveMember(actionBtn.dataset.taskId || actionBtn.closest('[data-task-id]')?.dataset?.taskId, actionBtn.dataset.personRef);
                  break;
                case 'omp-staffing-search':
                  // input event handled separately via change/input listener
                  break;
                case 'omp-staffing-toggle-org':
                  window.omp_staffingToggleOrg(actionBtn.dataset.orgId);
                  break;
                case 'omp-staffing-select-org':
                  window.omp_staffingSelectOrg(actionBtn.dataset.orgId);
                  break;
                case 'omp-staffing-clear-search':
                  window.omp_staffingClearSearch();
                  break;
              // ===== 战略指标库事件 =====
              case 'ind-select':
                window._indicatorState.selectedIndicatorId = id;
                navigate('bp/kpi');
                break;
              case 'ind-select-cat':
                window._indicatorState.selectedCategory = actionBtn.dataset.cat;
                window._indicatorState.selectedSubCategory = null;
                window._indicatorState.selectedIndicatorId = null;
                navigate('bp/kpi');
                break;
              case 'ind-select-subcat':
                window._indicatorState.selectedSubCategory = actionBtn.dataset.sub;
                window._indicatorState.selectedIndicatorId = null;
                navigate('bp/kpi');
                break;
              case 'ind-new': window.ind_openModal('new'); break;
              case 'ind-edit': window.ind_openModal('edit', id); break;
              case 'ind-delete': window.ind_delete(id); break;
              case 'ind-export': window.ind_export(); break;
              case 'ind-clear-select':
                window._indicatorState.selectedIndicatorId = null;
                navigate('bp/kpi');
                break;
              case 'ind-filter-freq':
                window._indicatorState.frequencyFilter = actionBtn.value;
                navigate('bp/kpi');
                break;
              case 'ind-filter-status':
                window._indicatorState.statusFilter = actionBtn.value;
                navigate('bp/kpi');
                break;
              // ===== 年度经营计划事件 =====
              case 'ap-switch-tab':
                window._annualPlanState.activeTab = actionBtn.dataset.tab;
                navigate('bp/annual-plan');
                break;
              case 'ap-switch-cycle':
                // 已废弃：周期切换由全局选择器统一处理
                break;
              case 'ap-switch-decompose-dim':
                window._annualPlanState.decomposeDimension = actionBtn.dataset.dim;
                navigate('bp/annual-plan');
                break;
              case 'ap-select-kpi':
                window._annualPlanState.selectedKpiId = id;
                navigate('bp/annual-plan');
                break;
              case 'ap-edit-kpi':
                window._annualPlanState.selectedKpiId = id;
                navigate('bp/annual-plan');
                break;
              case 'ap-close-panel':
                window._annualPlanState.selectedKpiId = null;
                navigate('bp/annual-plan');
                break;
              case 'ap-save-kpi':
                window.ap_saveKpi(id);
                break;
              case 'ap-add-kpi':
                window.ap_addKpi();
                break;
              case 'ap-decompose':
                window.ap_decomposeKpi(id);
                break;
              case 'ap-delete-kpi':
                if (!confirm('确定要删除此 KPI 吗？年度计划侧仅删除源头 KPI，如有子节点将一并删除。')) break;
                const allKpis = omp_load('kpiInstances');
                const rootKpi = allKpis.find(k => k.id === id);
                if (!rootKpi || rootKpi.source === 'omp') {
                  showToast('年度计划侧只能删除源头 KPI', 'warning');
                  break;
                }
                const toDelete = new Set([id]);
                // 递归收集子节点（仅年度计划源头）
                let changed = true;
                while (changed) {
                  changed = false;
                  allKpis.forEach(k => {
                    if (!toDelete.has(k.id) && toDelete.has(k.parentId) && k.source !== 'omp') {
                      toDelete.add(k.id);
                      changed = true;
                    }
                  });
                }
                const filtered = allKpis.filter(k => !toDelete.has(k.id));
                omp_save('kpiInstances', filtered);
                window._annualPlanState.selectedKpiId = null;
                navigate('bp/annual-plan');
                break;
              case 'ap-publish':
                window.ap_publishToExecution();
                break;
              case 'ap-add-keytask':
                window.ap_addKeyTask();
                break;
              case 'ap-edit-keytask':
                window.ap_editKeyTask(id);
                break;
              case 'version-audit-refresh':
                window.refreshVersionAudit();
                break;
              case 'version-audit-copy':
                window.copyVersionAuditReport();
                break;
            }
            } catch (err) {
              console.error('[OMP] 处理操作失败:', actionBtn.dataset.action, err);
            }
            return;
          }
        });

        // 重点工作人员配置台：拖拽分配（PRD v1.8：从通讯录拖拽人员到任务卡片）
        container.addEventListener('dragstart', (e) => {
          const memberChip = e.target.closest('[data-drag="member-chip"]');
          if (memberChip) {
            e.dataTransfer.setData('text/plain', JSON.stringify({
              action: 'reorder',
              personRef: memberChip.dataset.personRef,
              sourceTaskId: memberChip.dataset.taskId,
            }));
            e.dataTransfer.effectAllowed = 'move';
            memberChip.classList.add('dragging');
            document.querySelectorAll('[data-drop="matrix-member"]').forEach(el => el.classList.add('drop-ready'));
            return;
          }
          const personCard = e.target.closest('[data-drag="person"]');
          if (!personCard) return;
          const personRef = personCard.dataset.personRef;
          e.dataTransfer.setData('text/plain', JSON.stringify({ personRef }));
          e.dataTransfer.effectAllowed = 'copy';
          personCard.classList.add('dragging');
          document.querySelectorAll('[data-drop="task"], [data-drop="matrix-member"]').forEach(el => el.classList.add('drop-ready'));
        });
        container.addEventListener('dragend', (e) => {
          const memberChip = e.target.closest('[data-drag="member-chip"]');
          if (memberChip) memberChip.classList.remove('dragging');
          const personCard = e.target.closest('[data-drag="person"]');
          if (personCard) personCard.classList.remove('dragging');
          document.querySelectorAll('[data-drop="task"], [data-drop="matrix-member"]').forEach(el => el.classList.remove('drop-active', 'drop-ready'));
          document.querySelectorAll('.omp-matrix-member-chip').forEach(el => el.classList.remove('drop-before', 'drop-after'));
        });
        container.addEventListener('dragover', (e) => {
          const dropTarget = e.target.closest('[data-drop="task"], [data-drop="matrix-member"]');
          if (!dropTarget) return;
          e.preventDefault();

          const memberChip = e.target.closest('[data-drag="member-chip"]');
          // 重排时 effectAllowed 为 move；外部人员拖入为 copy
          const isReorder = e.dataTransfer.effectAllowed === 'move' || e.dataTransfer.effectAllowed === 'copyMove' || e.dataTransfer.effectAllowed === 'all';

          if (isReorder && memberChip) {
            e.dataTransfer.dropEffect = 'move';
            document.querySelectorAll('.omp-matrix-member-chip').forEach(el => el.classList.remove('drop-before', 'drop-after'));
            const rect = memberChip.getBoundingClientRect();
            const before = e.clientX < rect.left + rect.width / 2;
            memberChip.classList.add(before ? 'drop-before' : 'drop-after');
          } else {
            e.dataTransfer.dropEffect = 'copy';
          }
        });
        container.addEventListener('dragenter', (e) => {
          const dropTarget = e.target.closest('[data-drop="task"], [data-drop="matrix-member"]');
          if (!dropTarget) return;
          e.preventDefault();
          dropTarget.classList.add('drop-active');
        });
        container.addEventListener('dragleave', (e) => {
          const dropTarget = e.target.closest('[data-drop="task"], [data-drop="matrix-member"]');
          if (!dropTarget) return;
          const related = e.relatedTarget;
          if (dropTarget.contains(related)) return;
          dropTarget.classList.remove('drop-active');
        });
        container.addEventListener('drop', (e) => {
          const dropTarget = e.target.closest('[data-drop="task"], [data-drop="matrix-member"]');
          if (!dropTarget) return;
          e.preventDefault();
          dropTarget.classList.remove('drop-active');
          document.querySelectorAll('[data-drop="task"], [data-drop="matrix-member"]').forEach(el => el.classList.remove('drop-ready'));
          document.querySelectorAll('.omp-matrix-member-chip').forEach(el => el.classList.remove('drop-before', 'drop-after'));
          const raw = e.dataTransfer.getData('text/plain');
          if (!raw) return;
          try {
            const payload = JSON.parse(raw);
            if (payload.action === 'reorder' && payload.personRef && payload.sourceTaskId) {
              const memberChip = e.target.closest('[data-drag="member-chip"]');
              if (memberChip && memberChip.dataset.taskId === payload.sourceTaskId) {

                window.omp_staffingReorderMember(payload.sourceTaskId, payload.personRef, memberChip.dataset.personRef, before);

              return;

            if (payload.personRef) {

        });

        // 这样无论是否已发布、是否已有其他 OMP 任务，新增的年度计划重点工作都能自动出现在战略执行侧。
        if (omp_syncAnnualPlanTasksToExecution(cycleId)) {
          // 若新增 OMP 任务，立即把里程碑/进度记录关联过来
          omp_syncMilestonesAndRecordsToOmpTasks();

        // 自动聚合存在子任务的父任务进度
        const tasks = omp_load('tasks') || [];
        let progressChanged = false;
        tasks.forEach(t => {
          if (t && !t.parentId && hasSubtasks(tasks, t.id) && !t.progressOverridden) {
            if (recalculateParentProgress(tasks, t.id)) progressChanged = true;
          }
        });
        if (progressChanged) omp_save('tasks', tasks);
        const rawViewMode = window._ompState.taskViewMode || 'list';
        const viewMode = rawViewMode === 'staffing' ? 'matrix' : rawViewMode;

      // ===== Tab 1: 总览看板 =====
      function omp_renderDashboard() {
        const cycleId = window._dsteState.currentCycleId;
        const kpis = omp_load('kpiInstances').filter(k => k.cycleId === cycleId && k.source === 'omp');
        const tasks = omp_load('tasks').filter(t => t.cycleId === cycleId && t.source === 'omp');
        const indicators = omp_load('indicators');
        const milestones = omp_load('milestones');

        // 统计数据
        const avgAchievement = kpis.length > 0 ? Math.round(kpis.reduce((s, k) => s + k.achievementRate, 0) / kpis.length * 10) / 10 : 0;
        const warningKpis = kpis.filter(k => k.status === 'warning').length;
        const laggingKpis = kpis.filter(k => k.status === 'lagging').length;
        const totalTasks = tasks.length;
        const doneTasks = tasks.filter(t => t.status === 'done' || t.status === 'closed').length;
        const delayedTasks = tasks.filter(t => t.status === 'delayed').length;
        const activeTasks = tasks.filter(t => t.status === 'active' || t.status === 'at_risk').length;
        const taskCompletionRate = totalTasks > 0 ? Math.round(doneTasks / totalTasks * 100) : 0;

        const statCards = [
          { label: 'KPI 平均达成率', value: avgAchievement + '%', color: 'var(--primary)', icon: '<span class="icon" data-icon="chart-bar" data-icon-size="14"></span>' },
          { label: '预警/落后 KPI', value: (warningKpis + laggingKpis) + ' 个', color: 'var(--warning)', icon: '<span class="icon" data-icon="warning" data-icon-size="14"></span>️' },
          { label: '工作总数', value: totalTasks + ' 项', color: 'var(--primary)', icon: '<span class="icon" data-icon="clipboard-text" data-icon-size="14"></span>' },
          { label: '工作完成率', value: taskCompletionRate + '%', color: 'var(--success)', icon: icon('check', { size: 14 }) },
          { label: '延期工作', value: delayedTasks + ' 项', color: 'var(--danger)', icon: '<span class="icon" data-icon="warning-octagon" data-icon-size="14"></span>' },
          { label: '进行中', value: activeTasks + ' 项', color: 'var(--primary)', icon: '<span class="icon" data-icon="rocket-launch" data-icon-size="14"></span>' },
        ];

        // 热力图: 部门 × BSC维度
        const depts = [...new Set(kpis.map(k => k.dept))];
        const categories = ['财务', '客户', '流程', '学习成长'];
        const heatmapRows = depts.map(dept => {
          return `<div style="display:grid;grid-template-columns:100px repeat(4,1fr);gap:8px;align-items:center;margin-bottom:8px;">
            <div style="font-size:13px;font-weight:600;color:var(--text-primary);">${dept}</div>
            ${categories.map(cat => {
              const kpi = kpis.find(k => k.dept === dept && indicators.find(i => i.id === k.indicatorId)?.category === cat);
              if (!kpi) return `<div class="omp-heatmap-cell" style="background:var(--bg-page);color:var(--text-tertiary);">-</div>`;
              const rate = kpi.achievementRate;
              const bg = rate >= 95 ? 'var(--success)' : rate >= 80 ? 'var(--warning)' : 'var(--danger)';
              return `<div class="omp-heatmap-cell" style="background:${bg};color:var(--text-inverse);" data-action="omp-view-kpi" data-id="${kpi.id}">${rate}%</div>`;
            }).join('')}
          </div>`;
        }).join('');

        // 工作状态分布
        const statusDist = {};
        tasks.forEach(t => { statusDist[t.status] = (statusDist[t.status] || 0) + 1; });
        const statusLabels = { planning: '规划中', active: '进行中', at_risk: '有风险', delayed: '已延期', done: '已完成', closed: '已关闭' };
        const statusColors = { planning: 'var(--text-tertiary)', active: 'var(--success)', at_risk: 'var(--warning)', delayed: 'var(--danger)', done: 'var(--primary)', closed: 'var(--text-tertiary)' };
        const distHtml = Object.entries(statusDist).map(([status, count]) => {
          const pct = Math.round(count / totalTasks * 100);
          return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <span style="font-size:12px;color:var(--text-secondary);width:60px;">${statusLabels[status]}</span>
            <div style="flex:1;height:8px;background:var(--bg-page);border-radius:4px;overflow:hidden;">
              <div style="width:${pct}%;height:100%;background:${statusColors[status]};border-radius:4px;"></div>
            </div>
            <span style="font-size:12px;font-weight:600;color:var(--text-primary);width:40px;text-align:right;">${count}</span>
          </div>`;
        }).join('');

        // 预警清单
        const alerts = [];
        kpis.filter(k => k.status === 'lagging').forEach(k => {
          const ind = indicators.find(i => i.id === k.indicatorId);
          alerts.push({ type: 'kpi', text: `${ind ? ind.name : '未知指标'} (${k.dept}) 达成率 ${k.achievementRate}%`, id: k.id, action: 'omp-view-kpi' });
        });
        tasks.filter(t => t.status === 'delayed').forEach(t => {
          alerts.push({ type: 'task', text: `${t.name} (${t.dept}) 已延期`, id: t.id, action: 'omp-view-task' });
        });
        const alertHtml = alerts.length > 0 ? alerts.map(a =>
          `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-page);border-radius:6px;margin-bottom:6px;cursor:pointer;" data-action="${a.action}" data-id="${a.id}">
            <span style="font-size:16px;">${a.type === 'kpi' ? '<span class="icon" data-icon="warning-octagon" data-icon-size="14"></span>' : '<span class="icon" data-icon="warning-octagon" data-icon-size="14"></span>'}</span>
            <span style="font-size:13px;color:var(--text-primary);flex:1;">${a.text}</span>
            <span style="font-size:12px;color:var(--primary);font-weight:500;">查看 →</span>
          </div>`
        ).join('') : '<div style="padding:20px;text-align:center;color:var(--text-tertiary);font-size:13px;"><span class="icon" data-icon="confetti" data-icon-size="14"></span> 当前无预警项</div>';

        return `

                <button class="btn btn-sm ${window._ompState.kpiViewMode === 'tree' ? 'btn-primary' : 'btn-secondary'}" data-action="omp-toggle-view" data-view="tree" style="border-radius:0;border:none;font-size:12px;"><span class="icon" data-icon="tree" data-icon-size="14"></span> 树形</button>
              </div>
              <span style="font-size:12px;color:var(--text-tertiary);margin-left:auto;"><span class="icon" data-icon="lightbulb" data-icon-size="14"></span> KPI 目标请前往「年度经营计划」维护</span>
            </div>
          </div>
          ${window._ompState.kpiViewMode === 'tree' ? omp_renderKpiTree(filtered, indicators, statusBadge, miniTrend) : `
          <div class="card">
            <div style="overflow-x:auto;">
              <table class="data-table">
                <thead>
                  <tr><th>指标名称</th><th>考核层级</th><th>部门</th><th style="text-align:right;">目标值</th><th style="text-align:right;">实际值</th><th style="text-align:center;">达成率</th><th style="text-align:center;">状态</th><th style="text-align:center;">趋势</th><th style="text-align:center;">操作</th></tr>
                </thead>
                <tbody>
                  ${filtered.map(k => {
                    const ind = indicators.find(i => i.id === k.indicatorId);
                    const sb = statusBadge[k.status] || statusBadge.warning;
                    const levelCfg = ASSESSMENT_LEVELS[k.assessmentLevel || 'marketing-line'];
                    const levelClass = 'ap-level-' + (k.assessmentLevel || 'marketing-line');
                    const isUnset = k.status === 'unset';
                    const rateColor = isUnset ? 'var(--text-tertiary)' : (k.achievementRate >= 100 ? 'var(--success)' : k.achievementRate >= 80 ? 'var(--warning)' : 'var(--danger)');
                    return `
                      <tr>
                        <td><strong>${ind ? ind.name : '未知'}</strong>${k.annualPlanKpiId ? `<span style="font-size:11px;padding:2px 6px;border-radius:4px;background:var(--success-bg);color:var(--success);margin-left:8px;">年度计划</span>` : ''}<br><span style="font-size:11px;color:var(--text-tertiary);">${ind ? ind.category + ' · ' + ind.subCategory : ''}</span></td>
                        <td><span class="ap-level-badge ${levelClass}" style="background:color-mix(in srgb, ${levelCfg.color} 15%, transparent);color:${levelCfg.color};">${levelCfg.label}</span></td>
                        <td>${k.dept}</td>
                        <td style="text-align:right;font-weight:500;">${k.targetValue}${ind ? ind.unit : ''}</td>
                        <td style="text-align:right;font-weight:500;">${isUnset ? '—' : k.actualValue + (ind ? ind.unit : '')}</td>
                        <td style="text-align:center;">
                          <div style="display:flex;align-items:center;justify-content:center;gap:8px;">
                            <div style="width:40px;height:4px;background:var(--bg-page);border-radius:2px;overflow:hidden;">
                              <div style="width:${isUnset ? 0 : Math.min(k.achievementRate, 100)}%;height:100%;background:${rateColor};border-radius:2px;"></div>
                            </div>
                            <span style="font-size:13px;font-weight:600;">${isUnset ? '—' : k.achievementRate + '%'}</span>
                          </div>
                        </td>
                        <td style="text-align:center;"><span class="status-badge ${sb.cls}">${sb.text}</span></td>
                        <td style="text-align:center;">${miniTrend(k.id)}</td>
                        <td style="text-align:center;">
                          <button class="btn btn-sm btn-secondary" data-action="omp-view-kpi" data-id="${k.id}" style="font-size:12px;padding:3px 8px;">详情</button>
                          <button class="btn btn-sm btn-primary" data-action="omp-edit-kpi" data-id="${k.id}" style="font-size:12px;padding:3px 8px;">编辑</button>

      // ===== KPI 指标树 — 卡片式层级视图 =====
      function omp_kpiBuildTree(kpis) {
        const childrenMap = {};
        kpis.forEach(k => { childrenMap[k.id] = []; });
        kpis.forEach(k => {
          if (k.parentId && childrenMap[k.parentId] !== undefined) {
            childrenMap[k.parentId].push(k);
          }
        });
        const roots = kpis.filter(k => !k.parentId || !kpis.find(p => p.id === k.parentId));
        return { roots, childrenMap };
      }

      function omp_kpiRenderRing(rate, size) {
        const r = Math.round(size / 2) - 4;
        const c = Math.round(2 * Math.PI * r * 100) / 100;
        const dash = Math.round(c * Math.min(rate, 100) / 100 * 100) / 100;
        const color = rate >= 95 ? 'var(--success)' : rate >= 80 ? 'var(--warning)' : 'var(--danger)';
        const glow = rate >= 100 ? 'filter: drop-shadow(0 0 4px color-mix(in srgb, var(--success) 40%, transparent));' : '';
        const center = Math.round(size / 2);
        return `<svg class="omp-kpi-ring" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="${glow} flex-shrink:0;">
          <circle cx="${center}" cy="${center}" r="${r}" fill="none" stroke="var(--border-color)" stroke-width="3"/>
          <circle cx="${center}" cy="${center}" r="${r}" fill="none" stroke="${color}" stroke-width="3"
            stroke-dasharray="${dash} ${c}" stroke-linecap="round" transform="rotate(-90 ${center} ${center})"/>
        </svg>`;
      }

      function omp_renderKpiTree(kpis, indicators, statusBadge, miniTrend) {
        const expandedIds = window._ompState.kpiExpandedIds;
        const { roots, childrenMap } = omp_kpiBuildTree(kpis);
        // BSC 维度配置（用于角标颜色）
        const BSC_DIMENSIONS = {
          financial: { name: '财务', color: 'var(--dim-financial)' },
          customer:  { name: '客户', color: 'var(--dim-customer)' },
          internal:  { name: '流程', color: 'var(--dim-process)' },
          learning:  { name: '成长', color: 'var(--dim-learning)' }
        };
        // 首次渲染时，自动展开所有根节点（一次性）
        if (!window._ompState.kpiTreeAutoExpanded) {
          roots.forEach(r => {
            if (childrenMap[r.id] && childrenMap[r.id].length > 0) {
              expandedIds.add(r.id);
            }
          });
          window._ompState.kpiTreeAutoExpanded = true;
        }
        // 画布状态
        const canvasState = window._ompState.kpiCanvasState || {};
        const scale = canvasState.scale || 1;
        const offsetX = canvasState.offsetX || 0;
        const offsetY = canvasState.offsetY || 0;

        // 收集所有可见节点
        const visibleNodes = [];
        const visibleEdges = []; // { from: kpiId, to: kpiId }

        function traverse(kpi) {
          visibleNodes.push(kpi);
          const hasChildren = childrenMap[kpi.id] && childrenMap[kpi.id].length > 0;
          const isExpanded = expandedIds.has(kpi.id);
          if (hasChildren && isExpanded) {
            childrenMap[kpi.id].forEach(child => {
              visibleEdges.push({ from: kpi.id, to: child.id });
              traverse(child);
            });
          }
        }
        roots.forEach(r => traverse(r));

        // 自动布局：如果节点没有位置，计算默认位置
        // 使用简单的层级布局：根在左，子向右展开
        const nodePositions = {};
        const levelWidth = 220;
        const nodeHeight = 110;
        const levelNodes = {}; // { level: [kpiId, ...] }
        
        function collectLevels(kpi, level) {
          if (!levelNodes[level]) levelNodes[level] = [];
          levelNodes[level].push(kpi.id);
          const isExpanded = expandedIds.has(kpi.id);
          if (childrenMap[kpi.id] && isExpanded) {
            childrenMap[kpi.id].forEach(child => collectLevels(child, level + 1));
          }
        }
        roots.forEach(r => collectLevels(r, 0));

        // 计算每个节点的位置
        function sanitizePos(val, fallback) {
          const n = parseFloat(val);
          return (Number.isFinite(n) && n >= 0) ? n : fallback;
        }
        Object.entries(levelNodes).forEach(([level, ids]) => {
          const lvl = parseInt(level);
          const x = lvl * levelWidth + 20;
          ids.forEach((id, idx) => {
            const kpi = kpis.find(k => k.id === id);
            // 优先使用保存的位置（严格校验：非 null/undefined、有效数字、非负）
            const savedX = kpi && kpi.x != null ? parseFloat(kpi.x) : NaN;
            const savedY = kpi && kpi.y != null ? parseFloat(kpi.y) : NaN;
            if (Number.isFinite(savedX) && Number.isFinite(savedY) && savedX > 0 && savedY > 0) {
              nodePositions[id] = {
                x: savedX,
                y: savedY,
                w: sanitizePos(kpi.width, 170),
                h: sanitizePos(kpi.height, 100)
              };
            } else {
              const y = idx * (nodeHeight + 20) + 20;
              nodePositions[id] = { x, y, w: 170, h: 100 };
            }
          });
        });

        // 强制净化：确保 nodePositions 中所有坐标都是有效数字
        Object.keys(nodePositions).forEach(id => {
          const p = nodePositions[id];
          if (!Number.isFinite(p.x) || p.x < 0) p.x = 20;
          if (!Number.isFinite(p.y) || p.y < 0) p.y = 20;
          if (!Number.isFinite(p.w) || p.w <= 0) p.w = 170;
          if (!Number.isFinite(p.h) || p.h <= 0) p.h = 100;
        });

        // 渲染节点 HTML
        const nodesHtml = visibleNodes.map(kpi => {
          const ind = indicators.find(i => i.id === kpi.indicatorId);
          const pos = nodePositions[kpi.id] || { x: 0, y: 0, w: 170, h: 100 };
          const hasChildren = childrenMap[kpi.id] && childrenMap[kpi.id].length > 0;
          const isExpanded = expandedIds.has(kpi.id);
          const statusClass = kpi.status === 'achieved' ? 'achieved' : kpi.status === 'warning' ? 'warning' : 'lagging';
          const dimKey = kpi.bscDimension || 'financial';
          const displayName = ind ? ind.name : '未知';
          const unit = ind ? ind.unit : '';
          const progressWidth = Math.min(kpi.achievementRate, 100);
          
          return `<div class="omp-canvas-node status-${kpi.status}" data-id="${kpi.id}" data-level="${kpi.level}" data-dim="${dimKey}"
            style="left:${pos.x}px;top:${pos.y}px;width:${pos.w}px;height:${pos.h}px;"
            onmousedown="window.omp_canvasNodeDragStart(event,'${kpi.id}')">
            <div class="omp-dim-badge ${dimKey}"></div>
            <div class="canvas-node-name">${displayName}${kpi.annualPlanKpiId ? `<span style="font-size:10px;padding:1px 5px;border-radius:3px;background:var(--success-bg);color:var(--success);margin-left:6px;vertical-align:middle;">年度计划</span>` : ''}</div>
            ${kpi.dept && kpi.level > 0 ? `<div class="canvas-node-dept">${kpi.dept}</div>` : ''}
            ${(() => {
              const lvlCfg = ASSESSMENT_LEVELS[kpi.assessmentLevel || 'marketing-line'];
              return `<div class="canvas-node-level" style="font-size:10px;color:${lvlCfg.color};margin-top:2px;">${lvlCfg.label}</div>`;
            })()}
            <div class="canvas-node-metric">目标 <strong>${kpi.targetValue}</strong>${unit} / 实际 <strong>${kpi.actualValue}</strong>${unit}</div>
            <div class="canvas-node-progress">
              <div class="canvas-node-progress-bar"><div class="${statusClass}" style="width:${progressWidth}%"></div></div>
              <div class="canvas-node-progress-text ${statusClass}">${kpi.achievementRate}%</div>
            </div>
            ${hasChildren ? `<span class="canvas-node-expand" onclick="event.stopPropagation();window.omp_toggleExpand('${kpi.id}')">${isExpanded ? '−' : '+'}</span>` : ''}
          </div>`;
        }).join('');

        // 渲染 SVG 连接线（保守写法：任何无效值都用 || 0 兜底）
        const svgPaths = visibleEdges.map(edge => {
          const fromPos = nodePositions[edge.from];
          const toPos = nodePositions[edge.to];
          if (!fromPos || !toPos) return '';
          const fx = (fromPos.x || 0); const fy = (fromPos.y || 0);
          const fw = (fromPos.w || 170); const fh = (fromPos.h || 100);
          const tx = (toPos.x || 0); const ty = (toPos.y || 0);
          const tw = (toPos.w || 170); const th = (toPos.h || 100);
          const x1 = fx + fw;
          const y1 = fy + fh / 2;
          const x2 = tx;
          const y2 = ty + th / 2;
          const midX = (x1 + x2) / 2;
          return `<path d="M${x1},${y1} C${midX},${y1} ${midX},${y2} ${x2},${y2}" />`;
        }).join('');

        // 计算画布尺寸
        let maxX = 0, maxY = 0;
        Object.values(nodePositions).forEach(p => {
          maxX = Math.max(maxX, p.x + p.w);
          maxY = Math.max(maxY, p.y + p.h);
        });
        const canvasW = Math.max(maxX + 100, 1200);
        const canvasH = Math.max(maxY + 100, 700);

        return `
          <div class="omp-kpi-canvas" id="omp-kpi-canvas"
            onmousedown="window.omp_canvasPanStart(event)"
            onwheel="window.omp_canvasZoom(event)">
            <div class="omp-canvas-toolbar">
              <button onclick="window.omp_canvasReset()">⟲ 重置</button>
              <button onclick="window.omp_canvasZoomIn()">+</button>
              <button onclick="window.omp_canvasZoomOut()">−</button>
              <button onclick="window.omp_canvasSaveLayout()"><span class="icon" data-icon="floppy-disk" data-icon-size="14"></span> 保存布局</button>
            </div>
            <div class="omp-canvas-zoom" id="omp-canvas-zoom">100%</div>
            <div class="omp-kpi-canvas-inner" id="omp-kpi-canvas-inner" style="width:${canvasW}px;height:${canvasH}px;transform:translate(${offsetX}px,${offsetY}px) scale(${scale});">
              <svg class="omp-canvas-svg" width="${canvasW}" height="${canvasH}">${svgPaths}</svg>
              ${nodesHtml}
            </div>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;font-size:12px;color:var(--text-tertiary);margin-top:8px;">
            <span>共 ${roots.length} 个一级指标 · ${visibleNodes.length} 个可见节点（画布）</span>
            <span>拖拽节点调整位置 · 滚轮缩放 · 拖拽空白平移</span>
          </div>`;
      }

      // ===== Tab 3: 重点工作 =====
      function omp_renderTaskTab() {
        const cycleId = window._dsteState.currentCycleId;
        const tasks = omp_load('tasks');
        const kpis = omp_load('kpiInstances').filter(k => k.cycleId === cycleId);
        const filtered = tasks.filter(t => t.cycleId === cycleId && t.source === 'omp' && !t.parentId);

          <div style="display:flex;justify-content:flex-end;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
            <button class="btn btn-primary" data-action="omp-new-task" style="font-size:13px;">+ 新建工作</button>

          <div class="card">
            <div style="overflow-x:auto;">
              <table class="data-table">
                <thead>
                  <tr><th>工作名称</th><th>负责人</th><th>成员</th><th style="text-align:center;">进度</th><th>截止日期</th><th style="text-align:center;">操作</th></tr>
                </thead>
                <tbody>
                  ${filtered.map(t => {
                    const associations = Array.isArray(t.kpiAssociations) ? t.kpiAssociations : [];
                    const primary = associations.find(a => a.relationType === 'primary');
                    const firstSupporting = associations.find(a => a.relationType === 'supporting');
                    const displayAssociation = primary || firstSupporting;
                    const displayName = displayAssociation ? omp_getKpiAssociationDisplayName(displayAssociation) : '';
                    const displayLabel = displayName ? (primary ? displayName : `${displayName}（相关）`) : '';
                    const tooltipNames = associations.map(a => {
                      const name = omp_getKpiAssociationDisplayName(a);
                      return `${a.relationType === 'primary' ? '主指标' : '相关指标'}: ${name}`;
                    }).join('\n');
                    const sourceTag = (() => {
                      if (!t.annualPlanTaskId) return '';
                      const sourceTask = tasks.find(task => task.id === t.annualPlanTaskId);
                      const kmsUrl = (sourceTask && sourceTask.kmsUrl) || t.kmsUrl;
                      const hasExternalUrl = kmsUrl && kmsUrl !== '#' && kmsUrl.startsWith('http');
                      const linkUrl = hasExternalUrl ? kmsUrl : '#bp/annual-plan';
                      const attrs = hasExternalUrl ? 'target="_blank" rel="noopener noreferrer"' : 'data-navigate="bp/annual-plan"';
                      return `<a href="${linkUrl}" ${attrs} style="font-size:11px;padding:2px 6px;border-radius:4px;background:var(--primary-bg);color:var(--primary);margin-left:6px;text-decoration:none;display:inline-flex;align-items:center;gap:4px;"><span class="icon" data-icon="link" data-icon-size="14"></span> 主KMS链接</a>`;
                    })();
                    const memberList = Array.isArray(t.members) ? t.members.filter(Boolean) : [];
                    const memberNames = memberList.slice(0, 2).map(m => resolvePersonDisplayName(m)).join('、');
                    const memberExtra = memberList.length > 2 ? ` +${memberList.length - 2}` : '';
                    return `
                      <tr>
                        <td><strong>${t.name}</strong>${sourceTag}${displayLabel ? ` <span style="font-size:11px;padding:2px 6px;border-radius:4px;background:var(--primary-bg);color:var(--primary);margin-left:6px;cursor:help;" title="${escapeHtml(tooltipNames)}">${icon('chartLineUp', {size: 11})} ${escapeHtml(displayLabel)}</span>` : ''}</td>
                        <td>${escapeHtml(window.renderPerson ? window.renderPerson(t.owner) : (t.owner || ''))}</td>
                        <td style="font-size:12px;color:var(--text-secondary);">${memberList.length > 0 ? escapeHtml(memberNames + memberExtra) : '-'}</td>
                        <td style="text-align:center;">
                          <div style="display:flex;align-items:center;justify-content:center;gap:8px;">
                            <div class="progress-bar" style="width:60px;"><div class="progress-bar-fill ${t.progress < 50 && t.status !== 'done' ? 'warning' : ''}" style="width:${t.progress}%"></div></div>
                            <span style="font-size:12px;">${t.progress}%</span>
                          </div>

                        <td style="font-size:12px;color:var(--text-secondary);">${t.endDate}</td>
                        <td style="text-align:center;">
                          <button class="btn btn-sm btn-secondary" data-action="omp-view-task" data-id="${t.id}" style="font-size:12px;padding:3px 8px;">详情</button>
                          <button class="btn btn-sm btn-primary" data-action="omp-edit-task" data-id="${t.id}" style="font-size:12px;padding:3px 8px;">编辑</button>
                          <button class="btn btn-sm btn-danger" data-action="omp-delete-task" data-id="${t.id}" style="font-size:12px;padding:3px 8px;">删除</button>
                        </td>
                      </tr>`;
                  }).join('')}
                  ${filtered.length === 0 ? '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-tertiary);">暂无匹配数据</td></tr>' : ''}
                </tbody>
              </table>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-top:1px solid var(--border-light);font-size:12px;color:var(--text-tertiary);">
              <span>共 ${filtered.length} 项工作</span>
            </div>
          </div>`;

      // ===== 月度关键进展工具函数 =====
      function omp_getCycleMonths() {
        const year = getCurrentCycle().year;
        // 业务年度从 4 月起，展示 4 月 ~ 12 月
        return Array.from({ length: 9 }, (_, i) => {
          const n = i + 4;
          const month = String(n).padStart(2, '0');
          return { key: `${year}-${month}`, label: `${n}月` };
        });
      }

      function omp_isSummaryMonth(key) {
        return key === 'H1' || key === 'YEAR';
      }

      function omp_getSummaryColumns() {
        return [
          { key: 'H1', label: 'H1 总结', summary: true },
          { key: 'YEAR', label: '年终总结', summary: true },
        ];
      }

      function omp_formatMonth(dateStr) {
        if (!dateStr || dateStr.length < 7) return '';
        return dateStr.slice(0, 7);
      }

      function omp_getMonthlyRecord(taskId, month) {
        return omp_load('progressRecords')
          .filter(r => r.taskId === taskId && r.month === month)
          .sort((a, b) => b.date.localeCompare(a.date))[0];
      }

      function omp_getLastDayOfMonth(year, month) {
        const d = new Date(year, month, 0);
        return `${year}-${String(month).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      }

      function omp_syncTaskProgressFromRecords(taskId) {
        // 仅聚合逐月记录（YYYY-MM），忽略 H1/年终总结，避免总结覆盖逐月进度
        const records = omp_load('progressRecords').filter(r => r.taskId === taskId && !omp_isSummaryMonth(r.month));
        if (!records.length) return;
        const latest = records.sort((a, b) => b.date.localeCompare(a.date))[0];
        const tasks = omp_load('tasks');
        const task = tasks.find(t => t.id === taskId);
        if (!task || task.progress === latest.progress) return;
        task.progress = latest.progress;
        omp_save('tasks', tasks);
      }

      // ===== Tab 4: 甘特图 =====
      function omp_renderGanttTab() {
        const cycleId = window._dsteState.currentCycleId;

        const ganttRows = tasks.map(t => {
          const start = new Date(t.startDate);
          const end = new Date(t.endDate);

          const endMonth = end.getMonth() + 1;

              ${months.map((m, idx) => {

                    <div style="position:absolute;inset:0;background:${statusColors[t.status]};opacity:0.15;border-radius:4px;"></div>

        return `

            <div style="overflow-x:auto;">
              <div style="min-width:600px;">
                <div style="display:grid;grid-template-columns:180px repeat(6,1fr);gap:1px;border-bottom:1px solid var(--border-light);padding-bottom:8px;margin-bottom:4px;">
                  <div style="font-size:12px;color:var(--text-tertiary);font-weight:600;padding:8px;">工作名称</div>
                  ${months.map(m => `<div style="font-size:12px;color:var(--text-tertiary);font-weight:600;padding:8px;text-align:center;">${m}</div>`).join('')}
                </div>
                <div style="display:flex;flex-direction:column;gap:2px;">${ganttRows}</div>
              </div>
            </div>
            <div style="display:flex;gap:16px;margin-top:16px;padding-top:12px;border-top:1px solid var(--border-light);">
              <span style="font-size:12px;color:var(--text-tertiary);display:flex;align-items:center;gap:4px;"><span style="width:12px;height:12px;background:var(--primary);border-radius:2px;"></span>进行中</span>
              <span style="font-size:12px;color:var(--text-tertiary);display:flex;align-items:center;gap:4px;"><span style="width:12px;height:12px;background:var(--warning);border-radius:2px;"></span>有风险</span>
              <span style="font-size:12px;color:var(--text-tertiary);display:flex;align-items:center;gap:4px;"><span style="width:12px;height:12px;background:var(--danger);border-radius:2px;"></span>已延期</span>
              <span style="font-size:12px;color:var(--text-tertiary);display:flex;align-items:center;gap:4px;"><span style="width:12px;height:12px;background:var(--success);border-radius:2px;"></span>已完成</span>
            </div>

      }

      // ===== Tab 4.x: 月度关键进展 =====
      function omp_renderMonthlyProgressCell(task, month, record) {
        const isSummary = !!month.summary;
        const hasProblems = record && record.problems && record.problems.trim();

          ? `<span style="position:absolute;top:6px;right:6px;width:6px;height:6px;border-radius:50%;background:var(--danger);"></span>`
          : '';
        const placeholder = isSummary ? '+ 记录总结' : '+ 记录进展';
        const content = record
          ? `<span style="font-size:13px;font-weight:700;color:var(--primary);display:block;margin-bottom:2px;">${record.progress}%</span>
             <span style="font-size:12px;color:var(--text-secondary);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3;">${escapeHtml(record.content)}</span>`
          : `<span style="font-size:12px;color:var(--text-tertiary);display:block;padding-top:4px;">${placeholder}</span>`;
        const summaryStyle = isSummary ? 'background:var(--bg-page);border-style:dashed;' : 'background:var(--bg-card);';
        return `
          <div class="omp-month-cell" data-action="omp-edit-monthly-progress" data-task-id="${task.id}" data-month="${month.key}"
               style="padding:8px;min-height:48px;${summaryStyle}border:1px solid var(--border-light);border-radius:6px;cursor:pointer;position:relative;transition:all 0.15s;"
               title="${record ? escapeHtml(record.content) : (isSummary ? '点击记录总结' : '点击记录进展')}">
            ${problemDot}
            ${content}

      function omp_renderMonthlyProgressTab() {
        const cycleId = window._dsteState.currentCycleId;
        const tasks = omp_load('tasks').filter(t => t.cycleId === cycleId && t.source === 'omp' && !t.parentId);

          .concat(allMonths.map(m => `<option value="${m.key}" ${filter === m.key ? 'selected' : ''}>${m.label}</option>`))
          .join('');
        const filterSelect = `<select id="omp-monthly-filter" onchange="window.omp_setMonthlyFilter(this.value)" style="padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">${filterOptions}</select>`;

        if (tasks.length === 0) {
          return `
            <div class="card">
              <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;">

                ${filterSelect}
              </div>
              <div style="padding:60px;text-align:center;color:var(--text-tertiary);">

              <div style="font-size:13px;font-weight:500;color:var(--text-primary);padding:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;">${escapeHtml(t.name)}</div>
              ${columns.map(m => {
                const record = omp_getMonthlyRecord(t.id, m.key);
                return `<div style="padding:2px;">${omp_renderMonthlyProgressCell(t, m, record)}</div>`;
              }).join('')}

        }).join('');

        return `
          <div class="card">
            <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;">
              <div class="card-title"><span class="icon" data-icon="chart-bar" data-icon-size="16"></span> 重点工作月度关键进展 (${year})</div>
              ${filterSelect}
            </div>
            <div style="overflow-x:auto;">
              <div style="min-width:900px;">
                <div style="display:grid;grid-template-columns:${headerCols};gap:4px;border-bottom:1px solid var(--border-light);padding-bottom:8px;margin-bottom:4px;">
                  <div style="font-size:12px;color:var(--text-tertiary);font-weight:600;padding:8px;">工作名称</div>
                  ${columns.map(m => `<div style="font-size:12px;color:var(--text-tertiary);font-weight:600;padding:8px;text-align:center;">${m.label}</div>`).join('')}
                </div>
                <div style="display:flex;flex-direction:column;">${rows}</div>
              </div>
            </div>
            <div style="display:flex;gap:16px;margin-top:16px;padding-top:12px;border-top:1px solid var(--border-light);flex-wrap:wrap;">
              <span style="font-size:12px;color:var(--text-tertiary);display:flex;align-items:center;gap:4px;"><span style="width:12px;height:12px;background:var(--primary);border-radius:2px;"></span>已记录进展</span>
              <span style="font-size:12px;color:var(--text-tertiary);display:flex;align-items:center;gap:4px;"><span style="width:12px;height:12px;background:var(--danger);border-radius:50%;"></span>存在问题</span>
              <span style="font-size:12px;color:var(--text-tertiary);display:flex;align-items:center;gap:4px;"><span style="width:12px;height:12px;border:1px solid var(--border-light);border-radius:2px;background:var(--bg-card);"></span>未记录</span>
              <span style="font-size:12px;color:var(--text-tertiary);display:flex;align-items:center;gap:4px;"><span style="width:12px;height:12px;border:1px dashed var(--border-light);border-radius:2px;background:var(--bg-page);"></span>H1/年终总结</span>
            </div>
