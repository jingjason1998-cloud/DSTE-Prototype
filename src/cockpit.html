      function omp_renderTaskViewTabContent(task) {
        const taskId = task.id;
        const milestones = omp_load('milestones').filter(m => m.taskId === taskId);
        const records = omp_load('progressRecords').filter(r => r.taskId === taskId);
        const kpis = omp_load('kpiInstances');
        const typeLabels = { strategic: '战略举措', improvement: '业务改进', capability: '能力建设', risk_response: '风险应对', meeting_resolution: '会议决议' };
        const statusColors = { planning: 'var(--text-tertiary)', active: 'var(--success)', at_risk: 'var(--warning)', delayed: 'var(--danger)', done: 'var(--primary)', closed: 'var(--text-tertiary)' };
        const statusLabels = { planning: '规划中', active: '进行中', at_risk: '有风险', delayed: '已延期', done: '已完成', closed: '已关闭' };
        const activeTab = window._ompState.taskViewActiveTab || 'basic';

        if (activeTab === 'milestones') {
          const msHtml = milestones.map(m => `
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-light);">
              <span style="font-size:16px;">${m.status === 'completed' ? icon('check', { size: 16 }) : m.status === 'delayed' ? icon('warning', { size: 16 }) : icon('circle', { size: 16 })}</span>
              <div style="flex:1;"><div style="font-size:13px;font-weight:500;">${m.name}</div><div style="font-size:12px;color:var(--text-tertiary);">计划: ${m.planDate}${m.actualDate ? ' · 实际: ' + m.actualDate : ''}</div></div>
              <span style="font-size:12px;padding:2px 8px;border-radius:4px;background:${m.status === 'completed' ? 'var(--success-bg)' : 'var(--bg-page)'};color:${m.status === 'completed' ? 'var(--success)' : m.status === 'delayed' ? 'var(--danger)' : 'var(--text-secondary)'}">${m.status === 'completed' ? '已完成' : m.status === 'delayed' ? '已延期' : '待办'}</span>
            </div>`).join('') || '<div style="padding:20px;text-align:center;color:var(--text-tertiary);">暂无里程碑</div>';
          const recHtml = records.map(r => `
            <div style="padding:12px;background:var(--bg-page);border-radius:8px;margin-bottom:8px;">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;"><span style="font-size:13px;font-weight:600;">进度 ${r.progress}%</span><span style="font-size:12px;color:var(--text-tertiary);">${r.date} · ${r.reporter}</span></div>
              <div style="font-size:13px;color:var(--text-secondary);">${r.content}</div>${r.problems ? `<div style="margin-top:6px;font-size:12px;color:var(--danger);"><span class="icon" data-icon="warning" data-icon-size="14"></span>️ ${r.problems}</div>` : ''}
            </div>`).join('') || '<div style="padding:20px;text-align:center;color:var(--text-tertiary);">暂无进度记录</div>';
          return `
            <div style="margin-bottom:20px;"><div style="font-size:14px;font-weight:600;margin-bottom:10px;"><span class="icon" data-icon="push-pin" data-icon-size="14"></span> 里程碑</div><div style="border:1px solid var(--border-light);border-radius:8px;padding:0 12px;">${msHtml}</div></div>
            <div style="margin-bottom:20px;"><div style="font-size:14px;font-weight:600;margin-bottom:10px;"><span class="icon" data-icon="file-text" data-icon-size="14"></span> 进度记录</div><div>${recHtml}</div></div>`;
        }

        if (activeTab === 'subtasks') {
          const subtasks = omp_getSubtasks(taskId);
          const subRows = subtasks.map((s, idx) => {
            const ownerName = escapeHtml(window.renderPerson ? window.renderPerson(s.owner) : (s.owner || ''));
            const memberCount = (s.members || []).filter(Boolean).length;
            return `
              <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border-light);border-radius:8px;margin-bottom:8px;background:var(--bg-card);">

                <div style="flex:1;min-width:0;">
                  <div style="font-size:13px;font-weight:600;color:var(--text-primary);">${escapeHtml(s.name)}</div>
                  <div style="font-size:12px;color:var(--text-secondary);margin-top:2px;">负责人: ${ownerName} · 成员 ${memberCount} 人${s.target ? ' · 目标: ' + escapeHtml(s.target) : ''}</div>

            </div>`;
        }

        if (activeTab === 'resources') {

                ${ms.length > 0 ? ms.map(m => `

                  </div>`).join('') : '<div style="color:var(--text-tertiary);">暂无成员，请在「人员配置」视图中拖拽分配</div>'}
              </div>
            </div>`;
        }

        // basic tab
        const primary = omp_getPrimaryKpiAssociation(task);
        const supporting = omp_getSupportingKpiAssociations(task);
        const primaryText = primary ? `${omp_getKpiAssociationDisplayName(primary)} (${omp_getKpiByInstanceId(primary.kpiInstanceId)?.dept || '-'})` : '无';
        const supportingText = supporting.map(a => `${omp_getKpiAssociationDisplayName(a)} (${omp_getKpiByInstanceId(a.kpiInstanceId)?.dept || '-'})`).join('、') || '无';
        const overrideTag = task.progressOverridden ? `<span style="font-size:11px;padding:2px 6px;border-radius:4px;background:var(--warning-bg);color:var(--warning);margin-left:8px;">已手动覆盖</span>` : '';
        return `
          <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:20px;">
            <div style="grid-column:1 / -1;"><div style="font-size:20px;font-weight:700;">${task.name}</div><div style="font-size:13px;color:var(--text-secondary);margin-top:4px;">${task.description}</div></div>
            ${task.annualPlanTaskId ? `<div style="grid-column:1 / -1;"><div style="font-size:12px;color:var(--text-tertiary);">来源</div><div><span class="icon" data-icon="clipboard-text" data-icon-size="14"></span> 年度经营计划 <span style="font-size:12px;color:var(--text-tertiary);">(${escapeHtml(task.annualPlanTaskId)})</span> — <a href="#bp/annual-plan" data-navigate="bp/annual-plan" style="color:var(--primary);">查看源头</a></div></div>` : ''}
            <div><div style="font-size:12px;color:var(--text-tertiary);">类型</div><div style="font-weight:500;">${typeLabels[task.type]}</div></div>
            <div><div style="font-size:12px;color:var(--text-tertiary);">负责人</div><div>${escapeHtml(window.renderPerson ? window.renderPerson(task.owner) : (task.owner || ''))}</div></div>
            <div><div style="font-size:12px;color:var(--text-tertiary);">成员</div><div>${(() => { const ms = (task.members || []).filter(Boolean); return ms.length > 0 ? ms.map(m => escapeHtml(window.renderPerson ? window.renderPerson(m) : m)).join('、') : '无'; })()}</div></div>
            <div><div style="font-size:12px;color:var(--text-tertiary);">部门</div><div>${task.dept}</div></div>
            <div><div style="font-size:12px;color:var(--text-tertiary);">开始日期</div><div>${task.startDate}</div></div>
            <div><div style="font-size:12px;color:var(--text-tertiary);">截止日期</div><div>${task.endDate}</div></div>
            <div><div style="font-size:12px;color:var(--text-tertiary);">预算</div><div>${task.budget}万</div></div>
            <div><div style="font-size:12px;color:var(--text-tertiary);">实际成本</div><div>${task.actualCost}万</div></div>
            <div style="grid-column:1 / -1;">
              <div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">关联 KPI</div>
              <div><strong>主指标：</strong>${primaryText}</div>
              <div style="margin-top:4px;"><strong>相关指标：</strong>${supportingText}</div>
            </div>
            <div><div style="font-size:12px;color:var(--text-tertiary);">状态</div><div style="font-weight:600;color:${statusColors[task.status]}">${statusLabels[task.status]}</div></div>
            <div style="grid-column:1 / -1;"><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">年度目标</div><div>${task.annualTarget ? escapeHtml(task.annualTarget) : '无'}</div></div>
            <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">关联 SP 链接</div><div>${task.spLink ? `<a href="${escapeHtml(task.spLink)}" target="_blank" rel="noopener noreferrer" style="color:var(--primary);">${escapeHtml(task.spLink)}</a>` : '无'}</div></div>
            <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">主 BI 看板</div><div>${task.biDashboard ? `<a href="${escapeHtml(task.biDashboard)}" target="_blank" rel="noopener noreferrer" style="color:var(--primary);">${escapeHtml(task.biDashboard)}</a>` : '无'}</div></div>
            <div style="grid-column:1 / -1;"><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">进度 ${task.progress}%${overrideTag}</div><div style="width:100%;height:8px;background:var(--bg-page);border-radius:4px;overflow:hidden;"><div style="width:${task.progress}%;height:100%;background:${statusColors[task.status]};border-radius:4px;"></div></div></div>
          </div>`;
      }

      function omp_editTaskModal(taskId) {
        const tasks = omp_load('tasks');
        const task = tasks.find(t => t.id === taskId);
        if (!task) return;
        window._ompState.editingTaskId = taskId;
        window._ompState.taskEditActiveTab = 'basic';
        const isSubtask = omp_isSubtask(task);
        const tabs = [
          { id: 'basic', label: '基本信息' },
          { id: 'milestones', label: '里程碑' },
          { id: 'subtasks', label: `子任务 (${omp_getSubtasks(taskId).length})` },
          { id: 'resources', label: '资源' },
        ].filter(t => !isSubtask || t.id !== 'subtasks');
        const activeTab = window._ompState.taskEditActiveTab || 'basic';
        const tabHtml = `
          <div style="display:flex;gap:0;border-bottom:1px solid var(--border-color);margin-bottom:20px;">
            ${tabs.map(t => `
              <button type="button" class="omp-task-edit-tab ${activeTab === t.id ? 'active' : ''}" onclick="window.omp_switchTaskEditTab('${t.id}')" style="padding:10px 16px;font-size:13px;background:transparent;border:none;border-bottom:2px solid ${activeTab === t.id ? 'var(--primary)' : 'transparent'};color:${activeTab === t.id ? 'var(--primary)' : 'var(--text-secondary)'};cursor:pointer;">${t.label}</button>
            `).join('')}
          </div>`;
        const contentHtml = omp_renderTaskEditTabContent(task);
        omp_openModal(isSubtask ? '编辑子任务' : '编辑重点工作', `
          ${tabHtml}
          <div id="omp-task-edit-tab-content">${contentHtml}</div>
          <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border-color);">
            <button class="btn btn-secondary" onclick="document.getElementById('omp-active-modal').remove(); window._ompState.editingTaskId = null;">取消</button>
            <button class="btn btn-primary" onclick="window.omp_saveTask()">保存</button>
          </div>`, true);
        window.omp_initKpiSearchFields('omp-task', task.dept || '');
        if (window.ensurePersonInput) {
          window.ensurePersonInput('omp-task-owner', task.owner || '');
          if (activeTab === 'subtasks') {
            omp_getSubtasks(taskId).forEach(s => {
              window.ensurePersonInput('omp-subtask-owner-' + s.id, s.owner || '');
            });
          }
        }
      }

      function omp_renderTaskEditTabContent(task) {
        const activeTab = window._ompState.taskEditActiveTab || 'basic';
        if (activeTab === 'milestones') {
          const milestones = omp_load('milestones').filter(m => m.taskId === task.id);
          const msHtml = milestones.map(m => `
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-light);">
              <span style="font-size:16px;">${m.status === 'completed' ? icon('check', { size: 16 }) : m.status === 'delayed' ? icon('warning', { size: 16 }) : icon('circle', { size: 16 })}</span>
              <div style="flex:1;"><div style="font-size:13px;font-weight:500;">${m.name}</div><div style="font-size:12px;color:var(--text-tertiary);">计划: ${m.planDate}${m.actualDate ? ' · 实际: ' + m.actualDate : ''}</div></div>
              <span style="font-size:12px;padding:2px 8px;border-radius:4px;background:${m.status === 'completed' ? 'var(--success-bg)' : 'var(--bg-page)'};color:${m.status === 'completed' ? 'var(--success)' : m.status === 'delayed' ? 'var(--danger)' : 'var(--text-secondary)'}">${m.status === 'completed' ? '已完成' : m.status === 'delayed' ? '已延期' : '待办'}</span>
            </div>`).join('') || '<div style="padding:20px;text-align:center;color:var(--text-tertiary);">暂无里程碑</div>';
          return `<div style="margin-bottom:16px;"><div style="font-size:14px;font-weight:600;margin-bottom:10px;"><span class="icon" data-icon="push-pin" data-icon-size="14"></span> 里程碑</div><div style="border:1px solid var(--border-light);border-radius:8px;padding:0 12px;">${msHtml}</div></div>`;
        }
        if (activeTab === 'subtasks') {
          return omp_renderSubtaskTab(task.id);
        }
        if (activeTab === 'resources') {
          const ms = (task.members || []).filter(Boolean);
          return `
            <div style="margin-bottom:16px;">
              <div style="font-size:14px;font-weight:600;margin-bottom:10px;">资源成员</div>
              <div style="padding:12px;border:1px solid var(--border-light);border-radius:8px;background:var(--bg-page);">
                ${ms.length > 0 ? ms.map(m => `<div style="display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border:1px solid var(--border-light);border-radius:20px;background:var(--bg-card);margin:4px;">${renderAvatar(m, 22, resolvePersonDisplayName(m))}<span style="font-size:13px;">${escapeHtml(resolvePersonDisplayName(m))}</span></div>`).join('') : '<div style="color:var(--text-tertiary);">暂无成员</div>'}
              </div>
              <div style="margin-top:8px;font-size:12px;color:var(--text-secondary);">提示：请前往「人员配置」视图拖拽分配或移除成员。</div>
            </div>`;
        }
        // basic
        const overrideTag = task.progressOverridden ? `<span style="font-size:11px;padding:2px 6px;border-radius:4px;background:var(--warning-bg);color:var(--warning);margin-left:8px;">已手动覆盖</span>` : '';
        const restoreBtn = (!omp_isSubtask(task) && omp_hasSubtasks(task.id) && task.progressOverridden) ? `<button type="button" class="btn btn-sm btn-secondary" onclick="window.omp_restoreAutoProgress('${task.id}')" style="margin-left:8px;font-size:11px;">恢复自动计算</button>` : '';
        const kpis = omp_load('kpiInstances');
        const associations = omp_getKpiAssociations(task);
        const primaryId = omp_getPrimaryKpiAssociation(task)?.kpiInstanceId || '';
        const supportingIds = omp_getSupportingKpiAssociations(task).map(a => a.kpiInstanceId);
        const kpiFields = omp_renderKpiAssociationFields(task, 'omp-task', {
          kpis,
          primaryId,
          supportingIds,
          taskDept: task.dept || '',
          primaryDisabled: !!task.annualPlanTaskId,
          cycleId: task.cycleId
        });
        return `
          <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px;">
            <div style="grid-column:1 / -1;"><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">工作名称 *</label><input type="text" id="omp-task-name" value="${task.name}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            <div style="grid-column:1 / -1;"><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">描述</label><textarea id="omp-task-desc" rows="2" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;resize:vertical;">${task.description}</textarea></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">类型 *</label><select id="omp-task-type" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"><option value="strategic" ${task.type === 'strategic' ? 'selected' : ''}><span class="icon" data-icon="target" data-icon-size="14"></span> 战略举措</option><option value="improvement" ${task.type === 'improvement' ? 'selected' : ''}><span class="icon" data-icon="gear" data-icon-size="14"></span> 业务改进</option><option value="capability" ${task.type === 'capability' ? 'selected' : ''}><span class="icon" data-icon="books" data-icon-size="14"></span> 能力建设</option><option value="risk_response" ${task.type === 'risk_response' ? 'selected' : ''}><span class="icon" data-icon="warning" data-icon-size="14"></span>️ 风险应对</option></select></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">负责人 *</label><input type="text" id="omp-task-owner" value="${typeof task.owner === 'object' ? (task.owner.displayName || task.owner.name || '') : (task.owner || '')}" ${task.annualPlanTaskId ? 'disabled' : ''} style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:${task.annualPlanTaskId ? 'var(--bg-page)' : 'var(--bg-card)'};color:var(--text-primary);font-size:13px;"></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">部门 *</label><input type="text" id="omp-task-dept" value="${task.dept}" oninput="window.omp_updateKpiDeptWarning('omp-task')" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            ${task.annualPlanTaskId ? `<div style="grid-column:1 / -1;font-size:12px;color:var(--text-tertiary);padding:8px 12px;background:var(--bg-page);border-radius:6px;">ℹ️ 负责人由年度经营计划同步，如需修改请前往「年度经营计划」页面</div>` : ''}
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">开始日期</label><input type="date" id="omp-task-start" value="${task.startDate}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">截止日期 *</label><input type="date" id="omp-task-end" value="${task.endDate}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">进度 (%) ${overrideTag}${restoreBtn}</label><input type="number" id="omp-task-progress" value="${task.progress}" min="0" max="100" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">状态</label><select id="omp-task-status" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"><option value="planning" ${task.status === 'planning' ? 'selected' : ''}>规划中</option><option value="active" ${task.status === 'active' ? 'selected' : ''}>进行中</option><option value="at_risk" ${task.status === 'at_risk' ? 'selected' : ''}>有风险</option><option value="delayed" ${task.status === 'delayed' ? 'selected' : ''}>已延期</option><option value="done" ${task.status === 'done' ? 'selected' : ''}>已完成</option><option value="closed" ${task.status === 'closed' ? 'selected' : ''}>已关闭</option></select></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">预算 (万)</label><input type="number" id="omp-task-budget" value="${task.budget}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">实际成本 (万)</label><input type="number" id="omp-task-cost" value="${task.actualCost}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            ${kpiFields}
            <div style="grid-column:1 / -1;"><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">年度目标</label><input type="text" id="omp-task-annual-target" value="${escapeHtml(task.annualTarget || '')}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">关联 SP 链接</label><input type="text" id="omp-task-sp-link" value="${escapeHtml(task.spLink || '')}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">主 BI 看板</label><input type="text" id="omp-task-bi-dashboard" value="${escapeHtml(task.biDashboard || '')}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
          </div>`;
      }

      function omp_renderSubtaskRow(subtask, idx, total) {
        const ownerInputId = 'omp-subtask-owner-' + subtask.id;
        const isFirst = idx === 0;
        const isLast = idx === total - 1;
        return `
          <div class="omp-subtask-row" data-subtask-id="${subtask.id}" data-seq="${idx}" style="display:flex;gap:8px;align-items:center;padding:10px 12px;border:1px solid var(--border-light);border-radius:8px;margin-bottom:8px;background:var(--bg-card);">
            <div style="display:flex;flex-direction:column;gap:2px;">
              <button type="button" onclick="window.omp_moveSubtaskRow(this, 'up')" ${isFirst ? 'disabled style="visibility:hidden;"' : ''} style="background:none;border:none;cursor:pointer;color:var(--text-tertiary);font-size:10px;line-height:1;" title="上移">▲</button>
              <button type="button" onclick="window.omp_moveSubtaskRow(this, 'down')" ${isLast ? 'disabled style="visibility:hidden;"' : ''} style="background:none;border:none;cursor:pointer;color:var(--text-tertiary);font-size:10px;line-height:1;" title="下移">▼</button>
            </div>
            <div class="omp-subtask-number" style="min-width:24px;text-align:center;font-size:13px;font-weight:600;color:var(--text-secondary);">${idx + 1}.</div>
            <input type="text" class="omp-subtask-name" value="${escapeHtml(subtask.name)}" placeholder="子任务名称 *" style="flex:1;min-width:80px;padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
            <input type="text" id="${ownerInputId}" class="omp-subtask-owner" value="${typeof subtask.owner === 'object' ? (subtask.owner.displayName || subtask.owner.name || '') : (subtask.owner || '')}" placeholder="负责人 *" style="width:90px;padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
            <input type="text" class="omp-subtask-target" value="${escapeHtml(subtask.target || '')}" placeholder="目标" style="flex:1;min-width:80px;padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
            <button type="button" onclick="window.omp_removeSubtaskRow(this)" style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:16px;width:24px;" title="删除"><span class="icon" data-icon="x" data-icon-size="14"></span></button>
          </div>`;
      }

      function omp_renderSubtaskTab(parentTaskId) {
        const subtasks = omp_getSubtasks(parentTaskId);
        const rowHtml = subtasks.map((s, idx) => omp_renderSubtaskRow(s, idx, subtasks.length)).join('');
        const headerHtml = `
          <div style="display:flex;gap:8px;align-items:center;padding:6px 12px;font-size:12px;color:var(--text-tertiary);border-bottom:1px solid var(--border-light);margin-bottom:8px;">
            <div style="width:48px;"></div>
            <div style="min-width:24px;text-align:center;"></div>
            <div style="flex:1;min-width:80px;">子任务名称</div>
            <div style="width:90px;">负责人</div>
            <div style="flex:1;min-width:80px;">目标</div>
            <div style="width:24px;"></div>
          </div>`;
        return `
          <div style="margin-bottom:16px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
              <div style="font-size:14px;font-weight:600;">子任务 (${subtasks.length})</div>
              <button type="button" class="btn btn-sm btn-primary" onclick="window.omp_addSubtaskRow('${parentTaskId}')" style="font-size:12px;">+ 添加子任务</button>
            </div>
            ${subtasks.length > 0 ? headerHtml : ''}
            <div id="omp-subtask-list">${subtasks.length > 0 ? rowHtml : '<div style="padding:24px;text-align:center;color:var(--text-tertiary);">暂无子任务，点击上方按钮添加</div>'}</div>
          </div>`;
      }

      function omp_switchTaskEditTab(tab) {
        window._ompState.taskEditActiveTab = tab;
        const modal = document.getElementById('omp-active-modal');
        if (!modal) return;
        const taskId = window._ompState.editingTaskId;
        const tasks = omp_load('tasks');
        const task = tasks.find(t => t.id === taskId);
        if (!task) return;
        // Re-render tabs and content
        const isSubtask = omp_isSubtask(task);
        const tabs = [
          { id: 'basic', label: '基本信息' },
          { id: 'milestones', label: '里程碑' },
          { id: 'subtasks', label: `子任务 (${omp_getSubtasks(taskId).length})` },
          { id: 'resources', label: '资源' },
        ].filter(t => !isSubtask || t.id !== 'subtasks');
        const tabContainer = modal.querySelector('.omp-task-edit-tab')?.parentElement;
        if (tabContainer) {
          tabContainer.innerHTML = tabs.map(t => `
            <button type="button" class="omp-task-edit-tab ${tab === t.id ? 'active' : ''}" onclick="window.omp_switchTaskEditTab('${t.id}')" style="padding:10px 16px;font-size:13px;background:transparent;border:none;border-bottom:2px solid ${tab === t.id ? 'var(--primary)' : 'transparent'};color:${tab === t.id ? 'var(--primary)' : 'var(--text-secondary)'};cursor:pointer;">${t.label}</button>
          `).join('');
        }
        const contentContainer = modal.querySelector('#omp-task-edit-tab-content');
        if (contentContainer) {
          contentContainer.innerHTML = omp_renderTaskEditTabContent(task);
        }
        if (tab === 'basic' && window.ensurePersonInput) {
          window.ensurePersonInput('omp-task-owner', task.owner || '');
        }
        if (tab === 'subtasks' && window.ensurePersonInput) {
          omp_getSubtasks(taskId).forEach(s => {

      function omp_removeSubtaskRow(btn) {
        const row = btn.closest('.omp-subtask-row');
        if (!row) return;
        const subtaskId = row.dataset.subtaskId;
        row.remove();
        const container = document.getElementById('omp-subtask-list');

          container.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text-tertiary);">暂无子任务，点击上方按钮添加</div>';

          omp_refreshSubtaskOrder();

        if (subtaskId && !subtaskId.startsWith('new_')) {
          window.omp_deleteSubtask(subtaskId);
        }

      function omp_moveSubtaskRow(btn, direction) {
        const row = btn.closest('.omp-subtask-row');
        if (!row) return;
        const container = document.getElementById('omp-subtask-list');
        const rows = Array.from(container.querySelectorAll('.omp-subtask-row'));
        const idx = rows.indexOf(row);
        if (direction === 'up' && idx > 0) {
          container.insertBefore(row, rows[idx - 1]);
        } else if (direction === 'down' && idx < rows.length - 1) {
          container.insertBefore(row, rows[idx + 1].nextSibling);
        }
        omp_refreshSubtaskOrder();
      }

      function omp_refreshSubtaskOrder() {
        const container = document.getElementById('omp-subtask-list');
        if (!container) return;
        const rows = Array.from(container.querySelectorAll('.omp-subtask-row'));
        rows.forEach((row, idx) => {
          row.dataset.seq = String(idx);
          const numEl = row.querySelector('.omp-subtask-number');
          if (numEl) numEl.textContent = (idx + 1) + '.';
          const upBtn = row.querySelector('button[title="上移"]');
          const downBtn = row.querySelector('button[title="下移"]');
          if (upBtn) {
            upBtn.disabled = idx === 0;
            upBtn.style.visibility = idx === 0 ? 'hidden' : 'visible';
          }
          if (downBtn) {
            downBtn.disabled = idx === rows.length - 1;
            downBtn.style.visibility = idx === rows.length - 1 ? 'hidden' : 'visible';
          }
        });
      }

      function omp_collectSubtasks(parentId) {
        const container = document.getElementById('omp-subtask-list');
        if (!container) return [];
        const tasks = omp_load('tasks');
        const parent = tasks.find(t => t.id === parentId);
        const rows = Array.from(container.querySelectorAll('.omp-subtask-row'));
        const existingSubtasks = omp_getSubtasks(parentId);
        const result = [];
        rows.forEach((row, idx) => {
          const rawId = row.dataset.subtaskId;
          const isNew = rawId && rawId.startsWith('new_');
          const name = row.querySelector('.omp-subtask-name')?.value?.trim();
          const ownerInput = row.querySelector('.omp-subtask-owner');
          const ownerRaw = ownerInput?.value?.trim();
          const owner = (ownerInput?.id && window.getPersonValue) ? window.getPersonValue(ownerInput.id) : ownerRaw;
          const target = row.querySelector('.omp-subtask-target')?.value?.trim() || '';
          if (!name || !owner) return;
          if (isNew) {
            result.push({
              id: omp_generateSubtaskId(),
              cycleId: parent ? parent.cycleId : window._dsteState.currentCycleId,
              source: 'omp',
              parentId,
              seq: idx,
              name,
              description: '',
              type: parent ? parent.type : 'improvement',
              status: 'planning',
              progress: 0,
              owner,
              dept: parent ? parent.dept : '',
              startDate: parent ? parent.startDate : '',
              endDate: parent ? parent.endDate : '',
              budget: 0,
              actualCost: 0,
              kpiAssociations: [],
              members: [],
              weight: 1,
              target,
            });
          } else {
            const existing = existingSubtasks.find(s => s.id === rawId);
            if (existing) {
              result.push({ ...existing, name, owner, target, seq: idx });
            }
          }
        });
        return result;
      }

      function omp_deleteSubtask(subtaskId) {
        if (!subtaskId) return;
        const tasks = omp_load('tasks');
        const subtask = tasks.find(t => t.id === subtaskId);
        if (!subtask) return;
        const parentId = subtask.parentId;
        const filtered = tasks.filter(t => t.id !== subtaskId);
        omp_save('tasks', filtered);
        // Delete associated milestones and progress records
        const milestones = omp_load('milestones');
        omp_save('milestones', milestones.filter(m => m.taskId !== subtaskId));
        const records = omp_load('progressRecords');
        omp_save('progressRecords', records.filter(r => r.taskId !== subtaskId));
        if (parentId) omp_recalculateParentProgress(parentId);
        showToast('子任务已删除', 'success');
      }

      window.omp_saveKpi = function() {
        const indicatorId = document.getElementById('omp-kpi-indicator')?.value;
        const dept = document.getElementById('omp-kpi-dept')?.value?.trim();
        const owner = window.getPersonValue ? window.getPersonValue('omp-kpi-owner') : (document.getElementById('omp-kpi-owner')?.value?.trim() || '');
        const actual = parseFloat(document.getElementById('omp-kpi-actual')?.value) || 0;
        const period = document.getElementById('omp-kpi-period')?.value?.trim() || `${getCurrentCycle().year}-Q1`;
        const assessmentLevel = document.getElementById('omp-kpi-assessment-level')?.value || 'marketing-line';
        if (!dept || !owner) { showToast('请填写必填项（部门、责任人）', 'warning'); return; }
        const kpis = omp_load('kpiInstances');
        const editId = window._ompState.editingKpiId;
        if (editId === 'new') {
          // Note: new KPI creation is not available from OMP UI anymore;
          // kept for backward compatibility / programmatic use
          const target = parseFloat(document.getElementById('omp-kpi-target')?.value);
          const challenge = parseFloat(document.getElementById('omp-kpi-challenge')?.value) || 0;
          const weight = parseFloat(document.getElementById('omp-kpi-weight')?.value) || 20;
          if (!indicatorId) { showToast('请选择指标', 'warning'); return; }
          if (isNaN(target)) { showToast('请输入目标值', 'warning'); return; }
          const achievementRate = target > 0 ? Math.round((actual / target) * 100 * 10) / 10 : 0;
          kpis.push({ id: 'kpi_' + Date.now(), indicatorId, period, targetValue: target, challengeValue: challenge, actualValue: actual, achievementRate, weight, owner, dept, status: omp_getKpiStatus(achievementRate, actual), parentId: null, level: 0, assessmentLevel, source: 'omp', annualPlanKpiId: null });
        } else {
          const idx = kpis.findIndex(k => k.id === editId);
          if (idx > -1) {
            const oldKpi = kpis[idx];
            // Plan fields (targetValue, challengeValue, weight, indicatorId, assessmentLevel for derived) are locked;
            // only execution fields are editable in OMP
            const target = oldKpi.targetValue;
            const challenge = oldKpi.challengeValue || 0;
            const weight = oldKpi.weight;
            const achievementRate = target > 0 ? Math.round((actual / target) * 100 * 10) / 10 : 0;
            let history = oldKpi.history || [];
            if (oldKpi.achievementRate !== achievementRate) {
              history = [...history, oldKpi.achievementRate];
              if (history.length > 6) history = history.slice(-6);
            }
            const isDerived = !!oldKpi.annualPlanKpiId;
            const updates = { dept, owner, period, actualValue: actual, achievementRate, status: omp_getKpiStatus(achievementRate, actual), history };
            if (!isDerived) updates.assessmentLevel = assessmentLevel;
            kpis[idx] = { ...oldKpi, ...updates };
          }
        }
        omp_save('kpiInstances', kpis);
        window._ompState.editingKpiId = null;
        document.getElementById('omp-active-modal')?.remove();
        navigate('exe/kpi');
      };

      window.omp_saveTask = function() {
        const tasks = omp_load('tasks');
        const editId = window._ompState.editingTaskId;
        const activeTab = window._ompState.taskEditActiveTab || 'basic';
        const isNewTask = editId === 'new';

        if (isNewTask) {
          // 新建任务必须从基本信息页读取全部字段
          const name = document.getElementById('omp-task-name')?.value?.trim();
          const description = document.getElementById('omp-task-desc')?.value?.trim();
          const type = document.getElementById('omp-task-type')?.value;
          const owner = window.getPersonValue ? window.getPersonValue('omp-task-owner') : (document.getElementById('omp-task-owner')?.value?.trim() || '');
          const dept = document.getElementById('omp-task-dept')?.value?.trim();
          const startDate = document.getElementById('omp-task-start')?.value || '';
          const endDate = document.getElementById('omp-task-end')?.value || '';
          const progress = parseInt(document.getElementById('omp-task-progress')?.value, 10) || 0;
          const status = document.getElementById('omp-task-status')?.value || 'planning';
          const budget = parseFloat(document.getElementById('omp-task-budget')?.value) || 0;
          const actualCost = parseFloat(document.getElementById('omp-task-cost')?.value) || 0;
          const kpiAssociations = omp_collectKpiAssociationsFromForm('omp-task', null, false);
          const annualTarget = document.getElementById('omp-task-annual-target')?.value?.trim() || '';
          const spLink = document.getElementById('omp-task-sp-link')?.value?.trim() || '';
          const biDashboard = document.getElementById('omp-task-bi-dashboard')?.value?.trim() || '';
          if (!name || !owner || !dept || !endDate) { showToast('请填写必填项（名称、负责人、部门、截止日期）', 'warning'); return; }
          tasks.push({ id: 'task_' + Date.now(), cycleId: window._dsteState.currentCycleId, source: 'omp', name, description, type, status, progress, owner, dept, startDate, endDate, kpiAssociations, budget, actualCost, annualTarget, spLink, biDashboard, members: [] });
        } else {
          const idx = tasks.findIndex(t => t.id === editId);
          if (idx > -1) {
            const existing = tasks[idx];
            const existingMembers = Array.isArray(existing.members) ? existing.members : [];
            const isDerived = existing.annualPlanTaskId;
            const isParentTask = !omp_isSubtask(existing);

            if (activeTab === 'basic') {
              // 基本信息页：读取并校验表单字段
              const name = document.getElementById('omp-task-name')?.value?.trim();
              const description = document.getElementById('omp-task-desc')?.value?.trim();
              const type = document.getElementById('omp-task-type')?.value;
              const owner = window.getPersonValue ? window.getPersonValue('omp-task-owner') : (document.getElementById('omp-task-owner')?.value?.trim() || '');
              const dept = document.getElementById('omp-task-dept')?.value?.trim();
              const startDate = document.getElementById('omp-task-start')?.value || '';
              const endDate = document.getElementById('omp-task-end')?.value || '';
              const progress = parseInt(document.getElementById('omp-task-progress')?.value, 10) || 0;
              const status = document.getElementById('omp-task-status')?.value || 'planning';
              const budget = parseFloat(document.getElementById('omp-task-budget')?.value) || 0;
              const actualCost = parseFloat(document.getElementById('omp-task-cost')?.value) || 0;
              const kpiAssociations = omp_collectKpiAssociationsFromForm('omp-task', existing.kpiAssociations, isDerived);
              const annualTarget = document.getElementById('omp-task-annual-target')?.value?.trim() || '';
              const spLink = document.getElementById('omp-task-sp-link')?.value?.trim() || '';
              const biDashboard = document.getElementById('omp-task-bi-dashboard')?.value?.trim() || '';
              if (!name || !owner || !dept || !endDate) { showToast('请填写必填项（名称、负责人、部门、截止日期）', 'warning'); return; }
              const finalOwner = isDerived ? existing.owner : owner;
              let progressOverridden = existing.progressOverridden;
              if (isParentTask && progress !== existing.progress) {
                progressOverridden = true;
              }
              tasks[idx] = { ...existing, name, description, type, owner: finalOwner, dept, startDate, endDate, status, progress, kpiAssociations, budget, actualCost, annualTarget, spLink, biDashboard, members: existingMembers, progressOverridden };
            }

            // 父任务统一处理子任务增删改（仅在子任务标签页保存时执行，避免其他标签页因 DOM 不存在而误删子任务）
            if (isParentTask && activeTab === 'subtasks') {
              const collected = omp_collectSubtasks(editId);
              const existingSubIds = new Set(collected.map(s => s.id));
              const filtered = tasks.filter(t => t.parentId !== editId || existingSubIds.has(t.id));
              const parentIdx = filtered.findIndex(t => t.id === editId);
              if (parentIdx > -1) filtered[parentIdx] = tasks[idx];
              // 用收集到的子任务（含新增和修改）替换 filtered 中的对应对象，避免旧对象覆盖编辑
              const collectedById = new Map(collected.map(s => [s.id, s]));
              for (let i = 0; i < filtered.length; i++) {
                if (filtered[i].parentId === editId && collectedById.has(filtered[i].id)) {
                  filtered[i] = collectedById.get(filtered[i].id);
                }
              }
              const filteredIds = new Set(filtered.map(t => t.id));
              collected.forEach(s => {
                if (!filteredIds.has(s.id)) filtered.push(s);
              });
              tasks.length = 0;
              tasks.push(...filtered);
            }
          }
        }
        omp_save('tasks', tasks);
        if (editId !== 'new' && !omp_isSubtask(tasks.find(t => t.id === editId))) {
          omp_recalculateParentProgress(editId);
        }
        window._ompState.editingTaskId = null;
        window._ompState.taskEditActiveTab = 'basic';
        document.getElementById('omp-active-modal')?.remove();
        navigate('exe/tasks');
      };

      window.omp_staffingAssignDrag = async function(taskIds, personRef, mode) {
        if (!taskIds || taskIds.length === 0 || !personRef) return;
        const tasks = omp_load('tasks');
        let changed = false;
        let skippedAsOwner = 0;
        const changedTaskIds = [];
        tasks.forEach(t => {
          if (!taskIds.includes(t.id)) return;
          t.members = Array.isArray(t.members) ? t.members : [];
          if (mode === 'owner') {
            // PRD v1.8：人员配置台不处理负责人变更
            return;
          }
          if (t.owner === personRef) { skippedAsOwner++; return; }
          if (!t.members.includes(personRef)) {
            t.members.push(personRef);
            changed = true;
            changedTaskIds.push(t.id);
          }
        });
        if (changed) {
          omp_save('tasks', tasks);

        if (!task || !Array.isArray(task.members)) return;

        showToast('已移除成员', 'success');

      window.omp_staffingReorderMember = async function(taskId, sourceRef, targetRef, before) {

        const tasks = omp_load('tasks');
        const task = tasks.find(t => t.id === taskId);
        if (!task || !Array.isArray(task.members)) return;
        const members = task.members.filter(m => m);
        const fromIdx = members.indexOf(sourceRef);
        const toIdx = members.indexOf(targetRef);
        if (fromIdx === -1 || toIdx === -1) return;
        members.splice(fromIdx, 1);
        let insertIdx = members.indexOf(targetRef);
        if (!before) insertIdx++;
        members.splice(insertIdx, 0, sourceRef);

        showToast('已调整成员顺序', 'success');

      window.omp_canvasNodeDragStart = function(e, kpiId) {

        state.dragStartY = e.clientY;

        if (node) {
          state.nodeStartX = parseFloat(node.style.left) || 0;

      window.omp_canvasNodeDragMove = function(e) {
        const state = window.omp_canvasState;
        if (!state.draggingNode) return;
        const dx = (e.clientX - state.dragStartX) / state.scale;
        const dy = (e.clientY - state.dragStartY) / state.scale;
        const node = document.querySelector(`.omp-canvas-node[data-id="${state.draggingNode}"]`);
        if (node) {
          const newX = state.nodeStartX + dx;
          const newY = state.nodeStartY + dy;
          node.style.left = newX + 'px';
          node.style.top = newY + 'px';
          window.omp_canvasUpdateLines();

      window.omp_canvasNodeDragEnd = function(e) {
        const state = window.omp_canvasState;
        if (state.draggingNode) {
          const node = document.querySelector(`.omp-canvas-node[data-id="${state.draggingNode}"]`);
          if (node) node.classList.remove('selected');
          // Save position to 本地存储
          const kpis = omp_load('kpiInstances');
          const kpi = kpis.find(k => k.id === state.draggingNode);

        // Only pan if clicking on canvas background (not a node)
        if (e.target.closest('.omp-canvas-node') || e.target.closest('.omp-canvas-toolbar')) return;
        if (e.button !== 0) return;
        const state = window.omp_canvasState;
        state.isPanning = true;
        state.panStartX = e.clientX;
        state.panStartY = e.clientY;
        e.preventDefault();
        document.addEventListener('mousemove', window.omp_canvasPanMove);
        document.addEventListener('mouseup', window.omp_canvasPanEnd);

      window.omp_canvasPanMove = function(e) {
        const state = window.omp_canvasState;
        if (!state.isPanning) return;
        const dx = e.clientX - state.panStartX;
        const dy = e.clientY - state.panStartY;
        state.offsetX += dx;
        state.offsetY += dy;
        state.panStartX = e.clientX;
        state.panStartY = e.clientY;
        window.omp_canvasApplyTransform();
      };

      window.omp_canvasPanEnd = function(e) {
        window.omp_canvasState.isPanning = false;

        state.scale = Math.max(0.3, Math.min(3, state.scale + delta));
        window.omp_canvasApplyTransform();
      };

      window.omp_canvasApplyTransform = function() {
        const state = window.omp_canvasState;
        const inner = document.getElementById('omp-kpi-canvas-inner');
        const zoomLabel = document.getElementById('omp-canvas-zoom');
        if (inner) {
          inner.style.transform = `translate(${state.offsetX}px, ${state.offsetY}px) scale(${state.scale})`;

        if (zoomLabel) {
          zoomLabel.textContent = Math.round(state.scale * 100) + '%';
        }

      window.omp_canvasUpdateLines = function() {
        const svg = document.querySelector('.omp-canvas-svg');
        if (!svg) return;
        const edges = [];
        const kpis = omp_load('kpiInstances');
        const childrenMap = {};
        kpis.forEach(k => { childrenMap[k.id] = []; });
        kpis.forEach(k => {
          if (k.parentId && childrenMap[k.parentId] !== undefined) {
            childrenMap[k.parentId].push(k);
          }
        });
        const expandedIds = window._ompState.kpiExpandedIds;
        kpis.forEach(k => {
          if (childrenMap[k.id] && expandedIds.has(k.id)) {
            childrenMap[k.id].forEach(child => {
              edges.push({ from: k.id, to: child.id });
            });
          }
        });
        const paths = edges.map(edge => {
          const fromNode = document.querySelector(`.omp-canvas-node[data-id="${edge.from}"]`);
          const toNode = document.querySelector(`.omp-canvas-node[data-id="${edge.to}"]`);
          if (!fromNode || !toNode) return '';
          const fromLeft = parseFloat(fromNode.style.left) || 0;
          const fromTop = parseFloat(fromNode.style.top) || 0;
          const toLeft = parseFloat(toNode.style.left) || 0;
          const toTop = parseFloat(toNode.style.top) || 0;
          const x1 = fromLeft + (fromNode.offsetWidth || 170);
          const y1 = fromTop + (fromNode.offsetHeight || 100) / 2;
          const x2 = toLeft;
          const y2 = toTop + (toNode.offsetHeight || 100) / 2;
          const midX = (x1 + x2) / 2;
          return `<path d="M${x1},${y1} C${midX},${y1} ${midX},${y2} ${x2},${y2}" />`;
        }).join('');
        svg.innerHTML = paths;
      };

      window.omp_updateDecomposeValidation = function() {
        const rows = document.querySelectorAll('.omp-decompose-row');
        let totalWeight = 0;
        let totalTarget = 0;
        let hasEmpty = false;
        rows.forEach(r => {
          const w = parseFloat(r.querySelector('.omp-d-weight')?.value) || 0;
          const t = parseFloat(r.querySelector('.omp-d-target')?.value) || 0;
          const n = r.querySelector('.omp-d-name')?.value?.trim();
          totalWeight += w;
          totalTarget += t;
          if (!n) hasEmpty = true;
        });
        const parentKpiId = window._ompState.decomposingKpiId;
        const kpis = omp_load('kpiInstances');
        const parentKpi = kpis.find(k => k.id === parentKpiId);
        const parentTarget = parentKpi ? parentKpi.targetValue : 0;
        const weightOk = Math.abs(totalWeight - 100) < 0.01;
        const targetOk = totalTarget <= parentTarget;
        const el = document.getElementById('omp-decompose-validation');
        if (!el) return;
        el.innerHTML = `
          <div style="color:${weightOk ? 'var(--success)' : 'var(--danger)'}">${weightOk ? icon('check', { size: 14 }) : icon('x', { size: 14 })} 权重之和: ${totalWeight}% ${weightOk ? '(= 100%)' : '(必须 = 100%)'}</div>
          <div style="color:${targetOk ? 'var(--success)' : 'var(--warning)'}">${targetOk ? icon('check', { size: 14 }) : icon('warning', { size: 14 })} 目标值之和: ${totalTarget} ${targetOk ? '(≤ 父级 ' + parentTarget + ')' : '(超过父级 ' + parentTarget + ')'}</div>
          ${hasEmpty ? '<div style="color:var(--danger)"><span class="icon" data-icon="x" data-icon-size="14"></span> 存在未填写名称的子级</div>' : ''}
        `;
      };

      window.omp_saveDecomposition = function() {
        const rows = document.querySelectorAll('.omp-decompose-row');
        if (rows.length === 0) { showToast('请至少添加一个子级', 'warning'); return; }
        let totalWeight = 0;
        let totalTarget = 0;
        const children = [];
        for (const r of rows) {
          const name = r.querySelector('.omp-d-name')?.value?.trim();
          const dept = r.querySelector('.omp-d-dept')?.value?.trim();
          const target = parseFloat(r.querySelector('.omp-d-target')?.value);
          const weight = parseFloat(r.querySelector('.omp-d-weight')?.value);
          if (!name || !dept || isNaN(target) || isNaN(weight)) { showToast('请填写完整的子级信息', 'warning'); return; }
          totalWeight += weight;
          totalTarget += target;
          children.push({ name, dept, target, weight });
        }
        if (Math.abs(totalWeight - 100) > 0.01) { showToast('子级权重之和必须等于 100%，当前为 ' + totalWeight + '%', 'warning'); return; }
        const parentId = window._ompState.decomposingKpiId;
        const kpis = omp_load('kpiInstances');
        const parentKpi = kpis.find(k => k.id === parentId);
        if (!parentKpi) { showToast('父级 KPI 不存在', 'error'); return; }
        if (totalTarget > parentKpi.targetValue) {
          if (!confirm('子级目标值之和 (' + totalTarget + ') 超过父级目标 (' + parentKpi.targetValue + ')，是否继续？')) return;
        }
        const indicatorId = parentKpi.indicatorId;
        const period = parentKpi.period;
        const parentLevel = parentKpi.level;
        const childLevel = parentLevel + 1;
        children.forEach(c => {
          const achievementRate = c.target > 0 ? Math.round((0 / c.target) * 100 * 10) / 10 : 0;
          kpis.push({
            id: 'kpi_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
            indicatorId, period,
            targetValue: c.target, challengeValue: c.target, actualValue: 0,
            achievementRate, weight: c.weight, owner: parentKpi.owner, dept: c.dept,
            status: 'lagging', parentId, level: childLevel
          });
        });
        omp_save('kpiInstances', kpis);
        window._ompState.decomposingKpiId = null;
        document.getElementById('omp-active-modal')?.remove();
        navigate('exe/kpi');
      };

      window.omp_deleteTask = function(id) {
        const tasks = omp_load('tasks');
        const task = tasks.find(t => t.id === id);
        const hasChildren = task && omp_hasSubtasks(id);
        const confirmMsg = hasChildren
          ? '确定要删除这个重点工作吗？其下所有子任务也将被删除。关联的里程碑和进度记录也将被删除。此操作不可恢复。'
          : '确定要删除这个重点工作吗？关联的里程碑和进度记录也将被删除。此操作不可恢复。';
        if (!confirm(confirmMsg)) return;
        const idsToDelete = collectCascadeDeleteIds(tasks, id);
        // 若删除的是 OMP 派生任务，同步删除年度计划源头任务，避免自动同步再次创建
        if (task && task.annualPlanTaskId) {
          idsToDelete.add(task.annualPlanTaskId);
        }
        const filteredTasks = tasks.filter(t => !idsToDelete.has(t.id));
        omp_save('tasks', filteredTasks);
        const milestones = omp_load('milestones');
        const filteredMs = milestones.filter(m => !idsToDelete.has(m.taskId));
        omp_save('milestones', filteredMs);
        const records = omp_load('progressRecords');
        const filteredRecs = records.filter(r => !idsToDelete.has(r.taskId));
        omp_save('progressRecords', filteredRecs);
        navigate('exe/tasks');
      };

      // ===== 战略指标库全局函数 =====
      let _indDeptSelector = null;

      function resolveResponsibleDeptName(value) {
        if (!value) return '-';
        if (String(value).startsWith('org:')) {
          const tree = getOrgTree();
          const unit = tree?.orgUnits?.[value];
          if (unit) return unit.name;
        }
        return value;
      }

      function findOrgIdByName(name) {
        if (!name) return null;
        const tree = getOrgTree();
        const units = tree?.orgUnits || {};
        for (const [id, unit] of Object.entries(units)) {
          if (unit.name === name) return id;
        }
        for (const [id, unit] of Object.entries(units)) {
          if (unit.name.includes(name) || name.includes(unit.name)) return id;
        }
        return null;
      }

      window.ind_delete = function(id) {
        const indicators = omp_load('indicators');
        const ind = indicators.find(i => i.id === id);
        if (!ind) return;
        // 检查是否被 KPI 实例使用
        const kpis = omp_load('kpiInstances');
        const usedByKpis = kpis.filter(k => k.indicatorId === id);
        // 检查是否被任务关联
        const tasks = omp_load('tasks');
        const relatedKpiIds = new Set(kpis.filter(k => k.indicatorId === id).map(k => k.id));
        const usedByTasks = tasks.filter(t => (t.kpiAssociations || []).some(a => relatedKpiIds.has(a.kpiInstanceId)));
        const totalUsed = usedByKpis.length + usedByTasks.length;
        if (totalUsed > 0) {
          let msg = `该指标已被 ${totalUsed} 处引用，无法删除：`;
          if (usedByKpis.length > 0) msg += `\n- ${usedByKpis.length} 个 KPI 实例`;
          if (usedByTasks.length > 0) msg += `\n- ${usedByTasks.length} 个重点工作`;
          msg += '\n\n请先将关联项改为其他指标。';
          showToast(msg, 'info');
          return;
        }
        if (!confirm(`确定要删除指标「${ind.name}」吗？此操作不可恢复。`)) return;
        const filtered = indicators.filter(i => i.id !== id);
        omp_save('indicators', filtered);
        window._indicatorState.selectedIndicatorId = null;
        navigate('bp/kpi');
      };

      window.ind_export = function() {
        const indicators = omp_load('indicators');
        const headers = ['编码', '名称', '定义', '计算公式', '单位', '频次', '分类', '子分类', '数据来源', '责任部门', '状态'];
        const rows = indicators.map(i => [
          i.code, i.name, i.description, i.formula, i.unit,
          i.frequency, i.category, i.subCategory, i.dataSource, resolveResponsibleDeptName(i.responsibleDept), i.status
        ]);
        const csv = [headers.join(','), ...rows.map(r => r.map(v => `"${(v || '').toString().replace(/"/g, '""')}"`).join(','))].join('\n');
        const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `战略指标库_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
      };

      function generateIndicatorCode() {
        const indicators = omp_load('indicators') || [];
        let maxNum = 0;
        indicators.forEach(i => {
          const match = String(i.code).match(/^IND_(\d+)$/);
          if (match) {
            maxNum = Math.max(maxNum, parseInt(match[1], 10));
          }
        });
        return `IND_${String(maxNum + 1).padStart(3, '0')}`;
      }

      window.ind_openModal = function(mode, id) {
        const indicators = omp_load('indicators');
        const isEdit = mode === 'edit';
        const ind = isEdit ? indicators.find(i => i.id === id) : null;
        const categories = ['财务', '客户', '流程', '学习成长'];
        const subCats = {
          '财务': ['收入类', '利润类', '成本类', '投资回报类'],
          '客户': ['客户满意度', '客户增长', '客户价值', '市场份额'],
          '流程': ['运营效率', '质量指标', '创新指标', '合规指标'],
          '学习成长': ['人才发展', '组织活力', '数字化能力', '知识管理']
        };
        const freqs = [
          { value: 'monthly', label: '月度' },
          { value: 'quarterly', label: '季度' },
          { value: 'yearly', label: '年度' }
        ];
        const indTypes = [
          { value: 'result', label: '<span class="icon" data-icon="chart-bar" data-icon-size="14"></span> 结果指标' },
          { value: 'process', label: '<span class="icon" data-icon="ruler" data-icon-size="14"></span> 过程指标' }
        ];
        const dataTypes = [
          { value: 'currency', label: '<span class="icon" data-icon="currency-dollar" data-icon-size="14"></span> 金额（万元/元）' },
          { value: 'percentage', label: '<span class="icon" data-icon="chart-line-up" data-icon-size="14"></span> 百分比（%）' },
          { value: 'count', label: '<span class="icon" data-icon="numbers" data-icon-size="14"></span> 计数（个/次）' },
          { value: 'days', label: '<span class="icon" data-icon="calendar" data-icon-size="14"></span> 天数' },
          { value: 'score', label: '⭐ 分数' }
        ];

        omp_openModal(isEdit ? '编辑指标' : '新建指标', `
          <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px;">
            <div>
              <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">指标编码（系统自动生成）</label>
              <input type="text" id="ind-code" value="${isEdit ? ind.code : generateIndicatorCode()}" placeholder="系统自动生成" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-page);color:var(--text-secondary);font-size:13px;" disabled>
            </div>
            <div>
              <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">指标名称 *</label>
              <input type="text" id="ind-name" value="${isEdit ? ind.name : ''}" placeholder="如: 合同额" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
            </div>
            <div style="grid-column:1 / -1;">
              <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">指标定义 *</label>
              <textarea id="ind-desc" rows="2" placeholder="描述该指标的业务含义和统计口径" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;resize:vertical;">${isEdit ? ind.description : ''}</textarea>
            </div>
            <div style="grid-column:1 / -1;">
              <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">计算公式</label>
              <input type="text" id="ind-formula" value="${isEdit ? ind.formula : ''}" placeholder="如: SUM(合同金额)" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
            </div>
            <div>
              <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">单位</label>
              <input type="text" id="ind-unit" value="${isEdit ? ind.unit : ''}" placeholder="如: 万元" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
            </div>
            <div>
              <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">统计频次</label>
              <select id="ind-freq" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
                ${freqs.map(f => `<option value="${f.value}" ${isEdit && ind.frequency === f.value ? 'selected' : ''}>${f.label}</option>`).join('')}
              </select>
            </div>
            <div>
              <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">指标类型 *</label>
              <select id="ind-type" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
                ${indTypes.map(t => `<option value="${t.value}" ${isEdit && ind.indicatorType === t.value ? 'selected' : ''}>${t.label}</option>`).join('')}
              </select>
            </div>
            <div>
              <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">数据类型 *</label>
              <select id="ind-data-type" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
                ${dataTypes.map(d => `<option value="${d.value}" ${isEdit && ind.dataType === d.value ? 'selected' : ''}>${d.label}</option>`).join('')}
              </select>
            </div>
            <div>
              <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">BSC分类 *</label>
              <select id="ind-category" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;" onchange="window.ind_updateSubCats()">
                <option value="">请选择</option>
                ${categories.map(c => `<option value="${c}" ${isEdit && ind.category === c ? 'selected' : ''}>${c}</option>`).join('')}
              </select>
            </div>
            <div>
              <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">子分类</label>
              <select id="ind-subcategory" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
                ${isEdit ? subCats[ind.category]?.map(s => `<option value="${s}" ${ind.subCategory === s ? 'selected' : ''}>${s}</option>`).join('') : '<option value="">请先选择分类</option>'}
              </select>
            </div>
            <div>
              <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">数据来源</label>
              <input type="text" id="ind-source" value="${isEdit ? ind.dataSource : '帆软数仓'}" placeholder="帆软数仓" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
            </div>
            <div>
              <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">责任部门</label>
              <div id="ind-dept-selector" style="width:100%;"></div>
            </div>
            <div>
              <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">趋势方向</label>
              <select id="ind-positive" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
                <option value="true" ${isEdit && ind.isPositive ? 'selected' : ''}>越高越好</option>
                <option value="false" ${isEdit && !ind.isPositive ? 'selected' : ''}>越低越好</option>
              </select>
            </div>
            <div>
              <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">状态</label>
              <select id="ind-status" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;">
                <option value="active" ${isEdit && ind.status === 'active' ? 'selected' : ''}>启用</option>
                <option value="disabled" ${isEdit && ind.status === 'disabled' ? 'selected' : ''}>禁用</option>
              </select>
            </div>
          </div>
          <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:20px;">
            <button class="btn btn-secondary" data-modal-action="modal-close">取消</button>
            <button class="btn btn-primary" onclick="window.ind_save('${isEdit ? id : 'new'}')">保存</button>
          </div>
        `, true);

        const deptSelectorContainer = document.getElementById('ind-dept-selector');
        if (deptSelectorContainer) {
          let initialDeptValue = null;
          if (isEdit && ind.responsibleDept) {
            initialDeptValue = String(ind.responsibleDept).startsWith('org:')
              ? ind.responsibleDept
              : findOrgIdByName(ind.responsibleDept);
          }
          _indDeptSelector = createOrgSelector(deptSelectorContainer, {
            placeholder: '选择责任部门...',
            allowClear: true,
            value: initialDeptValue
          });
        }

        window.ind_updateSubCats = function() {
          const cat = document.getElementById('ind-category').value;
          const subSelect = document.getElementById('ind-subcategory');
          const subs = subCats[cat] || [];
          subSelect.replaceChildren();
          if (subs.length === 0) {
            const placeholder = document.createElement('option');
            placeholder.value = '';
            placeholder.textContent = '请选择分类';
            subSelect.appendChild(placeholder);
          } else {
            subs.forEach(s => {
              const option = document.createElement('option');
              option.value = s;
              option.textContent = s;
              subSelect.appendChild(option);
            });
          }
        };
      };

      window.ind_save = function(id) {
        const name = document.getElementById('ind-name')?.value?.trim();
        const description = document.getElementById('ind-desc')?.value?.trim();
        const formula = document.getElementById('ind-formula')?.value?.trim();
        const unit = document.getElementById('ind-unit')?.value?.trim();
        const frequency = document.getElementById('ind-freq')?.value;
        const indicatorType = document.getElementById('ind-type')?.value;
        const dataType = document.getElementById('ind-data-type')?.value;
        const category = document.getElementById('ind-category')?.value;
        const subCategory = document.getElementById('ind-subcategory')?.value;
        const dataSource = document.getElementById('ind-source')?.value?.trim();
        const responsibleDept = _indDeptSelector ? _indDeptSelector.getValue() : null;
        const isPositive = document.getElementById('ind-positive')?.value === 'true';
        const status = document.getElementById('ind-status')?.value || 'active';

        if (!name || !description || !category || !indicatorType || !dataType) {
          showToast('请填写必填项（名称、定义、分类、指标类型、数据类型）', 'warning');
          return;
        }

        const indicators = omp_load('indicators');
        let code = document.getElementById('ind-code')?.value?.trim();
        if (id === 'new') {
          while (indicators.some(i => i.code === code)) {
            code = generateIndicatorCode();
          }
          indicators.push({
            id: 'ind_' + Date.now(),
            code, name, description, formula, unit, frequency, indicatorType, dataType, category, subCategory, dataSource, responsibleDept, isPositive, status,
            createdAt: new Date().toISOString().slice(0, 10)
          });
        } else {
          const idx = indicators.findIndex(i => i.id === id);
          if (idx > -1) {
            indicators[idx] = { ...indicators[idx], name, description, formula, unit, frequency, indicatorType, dataType, category, subCategory, dataSource, responsibleDept, isPositive, status };
          }
        }
        omp_save('indicators', indicators);
        document.getElementById('omp-active-modal')?.remove();
        navigate('bp/kpi');
      };

      // 暴露全局 navigate
      window.navigate = navigate;
      window.renderBreadcrumb = renderBreadcrumb;

      // ===== 版本审计看板交互 =====
      window._versionAuditData = null;

      ;

      

      

      

      ;

      ;

      // 启动：等待 DOMContentLoaded，确保 defer 的 dashboard 渲染器脚本已定义 window 函数
      window.addEventListener('DOMContentLoaded', init);

      // 显示版本号
      console.log('DSTE Platform v' + (typeof __APP_VERSION__ !== 'undefined' ? __APP_VERSION__ : 'dev'));
    })();
  </script>
  <div id="app-version" style="position:fixed;bottom:4px;right:8px;font-size:11px;color:var(--text-tertiary);opacity:0.6;z-index:9999;pointer-events:none;"></div>


  <script type="module">
    (function() {
      const v = typeof __APP_VERSION__ !== 'undefined' ? __APP_VERSION__ : 'dev';
      const el = document.getElementById('app-version');
      if (el) el.textContent = 'v' + v;
    })();
  </script>
