<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>DSTE 战略管理平台</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="./styles/shell.css">
  <style>
    /* ===== cockpit.html 页面级响应式覆盖 ===== */

    /* Tablet (<1024px) */
    @media (max-width: 1024px) {
      #page-content [style*="grid-template-columns: repeat(4, 1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: 2fr 1fr"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(3, 1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: repeat(7, 1fr)"] {
        grid-template-columns: repeat(4, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: repeat(5, 1fr)"] {
        grid-template-columns: repeat(3, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: 280px 1fr"] {
        grid-template-columns: 1fr !important;
      }
      /* Roadmap 时间线节点缩小 */
      #dev-timeline .timeline-node {
        min-width: 90px !important;
        padding: 6px !important;
      }
    }

    /* Mobile (<768px) */
    @media (max-width: 768px) {
      #page-content [style*="grid-template-columns: repeat(4, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(2, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(3, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(7, 1fr)"] {
        grid-template-columns: repeat(3, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: repeat(5, 1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: 280px 1fr"] {
        grid-template-columns: 1fr !important;
      }
      /* Roadmap 时间线节点进一步缩小 */
      #dev-timeline .timeline-node {
        min-width: 80px !important;
        padding: 4px !important;
      }
      #dev-timeline .timeline-node > div:nth-child(2) {
        font-size: 12px !important;
      }
      #dev-timeline .timeline-node > div:nth-child(3),
      #dev-timeline .timeline-node > div:nth-child(4) {
        font-size: 10px !important;
      }
      /* 卡片 padding 缩小 */
      #page-content .card {
        padding: 12px !important;
      }
      /* 看板列从 4 列变为可滚动 */
      #page-content [style*="grid-template-columns: repeat(4, 1fr)"][class*="kanban"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
    }

    /* Small Phone (<480px) */
    @media (max-width: 480px) {
      #page-content [style*="grid-template-columns: repeat(2, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(7, 1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: repeat(5, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(4, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #dev-timeline .timeline-node {
        min-width: 70px !important;
      }
      #page-content .card {
        padding: 10px !important;
      }
      /* 看板单列 */
      #page-content [style*="grid-template-columns: repeat(4, 1fr)"][class*="kanban"] {
        grid-template-columns: 1fr !important;
      }
    }

    /* ===== OMP 专用 CSS 变量 ===== */
    :root {
      /* BSC 维度色 */
      --dim-financial: #1E3A5F;
      --dim-customer: #2E8B57;
      --dim-process: #D4A017;
      --dim-learning: #6B4C9A;
      /* KPI 层级色 */
      --kpi-level-0: #003087;
      --kpi-level-1: #005EB8;
      --kpi-level-2: #99C7E8;
      /* 画布背景 */
      --canvas-bg: var(--bg-page);
      --canvas-node-bg: var(--bg-card);
      --canvas-stroke: var(--border-color);
      --canvas-progress-track: var(--border-light);
      /* 辅助色 */
      --accent-pink: #EB2F96;
    }

    /* 表格横向滚动容器 */
    .table-scroll-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .table-scroll-wrapper table {
      min-width: 600px;
    }

    /* ===== 全局弹窗样式 ===== */
    .omp-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .omp-modal { background: var(--bg-card); border-radius: 12px; max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .omp-modal-wide { max-width: 900px !important; }

    /* ===== 年度经营计划公用样式 ===== */
    .ap-card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 10px; overflow: hidden; }
    .ap-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .ap-table th, .ap-table td { padding: 10px; border-bottom: 1px solid var(--border-light); }
    .ap-dim-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
    .ap-level-badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 600; }
    .ap-level-marketing-line { background: color-mix(in srgb, var(--kpi-level-0) 15%, transparent); color: var(--kpi-level-0); }
    .ap-level-department { background: color-mix(in srgb, var(--kpi-level-1) 15%, transparent); color: var(--kpi-level-1); }
    .ap-level-team { background: color-mix(in srgb, var(--kpi-level-2) 15%, transparent); color: var(--kpi-level-2); }
    .ap-status-pill { display: inline-block; font-size: 12px; padding: 2px 8px; border-radius: 4px; }
    .ap-edit-panel { position: fixed; top: 0; right: 0; width: 360px; height: 100vh; background: var(--bg-card); border-left: 1px solid var(--border-color); z-index: 100; padding: 20px; overflow-y: auto; box-shadow: -4px 0 20px rgba(0,0,0,0.1); }
    .ap-section-title { font-size: 14px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 8px; margin-top: 24px; margin-bottom: 8px; }

    /* ===== KPI 指标树 — 卡片式层级视图 ===== */
    /* ===== Canvas 自由画布 KPI 树 ===== */
    .omp-kpi-canvas {
      position: relative;
      width: 100%;
      height: 700px;
      overflow: hidden;
      background: var(--canvas-bg);
      border-radius: 12px;
      border: 1px solid var(--border-color);
      cursor: grab;
      user-select: none;
    }
    .omp-kpi-canvas:active { cursor: grabbing; }
    .omp-kpi-canvas-inner {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
    }
    /* SVG 连接线层 */
    .omp-canvas-svg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    .omp-canvas-svg path {
      fill: none;
      stroke: var(--canvas-stroke);
      stroke-width: 2;
      transition: d 0.2s ease;
    }
    /* 画布节点卡片 */
    .omp-canvas-node {
      position: absolute;
      min-width: 160px;
      min-height: 90px;
      border-radius: 10px;
      padding: 12px;
      background: var(--canvas-node-bg);
      border: 1px solid var(--canvas-stroke);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      cursor: grab;
      z-index: 2;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.2s, border-color 0.2s;
      overflow: hidden;
      resize: both;
    }
    .omp-canvas-node:active { cursor: grabbing; }
    .omp-canvas-node:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .omp-canvas-node.selected { border-color: var(--primary); box-shadow: 0 0 0 2px color-mix(in srgb, var(--primary) 30%, transparent); }
    /* 维度角标 */
    .omp-dim-badge {
      position: absolute;
      top: -1px; right: -1px;
      width: 0; height: 0;
      border-style: solid;
      border-width: 0 24px 24px 0;
      border-color: transparent;
    }
    .omp-dim-badge.financial { border-right-color: var(--dim-financial); }
    .omp-dim-badge.customer { border-right-color: var(--dim-customer); }
    .omp-dim-badge.internal { border-right-color: var(--dim-process); }
    .omp-dim-badge.learning { border-right-color: var(--dim-learning); }
    /* 顶部状态色条 */
    .omp-canvas-node.status-achieved { border-top: 3px solid var(--success); }
    .omp-canvas-node.status-warning { border-top: 3px solid var(--warning); }
    .omp-canvas-node.status-lagging { border-top: 3px solid var(--danger); }
    .canvas-node-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: 6px;
      word-break: break-all;
    }
    .canvas-node-dept {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }
    .canvas-node-metric {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .canvas-node-metric strong { color: var(--text-primary); font-size: 13px; }
    .canvas-node-progress {
      margin-top: auto;
      padding-top: 6px;
    }
    .canvas-node-progress-bar {
      height: 4px;
      border-radius: 2px;
      background: var(--canvas-progress-track);
      overflow: hidden;
      margin-bottom: 4px;
    }
    .canvas-node-progress-bar > div {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    .canvas-node-progress-bar > div.achieved { background: var(--success); }
    .canvas-node-progress-bar > div.warning { background: var(--warning); }
    .canvas-node-progress-bar > div.lagging { background: var(--danger); }
    .canvas-node-progress-text {
      font-size: 11px;
      font-weight: 600;
      text-align: right;
    }
    .canvas-node-progress-text.achieved { color: var(--success); }
    .canvas-node-progress-text.warning { color: var(--warning); }
    .canvas-node-progress-text.lagging { color: var(--danger); }
    /* 展开折叠按钮 */
    .canvas-node-expand {
      position: absolute;
      bottom: 6px;
      left: 6px;
      font-size: 14px;
      color: var(--text-tertiary);
      cursor: pointer;
      line-height: 1;
      z-index: 3;
    }
    /* 画布工具栏 */
    .omp-canvas-toolbar {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 6px;
      z-index: 10;
      background: rgba(255,255,255,0.9);
      padding: 6px 10px;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      font-size: 12px;
    }
    .omp-canvas-toolbar button {
      background: var(--bg-page);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-primary);
    }
    .omp-canvas-toolbar button:hover { background: var(--bg-card); }
    /* 缩放指示器 */
    .omp-canvas-zoom {
      position: absolute;
      bottom: 12px;
      right: 12px;
      z-index: 10;
      background: rgba(255,255,255,0.9);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      color: var(--text-secondary);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    /* 状态药丸（保留兼容） */
    .omp-status-pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
      letter-spacing: 0.5px;
    }
    .omp-status-pill.achieved { background: color-mix(in srgb, var(--success) 12%, transparent); color: var(--success); }
    .omp-status-pill.warning { background: color-mix(in srgb, var(--warning) 12%, transparent); color: var(--warning); }
    .omp-status-pill.lagging { background: color-mix(in srgb, var(--danger) 12%, transparent); color: var(--danger); }
    /* 展开按钮（保留兼容） */
    .omp-expand-btn {
      transition: transform 0.2s ease;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      padding: 0;
      width: 20px;
      text-align: center;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .omp-expand-btn.expanded { transform: rotate(90deg); }
    /* 保留兼容：层级差异化 */
    .omp-kpi-card[data-level="0"] { border-left: 4px solid var(--kpi-level-0); }
    .omp-kpi-card[data-level="1"] { border-left: 3px solid var(--kpi-level-1); }
    .omp-kpi-card[data-level="2"] { border-left: 2px solid var(--kpi-level-2); }
    /* 响应式 */
    @media (max-width: 768px) {
      .omp-kpi-card.mindmap-node { width: 140px; min-height: 80px; padding: 10px; }
      .omp-kpi-children-row { gap: 10px; }
    }

    /* 减少动画偏好 */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

    <!-- 顶部导航 -->
    <nav class="top-nav">
      <div style="display: flex; align-items: center;">
        <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="打开菜单">☰</button>

          <!-- 由 renderCycleSelector 填充 -->
        </select>
        <button class="icon-btn" id="theme-toggle" title="切换主题">🌙</button>

    <div class="app-body">
      <!-- 侧边栏遮罩层 -->
      <div class="sidebar-overlay" id="sidebar-overlay"></div>

      <!-- 左侧边栏 -->
      <aside class="sidebar" id="sidebar"></aside>

      <!-- 内容区 -->

  <script src="../assets/js/main.js"></script>
  <script src="../pages/dashboard/roadmap.js"></script>
  <script src="../pages/dashboard/version-audit.js"></script>
  <script type="module">
    import { renderTopNav, renderSidebar as shellRenderSidebar, getPhaseFromPage } from './lib/shell.js';
    import { EXTERNAL_PAGES } from './lib/config.js';
    import { createBackup, restoreFromBackup, cleanupOldBackups, getBackupKeys } from './lib/migration-utils.js';
    import { createOmpRepository } from './lib/repository.js';
    import { enhancePersonInput, getPersonInputValue } from './components/person-input.js';
    import { renderPerson, normalizePerson, getEmployees, getEmployeeById, getOrgTree, buildOrgHierarchy, searchEmployees } from './lib/employee-directory.js';
    import { createOrgSelector } from './components/org-selector.js';
    import { AIClient, AITools } from './lib/ai-client.js';
    import { buildSystemPrompt, gatherBusinessContext, getContextSummary } from './lib/ai-context.js';
    import {
      isSubtask,
      getSubtasks,
      hasSubtasks,
      generateSubtaskId,
      recalculateParentProgress,
      collectCascadeDeleteIds,
    } from './lib/subtask-utils.js';
    import {
      computeEntityDiff,
      mergeEntities,
      enqueuePerRecordSync,
      createPerItemExecutor,
      apiLoadArray,
      ensureLastModified,
    } from './lib/per-record-sync.js';
    import { getDefaultSyncQueue } from './lib/sync-queue.js';

    (function() {
      'use strict';

      // 人员输入增强全局助手（与 meetings.html 保持相同 API）
      window.enhancePersonInput = enhancePersonInput;
      window.getPersonInputValue = getPersonInputValue;
      window.renderPerson = renderPerson;
      window.normalizePerson = normalizePerson;
      window._personInputApis = window._personInputApis || {};
      window.ensurePersonInput = function(inputId, value) {
        if (!window.enhancePersonInput) return;
        const input = document.getElementById(inputId);
        if (!input) return;
        if (!window._personInputApis[inputId]) {
          window._personInputApis[inputId] = window.enhancePersonInput(input, {
            placeholder: input.getAttribute('placeholder') || '',
            allowFreeText: true,
          });
        }
        window._personInputApis[inputId].setValue(value);
      };
      window.getPersonValue = function(inputId) {
        const api = window._personInputApis[inputId];
        if (api) return api.getValue();
        const input = document.getElementById(inputId);
        return input ? (input.value.trim() || null) : null;
      };

      // ===== 配置 =====
      const API_BASE = (() => {
        const host = window.location.hostname;
        if (host === 'localhost' || host === '127.0.0.1' || host === 'dste.jasonxspace.cc') {
          return DSTE.Storage.getString('dste_api_base') || '';
        }
        return ''; // 生产环境走同域 /api/ 代理
      })();

      async function apiSave(endpoint, data) {
        // 无论 API 是否可用，都先保存到 本地存储 作为兜底，防止数据丢失
        if (endpoint === '/api/meetings') {
          try {
            DSTE.Storage.set('dste_meetings', data);
          } catch (e) {
            console.warn('本地存储 save failed:', e.message);
          }
        }
        if (!API_BASE) return;
        try {
          const token = DSTE.Storage.getString('dste-token');
          const headers = { 'Content-Type': 'application/json' };
          if (token) headers['Authorization'] = `Bearer ${token}`;
          const resp = await fetch(API_BASE + endpoint, {
            method: 'POST',
            headers,
            body: JSON.stringify(data),
          });
          if (resp.status === 401) {
            redirectToCasLogin();
            return;
          }
        } catch (e) {
          console.warn('API save failed:', e.message);
        }
      }

      // CAS 统一着陆页（所有页面共用此 service URL，避免 CAS 服务注册不一致导致循环）
      const CAS_LANDING_PAGE = '/src/cockpit.html';
      const CAS_REDIRECT_HISTORY_KEY = 'dste-cas-redirect-history';
      const CAS_LOGIN_AT_KEY = 'dste-cas-login-at';
      const CAS_RETURN_TO_KEY = 'dste-cas-return-to';

      function getCasServiceUrl() {
        return window.location.origin + CAS_LANDING_PAGE;
      }

      // 检测是否在短时间内被 CAS 重定向多次，防止无限循环
      function isCasRedirectLoop() {
        try {
          const now = Date.now();
          const raw = sessionStorage.getItem(CAS_REDIRECT_HISTORY_KEY);
          const history = raw ? JSON.parse(raw) : [];
          const recent = history.filter(t => now - t < 10000);
          recent.push(now);
          sessionStorage.setItem(CAS_REDIRECT_HISTORY_KEY, JSON.stringify(recent));
          return recent.length > 2;
        } catch (e) {
          return false;
        }
      }

      function clearCasRedirectHistory() {
        try { sessionStorage.removeItem(CAS_REDIRECT_HISTORY_KEY); } catch (e) {}
      }

      function saveAuthReturnUrl() {
        try {
          const path = window.location.pathname;
          const search = window.location.search;
          const hash = window.location.hash;
          if (!path.includes(CAS_LANDING_PAGE)) {
            sessionStorage.setItem(CAS_RETURN_TO_KEY, path + search + hash);
          }
        } catch (e) {}
      }

      function restoreAuthReturnUrl() {
        try {
          const returnTo = sessionStorage.getItem(CAS_RETURN_TO_KEY);
          if (returnTo) {
            sessionStorage.removeItem(CAS_RETURN_TO_KEY);
            const current = window.location.pathname + window.location.search + window.location.hash;
            if (returnTo !== current) {
              window.location.replace(returnTo);
              return true;
            }
          }
        } catch (e) {}
        return false;
      }

      function showAuthError(message) {
        console.error('[Auth]', message);
        const banner = document.createElement('div');
        banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#fee2e2;color:#991b1b;padding:12px 16px;text-align:center;font-size:14px;border-bottom:1px solid #fecaca;';
        banner.textContent = message;
        document.body.appendChild(banner);
      }

      // CAS 登录跳转
      function redirectToCasLogin() {
        if (isCasRedirectLoop()) {
          showAuthError('登录验证出现循环，请关闭页面后重新打开，或联系管理员。');
          return;
        }
        saveAuthReturnUrl();
        const service = encodeURIComponent(getCasServiceUrl());
        window.location.href = `https://passport.fanruan.com/cas/login?service=${service}`;
      }

      function setAuthToken(token, user) {
        DSTE.Storage.setString('dste-token', token);
        DSTE.Storage.setString('dste-user', user?.name || user?.username || '');
        sessionStorage.setItem('dste-user', user?.name || user?.username || '');
        sessionStorage.setItem(CAS_LOGIN_AT_KEY, String(Date.now()));
        clearCasRedirectHistory();
        updateUserUI();

      // CAS 回调处理：从 URL 提取 ticket，调用后端换取 token
      async function handleCasCallback() {
        const urlParams = new URLSearchParams(window.location.search);
        const ticket = urlParams.get('ticket');
        if (!ticket) return false;

        const cleanUrl = window.location.pathname + window.location.hash;
        history.replaceState(null, '', cleanUrl);

        try {
          const service = encodeURIComponent(getCasServiceUrl());
          const resp = await fetch(`${API_BASE}/api/auth/cas/login?ticket=${encodeURIComponent(ticket)}&service=${service}`);
          const json = await resp.json();
          if (json.success && json.token) {
            setAuthToken(json.token, json.user);
            // 登录成功后，若存在保存的返回地址，跳转回去
            if (restoreAuthReturnUrl()) {
              return true;
            }
            return true;
          }
        } catch (e) {
          console.error('CAS callback failed:', e);
        }
        return false;
      }

      // 检查登录状态：验证 token 是否有效
      async function checkLoginStatus() {
        const token = DSTE.Storage.getString('dste-token');
        if (!token) return false;

        // 刚完成 CAS 登录的 30 秒内，信任本地 token，避免 KV 跨节点一致性导致误删 token 并触发循环
        try {
          const loginAt = parseInt(sessionStorage.getItem(CAS_LOGIN_AT_KEY) || '0', 10);
          if (Date.now() - loginAt < 30000) {
            updateUserUI();
            return true;
          }
        } catch (e) {}

        try {
          const resp = await fetch(`${API_BASE}/api/auth/me`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (resp.ok) {
            const json = await resp.json();
            if (json.success && json.user) {
              DSTE.Storage.setString('dste-user', json.user.name || json.user.username || '');
              sessionStorage.setItem('dste-user', json.user.name || json.user.username || '');
              updateUserUI();
              return true;
            }
          }
        } catch (e) {
          console.warn('Login status check failed:', e);
        }

        DSTE.Storage.remove('dste-token');
        DSTE.Storage.remove('dste-user');
        sessionStorage.removeItem('dste-user');
        sessionStorage.removeItem(CAS_LOGIN_AT_KEY);
        return false;
      }

      /**

       * 规则：'omp_' + annualPlanTaskId；若本身已是 omp_ 前缀则直接返回。
       */
      function omp_deriveTaskIdFromAnnualPlan(annualPlanTaskId) {
        if (!annualPlanTaskId) return null;
        if (String(annualPlanTaskId).startsWith('omp_')) return annualPlanTaskId;
        return 'omp_' + annualPlanTaskId;
      }

      /**
       * 将当前周期的年度计划重点工作同步为 OMP 执行任务（幂等）。
       * 只处理没有 annualPlanTaskId 的源头任务（即年度计划侧任务）。
       */
      function omp_syncAnnualPlanTasksToExecution(cycleId) {
        const tasks = omp_load('tasks');
        const annualTasks = tasks.filter(t => t.cycleId === cycleId && t.source !== 'omp' && !t.annualPlanTaskId);
        let changed = false;
        const currentCycle = getCurrentCycle();
        const defaultYear = currentCycle ? currentCycle.year : new Date().getFullYear();

        annualTasks.forEach(at => {
          if (at.status === 'closed') return;
          // 标记年度计划源头任务，避免在 OMP 重点工作列表中显示重复行
          if (at.source !== 'annual_plan') { at.source = 'annual_plan'; changed = true; }
          const ompId = omp_deriveTaskIdFromAnnualPlan(at.id);
          const existing = tasks.find(t => t.id === ompId || t.annualPlanTaskId === at.id);
          if (existing) {
            // 若年度计划源头负责人变更，同步到 OMP 派生任务
            if (existing.owner !== at.owner) {
              existing.owner = at.owner || '';
              changed = true;
            }
          } else {
            tasks.push({
              id: ompId,
              cycleId: at.cycleId,
              source: 'omp',
              annualPlanTaskId: at.id,
              seq: typeof at.seq === 'number' ? at.seq : 0,
              name: at.name || '',
              bscDimension: at.bscDimension || 'customer',
              kmsUrl: at.kmsUrl || '#',
              owner: at.owner || '',
              members: Array.isArray(at.members) ? [...at.members] : [],
              status: 'planning',
              description: at.description || '',
              type: at.type || 'strategic',
              priority: at.priority || 'P0',
              progress: 0,
              dept: at.dept || '',
              startDate: at.startDate || `${defaultYear}-01-01`,
              endDate: at.endDate || `${defaultYear}-12-31`,
              relatedKpiIds: Array.isArray(at.relatedKpiIds) ? at.relatedKpiIds : [],
              budget: typeof at.budget === 'number' ? at.budget : 0,
              actualCost: 0,
            });
            changed = true;
          }
        });

        if (changed) {
          omp_save('tasks', tasks);
        }
        return changed;
      }

       */
      function omp_deriveKpiIdFromAnnualPlan(annualPlanKpiId) {
        if (!annualPlanKpiId) return null;
        if (String(annualPlanKpiId).startsWith('omp_')) return annualPlanKpiId;
        return 'omp_' + annualPlanKpiId;

       * 将当前周期的年度计划 KPI 同步为 OMP 执行 KPI（幂等）。
       * 只处理 source !== 'omp' 且没有 annualPlanKpiId 的源头 KPI。
       */
      function omp_syncAnnualPlanKpisToExecution(cycleId) {
        const kpis = omp_load('kpiInstances');
        const annualKpis = kpis.filter(k => k.cycleId === cycleId && k.source !== 'omp' && !k.annualPlanKpiId);
        let changed = false;

        annualKpis.forEach(ak => {
          if (ak.status === 'closed') return;
          // 标记年度计划源头 KPI，避免在 OMP KPI 列表中显示重复行
          if (ak.source !== 'annual_plan') { ak.source = 'annual_plan'; changed = true; }
          const ompId = omp_deriveKpiIdFromAnnualPlan(ak.id);
          const existing = kpis.find(k => k.id === ompId || k.annualPlanKpiId === ak.id);
          if (!existing) {
            kpis.push({
              ...ak,
              id: ompId,
              source: 'omp',
              annualPlanKpiId: ak.id,
              parentId: ak.parentId ? omp_deriveKpiIdFromAnnualPlan(ak.parentId) : null,
              actualValue: 0,
              achievementRate: 0,
              status: 'planning',
              history: [],
              x: null,

            changed = true;

      /**
       * 一次性迁移：将里程碑/进度记录从年度计划任务 ID 关联到 OMP 执行任务 ID。
       * 背景：OMP 工作台只展示 source='omp' 的任务，若 milestone/progressRecord.taskId
       *       仍指向 source='annual_plan' 的源头任务，详情页就看不到里程碑与进度记录。
       * 幂等：已指向 OMP 任务 ID 的记录不会被重复修改。
       */
      function omp_syncMilestonesAndRecordsToOmpTasks() {
        const tasksForMigration = omp_load('tasks');
        const annualPlanTaskIdToOmpId = new Map();
        tasksForMigration.forEach(t => {
          if (t.annualPlanTaskId) {
            annualPlanTaskIdToOmpId.set(t.annualPlanTaskId, t.id);
          }
        });
        function migrateTaskId(records) {
          let changed = false;
          const migrated = records.map(r => {
            const ompId = annualPlanTaskIdToOmpId.get(r.taskId);
            if (ompId && ompId !== r.taskId) {
              changed = true;
              return { ...r, taskId: ompId };
            }
            return r;
          });
          return { changed, migrated };
        }
        const existingMilestones = omp_load('milestones');
        const msMigration = migrateTaskId(existingMilestones);
        if (msMigration.changed) omp_save('milestones', msMigration.migrated);
        const existingRecords = omp_load('progressRecords');
        const recMigration = migrateTaskId(existingRecords);
        if (recMigration.changed) omp_save('progressRecords', recMigration.migrated);
        return msMigration.changed || recMigration.changed;
      }

        // 一次性迁移：为没有 assessmentLevel 的旧 KPI 补全考核层级
        const existingKpis = omp_load('kpiInstances');
        let migratedAny = false;
        const migratedKpis = existingKpis.map(k => {
          if (k.assessmentLevel) return k;
          migratedAny = true;
          if (k.level === 0) return { ...k, assessmentLevel: 'marketing-line' };
          if (k.level === 1) return { ...k, assessmentLevel: 'department' };
          return { ...k, assessmentLevel: 'team' };
        });
        if (migratedAny) omp_save('kpiInstances', migratedKpis);

        // 一次性迁移：为没有 source 的旧 KPI 补全来源标记（年度经营计划侧为源头）
        const existingKpisForSource = omp_load('kpiInstances');
        let sourceMigratedAny = false;

          if (k.source) return k;

        // 一次性迁移：将里程碑/进度记录关联到 OMP 执行任务
        omp_syncMilestonesAndRecordsToOmpTasks();

            return;

          const result = restoreFromBackup('omp');
          if (!result.success) {

            return;

            DSTE.showToast('备份格式异常', 'error');
            return;

            DSTE.Storage.set(key, value);

      // ===== OMP 数据层：本地存储 + 后端 API 双写（per-record）=====

        // 避免页面加载/切回时继续弹出「已达最大重试次数」红条
        const queue = ompSyncQueue.loadQueue();
        const cleanupRegex = /^\/api\/omp\/tasks\//;
        const hasStaleFailed = queue.some(op => op.status === 'failed' && cleanupRegex.test(op.endpoint));
        if (hasStaleFailed) {
          const cleaned = queue.filter(op => !(op.status === 'failed' && cleanupRegex.test(op.endpoint)));
          ompSyncQueue.saveQueue(cleaned);
          console.log('[OMP] Cleaned up stale failed per-record task sync items');
        }

      const OMP_API_ENTITY_NAMES = {
        indicators: 'omp/indicators',
        kpiInstances: 'omp/kpiInstances',
        tasks: 'omp/tasks',
        milestones: 'omp/milestones',
        progressRecords: 'omp/progressRecords',
      };

      function omp_getApiEntityName(key) {
        return OMP_API_ENTITY_NAMES[key] || key;
      }

      async function apiLoadOmp(entity) {
        return apiLoadArray('/api/omp/' + entity);
      }

      async function apiSaveOmp(entity, data) {
        // 保留给 cycles 等仍走批量 POST 的实体使用
        const apiBase = (() => {
          const host = window.location.hostname;
          if (host === 'localhost' || host === '127.0.0.1') {
            return DSTE.Storage.getString('dste_api_base') || '';
          }
          return ''; // 生产环境走同域 /api/ 代理
        })();
        if (!apiBase) return false;
        try {
          const token = DSTE.Storage.getString('dste-token');
          const resp = await fetch(apiBase + '/api/omp/' + entity, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              ...(token ? { 'Authorization': 'Bearer ' + token } : {}),
            },
            body: JSON.stringify(data),
          });
          if (!resp.ok) {
            if (resp.status === 401) {
              console.warn('[OMP] Save rejected: token expired or unauthorized');
              showToast('登录已过期，请刷新页面重新登录后再保存', 'error');
            } else {
              console.warn('[OMP] Save failed:', resp.status, await resp.text().catch(() => ''));
              showToast('数据同步到服务端失败，请检查网络后重试', 'warning');
            }
            return false;
          }
          return true;
        } catch (err) { console.warn('[OMP] API save failed:', err); }
        return false;
      }

      async function ompSyncFromApi() {
        console.log('[OMP] Syncing from API...');
        const entities = ['indicators', 'kpiInstances', 'tasks', 'milestones', 'progressRecords'];
        for (const entity of entities) {
          const remote = await apiLoadOmp(entity);
          if (remote !== null) {
            const repo = omp_getRepo(entity);
            const local = repo ? repo.getRaw() : [];
            const merged = local && local.length > 0
              ? mergeEntities(ensureLastModified(local), ensureLastModified(remote))
              : remote;
            if (repo) repo.set(merged);
            window._ompApiCache[entity] = merged;
          }
        }
        const cycles = await apiLoadOmp('cycles');
        if (cycles !== null) {
          try { DSTE.Storage.set('dste_cycles_v1', cycles); } catch(e) {}
        }
        console.log('[OMP] Sync complete');
      }

      function omp_load(key) {
        // 优先从内存缓存读取（API 同步后的最新数据）
        if (window._ompApiCache[key]) return window._ompApiCache[key];
        // Fallback 到 Repository（本地存储）
        const repo = omp_getRepo(key);
        if (repo) return repo.get();
        try { return DSTE.Storage.get(OMP_STORAGE[key], []); } catch(e) { return []; }
      }

      function omp_save(key, data) {
        // 1. 更新内存缓存
        window._ompApiCache[key] = data;
        // 2. 保存到 Repository（本地存储 fallback，保证离线可用）
        const repo = omp_getRepo(key);
        if (repo) {
          const oldData = repo.getRaw();
          ensureLastModified(data);
          const ok = repo.set(data);
          if (!ok) console.warn('[OMP] local save failed');

          // 3. per-record 单条同步（非 cycles、非 tasks）
          // tasks 后端暂无 PUT/DELETE per-record 接口，仍走批量 POST /api/omp/tasks
          const entityName = omp_getApiEntityName(key);
          if (entityName.startsWith('omp/') && key !== 'tasks') {
            const { created, updated, deleted } = computeEntityDiff(oldData, data);
            enqueuePerRecordSync(entityName, { created, updated, deleted }, ompPerItemExecutor, ompSyncQueue);
          } else {
            // cycles / tasks 等仍走批量
            apiSaveOmp(key, data);
          }
        } else {
          try { DSTE.Storage.set(OMP_STORAGE[key], data); } catch(e) { console.warn('[OMP] local save failed:', e); }
          apiSaveOmp(key, data);
        }
      }
      // 暴露给外部模块（如战略指标库）
      window.omp_load = omp_load;
      window.omp_save = omp_save;
      window.omp_initData = omp_initData;

      async function init() {
        // 1. 优先处理 CAS 回调（URL 中有 ticket）
        const casHandled = await handleCasCallback();

        // 2. 检查登录状态（无回调时）
        if (!casHandled) {
          const isLoggedIn = await checkLoginStatus();
          // 本地开发环境可免登录
          const isLocalDev = ['localhost', '127.0.0.1', 'dste.jasonxspace.cc'].includes(window.location.hostname);
          if (!isLoggedIn && !isLocalDev) {
            redirectToCasLogin();
            return;
          }
        }

        renderTopNav(currentPhase, navigate);
        renderCycleSelector();
        // 全局周期切换器事件绑定
        const cycleSelect = document.getElementById('global-cycle-select');
        if (cycleSelect) {
          cycleSelect.addEventListener('change', (e) => {
            window._dsteState.currentCycleId = e.target.value;
            // 刷新当前页面以应用新周期
            const currentHash = window.location.hash.slice(1) || 'dashboard';
            navigate(currentHash);
          });
        }

        // 加载会议数据：优先 API，其次 本地存储（由 apiLoad 处理），最后由 renderMeetings 创建 mock
        const remoteMeetings = await apiLoad('/api/meetings');
        if (remoteMeetings && remoteMeetings.length > 0) {
          window._meetingsData = remoteMeetings;
        }

        // 同步 OMP 数据（指标库 / KPI / 重点工作等）
        await ompSyncFromApi();

        // 预加载路线图数据，避免 renderDevTimeline 使用硬编码旧数据
        try {
          const roadmapRes = await fetch('/roadmap-data.json');
          window._roadmapData = roadmapRes.ok ? await roadmapRes.json() : null;
        } catch (e) {
          console.warn('无法加载 roadmap-data.json:', e);
          window._roadmapData = null;
        }

        const hash = window.location.hash.slice(1) || 'dashboard';
        navigate(hash, false);
        window.addEventListener('hashchange', () => navigate(window.location.hash.slice(1), false));

        // 显示用户名
        updateUserUI();

        // 用户下拉菜单
        const avatar = document.getElementById('user-avatar');
        const dropdown = document.getElementById('user-dropdown');
        const logoutBtn = document.getElementById('user-logout');
        if (avatar && dropdown) {
          avatar.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('open');
          });
          document.addEventListener('click', (e) => {
            if (!avatar.contains(e.target) && !dropdown.contains(e.target)) {
              dropdown.classList.remove('open');
            }
          });
        }
        if (logoutBtn) {
          logoutBtn.addEventListener('click', logout);
        }

        // 移动端汉堡菜单切换
        const menuToggle = document.getElementById('mobile-menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        if (menuToggle && sidebar && overlay) {
          menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('open');
          });
          overlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('open');
          });
          // 点击 sidebar 内的链接后自动关闭
          sidebar.addEventListener('click', (e) => {
            if (e.target.closest('.sidebar-item') || e.target.closest('[data-page]')) {
              sidebar.classList.remove('open');
              overlay.classList.remove('open');
            }
          });
        }
      }

      // ===== 年度经营计划 — 分解视图 Tab =====
      function ap_renderDecompositionTab(kpis, indicators, childKpis, state) {
        const decomposeDim = state.decomposeDimension || 'warzone';
        const dimCfg = DECOMPOSE_DIMENSIONS[decomposeDim];
        const items = dimCfg ? dimCfg.items : [];
        const dimButtons = Object.entries(DECOMPOSE_DIMENSIONS).map(([key, cfg]) =>
          `<button class="btn btn-sm ${decomposeDim === key ? 'btn-primary' : 'btn-secondary'}" data-action="ap-switch-decompose-dim" data-dim="${key}" style="margin-right:6px;font-size:12px;">${cfg.label}</button>`
        ).join('');
        return `
          <div style="margin-bottom:16px;">${dimButtons}</div>
          <div class="ap-card">
            <table class="ap-table" style="font-size:12px;">
              <thead>
                <tr style="background:var(--bg-page);">
                  <th style="padding:10px;border-bottom:2px solid var(--border-color);text-align:center;">考核指标</th>
                  <th style="padding:10px;border-bottom:2px solid var(--border-color);text-align:center;">合计</th>
                  ${items.map(z => `<th style="padding:10px;border-bottom:2px solid var(--border-color);text-align:center;min-width:70px;">${z}</th>`).join('')}
                </tr>
              </thead>
              <tbody>
                ${kpis.map(parentKpi => {
                  // 支持部门级/小组级独立 KPI：只在当前维度与其归属匹配时显示
                  const isVisible = parentKpi.assessmentLevel === 'marketing-line' || items.includes(parentKpi.dept);
                  if (!isVisible) return '';
                  const ind = indicators.find(i => i.id === parentKpi.indicatorId);
                  const name = escapeHtml(ind ? ind.name : parentKpi.indicatorId);
                  const isMarketingLine = parentKpi.assessmentLevel === 'marketing-line';
                  const levelLabel = isMarketingLine ? '' : (ASSESSMENT_LEVELS[parentKpi.assessmentLevel]?.short || '部门');
                  const levelBadge = isMarketingLine ? '' : `<span style="font-size:11px;margin-left:6px;padding:2px 6px;border-radius:4px;background:color-mix(in srgb, var(--info) 12%, transparent);color:var(--info);">${levelLabel}</span>`;
                  const myChildren = isMarketingLine
                    ? childKpis.filter(k => k.parentId === parentKpi.id && items.includes(k.dept))
                    : [];
                  const actualTotal = isMarketingLine
                    ? myChildren.reduce((sum, k) => sum + (k.targetValue || 0), 0)
                    : (parentKpi.targetValue || 0);
                  const match = isMarketingLine ? Math.abs(actualTotal - parentKpi.targetValue) < 0.01 : true;
                  const totalColor = match ? 'var(--success)' : 'var(--danger)';
                  const totalTitle = isMarketingLine
                    ? `父级目标: ${parentKpi.targetValue.toLocaleString()} | 实际合计: ${actualTotal.toLocaleString()}`
                    : `本级目标: ${parentKpi.targetValue.toLocaleString()}`;
                  return `
                    <tr style="border-bottom:1px solid var(--border-light);">
                      <td style="padding:8px;text-align:center;font-weight:600;">${name}${levelBadge}</td>
                      <td style="padding:8px;text-align:center;color:${totalColor};font-weight:600;" title="${totalTitle}">
                        ${actualTotal.toLocaleString()}
                        ${isMarketingLine && !match ? '<span style="font-size:11px;margin-left:4px;">≠</span>' : ''}
                      </td>
                      ${items.map(z => {
                        if (isMarketingLine) {
                          const child = childKpis.find(k => k.parentId === parentKpi.id && k.dept === z);
                          return `<td style="padding:8px;text-align:center;">${child ? child.targetValue.toLocaleString() : '-'}</td>`;
                        }
                        const ownValue = parentKpi.dept === z ? (parentKpi.targetValue || 0).toLocaleString() : '-';
                        return `<td style="padding:8px;text-align:center;">${ownValue}</td>`;
                      }).join('')}
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        `;
      }

      // ===== 年度经营计划页面 =====
      function renderAnnualPlan() {
        omp_initData();
        const state = window._annualPlanState;
        const cycleId = window._dsteState.currentCycleId;
        let kpis = omp_load('kpiInstances').filter(k => k.cycleId === cycleId && k.parentId === null && k.source !== 'omp');
        if (state.assessmentLevelFilter !== 'all') {
          kpis = kpis.filter(k => k.assessmentLevel === state.assessmentLevelFilter);
        }
        const indicators = omp_load('indicators');
        const allTasks = omp_load('tasks').filter(t => t.cycleId === cycleId);
        const tasks = allTasks.filter(t => t.source !== 'omp');
        const tabs = [
          { id: 'overview', label: '📊 总览' },
          { id: 'decomposition', label: '🔀 分解视图' },
        ];
        const activeTab = state.activeTab;
        const cycle = getCurrentCycle();
        const phaseLabels = { planning: '规划中', execution: '执行中', review: '复盘', archived: '已归档' };

        let tabContent = '';
        if (activeTab === 'overview') {
          tabContent = ap_renderOverviewTab(kpis, indicators, allTasks, state);
        } else if (activeTab === 'decomposition') {
          const childKpis = omp_load('kpiInstances').filter(k => k.cycleId === cycleId && k.parentId !== null && k.source !== 'omp');

        return `

              <button class="btn btn-secondary" data-action="ap-add-keytask" style="margin-right:8px;">+ 添加重点工作</button>
              <button class="btn btn-primary" data-action="ap-publish">发布到执行</button>
            </div>
          </div>
          <div style="display:flex;gap:0;border-bottom:1px solid var(--border-color);margin-bottom:20px;">
            ${tabs.map(t => `
              <button class="ap-tab-btn ${activeTab === t.id ? 'active' : ''}"
                      data-action="ap-switch-tab" data-tab="${t.id}"
                      style="padding:12px 24px;background:none;border:none;border-bottom:2px solid ${activeTab === t.id ? 'var(--primary)' : 'transparent'};color:${activeTab === t.id ? 'var(--primary)' : 'var(--text-secondary)'};font-weight:${activeTab === t.id ? '600' : '500'};cursor:pointer;font-size:14px;transition:all 0.2s;">
                ${t.label}

            `).join('')}
          </div>
          <div id="ap-tab-content">${tabContent}</div>
          ${state.selectedKpiId ? ap_renderEditPanel(state.selectedKpiId) : ''}

      // ===== 年度经营计划 — 保存 KPI 编辑 =====
      window.ap_saveKpi = function(kpiId) {
        const kpis = omp_load('kpiInstances');
        const idx = kpis.findIndex(k => k.id === kpiId);
        if (idx === -1) return;
        const targetValue = parseFloat(document.getElementById('ap-edit-target')?.value);
        const weight = parseFloat(document.getElementById('ap-edit-weight')?.value);
        const h1Ratio = parseFloat(document.getElementById('ap-edit-h1')?.value) / 100;
        const baselinePct = parseFloat(document.getElementById('ap-edit-baseline-pct')?.value) / 100;
        const challengePct = parseFloat(document.getElementById('ap-edit-challenge-pct')?.value) / 100;
        const scoringRule = document.getElementById('ap-edit-scoring')?.value?.trim();
        const assessmentLevel = document.getElementById('ap-edit-assessment-level')?.value || 'marketing-line';
        let dept = document.getElementById('ap-edit-dept-hidden')?.value?.trim() || kpis[idx].dept || '营销线';
        if (assessmentLevel === 'marketing-line' && !dept) dept = '营销线';
        if (!targetValue || isNaN(targetValue)) {
          showToast('请输入有效的目标值', 'warning');
          return;
        }
        if (assessmentLevel !== 'marketing-line' && !dept) {
          showToast('请选择部门/战区归属', 'warning');
          return;
        }
        const baselineValue = Math.round(targetValue * baselinePct);
        const challengeValue = Math.round(targetValue * challengePct);
        kpis[idx] = { ...kpis[idx], targetValue, weight, h1Ratio, baselinePct, challengePct, baselineValue, challengeValue, scoringRule, assessmentLevel, dept, source: 'annual_plan', annualPlanKpiId: kpis[idx].annualPlanKpiId || null };
        omp_save('kpiInstances', kpis);
        window._annualPlanState.selectedKpiId = null;
        navigate('bp/annual-plan');
      };

      window.ap_initDeptSelector = function(context, selectedName) {
        const container = document.getElementById(`${context}-dept`);
        const hidden = document.getElementById(`${context}-dept-hidden`);
        if (!container) return;
        container.innerHTML = '';

        const tree = getOrgTree();
        const hasOrgData = tree && tree.roots && tree.roots.length > 0;
        if (!hasOrgData) {
          container.innerHTML = '<div style="padding:8px 0;color:var(--text-muted);font-size:13px;">暂无组织数据，请先导入人员信息表</div>';
          return;
        }

        let selectedOrgId = null;
        if (selectedName && selectedName !== '营销线') {
          const matched = Object.values(tree.orgUnits).find(u => u.name === selectedName);
          if (matched) selectedOrgId = matched.id;
        }

          const cycle = getCurrentCycle();
          const defaultYear = cycle ? cycle.year : new Date().getFullYear();
          kts.push({
            id: 'kt_' + Date.now(),
            cycleId: window._dsteState.currentCycleId,

            relatedKpiIds: [],

            actualCost: 0,
          });

          const indicators = omp_load('indicators');

          const defaultDim = 'warzone';

      window.ap_getDecomposeChildren = function(parentId, dimKey) {
        const kpis = omp_load('kpiInstances');
        return kpis.filter(k => k.parentId === parentId && (k.decomposeBy || 'warzone') === dimKey);

        const parentId = window._apDecomposeParentId;
        if (!parentId) return;
        const kpis = omp_load('kpiInstances');
        const parent = kpis.find(k => k.id === parentId);
        if (!parent) return;
        const cfg = DECOMPOSE_DIMENSIONS[dimKey];
        const items = cfg.items;
        const existing = window.ap_getDecomposeChildren(parentId, dimKey);
        const defaultTarget = Math.round(parent.targetValue / items.length);
        const defaultWeight = Math.round(100 / items.length);
        window._apDecomposeDim = dimKey;
        const tableWrap = document.getElementById('ap-decomp-table-wrap');

                  const child = existing.find(k => k.dept === z);
                  const target = child ? child.targetValue : defaultTarget;

                  return `
                    <tr>
                      <td style="padding:8px;border-bottom:1px solid var(--border-light);">${z}</td>
                      <td style="padding:8px;border-bottom:1px solid var(--border-light);">

                      </td>
                      <td style="padding:8px;border-bottom:1px solid var(--border-light);">
                        <input type="number" id="ap-decomp-weight-${i}" value="${weight}" style="width:100%;padding:4px 8px;border:1px solid var(--border-color);border-radius:4px;background:var(--bg-card);color:var(--text-primary);font-size:12px;" oninput="window.ap_updateDecomposeSummary()">
                      </td>

                  `;
                }).join('')}
              </tbody>
            </table>
          `;

      window.ap_updateDecomposeSummary = function() {
        const parentId = window._apDecomposeParentId;
        if (!parentId) return;
        const kpis = omp_load('kpiInstances');
        const parent = kpis.find(k => k.id === parentId);
        if (!parent) return;
        const dimKey = window._apDecomposeDim || 'warzone';
        const cfg = DECOMPOSE_DIMENSIONS[dimKey];
        if (!cfg) return;
        const items = cfg.items;
        let totalTarget = 0;
        let totalWeight = 0;
        for (let i = 0; i < items.length; i++) {
          totalTarget += parseFloat(document.getElementById(`ap-decomp-target-${i}`)?.value) || 0;
          totalWeight += parseFloat(document.getElementById(`ap-decomp-weight-${i}`)?.value) || 0;
        }
        const targetOk = Math.abs(totalTarget - parent.targetValue) < 0.01;
        // 战区维度：权重指各战区组织绩效中该 KPI 的占比，不做求和校验
        const isWarzone = dimKey === 'warzone';
        const targetColor = targetOk ? 'var(--success)' : 'var(--warning)';
        const targetIcon = targetOk ? '✅' : '⚠️';
        const targetTip = targetOk ? '(等于父级)' : '(与父级不一致，允许保存)';
        const el = document.getElementById('ap-decomp-summary');
        if (el) {
          let html = '<div style="display:flex;gap:16px;">' +
            '<span style="color:' + targetColor + '">' + targetIcon + ' 目标合计: ' + totalTarget.toLocaleString() + ' / ' + parent.targetValue.toLocaleString() + ' ' + targetTip + '</span>';
          if (!isWarzone) {
            const weightOk = Math.abs(totalWeight - 100) < 0.01;
            const weightColor = weightOk ? 'var(--success)' : 'var(--danger)';
            const weightIcon = weightOk ? '✅' : '❌';
            const weightTip = weightOk ? '(= 100%)' : '(需 = 100%)';
            html += '<span style="color:' + weightColor + '">' + weightIcon + ' 权重合计: ' + totalWeight + '% ' + weightTip + '</span>';
          }
          html += '</div>';
          el.innerHTML = html;
        }
      };

      window.ap_confirmDecompose = function(parentId) {
        const kpis = omp_load('kpiInstances');
        const parent = kpis.find(k => k.id === parentId);
        if (!parent) return;
        const dimKey = window._apDecomposeDim || 'warzone';
        const isWarzone = dimKey === 'warzone';
        const dimCfg = DECOMPOSE_DIMENSIONS[dimKey];
        if (!dimCfg) { showToast('分解维度配置错误', 'error'); return; }
        const items = dimCfg.items;
        let totalTarget = 0;
        let totalWeight = 0;
        const children = [];
        const now = Date.now();
        items.forEach((item, i) => {
          const target = parseFloat(document.getElementById(`ap-decomp-target-${i}`)?.value) || 0;
          const weight = parseFloat(document.getElementById(`ap-decomp-weight-${i}`)?.value) || 0;
          totalTarget += target;
          totalWeight += weight;
          if (target > 0) {
            children.push({
              id: 'kpi_' + now + '_' + Math.random().toString(36).slice(2, 6) + '_' + i,
              cycleId: window._dsteState.currentCycleId,
              indicatorId: parent.indicatorId,
              period: parent.period,
              targetValue: target,
              challengeValue: Math.round(target * 1.2),
              actualValue: 0,
              achievementRate: 0,
              weight: weight,
              owner: '',
              dept: item,
              status: 'active',
              parentId: parentId,
              level: parent.level + 1,
              assessmentLevel: dimKey === 'team' ? 'team' : 'department',
              bscDimension: parent.bscDimension,
              decomposeBy: dimKey,
              source: 'annual_plan',
              annualPlanKpiId: null,
              history: [],
              x: null, y: null, width: 170, height: 100
            });
          }
        });
        if (Math.abs(totalTarget - parent.targetValue) > 0.01) {
          showToast(`子目标合计 (${totalTarget}) 与父目标 (${parent.targetValue}) 不一致，已保存但建议检查`, 'warning');
        }
        // 自动归一化权重：允许用户只改一个值，保存时按比例调整为合计 100%
        // 战区维度除外：权重为各战区组织绩效中该 KPI 的占比，不做求和校验与归一化
        if (!isWarzone && children.length > 0) {
          if (totalWeight === 0) {
            const equal = Math.floor(100 / children.length);
            let remainder = 100 - equal * children.length;
            children.forEach(child => {
              child.weight = equal + (remainder > 0 ? 1 : 0);
              if (remainder > 0) remainder--;
            });
          } else if (Math.abs(totalWeight - 100) > 0.01) {
            const scale = 100 / totalWeight;
            let newTotal = 0;
            children.forEach((child, idx) => {
              const isLast = idx === children.length - 1;
              child.weight = isLast ? 100 - newTotal : Math.round(child.weight * scale);
              newTotal += child.weight;
            });
          }
          const normalizedTotal = children.reduce((sum, c) => sum + c.weight, 0);
          if (Math.abs(normalizedTotal - 100) > 1) {
            showToast(`权重合计为 ${normalizedTotal}%，必须等于 100%`, 'warning');
            return;
          }
        }
        // 移除同一父级、同一维度下的旧分解子节点，避免重复
        const filteredKpis = kpis.filter(k => !(k.parentId === parentId && (k.decomposeBy || 'warzone') === dimKey));
        filteredKpis.push(...children);
        omp_save('kpiInstances', filteredKpis);
        window._apDecomposeDim = null;
        window._apDecomposeParentId = null;
        document.getElementById('omp-active-modal')?.remove();
        showToast(`已保存 ${children.length} 条分解目标`, 'success');
        navigate('bp/annual-plan');
      };

      // ===== 全局周期选择器渲染 =====
      function renderCycleSelector() {
        const select = document.getElementById('global-cycle-select');
        if (!select) return;
        try {
          let cycles = JSON.parse(DSTE.Storage.getString('dste_cycles_v1') || '[]');
          // fallback: 如果周期数据不存在，自动创建默认值
          if (!cycles || cycles.length === 0) {
            cycles = [2025, 2026, 2027].map(year => ({
              id: `cycle_${year}_marketing`,
              year,
              name: `${year}年度 — 营销线`,
              phase: year < 2026 ? 'archived' : 'planning',
              organization: '营销线',
              parentCycleId: null
            }));
            DSTE.Storage.set('dste_cycles_v1', cycles);
          }
          const currentId = window._dsteState.currentCycleId;
          select.replaceChildren();
          cycles.forEach(c => {
            const option = document.createElement('option');
            option.value = c.id;
            option.textContent = c.name;
            if (c.id === currentId) option.selected = true;
            select.appendChild(option);
          });
        } catch(e) {}
      }

      function getCurrentCycle() {
        try {
          const cycles = JSON.parse(DSTE.Storage.getString('dste_cycles_v1') || '[]');
          const found = cycles.find(c => c.id === window._dsteState.currentCycleId);
          if (found) return found;
          // Safe fallback: derive year from currentCycleId or use current calendar year
          const match = String(window._dsteState.currentCycleId || '').match(/cycle_(\d{4})_/);
          const year = match ? parseInt(match[1], 10) : new Date().getFullYear();
          return { id: window._dsteState.currentCycleId, year, name: `${year}年度 — 营销线`, phase: 'planning', organization: '营销线', parentCycleId: null };
        } catch(e) {
          const year = new Date().getFullYear();
          return { id: window._dsteState.currentCycleId, year, name: `${year}年度 — 营销线`, phase: 'planning', organization: '营销线', parentCycleId: null };
        }
      }

      // 外部页面映射
      function navigate(pageId, pushState = true) {
        if (!pageId) pageId = 'dashboard';
        
        // 外部链接直接跳转
        if (EXTERNAL_PAGES[pageId]) {
          window.location.href = EXTERNAL_PAGES[pageId];
          return;
        }
        
        if (!PAGES[pageId]) pageId = 'dashboard';

        // 同步 URL hash（避免和 hashchange 循环触发）
        if (pushState && window.location.hash.slice(1) !== pageId) {
          window.location.hash = pageId;
        }

        currentPage = pageId;

        // 确定当前 phase
        const phase = getPhaseFromPage(pageId);
        currentPhase = phase;

        // 更新顶部 active
        document.querySelectorAll('.top-nav-item').forEach(link => {
          link.classList.toggle('active', link.dataset.phase === phase);
        });

        // 更新左侧栏
        renderSidebar(phase);

        // 更新内容
        const contentEl = document.getElementById('page-content');

        // 保存当前焦点，避免 innerHTML 重建 DOM 后输入框失焦
        const activeEl = document.activeElement;
        const focusRestore = (activeEl && activeEl.id && contentEl.contains(activeEl) &&
          (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA' || activeEl.tagName === 'SELECT'))
          ? { id: activeEl.id, start: activeEl.selectionStart, end: activeEl.selectionEnd, dir: activeEl.selectionDirection }
          : null;

        contentEl.style.animation = 'none';
        contentEl.offsetHeight; // trigger reflow
        contentEl.innerHTML = PAGES[pageId]();
        contentEl.style.animation = '';

        // 若从侧边栏子目录携带了待打开的报表，进入报表中心后自动打开
        if (pageId === 'exe/report-center' && window._pendingReportId) {
          const pendingId = window._pendingReportId;
          window._pendingReportId = null;
          // 延迟到 DOM 渲染完成后打开
          requestAnimationFrame(() => openReport(pendingId));
        }

        // Roadmap 时间线默认滚动到最左侧（显示最新版本）
        if (pageId === 'dashboard/roadmap') {
          requestAnimationFrame(() => {
            const tl = document.getElementById('dev-timeline');
            if (tl) tl.scrollLeft = 0;
          });
        }

        // 绑定事件委托（替代内联 onclick）
        bindPageEvents(contentEl);

        // 恢复焦点与光标位置
        if (focusRestore) {
          const el = document.getElementById(focusRestore.id);
          if (el) {
            el.focus();
            if (typeof el.setSelectionRange === 'function' && focusRestore.start !== null) {
              const len = (el.value || '').length;
              const start = Math.min(focusRestore.start, len);
              const end = Math.min(focusRestore.end, len);
              el.setSelectionRange(start, end, focusRestore.dir || 'forward');
            }
          }
        }

        // AI 页面初始化
        if (pageId === 'ai') {
          initAIClient();
        }

        // 外部模块挂载钩子（如战略指标库）
        if (typeof window.__afterNavigate === 'function') {
          window.__afterNavigate(pageId, contentEl);
        }

        // 更新左侧 active
        document.querySelectorAll('.sidebar-item').forEach(item => {
          item.classList.toggle('active', item.dataset.page === pageId);
        });

        // 更新标题
        const pageNames = {
          'dashboard': '驾驶舱',
          'sp/strategy-map': '战略地图', 'sp/strategy-map-detail': '战略地图详情', 'sp/insights-topics': '战略洞察与专题',

          'rev/performance': '绩效与激励', 'rev/cadre': '干部管理', 'rev/review': '战略复盘', 'rev/gap-analysis': '差距分析',
          'ai': 'AI 战略助手',
          'dashboard/roadmap': '开发路线图 Road Map',
          'dashboard/version-audit': '版本审计'
        };
        document.title = (pageNames[pageId] || 'DSTE') + ' - DSTE 战略管理平台';

      // ===== 事件委托（替代内联 onclick）=====
      function bindPageEvents(container) {
        if (container._dsteEventsBound) return;
        container._dsteEventsBound = true;
        container.addEventListener('click', (e) => {
          // data-navigate: 面包屑/相关链接导航
          const navLink = e.target.closest('[data-navigate]');
          if (navLink) {
            e.preventDefault();
            navigate(navLink.dataset.navigate);
            return;
          }
          // data-filter-roadmap: 路线图筛选
          const filterBtn = e.target.closest('[data-filter-roadmap]');
          if (filterBtn) {
            filterRoadmap(filterBtn.dataset.filterRoadmap);
            return;
          }
          // data-scroll-to: 平滑滚动到元素
          const scrollTrigger = e.target.closest('[data-scroll-to]');

            const target = document.getElementById(scrollTrigger.dataset.scrollTo);
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });

                case 'omp-new-kpi': window.omp_newKpi(); break;
                case 'omp-view-task': window.omp_viewTask(id); break;
                case 'omp-edit-task': window.omp_editTask(id); break;
                case 'omp-new-task': window.omp_newTask(); break;

                case 'omp-delete-task': window.omp_deleteTask(id); break;
                case 'omp-task-edit-tab': window.omp_switchTaskEditTab(actionBtn.dataset.tab); break;

                  break;

                case 'omp-filter-kpi':

                  break;
                case 'omp-filter-task':
                  if (filter) { window._ompState.taskFilter[filter] = actionBtn.value; navigate('exe/tasks'); }

                navigate('bp/kpi');

                navigate('bp/kpi');

                const allKpis = omp_load('kpiInstances');

                if (!rootKpi || rootKpi.source === 'omp') {
                  showToast('年度计划侧只能删除源头 KPI', 'warning');
                  break;
                }
                const toDelete = new Set([id]);
                // 递归收集子节点（仅年度计划源头）
                let changed = true;
                while (changed) {
                  changed = false;
                  allKpis.forEach(k => {
                    if (!toDelete.has(k.id) && toDelete.has(k.parentId) && k.source !== 'omp') {
                      toDelete.add(k.id);

              personRef: memberChip.dataset.personRef,

          }
          const personCard = e.target.closest('[data-drag="person"]');
          if (!personCard) return;
          const personRef = personCard.dataset.personRef;
          e.dataTransfer.setData('text/plain', JSON.stringify({ personRef }));
          e.dataTransfer.effectAllowed = 'copy';
          personCard.classList.add('dragging');
          document.querySelectorAll('[data-drop="task"], [data-drop="matrix-member"]').forEach(el => el.classList.add('drop-ready'));
        });
        container.addEventListener('dragend', (e) => {
          const memberChip = e.target.closest('[data-drag="member-chip"]');
          if (memberChip) memberChip.classList.remove('dragging');
          const personCard = e.target.closest('[data-drag="person"]');
          if (personCard) personCard.classList.remove('dragging');
          document.querySelectorAll('[data-drop="task"], [data-drop="matrix-member"]').forEach(el => el.classList.remove('drop-active', 'drop-ready'));
          document.querySelectorAll('.omp-matrix-member-chip').forEach(el => el.classList.remove('drop-before', 'drop-after'));
        });
        container.addEventListener('dragover', (e) => {
          const dropTarget = e.target.closest('[data-drop="task"], [data-drop="matrix-member"]');
          if (!dropTarget) return;
          e.preventDefault();

          const memberChip = e.target.closest('[data-drag="member-chip"]');
          // 重排时 effectAllowed 为 move；外部人员拖入为 copy
          const isReorder = e.dataTransfer.effectAllowed === 'move' || e.dataTransfer.effectAllowed === 'copyMove' || e.dataTransfer.effectAllowed === 'all';

          if (isReorder && memberChip) {
            e.dataTransfer.dropEffect = 'move';
            document.querySelectorAll('.omp-matrix-member-chip').forEach(el => el.classList.remove('drop-before', 'drop-after'));
            const rect = memberChip.getBoundingClientRect();
            const before = e.clientX < rect.left + rect.width / 2;
            memberChip.classList.add(before ? 'drop-before' : 'drop-after');
          } else {
            e.dataTransfer.dropEffect = 'copy';
          }
        });
        container.addEventListener('dragenter', (e) => {
          const dropTarget = e.target.closest('[data-drop="task"], [data-drop="matrix-member"]');
          if (!dropTarget) return;
          e.preventDefault();
          dropTarget.classList.add('drop-active');
        });
        container.addEventListener('dragleave', (e) => {
          const dropTarget = e.target.closest('[data-drop="task"], [data-drop="matrix-member"]');
          if (!dropTarget) return;
          const related = e.relatedTarget;
          if (dropTarget.contains(related)) return;
          dropTarget.classList.remove('drop-active');
        });
        container.addEventListener('drop', (e) => {
          const dropTarget = e.target.closest('[data-drop="task"], [data-drop="matrix-member"]');
          if (!dropTarget) return;
          e.preventDefault();
          dropTarget.classList.remove('drop-active');
          document.querySelectorAll('[data-drop="task"], [data-drop="matrix-member"]').forEach(el => el.classList.remove('drop-ready'));
          document.querySelectorAll('.omp-matrix-member-chip').forEach(el => el.classList.remove('drop-before', 'drop-after'));
          const raw = e.dataTransfer.getData('text/plain');
          if (!raw) return;
          try {
            const payload = JSON.parse(raw);
            if (payload.action === 'reorder' && payload.personRef && payload.sourceTaskId) {
              const memberChip = e.target.closest('[data-drag="member-chip"]');
              if (memberChip && memberChip.dataset.taskId === payload.sourceTaskId) {
                const rect = memberChip.getBoundingClientRect();
                const before = e.clientX < rect.left + rect.width / 2;
                window.omp_staffingReorderMember(payload.sourceTaskId, payload.personRef, memberChip.dataset.personRef, before);
              }
              return;

            if (payload.personRef) {

      // ===== Tab 1: 总览看板 =====
      function omp_renderDashboard() {
        const cycleId = window._dsteState.currentCycleId;
        const kpis = omp_load('kpiInstances').filter(k => k.cycleId === cycleId && k.source === 'omp');
        const tasks = omp_load('tasks').filter(t => t.cycleId === cycleId && t.source === 'omp');
        const indicators = omp_load('indicators');
        const milestones = omp_load('milestones');

        // 统计数据
        const avgAchievement = kpis.length > 0 ? Math.round(kpis.reduce((s, k) => s + k.achievementRate, 0) / kpis.length * 10) / 10 : 0;
        const warningKpis = kpis.filter(k => k.status === 'warning').length;
        const laggingKpis = kpis.filter(k => k.status === 'lagging').length;
        const totalTasks = tasks.length;
        const doneTasks = tasks.filter(t => t.status === 'done' || t.status === 'closed').length;
        const delayedTasks = tasks.filter(t => t.status === 'delayed').length;
        const activeTasks = tasks.filter(t => t.status === 'active' || t.status === 'at_risk').length;
        const taskCompletionRate = totalTasks > 0 ? Math.round(doneTasks / totalTasks * 100) : 0;

        const statCards = [
          { label: 'KPI 平均达成率', value: avgAchievement + '%', color: 'var(--primary)', icon: '📊' },
          { label: '预警/落后 KPI', value: (warningKpis + laggingKpis) + ' 个', color: 'var(--warning)', icon: '⚠️' },
          { label: '工作总数', value: totalTasks + ' 项', color: 'var(--primary)', icon: '📋' },
          { label: '工作完成率', value: taskCompletionRate + '%', color: 'var(--success)', icon: '✅' },
          { label: '延期工作', value: delayedTasks + ' 项', color: 'var(--danger)', icon: '🔴' },
          { label: '进行中', value: activeTasks + ' 项', color: 'var(--primary)', icon: '🚀' },
        ];

        // 热力图: 部门 × BSC维度
        const depts = [...new Set(kpis.map(k => k.dept))];
        const categories = ['财务', '客户', '流程', '学习成长'];
        const heatmapRows = depts.map(dept => {
          return `<div style="display:grid;grid-template-columns:100px repeat(4,1fr);gap:8px;align-items:center;margin-bottom:8px;">
            <div style="font-size:13px;font-weight:600;color:var(--text-primary);">${dept}</div>
            ${categories.map(cat => {
              const kpi = kpis.find(k => k.dept === dept && indicators.find(i => i.id === k.indicatorId)?.category === cat);
              if (!kpi) return `<div class="omp-heatmap-cell" style="background:var(--bg-page);color:var(--text-tertiary);">-</div>`;
              const rate = kpi.achievementRate;
              const bg = rate >= 95 ? 'var(--success)' : rate >= 80 ? 'var(--warning)' : 'var(--danger)';
              return `<div class="omp-heatmap-cell" style="background:${bg};color:var(--text-inverse);" data-action="omp-view-kpi" data-id="${kpi.id}">${rate}%</div>`;
            }).join('')}
          </div>`;
        }).join('');

        // 工作状态分布
        const statusDist = {};
        tasks.forEach(t => { statusDist[t.status] = (statusDist[t.status] || 0) + 1; });
        const statusLabels = { planning: '规划中', active: '进行中', at_risk: '有风险', delayed: '已延期', done: '已完成', closed: '已关闭' };
        const statusColors = { planning: 'var(--text-tertiary)', active: 'var(--success)', at_risk: 'var(--warning)', delayed: 'var(--danger)', done: 'var(--primary)', closed: 'var(--text-tertiary)' };
        const distHtml = Object.entries(statusDist).map(([status, count]) => {
          const pct = Math.round(count / totalTasks * 100);
          return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <span style="font-size:12px;color:var(--text-secondary);width:60px;">${statusLabels[status]}</span>
            <div style="flex:1;height:8px;background:var(--bg-page);border-radius:4px;overflow:hidden;">
              <div style="width:${pct}%;height:100%;background:${statusColors[status]};border-radius:4px;"></div>
            </div>
            <span style="font-size:12px;font-weight:600;color:var(--text-primary);width:40px;text-align:right;">${count}</span>
          </div>`;
        }).join('');

        // 预警清单
        const alerts = [];
        kpis.filter(k => k.status === 'lagging').forEach(k => {
          const ind = indicators.find(i => i.id === k.indicatorId);
          alerts.push({ type: 'kpi', text: `${ind ? ind.name : '未知指标'} (${k.dept}) 达成率 ${k.achievementRate}%`, id: k.id, action: 'omp-view-kpi' });
        });
        tasks.filter(t => t.status === 'delayed').forEach(t => {
          alerts.push({ type: 'task', text: `${t.name} (${t.dept}) 已延期`, id: t.id, action: 'omp-view-task' });
        });
        const alertHtml = alerts.length > 0 ? alerts.map(a =>
          `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-page);border-radius:6px;margin-bottom:6px;cursor:pointer;" data-action="${a.action}" data-id="${a.id}">
            <span style="font-size:16px;">${a.type === 'kpi' ? '🔴' : '🔴'}</span>
            <span style="font-size:13px;color:var(--text-primary);flex:1;">${a.text}</span>
            <span style="font-size:12px;color:var(--primary);font-weight:500;">查看 →</span>
          </div>`
        ).join('') : '<div style="padding:20px;text-align:center;color:var(--text-tertiary);font-size:13px;">🎉 当前无预警项</div>';

        return `
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;">
            ${statCards.map(c => `
              <div class="omp-stat-card" style="text-align:center;">
                <div style="font-size:24px;margin-bottom:4px;">${c.icon}</div>
                <div style="font-size:28px;font-weight:700;color:${c.color};margin-bottom:4px;">${c.value}</div>
                <div style="font-size:12px;color:var(--text-tertiary);">${c.label}</div>
              </div>
            `).join('')}
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">
            <div class="card">
              <div class="card-header"><div class="card-title">🗺️ KPI 达成热力图</div></div>
              <div style="padding:16px;">
                <div style="display:grid;grid-template-columns:100px repeat(4,1fr);gap:8px;margin-bottom:12px;">
                  <div></div>
                  ${categories.map(c => `<div style="font-size:11px;color:var(--text-tertiary);text-align:center;font-weight:600;">${c}</div>`).join('')}
                </div>
                ${heatmapRows}
              </div>
            </div>
            <div class="card">
              <div class="card-header"><div class="card-title">📊 工作状态分布</div></div>
              <div style="padding:16px;">${distHtml}</div>
            </div>
          </div>
          <div class="card">
            <div class="card-header"><div class="card-title">⚠️ 预警清单</div></div>
            <div style="padding:16px;">${alertHtml}</div>
          </div>
        `;
      }

      // ===== Tab 2: KPI 管理 =====
      function omp_renderKPITab() {
        const cycleId = window._dsteState.currentCycleId;
        const kpis = omp_load('kpiInstances').filter(k => k.cycleId === cycleId && k.source === 'omp');
        const indicators = omp_load('indicators');
        const filter = window._ompState.kpiFilter;
        let filtered = kpis;
        if (filter.dept !== 'all') filtered = filtered.filter(k => k.dept === filter.dept);
        if (filter.status !== 'all') filtered = filtered.filter(k => k.status === filter.status);
        if (filter.category !== 'all') {
          filtered = filtered.filter(k => {
            const ind = indicators.find(i => i.id === k.indicatorId);
            return ind && ind.category === filter.category;
          });
        }
        if (filter.assessmentLevel !== 'all') {
          filtered = filtered.filter(k => k.assessmentLevel === filter.assessmentLevel);
        }
        const depts = ['all', ...new Set(kpis.map(k => k.dept))];
        const statuses = [
          { value: 'all', label: '全部状态' },
          { value: 'achieved', label: '✅ 达成' },
          { value: 'warning', label: '🟡 预警' },
          { value: 'lagging', label: '🔴 落后' },
          { value: 'unset', label: '⚪ 未录入' },
        ];
        const categories = [
          { value: 'all', label: '全部维度' },
          { value: '财务', label: '💰 财务' },
          { value: '客户', label: '👤 客户' },
          { value: '流程', label: '⚙️ 流程' },
          { value: '学习成长', label: '📚 学习成长' },
        ];
        const assessmentLevels = [
          { value: 'all', label: '全部层级' },
          { value: 'marketing-line', label: '营销线级' },
          { value: 'department', label: '部门级' },
          { value: 'team', label: '小组级' },
        ];
        const statusBadge = {
          achieved: { cls: 'status-success', text: '达成' },
          warning: { cls: 'status-warning', text: '预警' },
          lagging: { cls: 'status-danger', text: '落后' },
          unset: { cls: 'status-default', text: '未录入' },
        };
        const miniTrend = (kpiId) => {
          const kpi = kpis.find(k => k.id === kpiId);
          if (kpi?.status === 'unset') return '<span style="font-size:12px;color:var(--text-tertiary);">—</span>';
          let data = kpi?.history;
          if (!data || data.length === 0) {
            // Generate a plausible trend based on current achievementRate
            const rate = kpi?.achievementRate || 80;
            data = [
              Math.max(0, Math.round((rate - 8) * 10) / 10),
              Math.max(0, Math.round((rate - 4) * 10) / 10),
              Math.max(0, Math.round((rate - 2) * 10) / 10),
              rate,
            ];
          }
          const max = Math.max(...data);
          const min = Math.min(...data);
          const range = max - min || 1;
          return `<div style="display:flex;align-items:flex-end;gap:2px;height:28px;width:40px;">
            ${data.map(v => {
              const h = ((v - min) / range) * 20 + 4;
              const color = v >= 100 ? 'var(--success)' : v >= 80 ? 'var(--warning)' : 'var(--danger)';
              return `<div style="width:6px;height:${h}px;background:${color};border-radius:1px;" title="${v}%"></div>`;
            }).join('')}
          </div>`;
        };
        return `
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <select data-action="omp-filter-kpi" data-filter="dept" style="padding:6px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;cursor:pointer;">
                ${depts.map(d => `<option value="${d}" ${filter.dept === d ? 'selected' : ''}>${d === 'all' ? '全部部门' : d}</option>`).join('')}
              </select>
              <select data-action="omp-filter-kpi" data-filter="status" style="padding:6px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;cursor:pointer;">
                ${statuses.map(s => `<option value="${s.value}" ${filter.status === s.value ? 'selected' : ''}>${s.label}</option>`).join('')}
              </select>
              <select data-action="omp-filter-kpi" data-filter="category" style="padding:6px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;cursor:pointer;">
                ${categories.map(c => `<option value="${c.value}" ${filter.category === c.value ? 'selected' : ''}>${c.label}</option>`).join('')}
              </select>
              <select data-action="omp-filter-kpi" data-filter="assessmentLevel" style="padding:6px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;cursor:pointer;">
                ${assessmentLevels.map(l => `<option value="${l.value}" ${filter.assessmentLevel === l.value ? 'selected' : ''}>${l.label}</option>`).join('')}
              </select>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
              <div style="display:flex;border:1px solid var(--border-color);border-radius:6px;overflow:hidden;">
                <button class="btn btn-sm ${window._ompState.kpiViewMode === 'list' ? 'btn-primary' : 'btn-secondary'}" data-action="omp-toggle-view" data-view="list" style="border-radius:0;border:none;font-size:12px;">📋 列表</button>
                <button class="btn btn-sm ${window._ompState.kpiViewMode === 'tree' ? 'btn-primary' : 'btn-secondary'}" data-action="omp-toggle-view" data-view="tree" style="border-radius:0;border:none;font-size:12px;">🌲 树形</button>

                    const ind = indicators.find(i => i.id === k.indicatorId);
