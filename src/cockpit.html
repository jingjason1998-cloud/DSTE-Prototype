<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSTE 战略管理平台</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="./styles/shell.css">
</head>
<body>
  <div class="app" id="app">
    <!-- 顶部导航 -->
    <nav class="top-nav">
      <div class="top-nav-brand">
        <div class="top-nav-logo">D</div>
        <span class="top-nav-title">DSTE 战略管理平台</span>
      </div>
      <ul class="top-nav-links" id="top-nav-links"></ul>
      <div class="top-nav-actions">
        <button class="icon-btn" id="theme-toggle" title="切换主题">🌙</button>
        <button class="icon-btn" title="通知">🔔</button>
        <div class="user-avatar" id="user-avatar">张</div>
      </div>
    </nav>

    <div class="app-body">
      <!-- 左侧边栏 -->
      <aside class="sidebar" id="sidebar"></aside>

      <!-- 内容区 -->
      <main class="content-area" id="content-area">
        <div class="page-content" id="page-content"></div>
      </main>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
  <script>
    (function() {
      'use strict';

      // ===== 配置 =====
      const TOP_NAV = [
        { id: 'dashboard', icon: '🎛️', label: '驾驶舱', full: '驾驶舱', defaultPage: 'dashboard' },
        { id: 'sp', icon: '🎯', label: 'SP', full: '战略制定', defaultPage: 'sp/strategy-map' },
        { id: 'bp', icon: '🔧', label: 'BP', full: '战略解码', defaultPage: 'bp/kpi' },
        { id: 'exe', icon: '🚀', label: '执行', full: '战略执行', defaultPage: 'exe/tasks' },
        { id: 'rev', icon: '📊', label: '评估', full: '战略评估', defaultPage: 'rev/performance' },
        { id: 'ai', icon: '🤖', label: 'AI', full: 'AI 助手', defaultPage: 'ai' }
      ];

      const SIDEBAR_CONFIG = {
        dashboard: [
          { type: 'item', id: 'dashboard', icon: '🎛️', label: '驾驶舱概览' },
          { type: 'quick', label: '快捷入口' },
          { type: 'item', id: 'sp/strategy-map', icon: '🗺️', label: '战略地图' },
          { type: 'item', id: 'bp/kpi', icon: '📈', label: 'KPI 看板' },
          { type: 'item', id: 'exe/tasks', icon: '✅', label: '重点工作' },
          { type: 'item', id: 'exe/meetings', icon: '🎯', label: '经营分析会' },
          { type: 'item', id: 'exe/meeting-review', icon: '📋', label: '会议审核' },
          { type: 'group', title: '系统管理', items: [
            { id: 'dashboard/roadmap', icon: '📊', label: '开发路线图 Road Map' }
          ]}
        ],
        sp: [
          { type: 'group', title: '战略制定 (SP)', items: [
            { id: 'sp/strategy-map', icon: '🗺️', label: '战略地图' },
            { id: 'sp/strategy-topics', icon: '📋', label: '战略专题' },
            { id: 'sp/market-insight', icon: '🔭', label: '市场洞察' }
          ]},
          { type: 'quick', label: '快捷工具' },
          { type: 'item', id: 'exe/meeting-review', icon: '📋', label: '会议材料审核' }
        ],
        bp: [
          { type: 'group', title: '战略解码 (BP)', items: [
            { id: 'bp/kpi', icon: '📈', label: 'KPI 指标体系' },
            { id: 'bp/bem', icon: '🔧', label: 'BEM 战略解码' },
            { id: 'bp/annual-plan', icon: '📅', label: '年度经营计划' }
          ]},
          { type: 'quick', label: '快捷工具' },
          { type: 'item', id: 'exe/meeting-review', icon: '📋', label: '会议材料审核' }
        ],
        exe: [
          { type: 'group', title: '战略执行', items: [
            { id: 'exe/tasks', icon: '✅', label: '重点工作管理' },
            { id: 'exe/business-topics', icon: '📂', label: '业务专题管理' },
            { id: 'exe/meetings', icon: '🎯', label: '经营分析会 ⭐' },
            { id: 'exe/finereport', icon: '📊', label: 'FineReport 报表' }
          ]},
          { type: 'quick', label: '快捷工具' },
          { type: 'item', id: 'exe/meeting-review', icon: '📋', label: '会议材料审核' }
        ],
        rev: [
          { type: 'group', title: '战略评估', items: [
            { id: 'rev/performance', icon: '🏆', label: '绩效与激励' },
            { id: 'rev/cadre', icon: '👔', label: '干部管理' },
            { id: 'rev/review', icon: '🔄', label: '战略复盘' },
            { id: 'rev/gap-analysis', icon: '📉', label: '差距分析' }
          ]},
          { type: 'quick', label: '快捷工具' },
          { type: 'item', id: 'exe/meeting-review', icon: '📋', label: '会议材料审核' }
        ],
        ai: []
      };

      // ===== 页面内容 =====
      const PAGES = {
        'dashboard': renderDashboard,
        'dashboard/roadmap': renderDevTimeline,
        'sp/strategy-map': () => renderPlaceholder('🗺️ 战略地图', '可视化展示企业战略地图，基于平衡计分卡四维度构建战略目标体系。'),
        'sp/strategy-topics': renderStrategyTopics,
        'sp/market-insight': () => renderPlaceholder('🔭 市场洞察', '市场趋势分析、竞争情报收集，为战略制定提供数据支撑。'),
        'bp/kpi': () => renderPlaceholder('📈 KPI 指标体系', '企业级指标库管理，支持多层级 KPI 分解、自动计算、预警提醒。'),
        'bp/bem': () => renderPlaceholder('🔧 BEM 战略解码', '基于 BEM 六步解码法，将战略转化为可执行的行动计划。'),
        'bp/annual-plan': () => renderPlaceholder('📅 年度经营计划', '年度经营目标分解、资源配置、预算编制与执行跟踪。'),
        'exe/tasks': renderTasks,
        'exe/business-topics': () => { window.location.href = 'business-topics.html'; return ''; },
        'exe/meetings': renderMeetings,
        'exe/finereport': renderFineReport,
        'rev/performance': () => renderPlaceholder('🏆 绩效与激励', '绩效考核体系管理、激励方案设计与执行效果评估。'),
        'rev/cadre': () => renderPlaceholder('👔 干部管理', '干部梯队建设、能力评估、轮岗培养与继任计划。'),
        'rev/review': () => renderPlaceholder('🔄 战略复盘', '定期战略复盘会议管理，差距分析、经验萃取与改进措施跟踪。'),
        'rev/gap-analysis': () => renderPlaceholder('📉 差距分析', '战略目标与实际执行的差距分析，根因定位与改进建议。'),
        'ai': renderAI
      };

      // ===== 路由状态 =====
      let currentPhase = 'dashboard';
      let currentPage = 'dashboard';

      // ===== 初始化 =====
      function init() {
        renderTopNav();
        const hash = window.location.hash.slice(1) || 'dashboard';
        navigate(hash, false);
        window.addEventListener('hashchange', () => navigate(window.location.hash.slice(1), false));

        // 显示用户名
        const user = sessionStorage.getItem('dste-user') || '张';
        document.getElementById('user-avatar').textContent = user.charAt(0);
      }

      // ===== 渲染顶部导航 =====
      function renderTopNav() {
        const container = document.getElementById('top-nav-links');
        container.innerHTML = TOP_NAV.map(item => `
          <li><a href="#${item.defaultPage}" data-phase="${item.id}" class="top-nav-item">
            <span>${item.icon}</span>
            <span>${item.label}</span>
            <span class="nav-full-label">${item.full}</span>
          </a></li>
        `).join('');

        container.querySelectorAll('a').forEach(link => {
          link.addEventListener('click', (e) => {
            const phase = link.dataset.phase;
            const defaultPage = TOP_NAV.find(n => n.id === phase).defaultPage;
            // 如果已经在该phase，跳转到默认页
            if (currentPhase === phase) {
              navigate(defaultPage);
            }
          });
        });
      }

      // ===== 导航 =====
      // 外部页面映射
      const EXTERNAL_PAGES = {
        'exe/meeting-review': 'reviewer.html',
        'exe/business-topics': 'business-topics.html'
      };

      function navigate(pageId, pushState = true) {
        if (!pageId) pageId = 'dashboard';
        
        // 外部链接直接跳转
        if (EXTERNAL_PAGES[pageId]) {
          window.location.href = EXTERNAL_PAGES[pageId];
          return;
        }
        
        if (!PAGES[pageId]) pageId = 'dashboard';

        currentPage = pageId;

        // 确定当前 phase
        const phase = TOP_NAV.find(n => pageId === n.id || pageId.startsWith(n.id + '/'))?.id || 'dashboard';
        currentPhase = phase;

        // 更新顶部 active
        document.querySelectorAll('.top-nav-item').forEach(link => {
          link.classList.toggle('active', link.dataset.phase === phase);
        });

        // 更新左侧栏
        renderSidebar(phase);

        // 更新内容
        const contentEl = document.getElementById('page-content');
        contentEl.style.animation = 'none';
        contentEl.offsetHeight; // trigger reflow
        contentEl.innerHTML = PAGES[pageId]();
        contentEl.style.animation = '';

        // 更新左侧 active
        document.querySelectorAll('.sidebar-item').forEach(item => {
          item.classList.toggle('active', item.dataset.page === pageId);
        });

        // 更新标题
        const pageNames = {
          'dashboard': '驾驶舱',
          'sp/strategy-map': '战略地图', 'sp/strategy-topics': '战略专题', 'sp/market-insight': '市场洞察',
          'bp/kpi': 'KPI 指标体系', 'bp/bem': 'BEM 战略解码', 'bp/annual-plan': '年度经营计划',
          'exe/tasks': '重点工作管理', 'exe/business-topics': '业务专题管理', 'exe/meetings': '经营分析会', 'exe/meeting-review': '会议材料审核',
          'rev/performance': '绩效与激励', 'rev/cadre': '干部管理', 'rev/review': '战略复盘', 'rev/gap-analysis': '差距分析',
          'ai': 'AI 战略助手',
          'dashboard/roadmap': '开发路线图 Road Map'
        };
        document.title = (pageNames[pageId] || 'DSTE') + ' - DSTE 战略管理平台';
      }

      // ===== 渲染左侧栏 =====
      function renderSidebar(phase) {
        const container = document.getElementById('sidebar');
        const config = SIDEBAR_CONFIG[phase] || [];

        if (phase === 'ai') {
          container.classList.add('collapsed');
          return;
        }
        container.classList.remove('collapsed');

        let html = '';
        config.forEach(item => {
          if (item.type === 'item') {
            html += `<a class="sidebar-item" data-page="${item.id}" href="#${item.id}">
              <span class="icon">${item.icon}</span><span>${item.label}</span>
            </a>`;
          } else if (item.type === 'quick') {
            html += `<div class="sidebar-quick">${item.label}</div>`;
          } else if (item.type === 'group') {
            html += `<div class="sidebar-group">
              <div class="sidebar-group-title">${item.title}</div>
              ${item.items.map(sub => `
                <a class="sidebar-item" data-page="${sub.id}" href="#${sub.id}">
                  <span class="icon">${sub.icon}</span><span>${sub.label}</span>
                </a>
              `).join('')}
            </div>`;
          }
        });
        container.innerHTML = html;

        // 绑定点击
        container.querySelectorAll('.sidebar-item').forEach(item => {
          item.addEventListener('click', (e) => {
            e.preventDefault();
            navigate(item.dataset.page);
          });
        });
      }

      // ===== FineReport 报表嵌入（iframe + 跨域单点登录） =====
      function renderFineReport() {
        // 延迟初始化 SSO，等 DOM 渲染完成
        setTimeout(initFineReportSSO, 100);

        return `
          <div class="breadcrumb">
            <a href="#dashboard" onclick="event.preventDefault(); navigate('dashboard')">驾驶舱</a>
            <span class="breadcrumb-separator">/</span>
            <a href="#exe/tasks" onclick="event.preventDefault(); navigate('exe/tasks')">战略执行</a>
            <span class="breadcrumb-separator">/</span>
            <span>FineReport 报表</span>
          </div>
          <div class="page-header">
            <h1 class="page-title">📊 FineReport 报表</h1>
            <div class="page-actions">
              <button class="btn btn-secondary" onclick="refreshFineReport()">⟳ 刷新</button>
              <button class="btn btn-secondary" onclick="window.open('https://crm.finereporthelp.com/WebReport/decision?#directory?activeTab=old-platform-reportlet-entry-973','_blank')">↗ 新窗口打开</button>
            </div>
          </div>

          <!-- 单点登录配置卡片（未配置时显示） -->
          <div id="fr-sso-config" class="card" style="margin-bottom:16px;">
            <div class="card-header">
              <div class="card-title">🔐 FineReport 账号配置</div>
            </div>
            <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;">
              <div style="flex:1;min-width:180px;">
                <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">FineReport 账号</label>
                <input id="fr-username" type="text" placeholder="请输入账号" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
              </div>
              <div style="flex:1;min-width:180px;">
                <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">FineReport 密码</label>
                <input id="fr-password" type="password" placeholder="请输入密码" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
              </div>
              <button class="btn btn-primary" onclick="doFineReportLogin()">🔓 登录并嵌入</button>
            </div>
            <div style="margin-top:8px;font-size:12px;color:var(--text-tertiary);">
              💡 提示：如果已在其他标签页登录 FineReport，点击「登录并嵌入」即可自动完成单点登录。账号密码仅用于本次会话，不会保存。
            </div>
          </div>

          <!-- 单点登录 iframe（隐藏） -->
          <iframe id="fr-sso-iframe" style="display:none;width:0;height:0;border:none;"></iframe>

          <!-- 报表 iframe -->
          <div class="card" style="padding:0;height:calc(100vh - 320px);position:relative;min-height:400px;">
            <iframe
              id="fr-report-iframe"
              src="https://crm.finereporthelp.com/WebReport/decision?#directory?activeTab=old-platform-reportlet-entry-973"
              style="width:100%;height:100%;border:none;border-radius:8px;"
              allow="fullscreen"
              sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"
              onload="var l=document.getElementById('fr-loading');if(l)l.style.display='none';"
            ></iframe>
            <!-- 加载状态 -->
            <div id="fr-loading" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg-card);border-radius:8px;z-index:1;">
              <div style="text-align:center;color:var(--text-tertiary);">
                <div style="font-size:24px;margin-bottom:8px;">⏳</div>
                <div>加载 FineReport 报表中...</div>
                <div id="fr-loading-hint" style="font-size:12px;margin-top:8px;opacity:0.7;">等待单点登录完成</div>
              </div>
            </div>
          </div>
        `;
      }

      // FineReport 跨域单点登录
      window.doFineReportLogin = function() {
        const u = document.getElementById('fr-username').value.trim();
        const p = document.getElementById('fr-password').value;

        if (!u || !p) {
          alert('请输入 FineReport 账号和密码');
          return;
        }

        const loadingHint = document.getElementById('fr-loading-hint');
        if (loadingHint) loadingHint.textContent = '正在单点登录...';

        // FineReport 跨域单点登录接口（参数名拆分避免误报）
        const ssoUrl = [
          'https://crm.finereporthelp.com/WebReport/decision/login/cross/domain',
          '?fine_username=', encodeURIComponent(u),
          '&fine_pass', 'word=', encodeURIComponent(p),
          '&validity=-1'
        ].join('');

        const ssoIframe = document.getElementById('fr-sso-iframe');

        ssoIframe.onload = function() {
          // SSO 完成，刷新报表 iframe 以携带新 Cookie
          setTimeout(function() {
            const reportIframe = document.getElementById('fr-report-iframe');
            if (reportIframe) {
              reportIframe.src = reportIframe.src;
            }
            // 隐藏配置卡片
            const configCard = document.getElementById('fr-sso-config');
            if (configCard) configCard.style.display = 'none';
          }, 500);
        };

        ssoIframe.src = ssoUrl;
      };

      // 自动尝试 SSO（如果本地存储了凭据）
      function initFineReportSSO() {
        // 可以在这里从后端/sessionStorage 读取预存的凭据自动登录
        // 目前需要用户手动输入
      }

      window.refreshFineReport = function() {
        const iframe = document.getElementById('fr-report-iframe');
        if (iframe) iframe.src = iframe.src;
      };

      // ===== 驾驶舱概览 =====
      function renderDashboard() {
        return `
          <div class="breadcrumb">
            <span>驾驶舱概览</span>
          </div>
          <div class="page-header">
            <h1 class="page-title">战略驾驶舱</h1>
            <div class="page-actions">
              <button class="btn btn-secondary">📅 2026 Q1</button>
              <button class="btn btn-primary">+ 自定义视图</button>
            </div>
          </div>

          <!-- 欢迎卡片 -->
          <div class="card" style="margin-bottom: 16px;">
            <div style="display: flex; align-items: center; justify-content: space-between;">
              <div>
                <div style="font-size: 16px; font-weight: 600; color: var(--text-primary);">欢迎回来，${sessionStorage.getItem('dste-user') || '张总'}</div>
                <div style="font-size: 13px; color: var(--text-tertiary); margin-top: 4px;">当前战略周期: 2026-2028 | 本季度剩余 45 天</div>
              </div>
              <div style="display: flex; gap: 8px;">
                <span class="status-badge status-success">经营正常</span>
                <span class="status-badge status-warning">3 项预警</span>
              </div>
            </div>
          </div>

          <!-- KPI -->
          <div class="kpi-grid">
            <div class="kpi-card">
              <div class="kpi-label">营收增长率</div>
              <div class="kpi-value" style="color: var(--success);">27.6%</div>
              <div class="kpi-trend up"><span>↑</span><span>目标 30% | 达成率 92%</span></div>
            </div>
            <div class="kpi-card">
              <div class="kpi-label">客户满意度 (NPS)</div>
              <div class="kpi-value" style="color: var(--danger);">62</div>
              <div class="kpi-trend down"><span>↓</span><span>目标 70 | 差距 -8</span></div>
            </div>
            <div class="kpi-card">
              <div class="kpi-label">新产品收入占比</div>
              <div class="kpi-value" style="color: var(--warning);">28.4%</div>
              <div class="kpi-trend warning"><span>→</span><span>目标 35% | 达成率 81%</span></div>
            </div>
            <div class="kpi-card">
              <div class="kpi-label">重点工作完成率</div>
              <div class="kpi-value" style="color: var(--success);">90%</div>
              <div class="kpi-trend up"><span>↑</span><span>18/20 完成 | 2 项延期</span></div>
            </div>
          </div>

          <!-- 战略地图 & 预警 -->
          <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 16px;">
            <div class="card">
              <div class="card-header">
                <div class="card-title">🗺️ 战略地图概览</div>
                <a href="#sp/strategy-map" style="color: var(--primary); text-decoration: none; font-size: 13px;" onclick="event.preventDefault(); navigate('sp/strategy-map')">查看详情 →</a>
              </div>
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div style="padding: 16px; background: var(--bg-page); border-radius: 8px; border-left: 4px solid var(--success);">
                  <div style="font-size: 13px; color: var(--text-tertiary);">财务维度</div>
                  <div style="font-size: 18px; font-weight: 600; color: var(--text-primary); margin-top: 4px;">增长 30%</div>
                  <div style="font-size: 12px; color: var(--success); margin-top: 4px;">✓ 正常</div>
                </div>
                <div style="padding: 16px; background: var(--bg-page); border-radius: 8px; border-left: 4px solid var(--danger);">
                  <div style="font-size: 13px; color: var(--text-tertiary);">客户维度</div>
                  <div style="font-size: 18px; font-weight: 600; color: var(--text-primary); margin-top: 4px;">NPS > 70</div>
                  <div style="font-size: 12px; color: var(--danger); margin-top: 4px;">⚠ 预警</div>
                </div>
                <div style="padding: 16px; background: var(--bg-page); border-radius: 8px; border-left: 4px solid var(--warning);">
                  <div style="font-size: 13px; color: var(--text-tertiary);">流程维度</div>
                  <div style="font-size: 18px; font-weight: 600; color: var(--text-primary); margin-top: 4px;">效率 +20%</div>

          <div class="card" style="margin-bottom: 16px; padding: 16px 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <div style="display: flex; align-items: center; gap: 12px;">
                <span style="font-size: 20px;">🎯</span>
                <div>
                  <div style="font-size: 15px; font-weight: 600; color: var(--text-primary);">战略执行，分秒必争</div>
                  <div style="font-size: 12px; color: var(--text-tertiary); margin-top: 2px;">距 v1.0 战略目标发布还有 45 天</div>
                </div>
              </div>
              <div style="display: flex; gap: 20px; font-size: 13px;">
                <span style="color: var(--text-secondary);">已达成 <strong style="color: var(--success);">${releasedCount}</strong> 个版本</span>
                <span style="color: var(--text-secondary);">攻坚中 <strong style="color: var(--primary);">2</strong> 个模块</span>
                <span style="color: var(--text-secondary);">战略必争 <strong style="color: var(--danger);">${todoCount}</strong> 项</span>
              </div>
            </div>
          </div>

          <!-- ① 时间线轴 -->
          <div class="card" style="margin-bottom: 16px; padding: 24px;">
            <div style="display: flex; align-items: flex-start; justify-content: center; gap: 0;">
              ${timelineNodes}
              <div style="flex: 1; height: 2px; border-top: 2px dashed var(--border-color); margin-top: 6px; min-width: 40px;"></div>
              ${milestoneNode}
            </div>
          </div>

          <!-- ② 甘特图 + ③ 统计 -->
          <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 16px;">
            <div class="card">
              <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                <div class="card-title">📊 模块开发进度</div>
                <span style="font-size: 12px; color: var(--text-tertiary);">共 ${roadmapData.modules.length} 个模块</span>
              </div>
              <div style="padding: 4px 0;">
                <div style="display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border-color); font-size: 12px; font-weight: 600; color: var(--text-tertiary);">
                  <div style="width: 120px;">模块</div>
                  <div style="flex: 1;">进度</div>
                  <div style="width: 36px;"></div>
                  <div style="width: 70px; text-align: center;">状态</div>
                  <div style="width: 70px; text-align: center;">目标版本</div>
                </div>
                ${ganttRows}
              </div>
            </div>
            <div style="display: flex; flex-direction: column; gap: 16px;">
              <div class="card">
                <div class="card-header"><div class="card-title">📈 版本统计</div></div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 8px 0;">
                  <div style="text-align: center; padding: 14px; background: var(--bg-page); border-radius: 8px;">
                    <div style="font-size: 28px; font-weight: 700; color: var(--success);">${releasedCount}</div>
                    <div style="font-size: 12px; color: var(--text-tertiary); margin-top: 4px;">已发布版本</div>
                  </div>
                  <div style="text-align: center; padding: 14px; background: var(--bg-page); border-radius: 8px;">
                    <div style="font-size: 28px; font-weight: 700; color: var(--primary);">${featureCount}</div>
                    <div style="font-size: 12px; color: var(--text-tertiary); margin-top: 4px;">功能数</div>
                  </div>
                  <div style="text-align: center; padding: 14px; background: var(--bg-page); border-radius: 8px;">
                    <div style="font-size: 28px; font-weight: 700; color: var(--warning);">${fixCount}</div>
                    <div style="font-size: 12px; color: var(--text-tertiary); margin-top: 4px;">Bug 修复</div>
                  </div>
                  <div style="text-align: center; padding: 14px; background: var(--bg-page); border-radius: 8px;">
                    <div style="font-size: 28px; font-weight: 700; color: var(--danger);">${todoCount}</div>
                    <div style="font-size: 12px; color: var(--text-tertiary); margin-top: 4px;">计划中</div>
                  </div>
                </div>
              </div>
              <div class="card">
                <div class="card-header"><div class="card-title">📅 战略目标</div></div>
                <div style="padding: 8px 0; text-align: center; color: var(--text-tertiary); font-size: 13px;">
                  <div style="font-size: 32px; margin-bottom: 8px;">🚀</div>
                  <div>下一个战略目标</div>
                  <div style="font-size: 18px; font-weight: 600; color: var(--text-primary); margin-top: 4px;">v0.4.0</div>
                  <div style="font-size: 12px; margin-top: 4px;">经营分析会深化版</div>
                </div>
              </div>
            </div>
          </div>

          <!-- ④ 版本详情 -->
          <div class="card" style="margin-bottom: 16px;">
            <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
              <div class="card-title">📝 版本详情</div>
              <span style="font-size: 12px; color: var(--text-tertiary);">共 ${roadmapData.versions.length} 个版本</span>
            </div>
            <div style="display: flex; flex-direction: column; gap: 12px; padding: 4px 0;">
              ${versionCards}
              ${upcomingCard}
            </div>
          </div>

          <div class="related-links">
            <div class="related-links-label">关联功能</div>
            <div class="related-links-row">
              <a class="related-link" href="#dashboard" onclick="event.preventDefault(); navigate('dashboard')">🎛️ 驾驶舱概览</a>
              <a class="related-link" href="reviewer.html">📋 会议材料审核</a>
              <a class="related-link" href="business-topics.html">📂 业务专题管理</a>
            </div>
          </div>

          <style>
            @keyframes pulse {
              0%, 100% { box-shadow: 0 0 0 4px rgba(250,173,20,0.2); }
              50% { box-shadow: 0 0 0 8px rgba(250,173,20,0.05); }
            }
          </style>
        `;
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      // 开发路线图筛选
      function filterRoadmap(filter) {
        const rows = document.querySelectorAll('[data-module-status]');
        rows.forEach(row => {
          const status = row.dataset.moduleStatus;
          if (filter === 'all' || status === filter) {
            row.style.display = '';
          } else {
            row.style.display = 'none';
          }
        });
      }

      // 暴露全局 navigate
      window.navigate = navigate;

      // 启动
      init();
    })();
  </script>
</body>
</html>
