      // ===== Tab 4.5: 资源配置矩阵（MVP：负责人 + 成员） =====
      function resolvePersonDisplayName(personRef) {
        if (!personRef) return '';
        const emp = typeof getEmployeeById === 'function' ? getEmployeeById(personRef) : null;
        if (emp) return emp.name || emp.displayName || personRef;
        return window.renderPerson ? window.renderPerson(personRef) : personRef;
      }

      function omp_renderMatrixTab() {
        const cycleId = window._dsteState.currentCycleId;
        const allTasks = omp_load('tasks') || [];
        const tasks = allTasks.filter(t => t && t.cycleId === cycleId && t.source === 'omp' && !t.parentId);
        const filter = window._ompState.taskFilter || { dept: 'all', type: 'all' };
        const state = window._ompState.staffingState || { searchQuery: '', dirSearchQuery: '' };
        const depts = ['all', ...new Set(tasks.map(t => t.dept).filter(Boolean))];

        let filtered = tasks.filter(t => {
          if (filter.dept !== 'all' && t.dept !== filter.dept) return false;
          if (filter.type !== 'all' && t.type !== filter.type) return false;
          if (state.searchQuery) {
            const q = state.searchQuery.toLowerCase();
            return (t.name || '').toLowerCase().includes(q) || resolvePersonDisplayName(t.owner).toLowerCase().includes(q) || (t.members || []).some(m => resolvePersonDisplayName(m).toLowerCase().includes(q));
          }
          return true;
        });

        const rawEmployees = (typeof getEmployees === 'function' ? getEmployees() : []) || [];
        const employees = Array.isArray(rawEmployees) ? rawEmployees.filter(e => e && e.id) : [];
        const dirSearchQuery = (state.dirSearchQuery || '').trim();
        const selectedOrgId = state.selectedOrgId || null;

        // 构建组织架构树（与旧人员配置视图一致的多级树）
        const hasEmployeeData = employees.length > 0;
        const orgTree = hasEmployeeData ? buildOrgHierarchy(employees) : { orgUnits: {}, roots: [] };

        // 矩阵视图默认仅展开「销服团队」一级组织，其他一级组织收起；下级团队全部手动展开
        if (hasEmployeeData && (!state.expandedOrgIds || state.expandedOrgIds.size === 0)) {
          state.expandedOrgIds = new Set();
          orgTree.roots.forEach(rootId => {
            const root = orgTree.orgUnits[rootId];
            if (root && /(营销|销售|服务|销服)/.test(root.name)) {
              state.expandedOrgIds.add(rootId);
            }
          });
        }

        // 通讯录筛选：搜索优先于组织树
        const displayedPeopleBase = employees.slice().sort((a, b) => getDisplayNameLocal(a).localeCompare(getDisplayNameLocal(b), 'zh-CN'));
        let displayedPeople = [];
        if (dirSearchQuery) {
          const searchResults = searchEmployees(dirSearchQuery, 100);
          const matchedIds = new Set(searchResults.map(e => e.id));
          displayedPeople = displayedPeopleBase.filter(emp => matchedIds.has(emp.id));
        } else {
          displayedPeople = displayedPeopleBase;
        }

        // 将人员按组织路径挂到对应组织节点下（取最长匹配路径；匹配不上时按末级名称兜底）
        const peopleByOrgId = {};
        const orgIdByEmployeeId = {};
        let unassignedPeople = [];
        function normalizeOrgPath(path) {
          if (Array.isArray(path)) path = path.filter(Boolean).join(' > ');
          return String(path || '')
            .replace(/[\\／]/g, ' > ')
            .replace(/\s*->\s*/g, ' > ')
            .replace(/\s*—\s*/g, ' > ')
            .replace(/\s+/g, ' ')
            .trim();
        }
        function findBestOrgUnit(empPath, orgUnits) {
          let bestUnit = null;
          let bestLen = 0;
          Object.values(orgUnits).forEach(unit => {
            const unitPath = String(unit.path || '');
            if (unitPath && (empPath === unitPath || empPath.startsWith(unitPath + ' > '))) {
              if (unitPath.length > bestLen) {
                bestUnit = unit;
                bestLen = unitPath.length;
              }
            }
          });
          return bestUnit;
        }
        displayedPeopleBase.forEach(emp => {
          const orgPathFromFields = [emp.l1Org, emp.l1Team, emp.l2Team, emp.l3Team].filter(Boolean).join(' > ');
          const rawOrgPath = emp.orgPath || orgPathFromFields;
          const empPath = normalizeOrgPath(rawOrgPath);
          let bestUnit = findBestOrgUnit(empPath, orgTree.orgUnits);
          if (!bestUnit && emp.orgPath && orgPathFromFields) {
            bestUnit = findBestOrgUnit(normalizeOrgPath(orgPathFromFields), orgTree.orgUnits);
          }
          if (!bestUnit) {
            const segments = empPath.split(' > ').filter(Boolean);
            for (let i = segments.length - 1; i >= 0; i--) {
              const candidate = segments[i];
              const matches = Object.values(orgTree.orgUnits).filter(unit => unit.name === candidate);
              if (matches.length >= 1) {
                bestUnit = matches.reduce((best, unit) => {
                  if (!best) return unit;
                  const bestCommon = Math.min(best.path?.length || 0, empPath.length);
                  const unitCommon = Math.min(unit.path?.length || 0, empPath.length);
                  return unitCommon > bestCommon ? unit : best;
                }, null);
                break;
              }
            }
          }
          if (bestUnit) {
            if (!peopleByOrgId[bestUnit.id]) peopleByOrgId[bestUnit.id] = [];
            peopleByOrgId[bestUnit.id].push(emp);
            orgIdByEmployeeId[emp.id] = bestUnit.id;
          } else {
            unassignedPeople.push(emp);
          }
        });

        function renderAvatarLocal(personRef, size = 32, displayName) {
          const refStr = typeof personRef === 'string' ? personRef : String(personRef || '');
          const rawName = displayName || (window.renderPerson ? window.renderPerson(personRef) : refStr);
          const name = typeof rawName === 'string' ? rawName : String(rawName || '');
          const firstChar = name ? name.charAt(0) : '?';
          const hue = refStr ? (refStr.split('').reduce((a, c) => a + c.charCodeAt(0), 0) % 360) : 200;
          return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:hsl(${hue},65%,45%);color:#fff;display:flex;align-items:center;justify-content:center;font-size:${size * 0.4}px;font-weight:600;flex-shrink:0;" title="${escapeHtml(name)}">${escapeHtml(firstChar)}</div>`;
        }

        function renderMemberChipLocal(personRef, taskId) {
          const displayName = resolvePersonDisplayName(personRef);
          return `
            <span class="omp-matrix-member-chip" draggable="true" data-drag="member-chip" data-person-ref="${escapeHtml(personRef)}" data-task-id="${escapeHtml(taskId)}" style="display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 6px 2px 2px;border-radius:10px;background:var(--bg-page);color:var(--text-secondary);border:1px solid var(--border-light);margin:2px;cursor:grab;" title="${escapeHtml(displayName)}">
              ${renderAvatarLocal(personRef, 16, displayName)}
              <span style="max-width:80px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(displayName)}</span>
              <span style="cursor:pointer;color:var(--danger);font-weight:700;margin-left:2px;" data-action="omp-staffing-remove-member" data-person-ref="${escapeHtml(personRef)}" data-task-id="${escapeHtml(taskId)}">×</span>
            </span>`;
        }

        function getDisplayNameLocal(emp) {
          if (!emp) return '未知';
          if (typeof emp.name === 'string' && emp.name.trim()) return emp.name.trim();
          if (window.renderPerson) return window.renderPerson(emp.id);
          return String(emp.id || '未知');
        }

        function renderPersonListRowLocal(emp) {
          const personRef = emp.id;
          const displayName = getDisplayNameLocal(emp);
          const orgPath = emp.orgPath || '未指定部门';
          return `
            <div class="omp-staffing-person-row" data-person-ref="${escapeHtml(personRef)}" data-drag="person" draggable="true" title="${escapeHtml(orgPath)}"
              style="display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;cursor:grab;transition:background 0.15s;"
            >
              ${renderAvatarLocal(personRef, 24, displayName)}
              <span style="flex:1;min-width:0;font-size:13px;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${escapeHtml(displayName)}">${escapeHtml(displayName)}</span>
              <span style="font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px;" title="${escapeHtml(orgPath)}">${escapeHtml(orgPath.split(' > ').slice(-2).join(' / ') || '未指定部门')}</span>
            </div>`;
        }

        function renderPersonListLocal(people, title, limit = 80) {
          if (people.length === 0) {
            return `<div style="padding:24px 12px;text-align:center;color:var(--text-tertiary);font-size:12px;">
              <div style="font-size:24px;margin-bottom:6px;"><span class="icon" data-icon="user" data-icon-size="14"></span></div>
              <div>暂无人员</div>
            </div>`;
          }
          const displayPeople = people.slice(0, limit);
          const more = people.length > limit ? `<div style="padding:6px 10px;text-align:center;font-size:11px;color:var(--text-muted);">还有 ${people.length - limit} 人，请使用搜索</div>` : '';
          return `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:0 10px 6px;">
              <span style="font-size:12px;font-weight:600;color:var(--text-primary);">${escapeHtml(title)}</span>
              <span style="font-size:11px;color:var(--text-muted);">${people.length} 人</span>
            </div>
            <div style="display:flex;flex-direction:column;">${displayPeople.map(emp => renderPersonListRowLocal(emp)).join('')}</div>
            ${more}
          `;
        }

        function renderSearchResultsCompactLocal(people) {
          if (people.length === 0) return `<div style="text-align:center;padding:40px 20px;color:var(--text-tertiary);"><div style="font-size:28px;margin-bottom:8px;"><span class="icon" data-icon="magnifying-glass" data-icon-size="14"></span></div><div style="font-size:13px;">无匹配人员</div></div>`;
          return renderPersonListLocal(people, `搜索结果 (${people.length})`, 100);
        }

        function renderOrgTreeLocal(orgId, orgUnits, depth) {
          const unit = orgUnits[orgId];
          if (!unit) return '';
          const hasChildren = Array.isArray(unit.children) && unit.children.length > 0;
          const isExpanded = state.expandedOrgIds ? state.expandedOrgIds.has(orgId) : false;
          const isSelected = state.selectedOrgId === orgId;
          const indent = depth * 14;
          const toggleIcon = hasChildren ? (isExpanded ? '▼' : '▶') : '·';
          const rowClass = 'omp-staffing-org-row' + (isSelected ? ' selected' : '');
          const nameColor = isSelected ? 'var(--primary)' : 'var(--text-primary)';
          const fontWeight = isSelected ? '600' : '400';
          const childrenHtml = hasChildren && isExpanded
            ? `<div style="margin-left:10px;border-left:1px dashed var(--border-color);">${unit.children.map(childId => renderOrgTreeLocal(childId, orgUnits, depth + 1)).join('')}</div>`
            : '';
          return `
            <div class="omp-staffing-org-node" data-org-id="${escapeHtml(orgId)}">
              <div class="${rowClass}" style="display:flex;align-items:center;gap:4px;padding:5px 8px 5px ${8 + indent}px;cursor:pointer;" data-action="omp-staffing-select-org" data-org-id="${escapeHtml(orgId)}">
                <span class="omp-staffing-org-toggle" style="${hasChildren ? '' : 'visibility:hidden;'}" data-action="omp-staffing-toggle-org" data-org-id="${escapeHtml(orgId)}">${toggleIcon}</span>
                <span class="omp-staffing-org-name" style="flex:1;font-size:12px;color:${nameColor};font-weight:${fontWeight};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" data-action="omp-staffing-select-org" data-org-id="${escapeHtml(orgId)}">${escapeHtml(unit.name)}</span>
                <span class="omp-staffing-org-count" style="font-size:10px;color:var(--text-muted);flex-shrink:0;" data-action="omp-staffing-select-org" data-org-id="${escapeHtml(orgId)}">${unit.employeeCount || 0}</span>
              </div>
              ${childrenHtml}
            </div>`;
        }

        function getDescendantOrgIdsLocal(orgId, orgUnits) {
          const ids = new Set();
          const unit = orgUnits[orgId];
          if (!unit) return ids;
          ids.add(orgId);
          if (Array.isArray(unit.children)) {
            unit.children.forEach(childId => {
              getDescendantOrgIdsLocal(childId, orgUnits).forEach(id => ids.add(id));
            });
          }
          return ids;
        }

        // 选中部门下的人员（包含子部门）
        let selectedOrgPeople = [];
        let listTitle = '全部人员';
        if (dirSearchQuery) {
          selectedOrgPeople = displayedPeople;
          listTitle = '搜索结果';
        } else if (state.selectedOrgId && orgTree.orgUnits[state.selectedOrgId]) {
          const targetIds = getDescendantOrgIdsLocal(state.selectedOrgId, orgTree.orgUnits);
          selectedOrgPeople = displayedPeopleBase.filter(emp => targetIds.has(orgIdByEmployeeId[emp.id]));
          listTitle = orgTree.orgUnits[state.selectedOrgId].name + ' 人员';
        } else {
          selectedOrgPeople = displayedPeopleBase.slice();
        }
        selectedOrgPeople.sort((a, b) => getDisplayNameLocal(a).localeCompare(getDisplayNameLocal(b), 'zh-CN'));

        const unassignedHtml = !dirSearchQuery && unassignedPeople.length > 0
          ? `
            <div style="margin-top:8px;border-top:1px solid var(--border-light);padding-top:8px;">
              <div style="font-size:12px;font-weight:600;color:var(--text-secondary);padding:0 10px 6px;">未分配部门 (${unassignedPeople.length})</div>
              ${renderPersonListLocal(unassignedPeople, '未分配部门', 50)}
            </div>`
          : '';

        const orgTreeHtml = hasEmployeeData
          ? `<div style="flex:1;overflow-y:auto;padding-right:2px;">
              ${orgTree.roots.map(id => renderOrgTreeLocal(id, orgTree.orgUnits, 0)).join('')}
              ${unassignedHtml}
            </div>`
          : `<div style="padding:16px 12px;text-align:center;color:var(--text-muted);font-size:12px;line-height:1.6;">
              暂无组织数据<br>请先前往「系统管理 → 人员与组织管理」导入
            </div>`;

        const personListHtml = dirSearchQuery
          ? renderSearchResultsCompactLocal(selectedOrgPeople)
          : renderPersonListLocal(selectedOrgPeople, listTitle);

        function renderMatrixTaskRow(t, { isSubtask = false } = {}) {
          const memberList = (t.members || []).filter(Boolean);
          const ownerCell = t.owner
            ? `<div style="display:flex;align-items:center;gap:4px;">${renderAvatarLocal(t.owner, 20, resolvePersonDisplayName(t.owner))}<span style="font-size:12px;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(resolvePersonDisplayName(t.owner))}</span></div>`
            : '<span style="font-size:12px;color:var(--text-tertiary);">未分配</span>';
          const membersCell = memberList.length > 0
            ? `<div style="display:flex;align-items:center;flex-wrap:wrap;gap:2px;">${memberList.map(m => renderMemberChipLocal(m, t.id)).join('')}</div>`
            : '<span style="font-size:12px;color:var(--text-tertiary);">—</span>';
          const nameCell = isSubtask
            ? `<td style="padding:8px 10px 8px 32px;font-size:12px;color:var(--text-secondary);min-width:160px;max-width:260px;">
                <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${escapeHtml(t.name)}">${escapeHtml(t.name)}</span>
              </td>`
            : `<td style="padding:8px 10px;font-size:13px;color:var(--text-primary);font-weight:500;min-width:160px;max-width:260px;">
                <div style="display:flex;align-items:center;gap:6px;">
                  ${omp_hasSubtasks(t.id) ? `<button type="button" data-action="omp-toggle-task-expand" data-id="${t.id}" style="background:none;border:none;cursor:pointer;color:var(--text-tertiary);font-size:10px;padding:2px;flex-shrink:0;" title="展开/折叠子任务">${window._ompState.taskExpandedIds.has(t.id) ? '▼' : '▶'}</button>` : '<span style="width:16px;flex-shrink:0;"></span>'}
                  <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${escapeHtml(t.name)}">${escapeHtml(t.name)}</span>
                </div>
              </td>`;
          const rowBg = isSubtask ? 'background:var(--bg-page);' : '';
          return `
            <tr style="border-bottom:1px solid var(--border-light);${rowBg}">
              ${nameCell}
              <td style="padding:8px 10px;min-width:120px;max-width:180px;">${ownerCell}</td>
              <td class="omp-matrix-members-cell" data-drop="matrix-member" data-task-id="${t.id}" style="padding:8px 10px;min-width:160px;max-width:320px;vertical-align:top;">${membersCell}</td>
            </tr>`;
        }

        const matrixRows = filtered.map(t => {
          const rows = [renderMatrixTaskRow(t)];
          if (window._ompState.taskExpandedIds.has(t.id)) {
            rows.push(...omp_getSubtasks(t.id).map(s => renderMatrixTaskRow(s, { isSubtask: true })));
          }
          return rows.join('');
        }).join('');

        return `
          <div style="display:flex;flex-direction:column;height:100%;gap:12px;">
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
              <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <select data-action="omp-filter-task" data-filter="dept" style="padding:6px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;cursor:pointer;">
                  ${depts.map(d => `<option value="${d}" ${filter.dept === d ? 'selected' : ''}>${d === 'all' ? '全部部门' : d}</option>`).join('')}
                </select>
                <select data-action="omp-filter-task" data-filter="type" style="padding:6px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;cursor:pointer;">
                  <option value="all" ${filter.type === 'all' ? 'selected' : ''}>全部类型</option>
                  <option value="improvement" ${filter.type === 'improvement' ? 'selected' : ''}><span class="icon" data-icon="gear" data-icon-size="14"></span> 业务改进</option>
                  <option value="capability" ${filter.type === 'capability' ? 'selected' : ''}><span class="icon" data-icon="books" data-icon-size="14"></span> 能力建设</option>
                  <option value="risk_response" ${filter.type === 'risk_response' ? 'selected' : ''}><span class="icon" data-icon="warning" data-icon-size="14"></span>️ 风险应对</option>
                  <option value="meeting_resolution" ${filter.type === 'meeting_resolution' ? 'selected' : ''}><span class="icon" data-icon="file-text" data-icon-size="14"></span> 会议决议</option>
                </select>
                <input type="text" id="omp-matrix-search" placeholder="搜索任务或负责人..." value="${escapeHtml(state.searchQuery || '')}" style="padding:6px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;min-width:180px;" data-action="omp-staffing-search">
              </div>
              <span style="font-size:13px;color:var(--text-secondary);">仅配置成员，负责人在年度规划中设定</span>
            </div>
            <div style="display:flex;gap:16px;flex:1;min-height:0;">
              <div style="width:320px;min-width:320px;display:flex;flex-direction:column;gap:10px;background:var(--bg-card);border:1px solid var(--border-light);border-radius:8px;padding:12px;"
                   id="omp-matrix-address-book">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                  <h3 style="font-size:14px;font-weight:600;color:var(--text-primary);margin:0;"><span class="icon" data-icon="clipboard-text" data-icon-size="14"></span> 资源人选</h3>
                </div>
                <div style="height:280px;flex:none;min-height:0;display:flex;flex-direction:column;gap:8px;background:var(--bg-page);border:1px solid var(--border-light);border-radius:8px;padding:8px 0;" id="omp-matrix-org-tree">
                  <div style="font-size:12px;font-weight:600;color:var(--text-primary);padding:0 10px 6px;border-bottom:1px solid var(--border-light);margin-bottom:4px;">组织架构</div>
                  ${orgTreeHtml}
                </div>
                <div style="display:flex;gap:8px;align-items:center;">
                  <input type="text" id="omp-matrix-dir-search" placeholder="搜索姓名、工号、部门..." value="${escapeHtml(dirSearchQuery)}" style="flex:1;min-width:0;padding:6px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;" data-action="omp-staffing-dir-search">
                  <button class="btn btn-sm btn-secondary" style="font-size:12px;${dirSearchQuery ? '' : 'visibility:hidden;'}" data-action="omp-staffing-clear-search">清除</button>
                </div>
                <div style="flex:1;min-height:120px;overflow-y:auto;padding:8px;background:var(--bg-card);border:1px solid var(--border-light);border-radius:8px;" id="omp-matrix-person-list">
                  ${personListHtml}
                </div>
              </div>
              <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:10px;background:var(--bg-card);border:1px solid var(--border-light);border-radius:8px;padding:12px;overflow:hidden;">
                <h3 style="font-size:14px;font-weight:600;color:var(--text-primary);margin:0;"><span class="icon" data-icon="users" data-icon-size="14"></span> 人员配置矩阵 (${filtered.length})</h3>
                <div style="flex:1;overflow:auto;">
                  <table style="width:100%;border-collapse:collapse;min-width:600px;">
                    <thead style="position:sticky;top:0;background:var(--bg-card);z-index:1;">
                      <tr style="border-bottom:2px solid var(--border-color);">
                        <th style="padding:8px 10px;text-align:left;font-size:12px;color:var(--text-tertiary);font-weight:600;white-space:nowrap;">工作名称</th>
                        <th style="padding:8px 10px;text-align:left;font-size:12px;color:var(--text-tertiary);font-weight:600;white-space:nowrap;">负责人</th>
                        <th style="padding:8px 10px;text-align:left;font-size:12px;color:var(--text-tertiary);font-weight:600;white-space:nowrap;">成员（可拖拽分配）</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${matrixRows}
                      ${filtered.length === 0 ? '<tr><td colspan="3" style="padding:40px;text-align:center;color:var(--text-tertiary);">暂无匹配任务</td></tr>' : ''}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
            <style>
              .omp-matrix-members-cell { transition: all 0.15s; }
              .omp-matrix-members-cell.drop-active { background: var(--primary-bg) !important; border: 1px dashed var(--primary) !important; border-radius: 4px; }
              .omp-matrix-members-cell.drop-ready { background: var(--bg-page); }
              .omp-matrix-member-chip { transition: transform 0.15s, opacity 0.15s; }
              .omp-matrix-member-chip.dragging { opacity: 0.5; }
              .omp-matrix-member-chip.drop-before { position: relative; }
              .omp-matrix-member-chip.drop-before::before { content: ''; position: absolute; left: -3px; top: 0; bottom: 0; width: 3px; background: var(--primary); border-radius: 2px; }
              .omp-matrix-member-chip.drop-after { position: relative; }
              .omp-matrix-member-chip.drop-after::after { content: ''; position: absolute; right: -3px; top: 0; bottom: 0; width: 3px; background: var(--primary); border-radius: 2px; }
              .omp-staffing-org-row { border-radius: 6px; transition: background 0.15s; }
              .omp-staffing-org-row:hover { background: var(--bg-hover); }
              .omp-staffing-org-row.selected { background: var(--primary-bg); }
              .omp-staffing-org-row.selected .omp-staffing-org-name { color: var(--primary); font-weight: 600; }
              .omp-staffing-org-toggle { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-size: 12px; color: var(--text-tertiary); transition: background 0.15s; flex-shrink: 0; }
              .omp-staffing-org-toggle:hover { background: var(--bg-hover); color: var(--text-primary); }
              .omp-staffing-person-row { transition: background 0.15s; }
              .omp-staffing-person-row:hover { background: var(--bg-hover); }
              .omp-staffing-person-row.dragging { opacity: 0.5; }
            </style>
          </div>`;
      }

      // ===== Tab 5: 重点工作人员配置台 =====
      function omp_renderTaskStaffingTab() {
        try {
          const cycleId = window._dsteState.currentCycleId;
          const allTasks = omp_load('tasks') || [];
          // PRD v1.8：人员配置台显示当前周期全部重点工作（含年度计划派生任务）
          const tasks = allTasks.filter(t => t && t.cycleId === cycleId && t.source === 'omp');
          const rawEmployees = (typeof getEmployees === 'function' ? getEmployees() : []) || [];
          const employees = Array.isArray(rawEmployees) ? rawEmployees.filter(e => e && e.id) : [];
          const taskPersonRefs = new Set();
          tasks.forEach(t => {
            if (t.owner) taskPersonRefs.add(t.owner);
            (t.members || []).forEach(m => { if (m) taskPersonRefs.add(m); });
          });
          const employeeIds = new Set(employees.map(e => e.id));
          const pseudoEmployees = Array.from(taskPersonRefs)
            .filter(ref => !employeeIds.has(ref))
            .map(ref => ({ id: ref, name: window.renderPerson ? window.renderPerson(ref) : ref }));
          const allPeople = [...employees, ...pseudoEmployees];
          const state = window._ompState.staffingState || { searchQuery: '', dirSearchQuery: '', selectedOrgId: null, expandedOrgIds: new Set() };
          const filter = window._ompState.taskFilter || { dept: 'all', type: 'all' };

          const depts = ['all', ...new Set(tasks.map(t => t.dept).filter(Boolean))];

          let filtered = tasks.filter(t => {
            if (filter.dept !== 'all' && t.dept !== filter.dept) return false;
            if (filter.type !== 'all' && t.type !== filter.type) return false;
            if (state.searchQuery) {
              const q = state.searchQuery.toLowerCase();
              const nameMatch = (t.name || '').toLowerCase().includes(q);
              const ownerMatch = resolvePersonDisplayName(t.owner).toLowerCase().includes(q);
              const memberMatch = (t.members || []).some(m => resolvePersonDisplayName(m).toLowerCase().includes(q));
              return nameMatch || ownerMatch || memberMatch;
            }
            return true;
          });

          // PRD v1.8：人员列表默认按姓名升序，本期不做推荐排序
          const displayedPeopleBase = allPeople.slice().sort((a, b) => getDisplayName(a).localeCompare(getDisplayName(b), 'zh-CN'));

          // 构建组织架构树
          const hasEmployeeData = employees.length > 0;
          const orgTree = hasEmployeeData ? buildOrgHierarchy(employees) : { orgUnits: {}, roots: [] };
          // PRD v1.8 企业微信风格：默认只展示一级部门，全部折叠，由用户逐层展开
          // state.expandedOrgIds 为空即表示全部折叠

          // 通讯录筛选：搜索优先于组织树
          const dirSearchQuery = (state.dirSearchQuery || '').trim();
          let displayedPeople = [];
          if (dirSearchQuery) {
            const searchResults = searchEmployees(dirSearchQuery, 100);
            const matchedIds = new Set(searchResults.map(e => e.id));
            displayedPeople = displayedPeopleBase.filter(emp => matchedIds.has(emp.id));
          }

          // 将人员按组织路径挂到对应组织节点下（取最长匹配路径；匹配不上时按末级名称兜底）
          const peopleByOrgId = {};
          const orgIdByEmployeeId = {};
          let unassignedPeople = [];
          function normalizeOrgPath(path) {
            if (Array.isArray(path)) path = path.filter(Boolean).join(' > ');
            return String(path || '')
              .replace(/[\\/／]/g, ' > ')
              .replace(/\s*->\s*/g, ' > ')
              .replace(/\s*—\s*/g, ' > ')
              .replace(/\s+/g, ' ')
              .trim();
          }
          function findBestOrgUnit(empPath, orgUnits) {
            let bestUnit = null;
            let bestLen = 0;
            Object.values(orgUnits).forEach(unit => {
              const unitPath = String(unit.path || '');
              if (unitPath && (empPath === unitPath || empPath.startsWith(unitPath + ' > '))) {
                if (unitPath.length > bestLen) {
                  bestUnit = unit;
                  bestLen = unitPath.length;
                }
              }
            });
            return bestUnit;
          }
          displayedPeopleBase.forEach(emp => {
            // 优先使用 orgPath；若为空或无法匹配，用 l1Org/l1Team/l2Team/l3Team 兜底
            const orgPathFromFields = [emp.l1Org, emp.l1Team, emp.l2Team, emp.l3Team].filter(Boolean).join(' > ');
            const rawOrgPath = emp.orgPath || orgPathFromFields;
            const empPath = normalizeOrgPath(rawOrgPath);
            let bestUnit = findBestOrgUnit(empPath, orgTree.orgUnits);
            // 若 orgPath 未匹配，尝试用字段拼接路径再次匹配
            if (!bestUnit && emp.orgPath && orgPathFromFields) {
              bestUnit = findBestOrgUnit(normalizeOrgPath(orgPathFromFields), orgTree.orgUnits);
            }
            // 兜底：按组织路径末级名称匹配；若末级有重复，按各级名称逐级向上匹配
            if (!bestUnit) {
              const segments = empPath.split(' > ').filter(Boolean);
              for (let i = segments.length - 1; i >= 0; i--) {
                const candidate = segments[i];
                const matches = Object.values(orgTree.orgUnits).filter(unit => unit.name === candidate);
                if (matches.length >= 1) {
                  // 同名节点过多时，优先选择路径前缀与 empPath 重合度最高的
                  bestUnit = matches.reduce((best, unit) => {
                    if (!best) return unit;
                    const bestCommon = Math.min(best.path?.length || 0, empPath.length);
                    const unitCommon = Math.min(unit.path?.length || 0, empPath.length);
                    return unitCommon > bestCommon ? unit : best;
                  }, null);
                  break;
                }
              }
            }
            if (bestUnit) {
              if (!peopleByOrgId[bestUnit.id]) peopleByOrgId[bestUnit.id] = [];
              peopleByOrgId[bestUnit.id].push(emp);
              orgIdByEmployeeId[emp.id] = bestUnit.id;
            } else {
              unassignedPeople.push(emp);
            }
          });
          // 调试日志：帮助排查真实数据下人员未显示的问题
          console.log('[OMP Staffing] employees:', employees.length, 'orgUnits:', Object.keys(orgTree.orgUnits).length, 'unassigned:', unassignedPeople.length, 'mapped total:', Object.values(peopleByOrgId).reduce((a, b) => a + b.length, 0));

          function renderAvatar(personRef, size = 32, displayName) {
            const refStr = typeof personRef === 'string' ? personRef : (personRef && typeof personRef.toString === 'function' ? personRef.toString() : String(personRef || ''));
            const rawName = displayName || (window.renderPerson ? window.renderPerson(personRef) : refStr);
            const name = typeof rawName === 'string' ? rawName : String(rawName || '');
            const firstChar = name ? name.charAt(0) : '?';
            const hue = refStr ? (refStr.split('').reduce((a, c) => a + c.charCodeAt(0), 0) % 360) : 200;
            return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:hsl(${hue},65%,45%);color:#fff;display:flex;align-items:center;justify-content:center;font-size:${size * 0.4}px;font-weight:600;flex-shrink:0;" title="${escapeHtml(name)}">${escapeHtml(firstChar)}</div>`;
          }

          function renderOrgTree(orgId, orgUnits, depth) {
            const unit = orgUnits[orgId];
            if (!unit) return '';
            const hasChildren = Array.isArray(unit.children) && unit.children.length > 0;
            const isExpanded = state.expandedOrgIds.has(orgId);
            const isSelected = state.selectedOrgId === orgId;
            const indent = depth * 14;
            const toggleIcon = hasChildren ? (isExpanded ? '▼' : '▶') : '·';
            const rowClass = 'omp-staffing-org-row' + (isSelected ? ' selected' : '');
            const nameColor = isSelected ? 'var(--primary)' : 'var(--text-primary)';
            const fontWeight = isSelected ? '600' : '400';
            const childrenHtml = hasChildren && isExpanded
              ? `<div style="margin-left:10px;border-left:1px dashed var(--border-color);">${unit.children.map(childId => renderOrgTree(childId, orgUnits, depth + 1)).join('')}</div>`
              : '';
            return `
              <div class="omp-staffing-org-node" data-org-id="${escapeHtml(orgId)}">
                <div class="${rowClass}" style="display:flex;align-items:center;gap:4px;padding:5px 8px 5px ${8 + indent}px;cursor:pointer;" data-action="omp-staffing-select-org" data-org-id="${escapeHtml(orgId)}">
                  <span class="omp-staffing-org-toggle" style="${hasChildren ? '' : 'visibility:hidden;'}" data-action="omp-staffing-toggle-org" data-org-id="${escapeHtml(orgId)}">${toggleIcon}</span>
                  <span class="omp-staffing-org-name" style="flex:1;font-size:12px;color:${nameColor};font-weight:${fontWeight};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" data-action="omp-staffing-select-org" data-org-id="${escapeHtml(orgId)}">${escapeHtml(unit.name)}</span>
                  <span class="omp-staffing-org-count" style="font-size:10px;color:var(--text-muted);flex-shrink:0;" data-action="omp-staffing-select-org" data-org-id="${escapeHtml(orgId)}">${unit.employeeCount || 0}</span>
                </div>
                ${childrenHtml}
              </div>`;
          }

          function getDisplayName(emp) {
            if (!emp) return '未知';
            if (typeof emp.name === 'string' && emp.name.trim()) return emp.name.trim();
            if (window.renderPerson) return window.renderPerson(emp.id);
            return String(emp.id || '未知');
          }

          function renderCompactPersonCard(emp, depth = 0) {
            return renderPersonCard(emp, { depth, variant: 'tree' });
          }

          function renderSearchResultCard(emp) {
            return renderPersonCard(emp, { variant: 'search' });
          }

          function renderPersonListRow(emp) {
            const personRef = emp.id;
            const displayName = getDisplayName(emp);
            const orgPath = emp.orgPath || '未指定部门';
            return `
              <div class="omp-staffing-person-row" data-person-ref="${escapeHtml(personRef)}" data-drag="person" draggable="true" title="${escapeHtml(orgPath)}"
                style="display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;cursor:grab;transition:background 0.15s;"
              >
                ${renderAvatar(personRef, 24, displayName)}
                <span style="flex:1;min-width:0;font-size:13px;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"
                  title="${escapeHtml(displayName)}"
                >${escapeHtml(displayName)}</span>
                <span style="font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px;"
                  title="${escapeHtml(orgPath)}"
                >${escapeHtml(orgPath.split(' > ').slice(-2).join(' / ') || '未指定部门')}</span>
              </div>`;
          }

          function renderPersonCard(emp, { depth = 0, variant = 'tree' } = {}) {
            const personRef = emp.id;
            const displayName = getDisplayName(emp);
            const orgPath = emp.orgPath || '未指定部门';
            const deptBadge = orgPath.split(' > ').filter(Boolean).slice(-2).join(' / ') || '未指定部门';
            const indent = depth * 14;
            const isSearch = variant === 'search';
            const avatarSize = isSearch ? 32 : 28;
            const padding = isSearch ? '10px' : '8px 10px';
            const badgeHtml = !isSearch
              ? `<span style="font-size:10px;padding:1px 6px;border-radius:10px;background:var(--bg-page);color:var(--text-secondary);border:1px solid var(--border-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px;" title="${escapeHtml(orgPath)}">${escapeHtml(deptBadge)}</span>`
              : '';
            const pathHtml = isSearch
              ? `<div style="font-size:11px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${escapeHtml(orgPath)}">${escapeHtml(orgPath)}</div>`
              : '';
            return `
              <div class="omp-staffing-person-card" data-person-ref="${escapeHtml(personRef)}" data-drag="person" draggable="true" style="padding:${padding};border:1px solid var(--border-light);border-radius:8px;background:var(--bg-card);cursor:grab;transition:all 0.15s;margin:2px 0;${depth > 0 ? 'margin-left:' + indent + 'px;' : ''}">
                <div style="display:flex;align-items:center;gap:8px;pointer-events:none;">
                  ${renderAvatar(personRef, avatarSize)}
                  <div style="flex:1;min-width:0;">
                    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                      <span style="font-weight:600;color:var(--text-primary);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;" title="${escapeHtml(displayName)}">${escapeHtml(displayName)}</span>
                      ${badgeHtml}
                    </div>
                    ${pathHtml}
                  </div>
                </div>
              </div>`;
          }

          function renderMemberChip(personRef) {
            const displayName = resolvePersonDisplayName(personRef);
            return `
              <span style="display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 6px 2px 2px;border-radius:10px;background:var(--bg-page);color:var(--text-secondary);border:1px solid var(--border-light);margin:2px;" title="${escapeHtml(displayName)}">
                ${renderAvatar(personRef, 16, displayName)}
                <span style="max-width:80px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(displayName)}</span>
                <span style="cursor:pointer;color:var(--danger);font-weight:700;margin-left:2px;" data-action="omp-staffing-remove-member" data-person-ref="${escapeHtml(personRef)}">×</span>
              </span>`;
          }

          function renderTaskCard(t, { isSubtask = false, parentExpanded = false } = {}) {
            const memberList = (t.members || []).filter(Boolean);
            const ownerAvatar = t.owner ? renderAvatar(t.owner, 20, resolvePersonDisplayName(t.owner)) : '';
            const memberChips = memberList.map(m => renderMemberChip(m)).join('');
            const extraMembers = memberList.length > 3 ? `<span style="font-size:11px;color:var(--text-tertiary);margin-left:2px;">+${memberList.length - 3}</span>` : '';
            const hasSubtasks = omp_hasSubtasks(t.id);
            const expandIcon = window._ompState.taskExpandedIds.has(t.id) ? '▼' : '▶';
            return `
              <div class="omp-staffing-task-card ${isSubtask ? 'omp-staffing-subtask-card' : ''}" data-drop="task" data-task-id="${t.id}" style="padding:8px;border:1px solid var(--border-light);border-radius:8px;background:var(--bg-card);transition:all 0.15s;${isSubtask ? 'margin-left:24px;border-color:var(--border-color);background:var(--bg-page);' : ''}">
                <div style="display:flex;align-items:flex-start;gap:8px;">
                  ${!isSubtask && hasSubtasks ? `<button type="button" data-action="omp-toggle-task-expand" data-id="${t.id}" style="background:none;border:none;cursor:pointer;color:var(--text-tertiary);font-size:12px;padding:4px;margin-top:2px;flex-shrink:0;" title="展开/折叠子任务">${expandIcon}</button>` : ''}
                  ${isSubtask ? '<span style="width:18px;flex-shrink:0;"></span>' : ''}
                  <div style="flex:1;min-width:0;">
                    <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap;">
                      <span style="font-weight:600;color:var(--text-primary);font-size:${isSubtask ? '12px' : '13px'};line-height:1.4;">${escapeHtml(t.name)}</span>
                    </div>
                    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                      <span style="font-size:11px;color:var(--text-tertiary);">负责人:</span>
                      ${t.owner ? `<div style="display:flex;align-items:center;gap:4px;">${ownerAvatar}<span style="font-size:12px;color:var(--text-primary);">${escapeHtml(resolvePersonDisplayName(t.owner))}</span></div>` : '<span style="font-size:12px;color:var(--text-tertiary);">未分配</span>'}
                    </div>
                    ${memberList.length > 0 ? `
                    <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:4px;">
                      <span style="font-size:11px;color:var(--text-tertiary);">成员:</span>
                      <div style="display:flex;align-items:center;gap:2px;flex-wrap:wrap;">${memberChips}${extraMembers}</div>
                    </div>` : ''}
                  </div>
                </div>
              </div>`;
          }

          const parentTasks = filtered.filter(t => !t.parentId);
          const taskCards = parentTasks.map(t => {
            const card = renderTaskCard(t);
            const expanded = window._ompState.taskExpandedIds.has(t.id);
            const subCards = expanded ? omp_getSubtasks(t.id).map(s => renderTaskCard(s, { isSubtask: true })).join('') : '';
            return card + subCards;
          }).join('');

          const unassignedHtml = !dirSearchQuery && unassignedPeople.length > 0
            ? `
              <div style="margin-top:8px;border-top:1px solid var(--border-light);padding-top:8px;">
                <div style="font-size:12px;font-weight:600;color:var(--text-secondary);padding:0 10px 6px;">未分配部门 (${unassignedPeople.length})</div>
                ${unassignedPeople.map(emp => renderSearchResultCard(emp)).join('')}
              </div>`
            : '';

          const orgTreeHtml = hasEmployeeData
            ? `<div style="flex:1;overflow-y:auto;padding-right:2px;">
                ${orgTree.roots.map(id => renderOrgTree(id, orgTree.orgUnits, 0)).join('')}
                ${unassignedHtml}
              </div>`
            : `<div style="padding:16px 12px;text-align:center;color:var(--text-muted);font-size:12px;line-height:1.6;">
                暂无组织数据<br>请先前往「系统管理 → 人员与组织管理」导入
              </div>`;

          function getDescendantOrgIds(orgId, orgUnits) {
            const ids = new Set();
            const unit = orgUnits[orgId];
            if (!unit) return ids;
            ids.add(orgId);
            if (Array.isArray(unit.children)) {
              unit.children.forEach(childId => {
                getDescendantOrgIds(childId, orgUnits).forEach(id => ids.add(id));
              });
            }
            return ids;
          }

          function renderPersonList(people, title, limit = 80) {
            if (people.length === 0) {
              return `<div style="padding:24px 12px;text-align:center;color:var(--text-tertiary);font-size:12px;">
                <div style="font-size:24px;margin-bottom:6px;"><span class="icon" data-icon="user" data-icon-size="14"></span></div>
                <div>暂无人员</div>
              </div>`;
            }
            const displayPeople = people.slice(0, limit);
            const more = people.length > limit ? `<div style="padding:6px 10px;text-align:center;font-size:11px;color:var(--text-muted);">还有 ${people.length - limit} 人，请使用搜索</div>` : '';
            return `
              <div style="display:flex;justify-content:space-between;align-items:center;padding:0 10px 6px;">
                <span style="font-size:12px;font-weight:600;color:var(--text-primary);">${escapeHtml(title)}</span>
                <span style="font-size:11px;color:var(--text-muted);">${people.length} 人</span>
              </div>
              <div style="display:flex;flex-direction:column;">${displayPeople.map(emp => renderPersonListRow(emp)).join('')}</div>
              ${more}
            `;
          }

          function renderSearchResultsCompact(people) {
            if (people.length === 0) return `<div style="text-align:center;padding:40px 20px;color:var(--text-tertiary);"><div style="font-size:28px;margin-bottom:8px;"><span class="icon" data-icon="magnifying-glass" data-icon-size="14"></span></div><div style="font-size:13px;">无匹配人员</div></div>`;
            return renderPersonList(people, `搜索结果 (${people.length})`, 100);
          }

          // 选中部门下的人员（包含子部门）
          let selectedOrgPeople = [];
          let listTitle = '全部人员';
          if (dirSearchQuery) {
            selectedOrgPeople = displayedPeople;
            listTitle = '搜索结果';
          } else if (state.selectedOrgId && orgTree.orgUnits[state.selectedOrgId]) {
            const targetIds = getDescendantOrgIds(state.selectedOrgId, orgTree.orgUnits);
            selectedOrgPeople = displayedPeopleBase.filter(emp => targetIds.has(orgIdByEmployeeId[emp.id]));
            listTitle = orgTree.orgUnits[state.selectedOrgId].name + ' 人员';
          } else {
            selectedOrgPeople = displayedPeopleBase.slice();
          }
          selectedOrgPeople.sort((a, b) => getDisplayName(a).localeCompare(getDisplayName(b), 'zh-CN'));

          const personListHtml = dirSearchQuery
            ? renderSearchResultsCompact(selectedOrgPeople)
            : (state.selectedOrgId
                ? renderPersonList(selectedOrgPeople, listTitle)
                : `<div style="padding:24px 12px;text-align:center;color:var(--text-tertiary);font-size:12px;">
                    <div style="font-size:24px;margin-bottom:6px;"><span class="icon" data-icon="building" data-icon-size="14"></span></div>
                    <div>点击上方部门查看人员</div>
                  </div>`);

          return `
            <div style="display:flex;flex-direction:column;gap:12px;height:calc(100vh - 200px);min-height:500px;">
              <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;padding:12px 16px;background:var(--bg-card);border:1px solid var(--border-light);border-radius:10px;">
                <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
                  <select data-action="omp-filter-task" data-filter="dept" style="padding:6px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;cursor:pointer;">
                    ${depts.map(d => `<option value="${d}" ${filter.dept === d ? 'selected' : ''}>${d === 'all' ? '全部部门' : d}</option>`).join('')}
                  </select>
                  <select data-action="omp-filter-task" data-filter="type" style="padding:6px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;cursor:pointer;">
                    <option value="all" ${filter.type === 'all' ? 'selected' : ''}>全部类型</option>
                    <option value="improvement" ${filter.type === 'improvement' ? 'selected' : ''}><span class="icon" data-icon="gear" data-icon-size="14"></span> 业务改进</option>
                    <option value="capability" ${filter.type === 'capability' ? 'selected' : ''}><span class="icon" data-icon="books" data-icon-size="14"></span> 能力建设</option>
                    <option value="risk_response" ${filter.type === 'risk_response' ? 'selected' : ''}><span class="icon" data-icon="warning" data-icon-size="14"></span>️ 风险应对</option>
                    <option value="meeting_resolution" ${filter.type === 'meeting_resolution' ? 'selected' : ''}><span class="icon" data-icon="file-text" data-icon-size="14"></span> 会议决议</option>
                  </select>
                  <input type="text" id="omp-staffing-search" placeholder="搜索任务或负责人..." value="${escapeHtml(state.searchQuery || '')}" style="padding:6px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;min-width:180px;" data-action="omp-staffing-search">
                </div>
                <div style="display:flex;gap:8px;align-items:center;">
                  <span style="font-size:13px;color:var(--text-secondary);">仅配置成员，负责人在年度规划中设定</span>
                </div>
              </div>
              <div style="display:flex;gap:16px;flex:1;min-height:0;">
                <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:10px;">
                  <div style="display:flex;justify-content:space-between;align-items:center;">
                    <h3 style="font-size:14px;font-weight:600;color:var(--text-primary);margin:0;">任务池 (${parentTasks.length})</h3>
                  </div>
                  <div style="flex:1;overflow-y:auto;padding-right:4px;display:flex;flex-direction:column;gap:8px;" id="omp-staffing-task-list">
                    ${parentTasks.length > 0 ? taskCards : '<div style="text-align:center;padding:40px;color:var(--text-tertiary);">暂无匹配任务</div>'}
                  </div>
                </div>
                <div style="width:380px;min-width:380px;display:flex;flex-direction:column;gap:10px;" id="omp-staffing-address-book">
                  <div style="display:flex;justify-content:space-between;align-items:center;">
                    <h3 style="font-size:14px;font-weight:600;color:var(--text-primary);margin:0;"><span class="icon" data-icon="clipboard-text" data-icon-size="14"></span> 资源人选 (通讯录)</h3>
                    <span style="font-size:12px;color:var(--text-secondary);">${dirSearchQuery ? `${displayedPeople.length} 条结果` : `${displayedPeopleBase.length} 人`}</span>
                  </div>
                  <div style="display:flex;gap:8px;align-items:center;">
                    <input type="text" id="omp-staffing-dir-search" placeholder="搜索姓名、工号、部门..." value="${escapeHtml(dirSearchQuery)}" style="flex:1;min-width:0;padding:6px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;" data-action="omp-staffing-dir-search">
                    <button class="btn btn-sm btn-secondary" style="font-size:12px;${dirSearchQuery ? '' : 'visibility:hidden;'}" data-action="omp-staffing-clear-search">清除</button>
                  </div>
                  ${dirSearchQuery ? `
                  <div style="flex:1;overflow-y:auto;padding:8px;background:var(--bg-card);border:1px solid var(--border-light);border-radius:8px;" id="omp-staffing-person-list">
                    ${personListHtml}
                  </div>
                  ` : `
                  <div style="flex:0 0 45%;min-height:180px;display:flex;flex-direction:column;gap:8px;background:var(--bg-card);border:1px solid var(--border-light);border-radius:8px;padding:8px 0;" id="omp-staffing-org-tree">
                    <div style="font-size:12px;font-weight:600;color:var(--text-primary);padding:0 10px 6px;border-bottom:1px solid var(--border-light);margin-bottom:4px;">组织架构</div>
                    ${orgTreeHtml}
                  </div>
                  <div style="flex:1;min-height:180px;overflow-y:auto;padding:8px;background:var(--bg-card);border:1px solid var(--border-light);border-radius:8px;" id="omp-staffing-person-list">
                    ${personListHtml}
                  </div>
                  `}
                </div>
              </div>
            </div>
            <style>
              .omp-staffing-task-card { cursor: default; }
              .omp-staffing-task-card:hover { border-color: var(--primary) !important; }
              .omp-staffing-task-card.drop-active { border-color: var(--primary) !important; border-style: dashed !important; background: var(--primary-bg) !important; }
              .omp-staffing-subtask-card { border-left: 3px solid var(--primary) !important; }
              .omp-staffing-subtask-card:hover { border-color: var(--primary) !important; }
              .omp-staffing-org-row { border-radius: 6px; transition: background 0.15s; }
              .omp-staffing-org-row:hover { background: var(--bg-hover); }
              .omp-staffing-org-row.selected { background: var(--primary-bg); }
              .omp-staffing-org-row.selected .omp-staffing-org-name { color: var(--primary); font-weight: 600; }
              .omp-staffing-org-toggle {
                width: 20px;
                height: 20px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 4px;
                font-size: 12px;
                color: var(--text-tertiary);
                transition: background 0.15s;
                flex-shrink: 0;
              }
              .omp-staffing-org-toggle:hover { background: var(--bg-hover); color: var(--text-primary); }
              .omp-staffing-person-row { transition: background 0.15s; }
              .omp-staffing-person-row:hover { background: var(--bg-hover); }
              .omp-staffing-person-row.dragging { opacity: 0.5; }
              .omp-staffing-person-card { border-radius: 8px; }
              .omp-staffing-person-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); background: var(--bg-hover); border-color: var(--primary) !important; }
              .omp-staffing-person-card.dragging { opacity: 0.5; }
              @media (max-width: 768px) {
                #omp-staffing-address-book { width: 100% !important; min-width: 0 !important; }
              }
            </style>`;
        } catch (err) {
          console.error('[OMP] 渲染人员配置视图失败:', err);
          return `
            <div style="padding:40px;text-align:center;color:var(--text-secondary);">
              <div style="font-size:48px;margin-bottom:16px;"><span class="icon" data-icon="warning" data-icon-size="14"></span>️</div>
              <div style="font-size:16px;font-weight:600;margin-bottom:8px;">人员配置视图加载失败</div>
              <div style="font-size:13px;color:var(--text-tertiary);margin-bottom:16px;">${escapeHtml(err.message || '未知错误')}</div>
              <button class="btn btn-primary" data-action="omp-switch-task-view" data-view="list">返回列表</button>
            </div>`;
        }
      }

      // ===== 战略洞察与专题共享工具函数（v1.2 页面拆分后） =====
      const SI_STORAGE_KEY_INSIGHTS = 'dste_insights_v1';
      const SI_STORAGE_KEY_TOPICS = 'dste_strategy_topics_v2';
      const SI_STORAGE_KEY_TOPICS_LEGACY = 'dste_strategy_topics_v1';

      // 战略专题 Repository 与同步基础设施
      const strategyTopicsRepo = new Repository('strategyTopics', {
        storageKey: SI_STORAGE_KEY_TOPICS,
        schema: 'array',
        version: 3,
        backupNamespace: 'strategyTopics',
        migrators: {
          3: (topics) => {
            const now = Date.now();
            return topics.map(t => ({
              ...t,
              version: t.version || 1,
              lastModified: t.lastModified || (t.updatedAt ? new Date(t.updatedAt).getTime() || now : now),
            }));
          }
        }
      });
      const strategyTopicsSyncQueue = getDefaultSyncQueue();
      const strategyTopicsExecutor = createPerItemExecutor();
      if (typeof window !== 'undefined') {
        strategyTopicsSyncQueue.bindAutoProcess(strategyTopicsExecutor);
      }

      const insightsSyncQueue = getDefaultSyncQueue();
      const insightsExecutor = createPerItemExecutor();
      if (typeof window !== 'undefined') {
        insightsSyncQueue.bindAutoProcess(insightsExecutor);
      }

      function siEscapeHtml(text) {
        if (text == null) return '';
        const div = document.createElement('div');
        div.textContent = String(text);
        return div.innerHTML;
      }

      function siRenderPerson(person) {
        if (!person) return '';
        if (typeof person === 'object') return person.displayName || person.name || person.email || JSON.stringify(person);
        return String(person);
      }

      function siSafeInsightId(id) {
        return typeof id === 'string' && /^ins_\d+_\d+$/.test(id);
      }

      function siSafeTopicId(id) {
        return typeof id === 'string' && /^st_\d+_\d+$/.test(id);
      }

      function siMigrateTopicsFromV1() {
        try {
          const legacy = DSTE.Storage.getString(SI_STORAGE_KEY_TOPICS_LEGACY);
          if (!legacy) return false;
          const topics = JSON.parse(legacy);
          if (!Array.isArray(topics)) return false;
          const migrated = topics.map(t => {
            const year = t.year || (t.startDate ? parseInt(t.startDate.split('-')[0], 10) : new Date().getFullYear());
            const item = {
              ...t,
              year,
              members: t.members || [],
              kmsUrl: t.kmsUrl || '',
              researchObjectives: t.researchObjectives || '',
              deliverables: t.deliverables || [],
              previousTopicId: t.previousTopicId || null,
              nextTopicId: t.nextTopicId || null,
              deleted: t.deleted === true
            };
            delete item.priority;
            delete item.budget;
            delete item.actualCost;
            delete item.dimension;
            delete item.progress;
            return item;
          });
          DSTE.Storage.set(SI_STORAGE_KEY_TOPICS, migrated);
          DSTE.Storage.remove(SI_STORAGE_KEY_TOPICS_LEGACY);
          return true;
        } catch (e) {
          console.error('[SI] v1 migration failed:', e);
          return false;
        }
      }

      function siMigrateTopicTypes() {
        const TYPE_MAP = { breakthrough: 'macro', incremental: 'customer', maintenance: 'self' };
        try {
          const topics = strategyTopicsRepo.get();
          if (!Array.isArray(topics)) return;
          let changed = false;
          const migrated = topics.map(t => {
            const newType = TYPE_MAP[t.type];
            if (newType) {
              changed = true;
              return { ...t, type: newType };
            }
            return t;
          });
          if (changed) strategyTopicsRepo.set(migrated);
        } catch (e) {
          console.warn('[SI] topic type migration failed:', e);
        }
      }

      // 清理已废弃字段（dimension 战略维度、progress 进度）
      function siMigrateRemoveDeprecatedFields() {
        try {
          const topics = strategyTopicsRepo.get();
          if (!Array.isArray(topics)) return;
          let changed = false;
          const migrated = topics.map(t => {
            if ('dimension' in t || 'progress' in t) {
              changed = true;
              const { dimension, progress, ...rest } = t;
              return rest;
            }
            return t;
          });
          if (changed) strategyTopicsRepo.set(migrated);
        } catch (e) {
          console.warn('[SI] deprecated field migration failed:', e);
        }
      }

      function siLoadInsights() {
        try {
          const data = DSTE.Storage.getString(SI_STORAGE_KEY_INSIGHTS);
          if (!data) return [];
          const parsed = JSON.parse(data);
          if (!Array.isArray(parsed)) return [];
          return parsed.filter(i => siSafeInsightId(i.id));
        } catch (e) {
          console.error('[SI] load insights failed:', e);
          return [];
        }
      }

      function siSaveInsights(insights) {
        try {
          DSTE.Storage.set(SI_STORAGE_KEY_INSIGHTS, insights);
        } catch (e) {
          console.error('[SI] save insights failed:', e);
          showToast('数据保存失败，可能是存储空间不足', 'error');
        }
      }

      function siPersistInsights(insights) {
        let oldInsights = [];
        try {
          const raw = DSTE.Storage.getString(SI_STORAGE_KEY_INSIGHTS);
          if (raw) {
            const parsed = JSON.parse(raw);
            if (Array.isArray(parsed)) oldInsights = parsed;
          }
        } catch (e) {
          console.warn('[SI] read old insights failed:', e);
        }
        ensureLastModified(insights);
        insights.forEach(i => { if (i.version === undefined) i.version = 1; });
        siSaveInsights(insights);
        try {
          const { created, updated, deleted } = computeEntityDiff(oldInsights, insights, item => String(item.id));
          if (created.length || updated.length || deleted.length) {
            enqueuePerRecordSync('insights', { created, updated, deleted }, insightsExecutor, insightsSyncQueue);
          }
        } catch (e) {
          console.error('[SI] sync insights failed:', e);
        }
      }

      const topicsSwr = createSwrSync({
        key: 'strategy-topics',
        loadLocal: () => strategyTopicsRepo.get(),
        save: (data) => strategyTopicsRepo.set(data),
        fetchRemote: () => apiLoadArray('/api/strategy-topics'),
        merge: (local, remote) => mergeEntities(local, remote),
      });

      const insightsSwr = createSwrSync({
        key: 'insights',
        loadLocal: siLoadInsights,
        save: siSaveInsights,
        fetchRemote: () => apiLoadArray('/api/insights'),
        merge: (local, remote) => mergeEntities(local, remote, item => String(item.id)),
      });

      async function siLoadRemoteInsights(force = false) {
        try {
          const { updated } = await insightsSwr(force);
          if (updated && currentPage === 'sp/insights') {
            navigate('sp/insights', false);
          }
        } catch (e) {
          console.warn('[SI] load remote insights failed:', e.message);
        }
      }

      async function siLoadRemoteTopics(force = false) {
        try {
          const { updated } = await topicsSwr(force);
          if (updated && currentPage === 'sp/strategy-topics') {
            navigate('sp/strategy-topics', false);
          }
        } catch (e) {
          console.warn('[SI] load remote topics failed:', e.message);
        }
      }

      function siLoadTopics() {
        siMigrateTopicsFromV1();
        siMigrateTopicTypes();
        siMigrateRemoveDeprecatedFields();
        try {
          const topics = strategyTopicsRepo.get().filter(t => siSafeTopicId(t.id));
          const { topics: cleaned, changed } = siCleanupOrphanTopicChainLinks(topics);
          if (changed) {
            strategyTopicsRepo.set(cleaned);
          }
          return cleaned;
        } catch (e) {
          console.error('[SI] load topics failed:', e);
          return [];
        }
      }

      function siSaveTopics(topics) {
        try {
          strategyTopicsRepo.set(topics);
        } catch (e) {
          console.error('[SI] save topics failed:', e);
          showToast('数据保存失败，可能是存储空间不足', 'error');
        }
      }

      function siPersistTopics(topics) {
        const oldTopics = strategyTopicsRepo.getRaw();
        ensureLastModified(topics);
        topics.forEach(t => { if (t.version === undefined) t.version = 1; });
        siSaveTopics(topics);
        try {
          const { created, updated, deleted } = computeEntityDiff(oldTopics, topics);
          if (created.length || updated.length || deleted.length) {
            enqueuePerRecordSync('strategy-topics', { created, updated, deleted }, strategyTopicsExecutor, strategyTopicsSyncQueue);
          }
        } catch (e) {
          console.error('[SI] sync topics failed:', e);
        }
      }

      function siGetActiveTopics() {
        return siLoadTopics().filter(t => !t.deleted);
      }

      function siGenerateTopicId() {
        return 'st_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
      }

      function siCleanupOrphanTopicChainLinks(topics) {
        const activeIds = new Set(topics.map(t => t.id));
        let changed = false;
        topics.forEach(t => {
          if (t.previousTopicId && !activeIds.has(t.previousTopicId)) {
            t.previousTopicId = null;
            changed = true;
          }
          if (t.nextTopicId && !activeIds.has(t.nextTopicId)) {
            t.nextTopicId = null;
            changed = true;
          }
        });
        return { topics, changed };
      }

      function siParseDeliverablesBatch(text) {
        if (typeof text !== 'string') return [];
        return text.split(/\n|\r\n/).map(s => s.trim()).filter(s => s.length > 0);
      }

      // ===== 战略专题 AI 助手（规则引擎，降低外部 LLM 依赖）=====
      function siAnalyzeTopicQuality(topic) {
        const suggestions = [];
        let score = 100;

        const obj = String(topic.researchObjectives || '').trim();
        if (obj.length < 20) {
          suggestions.push('研究目标过于简短，建议补充背景、范围与预期产出。');
          score -= 15;
        } else if (!/[0-9一二三四五六七八九十百千万]|指标|目标|产出|交付/.test(obj)) {
          suggestions.push('研究目标可加入更具体的衡量指标或关键产出。');
          score -= 8;
        }

        const deliverables = topic.deliverables || [];
        if (deliverables.length === 0) {
          suggestions.push('尚未定义交付件，建议列出至少 1-2 个可验收的产出物。');
          score -= 15;
        } else if (deliverables.some(d => String(d).length < 4)) {
          suggestions.push('部分交付件描述过短，建议写清交付件内容与验收标准。');
          score -= 5;
        }

        const milestones = topic.milestones || [];
        if (milestones.length === 0) {
          suggestions.push('缺少里程碑，建议按阶段拆解关键节点以跟踪进度。');
          score -= 12;
        } else {
          const withDate = milestones.filter(m => m.date);
          if (withDate.length < milestones.length) {
            suggestions.push('部分里程碑未设定日期，建议补全日期便于甘特图展示。');
            score -= 6;
          }
        }

        const summary = String(topic.summary || '').trim();
        if (topic.status === 'closed' && summary.length < 20) {
          suggestions.push('已闭环专题的结项总结较短，建议沉淀核心结论与可复用经验。');
          score -= 10;
        }

        const hasKms = String(topic.kmsUrl || '').trim().length > 0;
        if (!hasKms) {
          suggestions.push('未填写 KMS 链接，建议关联知识库页面便于查阅背景资料。');
          score -= 5;
        }

        const insights = topic.insights || [];
        if (insights.length === 0) {
          suggestions.push('未关联战略洞察，建议关联至少一条相关洞察以体现输入来源。');
          score -= 8;
        }

        return {
          score: Math.max(0, Math.min(100, score)),
          suggestions,
          details: {
            objectiveLength: obj.length,
            deliverableCount: deliverables.length,
            milestoneCount: milestones.length,
            linkedInsights: insights.length,
            hasSummary: summary.length > 0,
            hasKms
          }
        };
      }

      function siSuggestNextYearObjectives(topic) {
        const objectives = String(topic.researchObjectives || '').trim();
        const deliverables = (topic.deliverables || []).join('、');
        const milestones = (topic.milestones || []).map(m => m.title).join('、');
        const year = (topic.year || new Date().getFullYear()) + 1;

        const lines = [
          `基于「${topic.name}」的${topic.year || ''}年研究成果，${year}年重点深化以下内容：`,
          ''
        ];

        if (objectives) {
          lines.push(`1. 延续上一年研究目标，将「${objectives.slice(0, 40)}${objectives.length > 40 ? '…' : ''}」从试点/规划阶段推进到规模化落地；`);
        }
        if (deliverables) {
          lines.push(`2. 围绕已产出交付件（${deliverables.slice(0, 50)}${deliverables.length > 50 ? '…' : ''}）建立长效机制，形成可复用的标准方案；`);
        }
        if (milestones) {
          lines.push(`3. 针对关键节点（${milestones.slice(0, 50)}${milestones.length > 50 ? '…' : ''}）开展复盘，输出下一年度行动计划与风险预案。`);
        }
        if (lines.length <= 3) {
          lines.push(`2. 明确${year}年的关键假设、验证路径与阶段性产出，确保专题可衡量、可闭环。`);
        }
        lines.push('', '建议补充量化指标、责任人与验收标准后保存。');
        return lines.join('\n');
      }

      function siRecommendInsightsForTopic(topic) {
        const insights = siLoadInsights();
        if (!insights.length) return [];
        const topicText = `${topic.name} ${topic.researchObjectives}`.toLowerCase();
        return insights
          .filter(i => !(topic.insights || []).includes(i.id))
          .map(i => {
            const text = `${i.title} ${i.content} ${i.source}`.toLowerCase();
            let score = 0;
            const topicWords = topicText.split(/\s+|\p{P}/u).filter(w => w.length >= 2);
            topicWords.forEach(w => { if (text.includes(w)) score += 1; });
            if (i.impact === 'high') score += 3;
            if (i.impact === 'medium') score += 1;
            return { insight: i, score };
          })
          .filter(item => item.score > 0)
          .sort((a, b) => b.score - a.score)
          .slice(0, 3)
          .map(item => item.insight.id);
      }

      window.siShowTopicQualityAnalysis = function(topicId) {
        if (!siSafeTopicId(topicId)) return;
        const topic = siGetActiveTopics().find(t => t.id === topicId);
        if (!topic) return;
        const result = siAnalyzeTopicQuality(topic);
        const suggestionsHtml = result.suggestions.length
          ? `<ul style="margin:0;padding-left:18px;font-size:13px;color:var(--text-secondary);line-height:1.8;">${result.suggestions.map(s => `<li>${siEscapeHtml(s)}</li>`).join('')}</ul>`
          : '<p style="font-size:13px;color:var(--success);margin:0;">✓ 当前专题内容完整，暂无改进建议。</p>';
        const scoreColor = result.score >= 80 ? 'var(--success)' : result.score >= 60 ? 'var(--warning)' : 'var(--danger)';

        const panel = document.createElement('div');
        panel.id = 'topic-ai-quality-panel';
        panel.className = 'omp-modal-overlay';
        panel.style.zIndex = '100001';
        panel.innerHTML = `
          <div class="omp-modal" style="background:var(--bg-card);border-radius:12px;max-width:520px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);padding:24px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
              <h3 style="margin:0;font-size:16px;">AI 报告质量分析</h3>
              <button onclick="document.getElementById('topic-ai-quality-panel').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-secondary);">×</button>
            </div>
            <div style="text-align:center;margin-bottom:20px;">
              <div style="font-size:48px;font-weight:700;color:${scoreColor};">${result.score}</div>
              <div style="font-size:13px;color:var(--text-secondary);">综合质量评分</div>
            </div>
            <div style="margin-bottom:16px;">
              <div style="font-size:14px;font-weight:600;margin-bottom:8px;">改进建议</div>
              ${suggestionsHtml}
            </div>
            <div style="display:flex;justify-content:flex-end;">
              <button class="btn btn-secondary" onclick="document.getElementById('topic-ai-quality-panel').remove()">关闭</button>
            </div>
          </div>
        `;
        document.body.appendChild(panel);
        panel.addEventListener('click', (e) => { if (e.target === panel) panel.remove(); });
      };

      window.siFillAiNextYearObjectives = function(topicId) {
        if (!siSafeTopicId(topicId)) return;
        const topic = siGetActiveTopics().find(t => t.id === topicId);
        if (!topic) return;
        const suggestion = siSuggestNextYearObjectives(topic);
        const textarea = document.getElementById('edit-topic-researchObjectives');
        if (textarea) {
          textarea.value = suggestion;
          showToast('已生成下一年研究目标建议，请根据实际调整', 'success');
        }
      };

      window.siOpenTopicAiChat = function(topicId) {
        if (!siSafeTopicId(topicId)) return;
        const topic = siGetActiveTopics().find(t => t.id === topicId);
        if (!topic) return;
        if (!topic.kmsUrl) {
          showToast('该专题未关联 KMS 页面，无法使用 AI 问答', 'warning');
          return;
        }

        const pageIdMatch = /pageId=(\d+)/.exec(String(topic.kmsUrl));
        if (!pageIdMatch) {
          showToast('KMS 链接格式无法解析 pageId', 'warning');
          return;
        }
        const pageId = pageIdMatch[1];

        // 关闭可能已存在的面板
        document.getElementById('topic-ai-chat-overlay')?.remove();

        const overlay = document.createElement('div');
        overlay.id = 'topic-ai-chat-overlay';
        overlay.className = 'omp-modal-overlay';
        overlay.style.zIndex = '100002';
        overlay.innerHTML = `
          <div id="topic-ai-chat-modal" class="omp-modal omp-modal-wide" style="background:var(--bg-card);border-radius:12px;max-width:680px;width:100%;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border-color);flex-shrink:0;">
              <div style="min-width:0;">
                <h3 style="margin:0;font-size:16px;display:flex;align-items:center;gap:8px;">${icon('robot', { size: 16 })} AI 问答 · ${siEscapeHtml(topic.name)}</h3>
                <div style="font-size:12px;color:var(--text-secondary);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                  <a href="${siEscapeHtml(topic.kmsUrl)}" target="_blank" rel="noopener noreferrer" style="color:var(--primary);">${siEscapeHtml(topic.kmsUrl)}</a>
                </div>
              </div>
              <button onclick="document.getElementById('topic-ai-chat-overlay').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-secondary);flex-shrink:0;">×</button>
            </div>
            <div id="topic-ai-chat-area" style="flex:1;overflow-y:auto;padding:16px 20px;min-height:260px;">
              <div class="ai-message bot dste-ai-msg assistant">
                <div class="ai-avatar dste-ai-avatar">${icon('robot', { size: 14 })}</div>
                <div class="ai-message-content dste-ai-bubble"><span class="dste-ai-thinking">正在从 KMS 提取《${siEscapeHtml(topic.name)}》页面内容，请稍候…</span></div>
              </div>
            </div>
            <div style="padding:12px 20px;border-top:1px solid var(--border-color);flex-shrink:0;">
              <div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px;" id="topic-ai-status"><span class="dste-ai-thinking">正在提取 KMS 页面…</span></div>
              <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;" id="topic-ai-quick-actions">
                <button class="btn btn-sm btn-secondary dste-ai-chip" data-ai-topic-prompt="这个专题的核心结论是什么？">核心结论</button>
                <button class="btn btn-sm btn-secondary dste-ai-chip" data-ai-topic-prompt="关键里程碑与时间节点有哪些？">里程碑</button>
                <button class="btn btn-sm btn-secondary dste-ai-chip" data-ai-topic-prompt="主要风险与应对措施是什么？">风险与应对</button>
                <button class="btn btn-sm btn-secondary dste-ai-chip" data-ai-topic-prompt="这个专题对年度经营计划有什么影响？">经营影响</button>
              </div>
              <div class="dste-ai-composer">
                <input type="text" id="topic-ai-chat-input" placeholder="输入关于该专题的问题，例如：关键举措有哪些？" onkeypress="if(event.key==='Enter') window.siSendTopicAiMessage()" oninput="document.getElementById('topic-ai-chat-send').disabled=!this.value.trim()">
                <button class="dste-ai-send-btn" id="topic-ai-chat-send" aria-label="发送" onclick="window.siSendTopicAiMessage()" disabled>${icon('arrowUp', { size: 16 })}</button>
              </div>

        document.body.appendChild(overlay);
        overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

        // 快捷问题芯片
        overlay.addEventListener('click', (e) => {

          if (!chip) return;
          const input = document.getElementById('topic-ai-chat-input');

          }

        // 初始化临时会话，不污染全局 AI 会话列表
        window._topicAiSession = new AISession();
        window._topicAiKmsPage = null;

        // 拉取 KMS 页面内容
        (async () => {
          const statusEl = document.getElementById('topic-ai-status');
          const area = document.getElementById('topic-ai-chat-area');
          try {
            const client = getAIClient();
            const res = await client.request('/api/ai/tools/execute', {
              name: 'getKmsPage',

            if (!res.success || !res.result || !res.result.success) {
              const err = res.result?.error || res.error || '提取失败';

            window._topicAiKmsPage = { ...kmsPage, topic };

            const cachedTag = kmsPage.cached ? '（缓存命中）' : '（新提取）';
