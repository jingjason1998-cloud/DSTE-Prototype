<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>DSTE 战略管理平台</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="./styles/shell.css">
  <style>
    /* ===== cockpit.html 页面级响应式覆盖 ===== */

    /* Tablet (<1024px) */
    @media (max-width: 1024px) {
      #page-content [style*="grid-template-columns: repeat(4, 1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: 2fr 1fr"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(3, 1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: repeat(7, 1fr)"] {
        grid-template-columns: repeat(4, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: repeat(5, 1fr)"] {
        grid-template-columns: repeat(3, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: 280px 1fr"] {
        grid-template-columns: 1fr !important;
      }
      /* Roadmap 时间线节点缩小 */
      #dev-timeline .timeline-node {
        min-width: 90px !important;
        padding: 6px !important;
      }
    }

    /* Mobile (<768px) */
    @media (max-width: 768px) {
      #page-content [style*="grid-template-columns: repeat(4, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(2, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(3, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(7, 1fr)"] {
        grid-template-columns: repeat(3, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: repeat(5, 1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: 280px 1fr"] {
        grid-template-columns: 1fr !important;
      }
      /* Roadmap 时间线节点进一步缩小 */
      #dev-timeline .timeline-node {
        min-width: 80px !important;
        padding: 4px !important;
      }
      #dev-timeline .timeline-node > div:nth-child(2) {
        font-size: 12px !important;
      }
      #dev-timeline .timeline-node > div:nth-child(3),
      #dev-timeline .timeline-node > div:nth-child(4) {
        font-size: 10px !important;
      }
      /* 卡片 padding 缩小 */
      #page-content .card {
        padding: 12px !important;
      }
      /* 看板列从 4 列变为可滚动 */
      #page-content [style*="grid-template-columns: repeat(4, 1fr)"][class*="kanban"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
    }

    /* Small Phone (<480px) */
    @media (max-width: 480px) {
      #page-content [style*="grid-template-columns: repeat(2, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(7, 1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: repeat(5, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(4, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #dev-timeline .timeline-node {
        min-width: 70px !important;
      }
      #page-content .card {
        padding: 10px !important;
      }
      /* 看板单列 */
      #page-content [style*="grid-template-columns: repeat(4, 1fr)"][class*="kanban"] {
        grid-template-columns: 1fr !important;
      }
    }

    /* 表格横向滚动容器 */
    .table-scroll-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .table-scroll-wrapper table {
      min-width: 600px;
    }

    /* ===== KPI 指标树 — 卡片式层级视图 ===== */
    /* ===== Canvas 自由画布 KPI 树 ===== */
    .omp-kpi-canvas {
      position: relative;
      width: 100%;
      height: 700px;
      overflow: hidden;
      background: #f8f9fa;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      cursor: grab;
      user-select: none;
    }
    .omp-kpi-canvas:active { cursor: grabbing; }
    .omp-kpi-canvas-inner {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
    }
    /* SVG 连接线层 */
    .omp-canvas-svg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    .omp-canvas-svg path {
      fill: none;
      stroke: #D0D0D0;
      stroke-width: 2;
      transition: d 0.2s ease;
    }
    /* 画布节点卡片 */
    .omp-canvas-node {
      position: absolute;
      min-width: 160px;
      min-height: 90px;
      border-radius: 10px;
      padding: 12px;
      background: #fff;
      border: 1px solid #E8E8E8;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      cursor: grab;
      z-index: 2;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.2s, border-color 0.2s;
      overflow: hidden;
      resize: both;
    }
    .omp-canvas-node:active { cursor: grabbing; }
    .omp-canvas-node:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .omp-canvas-node.selected { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(59,130,246,0.3); }
    /* 维度角标 */
    .omp-dim-badge {
      position: absolute;
      top: -1px; right: -1px;
      width: 0; height: 0;
      border-style: solid;
      border-width: 0 24px 24px 0;
      border-color: transparent;
    }
    .omp-dim-badge.financial { border-right-color: #1E3A5F; }
    .omp-dim-badge.customer { border-right-color: #2E8B57; }
    .omp-dim-badge.internal { border-right-color: #D4A017; }
    .omp-dim-badge.learning { border-right-color: #6B4C9A; }
    /* 顶部状态色条 */
    .omp-canvas-node.status-achieved { border-top: 3px solid #22C55E; }
    .omp-canvas-node.status-warning { border-top: 3px solid #F59E0B; }
    .omp-canvas-node.status-lagging { border-top: 3px solid #EF4444; }
    .canvas-node-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: 6px;
      word-break: break-all;
    }
    .canvas-node-dept {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }
    .canvas-node-metric {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .canvas-node-metric strong { color: var(--text-primary); font-size: 13px; }
    .canvas-node-progress {
      margin-top: auto;
      padding-top: 6px;
    }
    .canvas-node-progress-bar {
      height: 4px;
      border-radius: 2px;
      background: #E5E7EB;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .canvas-node-progress-bar > div {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    .canvas-node-progress-bar > div.achieved { background: #22C55E; }
    .canvas-node-progress-bar > div.warning { background: #F59E0B; }
    .canvas-node-progress-bar > div.lagging { background: #EF4444; }
    .canvas-node-progress-text {
      font-size: 11px;
      font-weight: 600;
      text-align: right;
    }
    .canvas-node-progress-text.achieved { color: #16A34A; }
    .canvas-node-progress-text.warning { color: #D97706; }
    .canvas-node-progress-text.lagging { color: #DC2626; }
    /* 展开折叠按钮 */
    .canvas-node-expand {
      position: absolute;
      bottom: 6px;
      left: 6px;
      font-size: 14px;
      color: var(--text-tertiary);
      cursor: pointer;
      line-height: 1;
      z-index: 3;
    }
    /* 画布工具栏 */
    .omp-canvas-toolbar {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 6px;
      z-index: 10;
      background: rgba(255,255,255,0.9);
      padding: 6px 10px;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      font-size: 12px;
    }
    .omp-canvas-toolbar button {
      background: var(--bg-page);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-primary);
    }
    .omp-canvas-toolbar button:hover { background: var(--bg-card); }
    /* 缩放指示器 */
    .omp-canvas-zoom {
      position: absolute;
      bottom: 12px;
      right: 12px;
      z-index: 10;
      background: rgba(255,255,255,0.9);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      color: var(--text-secondary);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    /* 状态药丸（保留兼容） */
    .omp-status-pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
      letter-spacing: 0.5px;
    }
    .omp-status-pill.achieved { background: rgba(34,197,94,0.12); color: #16A34A; }
    .omp-status-pill.warning { background: rgba(245,158,11,0.12); color: #D97706; }
    .omp-status-pill.lagging { background: rgba(239,68,68,0.12); color: #DC2626; }
    /* 展开按钮（保留兼容） */
    .omp-expand-btn {
      transition: transform 0.2s ease;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      padding: 0;
      width: 20px;
      text-align: center;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .omp-expand-btn.expanded { transform: rotate(90deg); }
    /* 保留兼容：层级差异化 */
    .omp-kpi-card[data-level="0"] { border-left: 4px solid #003087; }
    .omp-kpi-card[data-level="1"] { border-left: 3px solid #005EB8; }
    .omp-kpi-card[data-level="2"] { border-left: 2px solid #99C7E8; }
    .omp-kpi-card[data-level="0"] { border-left: 4px solid #003087; }
    .omp-kpi-card[data-level="1"] { border-left: 3px solid #005EB8; }
    .omp-kpi-card[data-level="2"] { border-left: 2px solid #99C7E8; }
    /* 响应式 */
    @media (max-width: 768px) {
      .omp-kpi-card.mindmap-node { width: 140px; min-height: 80px; padding: 10px; }
      .omp-kpi-children-row { gap: 10px; }
    }

    /* 减少动画偏好 */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

  <script src="../assets/js/main.js"></script>
  <script>
    (function() {
      'use strict';

      // ===== 配置 =====
      const API_BASE = (() => {
        const host = window.location.hostname;
        if (host === 'localhost' || host === '127.0.0.1') {
          return localStorage.getItem('dste_api_base') || '';
        }
        return 'https://dste-api.jasonxspace.workers.dev';
      })();

      async function apiSave(endpoint, data) {
        // 无论 API 是否可用，都先保存到 localStorage 作为兜底，防止数据丢失
        if (endpoint === '/api/meetings') {
          try {
            localStorage.setItem('dste_meetings', JSON.stringify(data));
          } catch (e) {
            console.warn('localStorage save failed:', e.message);
          }
        }
        if (!API_BASE) return;
        try {
          const token = localStorage.getItem('dste-token');
          const headers = { 'Content-Type': 'application/json' };
          if (token) headers['Authorization'] = `Bearer ${token}`;
          const resp = await fetch(API_BASE + endpoint, {
            method: 'POST',
            headers,
            body: JSON.stringify(data),
          });
          if (resp.status === 401) {
            redirectToCasLogin();
            return;
          }
        } catch (e) {
          console.warn('API save failed:', e.message);
        }
      }

      // CAS 登录跳转
      function redirectToCasLogin() {
        const service = encodeURIComponent(window.location.origin + window.location.pathname);
        window.location.href = `https://passport.fanruan.com/cas/login?service=${service}`;
      }

      // CAS 回调处理：从 URL 提取 ticket，调用后端换取 token
      async function handleCasCallback() {
        const urlParams = new URLSearchParams(window.location.search);
        const ticket = urlParams.get('ticket');
        if (!ticket) return false;

        const cleanUrl = window.location.pathname + window.location.hash;
        history.replaceState(null, '', cleanUrl);

        try {
          const service = encodeURIComponent(window.location.origin + window.location.pathname);
          const resp = await fetch(`${API_BASE}/api/auth/cas/login?ticket=${encodeURIComponent(ticket)}&service=${service}`);
          const json = await resp.json();
          if (json.success && json.token) {
            localStorage.setItem('dste-token', json.token);
            localStorage.setItem('dste-user', json.user?.name || json.user?.username || '');
            sessionStorage.setItem('dste-user', json.user?.name || json.user?.username || '');
            updateUserUI();
            return true;
          }
        } catch (e) {
          console.error('CAS callback failed:', e);
        }
        return false;
      }

      // 检查登录状态：验证 token 是否有效
      async function checkLoginStatus() {
        const token = localStorage.getItem('dste-token');
        if (!token) return false;

        try {
          const resp = await fetch(`${API_BASE}/api/auth/me`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (resp.ok) {
            const json = await resp.json();
            if (json.success && json.user) {
              localStorage.setItem('dste-user', json.user.name || json.user.username || '');
              sessionStorage.setItem('dste-user', json.user.name || json.user.username || '');
              updateUserUI();
              return true;
            }
          }
        } catch (e) {
          console.warn('Login status check failed:', e);
        }

        localStorage.removeItem('dste-token');
        localStorage.removeItem('dste-user');
        sessionStorage.removeItem('dste-user');
        return false;
      }

      // 更新用户 UI（头像、下拉菜单名）
      function updateUserUI() {
        const user = localStorage.getItem('dste-user') || sessionStorage.getItem('dste-user') || '张';
        const avatar = document.getElementById('user-avatar');
        const dropdownName = document.getElementById('user-dropdown-name');
        if (avatar) avatar.textContent = user.charAt(0);
        if (dropdownName) dropdownName.textContent = user;
      }

      // 登出
      async function logout() {
        const token = localStorage.getItem('dste-token');
        if (token) {
          try {
            await fetch(`${API_BASE}/api/auth/logout`, {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${token}` }
            });
          } catch (e) {
            console.warn('Logout API failed:', e);
          }
        }
        localStorage.removeItem('dste-token');
        localStorage.removeItem('dste-user');
        sessionStorage.removeItem('dste-user');
        window.location.reload();
      }

      async function apiLoad(endpoint) {
        let apiData = null;
        if (API_BASE) {
          try {
            const token = localStorage.getItem('dste-token');
            const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
            const resp = await fetch(API_BASE + endpoint, { headers });
            if (resp.status === 401) {
              redirectToCasLogin();
              return null;
            }
            const json = await resp.json();
            if (json.success && json.data) apiData = json.data;
          } catch (e) {
            console.warn('API load failed:', e.message);
          }
        }
        if (apiData && apiData.length > 0) return apiData;
        // API 无数据或失败时 fallback 到 localStorage
        if (endpoint === '/api/meetings') {
          const local = localStorage.getItem('dste_meetings');
          if (local) {
            try {
              const parsed = JSON.parse(local);
              if (parsed && parsed.length > 0) return parsed;
            } catch (e) {
              console.warn('localStorage parse failed:', e);
            }
          }
        }
        return null;
      }

      const TOP_NAV = [
        { id: 'dashboard', icon: '🎛️', label: '驾驶舱', full: '驾驶舱', defaultPage: 'dashboard' },
        { id: 'sp', icon: '🎯', label: 'SP', full: '战略制定', defaultPage: 'sp/strategy-map' },
        { id: 'bp', icon: '🔧', label: 'BP', full: '战略解码', defaultPage: 'bp/kpi' },
        { id: 'exe', icon: '🚀', label: '执行', full: '战略执行', defaultPage: 'exe/tasks' },
        { id: 'rev', icon: '📊', label: '评估', full: '战略评估', defaultPage: 'rev/performance' },
        { id: 'ai', icon: '🤖', label: 'AI', full: 'AI 助手', defaultPage: 'ai' }
      ];

          { type: 'quick', label: '快捷入口' },
          { type: 'item', id: 'sp/strategy-map', icon: '🗺️', label: '战略地图' },

          { type: 'item', id: 'exe/meeting-review', icon: '📋', label: '会议审核' },
          { type: 'group', title: '系统管理', items: [

        ],
        sp: [
          { type: 'group', title: '战略制定 (SP)', items: [
            { id: 'sp/strategy-map', icon: '🗺️', label: '战略地图' },
            { id: 'sp/insights-topics', icon: '🔭', label: '战略洞察与专题' }

          { type: 'quick', label: '快捷工具' },
          { type: 'item', id: 'exe/meeting-review', icon: '📋', label: '会议材料审核' }
        ],
        bp: [
          { type: 'group', title: '战略解码 (BP)', items: [
            { id: 'bp/kpi', icon: '📈', label: 'KPI 指标体系' },
            { id: 'bp/bem', icon: '🔧', label: 'BEM 战略解码' },
            { id: 'bp/annual-plan', icon: '📅', label: '年度经营计划' }
          ]},
          { type: 'quick', label: '快捷工具' },
          { type: 'item', id: 'exe/meeting-review', icon: '📋', label: '会议材料审核' }
        ],
        exe: [
          { type: 'group', title: '战略执行', items: [
            { id: 'exe/tasks', icon: '✅', label: '重点工作管理' },
            { id: 'exe/business-topics', icon: '📂', label: '业务专题管理' },
            { id: 'exe/meetings', icon: '🎯', label: '经营分析会 ⭐' },
            { id: 'exe/report-center', icon: '📊', label: '报表中心' }
          ]},
          { type: 'quick', label: '快捷工具' },
          { type: 'item', id: 'exe/meeting-review', icon: '📋', label: '会议材料审核' }
        ],
        rev: [
          { type: 'group', title: '战略评估', items: [
            { id: 'rev/performance', icon: '🏆', label: '绩效与激励' },
            { id: 'rev/cadre', icon: '👔', label: '干部管理' },
            { id: 'rev/review', icon: '🔄', label: '战略复盘' },
            { id: 'rev/gap-analysis', icon: '📉', label: '差距分析' }
          ]},
          { type: 'quick', label: '快捷工具' },
          { type: 'item', id: 'exe/meeting-review', icon: '📋', label: '会议材料审核' }
        ],
        ai: []
      };

      // ===== 组织绩效管理模块 (OMP) 数据层 =====

            <input type="text" id="ind-search" placeholder="🔍 搜索指标名称/编码/描述..." value="${state.searchQuery}" style="flex:1;min-width:200px;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;" data-action="ind-search">
            <select data-action="ind-filter-freq" style="padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;cursor:pointer;">
              <option value="all" ${state.frequencyFilter === 'all' ? 'selected' : ''}>全部频次</option>
              <option value="monthly" ${state.frequencyFilter === 'monthly' ? 'selected' : ''}>月度</option>
              <option value="quarterly" ${state.frequencyFilter === 'quarterly' ? 'selected' : ''}>季度</option>
              <option value="yearly" ${state.frequencyFilter === 'yearly' ? 'selected' : ''}>年度</option>

            <!-- 左侧分类树 -->

                <div style="padding:12px;">
                  <div class="ind-cat-item ${state.selectedCategory === 'all' ? 'active' : ''}" data-action="ind-select-cat" data-cat="all" style="padding:8px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text-primary);display:flex;align-items:center;gap:8px;margin-bottom:2px;${state.selectedCategory === 'all' ? 'background:var(--bg-active);font-weight:600;' : ''}">
                    <span>📋</span> 全部指标 <span style="margin-left:auto;font-size:11px;color:var(--text-tertiary);background:var(--bg-page);padding:1px 6px;border-radius:10px;">${indicators.length}</span>
                  </div>
                  ${categories.map(cat => `
                    <div style="margin-top:4px;">
                      <div class="ind-cat-item ${state.selectedCategory === cat ? 'active' : ''}" data-action="ind-select-cat" data-cat="${cat}" style="padding:8px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text-primary);display:flex;align-items:center;gap:8px;${state.selectedCategory === cat ? 'background:var(--bg-active);font-weight:600;' : ''}">
                        <span>${catIcons[cat]}</span> ${cat}指标 <span style="margin-left:auto;font-size:11px;color:var(--text-tertiary);background:var(--bg-page);padding:1px 6px;border-radius:10px;">${catCounts[cat] || 0}</span>
                      </div>
                      ${state.selectedCategory === cat ? subCategories[cat].map(sub => `
                        <div class="ind-subcat-item ${state.selectedSubCategory === sub ? 'active' : ''}" data-action="ind-select-subcat" data-sub="${sub}" style="padding:6px 10px 6px 32px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--text-secondary);margin-top:2px;${state.selectedSubCategory === sub ? 'background:var(--bg-active);color:var(--primary);font-weight:500;' : ''}">
                          ${sub}
                        </div>
                      `).join('') : ''}
                    </div>
                  `).join('')}
                </div>
              </div>
            </div>

            <!-- 右侧内容区 -->
            <div style="flex:1;min-width:0;">
              ${filtered.length === 0 ? `
                <div class="card" style="text-align:center;padding:60px 20px;">
                  <div style="font-size:48px;margin-bottom:16px;">🔍</div>
                  <div style="font-size:16px;color:var(--text-primary);margin-bottom:8px;">未找到匹配的指标</div>
                  <div style="font-size:13px;color:var(--text-tertiary);">请调整筛选条件或搜索关键词</div>
                </div>
              ` : `
                <div style="display:grid;grid-template-columns:${selectedInd ? '1fr 320px' : '1fr'};gap:16px;">
                  <!-- 指标列表 -->
                  <div class="card" style="overflow:hidden;">
                    <div style="overflow-x:auto;">
                      <table style="width:100%;border-collapse:collapse;font-size:13px;">
                        <thead>
                          <tr style="border-bottom:1px solid var(--border-light);">
                            <th style="padding:10px 12px;text-align:left;font-weight:600;color:var(--text-tertiary);font-size:12px;">编码</th>
                            <th style="padding:10px 12px;text-align:left;font-weight:600;color:var(--text-tertiary);font-size:12px;">指标名称</th>
                            <th style="padding:10px 12px;text-align:left;font-weight:600;color:var(--text-tertiary);font-size:12px;">分类</th>
                            <th style="padding:10px 12px;text-align:center;font-weight:600;color:var(--text-tertiary);font-size:12px;">频次</th>
                            <th style="padding:10px 12px;text-align:center;font-weight:600;color:var(--text-tertiary);font-size:12px;">单位</th>
                            <th style="padding:10px 12px;text-align:center;font-weight:600;color:var(--text-tertiary);font-size:12px;">状态</th>
                            <th style="padding:10px 12px;text-align:center;font-weight:600;color:var(--text-tertiary);font-size:12px;">操作</th>
                          </tr>
                        </thead>
                        <tbody>
                          ${filtered.map(ind => `
                            <tr style="border-bottom:1px solid var(--border-light);cursor:pointer;${state.selectedIndicatorId === ind.id ? 'background:var(--bg-active);' : ''}" data-action="ind-select" data-id="${ind.id}">
                              <td style="padding:10px 12px;color:var(--text-secondary);font-size:12px;font-family:monospace;">${ind.code}</td>
                              <td style="padding:10px 12px;">
                                <div style="font-weight:500;color:var(--text-primary);">${ind.name}</div>
                                <div style="font-size:11px;color:var(--text-tertiary);margin-top:2px;">${ind.description.substring(0, 30)}${ind.description.length > 30 ? '...' : ''}</div>
                              </td>
                              <td style="padding:10px 12px;">
                                <span style="font-size:11px;padding:2px 8px;border-radius:4px;background:var(--bg-page);color:var(--text-secondary);">${ind.category}</span>
                              </td>
                              <td style="padding:10px 12px;text-align:center;">
                                <span style="font-size:11px;padding:2px 8px;border-radius:4px;background:${freqColors[ind.frequency]}15;color:${freqColors[ind.frequency]};">${freqLabels[ind.frequency]}</span>
                              </td>
                              <td style="padding:10px 12px;text-align:center;color:var(--text-secondary);font-size:12px;">${ind.unit}</td>
                              <td style="padding:10px 12px;text-align:center;">
                                <span style="font-size:11px;padding:2px 8px;border-radius:10px;background:${statusColors[ind.status]}15;color:${statusColors[ind.status]};">${statusLabels[ind.status]}</span>
                              </td>
                              <td style="padding:10px 12px;text-align:center;">
                                <button class="btn btn-sm btn-secondary" data-action="ind-edit" data-id="${ind.id}" style="font-size:11px;padding:2px 8px;margin-right:4px;" onclick="event.stopPropagation();">编辑</button>
                                <button class="btn btn-sm btn-danger" data-action="ind-delete" data-id="${ind.id}" style="font-size:11px;padding:2px 8px;" onclick="event.stopPropagation();">删除</button>
                              </td>
                            </tr>
                          `).join('')}
                        </tbody>
                      </table>
                    </div>
                  </div>

                  ${selectedInd ? `
                    <!-- 详情面板 -->
                    <div class="card" style="height:fit-content;">
                      <div class="card-header">
                        <div class="card-title">📋 指标详情</div>
                      </div>
                      <div style="padding:16px;">
                        <div style="font-size:16px;font-weight:600;color:var(--text-primary);margin-bottom:4px;">${selectedInd.name}</div>
                        <div style="font-size:12px;color:var(--text-tertiary);margin-bottom:16px;font-family:monospace;">${selectedInd.code}</div>

                        <div style="margin-bottom:12px;">
                          <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:4px;">指标定义</div>
                          <div style="font-size:13px;color:var(--text-primary);line-height:1.5;">${selectedInd.description}</div>
                        </div>

                        <div style="margin-bottom:12px;">
                          <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:4px;">计算公式</div>
                          <div style="font-size:13px;color:var(--primary);font-family:monospace;background:var(--bg-page);padding:8px 10px;border-radius:6px;">${selectedInd.formula}</div>
                        </div>

                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
                          <div>
                            <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:4px;">单位</div>
                            <div style="font-size:13px;color:var(--text-primary);">${selectedInd.unit}</div>
                          </div>
                          <div>
                            <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:4px;">统计频次</div>
                            <div style="font-size:13px;color:var(--text-primary);">${freqLabels[selectedInd.frequency]}</div>
                          </div>
                          <div>
                            <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:4px;">数据来源</div>
                            <div style="font-size:13px;color:var(--text-primary);">${selectedInd.dataSource}</div>
                          </div>
                          <div>
                            <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:4px;">责任部门</div>
                            <div style="font-size:13px;color:var(--text-primary);">${selectedInd.responsibleDept}</div>
                          </div>
                        </div>

                        <div style="margin-bottom:12px;">
                          <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:4px;">分类</div>
                          <div style="font-size:13px;color:var(--text-primary);">${catIcons[selectedInd.category]} ${selectedInd.category} / ${selectedInd.subCategory}</div>
                        </div>

                        <div style="margin-bottom:12px;">
                          <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:4px;">趋势方向</div>
                          <div style="font-size:13px;color:var(--text-primary);">${selectedInd.isPositive ? '✅ 越高越好' : '⬇️ 越低越好'}</div>
                        </div>

                        <div style="padding-top:12px;border-top:1px solid var(--border-light);">
                          <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:4px;">创建时间</div>
                          <div style="font-size:12px;color:var(--text-secondary);">${selectedInd.createdAt}</div>
                        </div>

                        <div style="display:flex;gap:8px;margin-top:16px;">
                          <button class="btn btn-primary" style="flex:1;font-size:12px;" data-action="ind-edit" data-id="${selectedInd.id}">编辑</button>
                          <button class="btn btn-secondary" style="font-size:12px;" data-action="ind-clear-select">关闭</button>
                        </div>
                      </div>
                    </div>
                  ` : ''}
                </div>
              `}
            </div>
          </div>

          <style>
            .ind-cat-item:hover { background: var(--bg-hover); }
            .ind-cat-item.active { background: var(--bg-active) !important; }
            .ind-subcat-item:hover { background: var(--bg-hover); }
            .ind-subcat-item.active { background: var(--bg-active) !important; }
          </style>
        `;
      }

      // ===== 页面内容 =====
      const PAGES = {
        'dashboard': renderDashboard,
        'dashboard/roadmap': renderDevTimeline,
        'sp/strategy-map': () => renderPlaceholder('🗺️ 战略地图', '可视化展示企业战略地图，基于平衡计分卡四维度构建战略目标体系。'),
        'sp/insights-topics': renderInsightsTopics,
        'bp/kpi': renderIndicatorSystem,
        'bp/bem': () => renderPlaceholder('🔧 BEM 战略解码', '基于 BEM 六步解码法，将战略转化为可执行的行动计划。'),
        'bp/annual-plan': () => renderPlaceholder('📅 年度经营计划', '年度经营目标分解、资源配置、预算编制与执行跟踪。'),
        'exe/tasks': renderTasks,
        'exe/business-topics': () => { window.location.href = 'business-topics.html'; return ''; },
        'exe/meetings': () => { window.location.href = 'meetings.html'; return ''; },
        'exe/report-center': renderReportCenter,
        'rev/performance': () => renderPlaceholder('🏆 绩效与激励', '绩效考核体系管理、激励方案设计与执行效果评估。'),
        'rev/cadre': () => renderPlaceholder('👔 干部管理', '干部梯队建设、能力评估、轮岗培养与继任计划。'),
        'rev/review': () => renderPlaceholder('🔄 战略复盘', '定期战略复盘会议管理，差距分析、经验萃取与改进措施跟踪。'),
        'rev/gap-analysis': () => renderPlaceholder('📉 差距分析', '战略目标与实际执行的差距分析，根因定位与改进建议。'),
        'ai': renderAI
      };

      // ===== 路由状态 =====
      let currentPhase = 'dashboard';
      let currentPage = 'dashboard';

      // ===== 初始化 =====
      async function init() {
        // 1. 优先处理 CAS 回调（URL 中有 ticket）
        const casHandled = await handleCasCallback();

        // 2. 检查登录状态（无回调时）
        if (!casHandled) {
          const isLoggedIn = await checkLoginStatus();
          // 本地开发环境可免登录
          const isLocalDev = ['localhost', '127.0.0.1'].includes(window.location.hostname);
          if (!isLoggedIn && !isLocalDev) {
            redirectToCasLogin();
            return;
          }
        }

        renderTopNav();

        // 加载会议数据：优先 API，其次 localStorage（由 apiLoad 处理），最后由 renderMeetings 创建 mock
        const remoteMeetings = await apiLoad('/api/meetings');
        if (remoteMeetings && remoteMeetings.length > 0) {
          window._meetingsData = remoteMeetings;
        }

        const hash = window.location.hash.slice(1) || 'dashboard';
        navigate(hash, false);
        window.addEventListener('hashchange', () => navigate(window.location.hash.slice(1), false));

        // 显示用户名
        updateUserUI();

        // 用户下拉菜单
        const avatar = document.getElementById('user-avatar');
        const dropdown = document.getElementById('user-dropdown');
        const logoutBtn = document.getElementById('user-logout');
        if (avatar && dropdown) {
          avatar.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('open');
          });
          document.addEventListener('click', (e) => {
            if (!avatar.contains(e.target) && !dropdown.contains(e.target)) {
              dropdown.classList.remove('open');
            }
          });
        }
        if (logoutBtn) {
          logoutBtn.addEventListener('click', logout);
        }

        // 移动端汉堡菜单切换
        const menuToggle = document.getElementById('mobile-menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        if (menuToggle && sidebar && overlay) {
          menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('open');
          });
          overlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('open');
          });
          // 点击 sidebar 内的链接后自动关闭
          sidebar.addEventListener('click', (e) => {
            if (e.target.closest('.sidebar-item') || e.target.closest('[data-page]')) {
              sidebar.classList.remove('open');
              overlay.classList.remove('open');
            }
          });
        }
      }

      // ===== 渲染顶部导航 =====
      function renderTopNav() {
        const container = document.getElementById('top-nav-links');
        container.innerHTML = TOP_NAV.map(item => `
          <li><a href="#${item.defaultPage}" data-phase="${item.id}" class="top-nav-item">
            <span>${item.icon}</span>
            <span>${item.label}</span>
            <span class="nav-full-label">${item.full}</span>
          </a></li>
        `).join('');

        container.querySelectorAll('a').forEach(link => {
          link.addEventListener('click', (e) => {
            e.preventDefault();
            const phase = link.dataset.phase;
            const defaultPage = TOP_NAV.find(n => n.id === phase).defaultPage;
            // 如果已经在该phase，跳转到默认页
            if (currentPhase === phase) {
              navigate(defaultPage);
            } else {
              // 切换phase，跳转到默认页
              navigate(defaultPage);
            }
          });
        });
      }

      // ===== 导航 =====
      // 外部页面映射
      const EXTERNAL_PAGES = {
        'exe/meeting-review': 'reviewer.html',
        'exe/business-topics': 'business-topics.html',
        'exe/meetings': 'meetings.html'
      };

      function navigate(pageId, pushState = true) {
        if (!pageId) pageId = 'dashboard';
        
        // 外部链接直接跳转
        if (EXTERNAL_PAGES[pageId]) {
          window.location.href = EXTERNAL_PAGES[pageId];
          return;
        }
        
        if (!PAGES[pageId]) pageId = 'dashboard';

        // 同步 URL hash（避免和 hashchange 循环触发）
        if (pushState && window.location.hash.slice(1) !== pageId) {
          window.location.hash = pageId;
        }

        currentPage = pageId;

        // 确定当前 phase
        const phase = TOP_NAV.find(n => pageId === n.id || pageId.startsWith(n.id + '/'))?.id || 'dashboard';
        currentPhase = phase;

        // 更新顶部 active
        document.querySelectorAll('.top-nav-item').forEach(link => {
          link.classList.toggle('active', link.dataset.phase === phase);
        });

        // 更新左侧栏
        renderSidebar(phase);

        // 更新内容
        const contentEl = document.getElementById('page-content');
        contentEl.style.animation = 'none';
        contentEl.offsetHeight; // trigger reflow
        contentEl.innerHTML = PAGES[pageId]();
        contentEl.style.animation = '';

        // Roadmap 时间线默认滚动到最左侧（显示最新版本）
        if (pageId === 'dashboard/roadmap') {
          requestAnimationFrame(() => {
            const tl = document.getElementById('dev-timeline');
            if (tl) tl.scrollLeft = 0;
          });
        }

        // 绑定事件委托（替代内联 onclick）
        bindPageEvents(contentEl);

        // 更新左侧 active
        document.querySelectorAll('.sidebar-item').forEach(item => {
          item.classList.toggle('active', item.dataset.page === pageId);
        });

        // 更新标题
        const pageNames = {
          'dashboard': '驾驶舱',
          'sp/strategy-map': '战略地图', 'sp/insights-topics': '战略洞察与专题',
          'bp/kpi': 'KPI 指标体系', 'bp/bem': 'BEM 战略解码', 'bp/annual-plan': '年度经营计划',
          'exe/tasks': '重点工作管理', 'exe/business-topics': '业务专题管理', 'exe/meetings': '经营分析会', 'exe/meetings/edit': '编辑会议', 'exe/meeting-review': '会议材料审核',
          'rev/performance': '绩效与激励', 'rev/cadre': '干部管理', 'rev/review': '战略复盘', 'rev/gap-analysis': '差距分析',
          'ai': 'AI 战略助手',
          'dashboard/roadmap': '开发路线图 Road Map'
        };
        document.title = (pageNames[pageId] || 'DSTE') + ' - DSTE 战略管理平台';
      }

      // ===== 事件委托（替代内联 onclick）=====
      function bindPageEvents(container) {
        container.addEventListener('click', (e) => {
          // data-navigate: 面包屑/相关链接导航
          const navLink = e.target.closest('[data-navigate]');
          if (navLink) {
            e.preventDefault();
            navigate(navLink.dataset.navigate);
            return;
          }
          // data-filter-roadmap: 路线图筛选
          const filterBtn = e.target.closest('[data-filter-roadmap]');
          if (filterBtn) {
            filterRoadmap(filterBtn.dataset.filterRoadmap);
            return;
          }
          // data-scroll-to: 平滑滚动到元素
          const scrollTrigger = e.target.closest('[data-scroll-to]');
          if (scrollTrigger) {
            const target = document.getElementById(scrollTrigger.dataset.scrollTo);
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            return;
          }
          // OMP: data-action 事件委托
          const actionBtn = e.target.closest('[data-action]');
          if (actionBtn) {
            const action = actionBtn.dataset.action;
            const id = actionBtn.dataset.id;
            const filter = actionBtn.dataset.filter;
            const tab = actionBtn.dataset.tab;
            switch(action) {
              case 'omp-switch-tab': window.omp_switchTab(tab); break;
              case 'omp-view-kpi': window.omp_viewKpi(id); break;
              case 'omp-edit-kpi': window.omp_editKpi(id); break;
              case 'omp-new-kpi': window.omp_newKpi(); break;
              case 'omp-view-task': window.omp_viewTask(id); break;
              case 'omp-edit-task': window.omp_editTask(id); break;
              case 'omp-new-task': window.omp_newTask(); break;
              case 'omp-delete-kpi': window.omp_deleteKpi(id); break;
              case 'omp-delete-task': window.omp_deleteTask(id); break;
              case 'omp-export': window.omp_exportData(); break;
              case 'omp-toggle-view':
                window._ompState.kpiViewMode = actionBtn.dataset.view;
                navigate('exe/tasks');
                break;
              case 'omp-decompose-kpi': window.omp_openDecomposeModal(id); break;
              case 'omp-filter-kpi':
                if (filter) { window._ompState.kpiFilter[filter] = actionBtn.value; navigate('exe/tasks'); }
                break;
              case 'omp-filter-task':
                if (filter) { window._ompState.taskFilter[filter] = actionBtn.value; navigate('exe/tasks'); }
                break;
              // ===== 指标体系事件 =====
              case 'ind-select':
                window._indicatorState.selectedIndicatorId = id;
                navigate('bp/kpi');
                break;
              case 'ind-select-cat':
                window._indicatorState.selectedCategory = actionBtn.dataset.cat;
                window._indicatorState.selectedSubCategory = null;
                window._indicatorState.selectedIndicatorId = null;
                navigate('bp/kpi');
                break;
              case 'ind-select-subcat':
                window._indicatorState.selectedSubCategory = actionBtn.dataset.sub;
                window._indicatorState.selectedIndicatorId = null;
                navigate('bp/kpi');
                break;
              case 'ind-new': window.ind_openModal('new'); break;
              case 'ind-edit': window.ind_openModal('edit', id); break;
              case 'ind-delete': window.ind_delete(id); break;
              case 'ind-export': window.ind_export(); break;
              case 'ind-clear-select':
                window._indicatorState.selectedIndicatorId = null;
                navigate('bp/kpi');
                break;
              case 'ind-filter-freq':
                window._indicatorState.frequencyFilter = actionBtn.value;
                navigate('bp/kpi');
                break;
              case 'ind-filter-status':
                window._indicatorState.statusFilter = actionBtn.value;
                navigate('bp/kpi');
                break;
            }
            return;
          }
        });

              navigate('bp/kpi');
            }, 300);
          });
        }
      }

      // ===== KPI 指标树 — 卡片式层级视图 =====
      function omp_kpiBuildTree(kpis) {
        const childrenMap = {};
        kpis.forEach(k => { childrenMap[k.id] = []; });
        kpis.forEach(k => {
          if (k.parentId && childrenMap[k.parentId] !== undefined) {
            childrenMap[k.parentId].push(k);
          }
        });
        const roots = kpis.filter(k => !k.parentId || !kpis.find(p => p.id === k.parentId));
        return { roots, childrenMap };
      }

      function omp_kpiRenderRing(rate, size) {
        const r = Math.round(size / 2) - 4;
        const c = Math.round(2 * Math.PI * r * 100) / 100;
        const dash = Math.round(c * Math.min(rate, 100) / 100 * 100) / 100;
        const color = rate >= 95 ? '#16A34A' : rate >= 80 ? '#D97706' : '#DC2626';
        const glow = rate >= 100 ? 'filter: drop-shadow(0 0 4px rgba(22,163,74,0.4));' : '';
        const center = Math.round(size / 2);
        return `<svg class="omp-kpi-ring" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="${glow} flex-shrink:0;">
          <circle cx="${center}" cy="${center}" r="${r}" fill="none" stroke="var(--border-color)" stroke-width="3"/>
          <circle cx="${center}" cy="${center}" r="${r}" fill="none" stroke="${color}" stroke-width="3"
            stroke-dasharray="${dash} ${c}" stroke-linecap="round" transform="rotate(-90 ${center} ${center})"/>
        </svg>`;
      }

      function omp_renderKpiTree(kpis, indicators, statusBadge, miniTrend) {
        const expandedIds = window._ompState.kpiExpandedIds;
        const { roots, childrenMap } = omp_kpiBuildTree(kpis);
        // BSC 维度配置（用于角标颜色）
        const BSC_DIMENSIONS = {
          financial: { name: '财务', color: '#1E3A5F' },
          customer:  { name: '客户', color: '#2E8B57' },
          internal:  { name: '流程', color: '#D4A017' },
          learning:  { name: '成长', color: '#6B4C9A' }
        };
        // 首次渲染时，自动展开所有根节点（一次性）
        if (!window._ompState.kpiTreeAutoExpanded) {
          roots.forEach(r => {
            if (childrenMap[r.id] && childrenMap[r.id].length > 0) {
              expandedIds.add(r.id);
            }
          });
          window._ompState.kpiTreeAutoExpanded = true;
        }
        // 画布状态
        const canvasState = window._ompState.kpiCanvasState || {};
        const scale = canvasState.scale || 1;
        const offsetX = canvasState.offsetX || 0;
        const offsetY = canvasState.offsetY || 0;

        // 收集所有可见节点
        const visibleNodes = [];
        const visibleEdges = []; // { from: kpiId, to: kpiId }

        function traverse(kpi) {
          visibleNodes.push(kpi);
          const hasChildren = childrenMap[kpi.id] && childrenMap[kpi.id].length > 0;
          const isExpanded = expandedIds.has(kpi.id);
          if (hasChildren && isExpanded) {
            childrenMap[kpi.id].forEach(child => {
              visibleEdges.push({ from: kpi.id, to: child.id });
              traverse(child);
            });
          }
        }
        roots.forEach(r => traverse(r));

        // 自动布局：如果节点没有位置，计算默认位置
        // 使用简单的层级布局：根在左，子向右展开
        const nodePositions = {};
        const levelWidth = 220;
        const nodeHeight = 110;
        const levelNodes = {}; // { level: [kpiId, ...] }
        
        function collectLevels(kpi, level) {
          if (!levelNodes[level]) levelNodes[level] = [];
          levelNodes[level].push(kpi.id);
          const isExpanded = expandedIds.has(kpi.id);
          if (childrenMap[kpi.id] && isExpanded) {
            childrenMap[kpi.id].forEach(child => collectLevels(child, level + 1));
          }
        }
        roots.forEach(r => collectLevels(r, 0));

        // 计算每个节点的位置
        function sanitizePos(val, fallback) {
          const n = parseFloat(val);
          return (Number.isFinite(n) && n >= 0) ? n : fallback;
        }
        Object.entries(levelNodes).forEach(([level, ids]) => {
          const lvl = parseInt(level);
          const x = lvl * levelWidth + 20;
          ids.forEach((id, idx) => {
            const kpi = kpis.find(k => k.id === id);
            // 优先使用保存的位置（严格校验：非 null/undefined、有效数字、非负）
            const savedX = kpi && kpi.x != null ? parseFloat(kpi.x) : NaN;
            const savedY = kpi && kpi.y != null ? parseFloat(kpi.y) : NaN;
            if (Number.isFinite(savedX) && Number.isFinite(savedY) && savedX > 0 && savedY > 0) {
              nodePositions[id] = {
                x: savedX,
                y: savedY,
                w: sanitizePos(kpi.width, 170),
                h: sanitizePos(kpi.height, 100)
              };
            } else {
              const y = idx * (nodeHeight + 20) + 20;
              nodePositions[id] = { x, y, w: 170, h: 100 };
            }
          });
        });

        // 强制净化：确保 nodePositions 中所有坐标都是有效数字
        Object.keys(nodePositions).forEach(id => {
          const p = nodePositions[id];
          if (!Number.isFinite(p.x) || p.x < 0) p.x = 20;
          if (!Number.isFinite(p.y) || p.y < 0) p.y = 20;
          if (!Number.isFinite(p.w) || p.w <= 0) p.w = 170;
          if (!Number.isFinite(p.h) || p.h <= 0) p.h = 100;
        });

        // 渲染节点 HTML
        const nodesHtml = visibleNodes.map(kpi => {
          const ind = indicators.find(i => i.id === kpi.indicatorId);
          const pos = nodePositions[kpi.id] || { x: 0, y: 0, w: 170, h: 100 };
          const hasChildren = childrenMap[kpi.id] && childrenMap[kpi.id].length > 0;
          const isExpanded = expandedIds.has(kpi.id);
          const statusClass = kpi.status === 'achieved' ? 'achieved' : kpi.status === 'warning' ? 'warning' : 'lagging';
          const dimKey = kpi.bscDimension || 'financial';
          const displayName = ind ? ind.name : '未知';
          const unit = ind ? ind.unit : '';
          const progressWidth = Math.min(kpi.achievementRate, 100);
          
          return `<div class="omp-canvas-node status-${kpi.status}" data-id="${kpi.id}" data-level="${kpi.level}" data-dim="${dimKey}"
            style="left:${pos.x}px;top:${pos.y}px;width:${pos.w}px;height:${pos.h}px;"
            onmousedown="window.omp_canvasNodeDragStart(event,'${kpi.id}')">
            <div class="omp-dim-badge ${dimKey}"></div>
            <div class="canvas-node-name">${displayName}</div>
            ${kpi.dept && kpi.level > 0 ? `<div class="canvas-node-dept">${kpi.dept}</div>` : ''}
            <div class="canvas-node-metric">目标 <strong>${kpi.targetValue}</strong>${unit} / 实际 <strong>${kpi.actualValue}</strong>${unit}</div>
            <div class="canvas-node-progress">
              <div class="canvas-node-progress-bar"><div class="${statusClass}" style="width:${progressWidth}%"></div></div>
              <div class="canvas-node-progress-text ${statusClass}">${kpi.achievementRate}%</div>
            </div>
            ${hasChildren ? `<span class="canvas-node-expand" onclick="event.stopPropagation();window.omp_toggleExpand('${kpi.id}')">${isExpanded ? '−' : '+'}</span>` : ''}
          </div>`;
        }).join('');

        // 渲染 SVG 连接线（保守写法：任何无效值都用 || 0 兜底）
        const svgPaths = visibleEdges.map(edge => {
          const fromPos = nodePositions[edge.from];
          const toPos = nodePositions[edge.to];
          if (!fromPos || !toPos) return '';
          const fx = (fromPos.x || 0); const fy = (fromPos.y || 0);
          const fw = (fromPos.w || 170); const fh = (fromPos.h || 100);
          const tx = (toPos.x || 0); const ty = (toPos.y || 0);
          const tw = (toPos.w || 170); const th = (toPos.h || 100);
          const x1 = fx + fw;
          const y1 = fy + fh / 2;
          const x2 = tx;
          const y2 = ty + th / 2;
          const midX = (x1 + x2) / 2;
          return `<path d="M${x1},${y1} C${midX},${y1} ${midX},${y2} ${x2},${y2}" />`;
        }).join('');

        // 计算画布尺寸
        let maxX = 0, maxY = 0;
        Object.values(nodePositions).forEach(p => {
          maxX = Math.max(maxX, p.x + p.w);
          maxY = Math.max(maxY, p.y + p.h);
        });
        const canvasW = Math.max(maxX + 100, 1200);
        const canvasH = Math.max(maxY + 100, 700);

        return `
          <div class="omp-kpi-canvas" id="omp-kpi-canvas"
            onmousedown="window.omp_canvasPanStart(event)"
            onwheel="window.omp_canvasZoom(event)">
            <div class="omp-canvas-toolbar">
              <button onclick="window.omp_canvasReset()">⟲ 重置</button>
              <button onclick="window.omp_canvasZoomIn()">+</button>
              <button onclick="window.omp_canvasZoomOut()">−</button>
              <button onclick="window.omp_canvasSaveLayout()">💾 保存布局</button>
            </div>
            <div class="omp-canvas-zoom" id="omp-canvas-zoom">100%</div>
            <div class="omp-kpi-canvas-inner" id="omp-kpi-canvas-inner" style="width:${canvasW}px;height:${canvasH}px;transform:translate(${offsetX}px,${offsetY}px) scale(${scale});">
              <svg class="omp-canvas-svg" width="${canvasW}" height="${canvasH}">${svgPaths}</svg>
              ${nodesHtml}
            </div>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;font-size:12px;color:var(--text-tertiary);margin-top:8px;">
            <span>共 ${roots.length} 个一级指标 · ${visibleNodes.length} 个可见节点（画布）</span>
            <span>拖拽节点调整位置 · 滚轮缩放 · 拖拽空白平移</span>
          </div>`;
      }

        // 删除里程碑（inline 调用，此处为测试兼容声明）
        window.removeMilestone = function(rowEl) { if(rowEl) rowEl.remove(); };

        // 添加里程碑行
        window.addMilestoneRow = function() {
          const container = document.getElementById('edit-topic-milestones');
          if (!container) return;
          const row = document.createElement('div');
          row.className = 'milestone-row';
          row.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px;';
          row.innerHTML = `
            <input type="checkbox" class="ms-completed" style="width:16px;height:16px;">
            <input type="text" class="ms-title" placeholder="里程碑标题" style="flex:1;padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
            <input type="date" class="ms-date" style="padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
            <button type="button" onclick="this.parentElement.remove()" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px;">×</button>
          `;
          container.appendChild(row);
        };

        // 保存编辑
        window.saveTopicEdit = function() {
          const topicId = window._topicEditId;
          if (!topicId) return;
          const topics = loadTopics();
          const idx = topics.findIndex(t => t.id === topicId);
          if (idx === -1) return;

          // 收集里程碑
          const milestoneRows = document.querySelectorAll('#edit-topic-milestones .milestone-row');
          const milestones = Array.from(milestoneRows).map(row => ({
            title: row.querySelector('.ms-title').value.trim(),
            date: row.querySelector('.ms-date').value,
            completed: row.querySelector('.ms-completed').checked
          })).filter(m => m.title);

          // 收集关联洞察
          const insightSelect = document.getElementById('edit-topic-insights');
          const selectedInsights = insightSelect ? Array.from(insightSelect.selectedOptions).map(o => o.value) : [];

          topics[idx] = {
            ...topics[idx],
            name: document.getElementById('edit-topic-name').value.trim() || topics[idx].name,
            dimension: document.getElementById('edit-topic-dimension').value.trim() || topics[idx].dimension,
            type: document.getElementById('edit-topic-type').value,
            priority: document.getElementById('edit-topic-priority').value,
            owner: document.getElementById('edit-topic-owner').value.trim() || topics[idx].owner,
            status: document.getElementById('edit-topic-status').value,
            startDate: document.getElementById('edit-topic-startDate').value,
            endDate: document.getElementById('edit-topic-endDate').value,
            budget: document.getElementById('edit-topic-budget').value.trim(),
            progress: parseInt(document.getElementById('edit-topic-progress').value, 10) || 0,
            milestones: milestones,
            insights: selectedInsights,
            updatedAt: new Date().toISOString().slice(0, 10)
          };

          saveTopics(topics);
          window._topicEditId = null;
          const overlay = document.getElementById('topic-edit-overlay');
          if (overlay) overlay.remove();
          navigate('sp/insights-topics');
        };

        // 删除确认
        window.confirmDeleteTopic = function(topicId) {
          const topics = getActiveTopics();
          const topic = topics.find(t => t.id === topicId);
          if (!topic) return;

          const overlay = document.createElement('div');
          overlay.id = 'delete-confirm-overlay';
          overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;';
          overlay.innerHTML = `
            <div id="delete-confirm-modal" style="background:var(--bg-card);border-radius:12px;max-width:400px;width:100%;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.3);text-align:center;">

              <h3 style="margin:0 0 8px;font-size:18px;">确认删除专题?</h3>
              <p style="margin:0 0 20px;font-size:14px;color:var(--text-secondary);">「${topic.name}」将被标记为已删除，数据保留但不再显示。</p>
              <div style="display:flex;gap:10px;justify-content:center;">
                <button class="btn btn-secondary" onclick="document.getElementById('delete-confirm-overlay').remove()">取消</button>
                <button class="btn btn-danger" onclick="window.executeDeleteTopic('${topicId}')">确认删除</button>
              </div>
            </div>
          `;
          document.body.appendChild(overlay);
          overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
        };

        // 执行软删除
        window.executeDeleteTopic = function(topicId) {
          const topics = loadTopics();
          const idx = topics.findIndex(t => t.id === topicId);
          if (idx > -1) {
            topics[idx].deleted = true;
            topics[idx].updatedAt = new Date().toISOString().slice(0, 10);
            saveTopics(topics);
          }
          const overlay = document.getElementById('delete-confirm-overlay');
          if (overlay) overlay.remove();
          navigate('sp/insights-topics');
        };

        const tabScript = '';

        return `
          ${renderBreadcrumb('战略洞察与专题')}

            <h1 class="page-title">战略洞察与专题</h1>

              <button class="btn btn-primary" id="btn-new-insight">+ 新增洞察</button>
            </div>
          </div>

              <button class="insights-tab" data-tab="topics" onclick="switchInsightsTab('topics')" style="padding:12px 24px;background:none;border:none;border-bottom:2px solid ${window._insightsActiveTab === 'topics' ? 'var(--primary)' : 'transparent'};color:${window._insightsActiveTab === 'topics' ? 'var(--primary)' : 'var(--text-secondary)'};font-weight:${window._insightsActiveTab === 'topics' ? '600' : '500'};cursor:pointer;font-size:14px;">📋 专题列表</button>
              <button class="insights-tab" data-tab="knowledge" onclick="switchInsightsTab('knowledge')" style="padding:12px 24px;background:none;border:none;border-bottom:2px solid ${window._insightsActiveTab === 'knowledge' ? 'var(--primary)' : 'transparent'};color:${window._insightsActiveTab === 'knowledge' ? 'var(--primary)' : 'var(--text-secondary)'};font-weight:${window._insightsActiveTab === 'knowledge' ? '600' : '500'};cursor:pointer;font-size:14px;">📚 知识沉淀</button>
            </div>

            <!-- 洞察视图 -->
            <div id="panel-insights" class="insights-panel" style="display:${window._insightsActiveTab === 'topics' || window._insightsActiveTab === 'knowledge' ? 'none' : 'block'};">
              <div style="display:grid;grid-template-columns:repeat(5, 1fr);gap:12px;margin-bottom:20px;">
                ${fiveViewsHtml}
              </div>

              <div class="card">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                  <h3 style="margin:0;font-size:16px;">全部洞察</h3>
                  <span style="font-size:13px;color:var(--text-tertiary);">共 ${insights.length} 条</span>
                </div>
                ${insightsHtml || '<div style="text-align:center;padding:40px;color:var(--text-tertiary);">暂无洞察，点击"新增洞察"开始记录</div>'}
              </div>
            </div>

            <!-- 专题列表 -->
            <div id="panel-topics" class="insights-panel" style="display:${window._insightsActiveTab === 'topics' ? 'block' : 'none'};">
              <!-- 年份选择器 -->
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                <div style="display:flex;align-items:center;gap:8px;">
                  <span style="font-size:13px;color:var(--text-secondary);font-weight:500;">年份:</span>
                  <select id="year-selector" class="year-selector" onchange="filterTopicsByYear(this.value)" style="padding:6px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;cursor:pointer;">
                    ${sortedYears.map(y => `<option value="${y}" ${y === selectedYear ? 'selected' : ''}>${y}年</option>`).join('')}
                    <option value="${currentYear + 1}">${currentYear + 1}年</option>
                  </select>
                  <span style="font-size:12px;color:var(--text-tertiary);">共 ${allTopics.length} 个专题</span>
                </div>
                <button class="btn btn-primary" id="btn-new-topic" style="padding:6px 16px;font-size:13px;">+ 新建专题</button>
              </div>

              <div class="kpi-grid" style="grid-template-columns: repeat(4, 1fr); margin-bottom: 16px;">
                <div class="kpi-card">

                  <div class="kpi-value" style="color: var(--primary);">${activeTopics.length}</div>
                  <div class="kpi-trend"><span>活跃专题</span></div>
                </div>

                  <div class="kpi-trend"><span>本季度累计</span></div>

                  <div class="kpi-label">高风险</div>

                </div>
              </div>

              <!-- 按年份分组展示 -->
              ${sortedYears.map(year => {
                const yearTopics = yearGroups[year];
                const yearActive = yearTopics.filter(t => t.status !== 'closed' && t.status !== 'insight').length;
                const yearCompleted = yearTopics.filter(t => t.status === 'closed').length;
                const yearRows = yearTopics.map(t => `
                  <tr data-topic-id="${t.id}" data-year="${t.year}">

                    </td>

                return `

                    </table>

          <div class="related-links">

            <div class="related-links-row">
              <a class="related-link" href="#sp/strategy-map" data-navigate="sp/strategy-map">🗺️ 战略地图</a>
              <a class="related-link" href="#exe/business-topics" data-navigate="exe/business-topics">📂 业务专题</a>
              <a class="related-link" href="#bp/kpi" data-navigate="bp/kpi">📈 KPI 看板</a>
            </div>
          </div>

          ${tabScript}
        `;
      }

      // ===== 业务专题管理页面 =====
      function renderBusinessTopics() {
        const topics = [
          { name: 'Q2 大客户攻坚协同', lead: '销售部', partners: ['产品部','交付部'], milestone: '需求对齐完成', progress: 75, risk: '中', status: 'normal' },

          { name: '客户满意度提升专项', lead: '客户成功部', partners: ['产品部','服务部'], milestone: 'NPS调研分析', progress: 45, risk: '低', status: 'normal' },
          { name: '成本优化联合行动', lead: '供应链部', partners: ['财务部','采购部'], milestone: '供应商谈判', progress: 30, risk: '中', status: 'normal' },
          { name: '数字化工具推广', lead: 'IT部', partners: ['HR部','各业务部门'], milestone: '培训计划制定', progress: 20, risk: '低', status: 'default' },
          { name: '海外市场本地化支持', lead: '国际部', partners: ['产品部','法务部'], milestone: '合规审查', progress: 90, risk: '低', status: 'success' }
        ];
        const riskColor = { '高': 'var(--danger)', '中': 'var(--warning)', '低': 'var(--success)' };
        const statusClass = { 'normal': 'status-primary', 'success': 'status-success', 'warning': 'status-warning', 'default': 'status-default' };
        const statusLabel = { 'normal': '推进中', 'success': '即将完成', 'warning': '有风险', 'default': '启动中' };
        const deptColors = ['#1677FF','#52C41A','#FAAD14','#F5222D','#722ED1','#13C2C2','#EB2F96'];

        const rows = topics.map((t, i) => {
          const partnerTags = t.partners.map((p, j) => `<span style="display:inline-block;padding:2px 8px;border-radius:4px;background:${deptColors[(i+j)%deptColors.length]}15;color:${deptColors[(i+j)%deptColors.length]};font-size:11px;margin-right:4px;">${p}</span>`).join('');
          return `
            <tr>
              <td><strong>${t.name}</strong></td>
              <td><span style="font-weight:500;color:var(--primary)">${t.lead}</span></td>
              <td>${partnerTags}</td>
              <td>${t.milestone}</td>
              <td><div style="display:flex;align-items:center;gap:8px"><div class="progress-bar" style="width:80px"><div class="progress-bar-fill ${t.progress < 50 && t.progress > 0 ? 'warning' : ''}" style="width:${t.progress}%"></div></div><span style="font-size:12px">${t.progress}%</span></div></td>
              <td><span style="color:${riskColor[t.risk]};font-weight:600;font-size:12px">● ${t.risk}</span></td>
              <td><span class="status-badge ${statusClass[t.status]}">${statusLabel[t.status]}</span></td>
            </tr>
          `;
        }).join('');

        return `
          ${renderBreadcrumb('业务专题管理')}
          <div class="page-header">
            <h1 class="page-title">业务专题管理</h1>
            <div class="page-actions">
              <button class="btn btn-secondary">🔍 筛选</button>
              <button class="btn btn-primary">+ 新建专题</button>
            </div>
          </div>

      function sendAIMessage() {
        const input = document.getElementById('ai-chat-input');
        if (!input) return;
        const text = input.value.trim();
        if (!text) return;

        const area = document.getElementById('ai-chat-area');
        area.innerHTML += `<div class="ai-message user">${escapeHtml(text)}</div>`;
        area.innerHTML += `<div class="ai-message bot" id="ai-thinking"><strong>🤖</strong> 正在分析战略数据...</div>`;
        area.scrollTop = area.scrollHeight;
        input.value = '';

      function escapeHtml(text) {
        const div = document.createElement('div');

      // 开发路线图筛选
      window.filterRoadmap = function(filter) {
        const rows = document.querySelectorAll('[data-module-status]');
        rows.forEach(row => {
          const status = row.dataset.moduleStatus;
          if (filter === 'all' || status === filter) {
            row.style.display = '';
          } else {
            row.style.display = 'none';

      // ===== OMP: 全局事件处理 =====
      window.omp_saveKpi = function() {
        const indicatorId = document.getElementById('omp-kpi-indicator')?.value;
        const dept = document.getElementById('omp-kpi-dept')?.value?.trim();
        const owner = document.getElementById('omp-kpi-owner')?.value?.trim();
        const target = parseFloat(document.getElementById('omp-kpi-target')?.value);
        const challenge = parseFloat(document.getElementById('omp-kpi-challenge')?.value) || 0;
        const actual = parseFloat(document.getElementById('omp-kpi-actual')?.value) || 0;
        const weight = parseFloat(document.getElementById('omp-kpi-weight')?.value) || 20;
        const period = document.getElementById('omp-kpi-period')?.value?.trim() || '2026-Q2';
        if (!dept || !owner || isNaN(target)) { alert('请填写必填项'); return; }
        const kpis = omp_load('kpiInstances');
        const editId = window._ompState.editingKpiId;
        if (editId === 'new') {
          if (!indicatorId) { alert('请选择指标'); return; }
          const achievementRate = target > 0 ? Math.round((actual / target) * 100 * 10) / 10 : 0;
          kpis.push({ id: 'kpi_' + Date.now(), indicatorId, period, targetValue: target, challengeValue: challenge, actualValue: actual, achievementRate, weight, owner, dept, status: omp_getKpiStatus(achievementRate), parentId: null, level: 0 });
        } else {
          const idx = kpis.findIndex(k => k.id === editId);
          if (idx > -1) {
            const oldKpi = kpis[idx];
            const achievementRate = target > 0 ? Math.round((actual / target) * 100 * 10) / 10 : 0;
            let history = oldKpi.history || [];
            // If achievementRate changed, append old value to history
            if (oldKpi.achievementRate !== achievementRate) {
              history = [...history, oldKpi.achievementRate];
              if (history.length > 6) history = history.slice(-6); // keep last 6 points
            }
            kpis[idx] = { ...oldKpi, dept, owner, period, targetValue: target, challengeValue: challenge, actualValue: actual, achievementRate, weight, status: omp_getKpiStatus(achievementRate), history };
          }
        }
        omp_save('kpiInstances', kpis);
        window._ompState.editingKpiId = null;
        document.getElementById('omp-active-modal')?.remove();
        navigate('exe/tasks');
      };

      window.omp_saveTask = function() {
        const name = document.getElementById('omp-task-name')?.value?.trim();
        const description = document.getElementById('omp-task-desc')?.value?.trim();
        const type = document.getElementById('omp-task-type')?.value;
        const priority = document.getElementById('omp-task-priority')?.value;
        const owner = document.getElementById('omp-task-owner')?.value?.trim();
        const dept = document.getElementById('omp-task-dept')?.value?.trim();
        const startDate = document.getElementById('omp-task-start')?.value || '';
        const endDate = document.getElementById('omp-task-end')?.value || '';
        const budget = parseFloat(document.getElementById('omp-task-budget')?.value) || 0;
        const actualCost = parseFloat(document.getElementById('omp-task-cost')?.value) || 0;
        const kpiSelect = document.getElementById('omp-task-kpis');
        const relatedKpiIds = kpiSelect ? Array.from(kpiSelect.selectedOptions).map(o => o.value) : [];
        if (!name || !owner || !dept || !endDate) { alert('请填写必填项（名称、负责人、部门、截止日期）'); return; }
        const tasks = omp_load('tasks');
        const editId = window._ompState.editingTaskId;
        if (editId === 'new') {
          tasks.push({ id: 'task_' + Date.now(), name, description, type, priority, status: 'planning', progress: 0, owner, dept, startDate, endDate, relatedKpiIds, budget, actualCost });
        } else {
          const idx = tasks.findIndex(t => t.id === editId);
          if (idx > -1) tasks[idx] = { ...tasks[idx], name, description, type, priority, owner, dept, startDate, endDate, relatedKpiIds, budget, actualCost };
        }
        omp_save('tasks', tasks);
        window._ompState.editingTaskId = null;
        document.getElementById('omp-active-modal')?.remove();
        navigate('exe/tasks');
      };

      window.omp_switchTab = function(tab) { window._ompState.activeTab = tab; navigate('exe/tasks'); };
      window.omp_viewKpi = function(id) { omp_viewKpiModal(id); };
      window.omp_editKpi = function(id) { omp_editKpiModal(id); };
      window.omp_newKpi = function() { omp_newKpiModal(); };
      window.omp_viewTask = function(id) { omp_viewTaskModal(id); };
      window.omp_editTask = function(id) { omp_editTaskModal(id); };
      window.omp_toggleExpand = function(kpiId) {
        const isExpanding = !window._ompState.kpiExpandedIds.has(kpiId);
        if (isExpanding) {
          window._ompState.kpiExpandedIds.add(kpiId);
        } else {
          window._ompState.kpiExpandedIds.delete(kpiId);
        }
        // Canvas 版：重新渲染以更新节点和连接线
        navigate('bp/kpi');
      };
      window.omp_toggleDimension = function(dimKey) {
        window._ompState.kpiDimCollapsed = window._ompState.kpiDimCollapsed || {};
        const wasCollapsed = window._ompState.kpiDimCollapsed[dimKey];
        window._ompState.kpiDimCollapsed[dimKey] = !wasCollapsed;
        const dimEl = document.querySelector(`.omp-bsc-dimension[data-dim="${dimKey}"]`);
        if (!dimEl) return;
        const body = dimEl.querySelector('.omp-bsc-dimension-body');
        const toggle = dimEl.querySelector('.dim-toggle');
        if (body) body.classList.toggle('collapsed', !wasCollapsed);
        if (toggle) toggle.textContent = wasCollapsed ? '▼' : '▶';
      };
      // ===== Canvas 画布交互 =====
      window.omp_canvasState = window.omp_canvasState || { scale: 1, offsetX: 0, offsetY: 0, draggingNode: null, dragStartX: 0, dragStartY: 0, nodeStartX: 0, nodeStartY: 0, isPanning: false, panStartX: 0, panStartY: 0 };

      window.omp_canvasNodeDragStart = function(e, kpiId) {
        if (e.button !== 0) return;
        const state = window.omp_canvasState;
        state.draggingNode = kpiId;
        state.dragStartX = e.clientX;
        state.dragStartY = e.clientY;
        const node = document.querySelector(`.omp-canvas-node[data-id="${kpiId}"]`);
        if (node) {
          state.nodeStartX = parseFloat(node.style.left) || 0;
          state.nodeStartY = parseFloat(node.style.top) || 0;
          node.classList.add('selected');
        }
        e.stopPropagation();
        document.addEventListener('mousemove', window.omp_canvasNodeDragMove);
        document.addEventListener('mouseup', window.omp_canvasNodeDragEnd);
      };

      window.omp_canvasNodeDragMove = function(e) {
        const state = window.omp_canvasState;
        if (!state.draggingNode) return;
        const dx = (e.clientX - state.dragStartX) / state.scale;
        const dy = (e.clientY - state.dragStartY) / state.scale;
        const node = document.querySelector(`.omp-canvas-node[data-id="${state.draggingNode}"]`);
        if (node) {
          const newX = state.nodeStartX + dx;
          const newY = state.nodeStartY + dy;
          node.style.left = newX + 'px';
          node.style.top = newY + 'px';
          window.omp_canvasUpdateLines();
        }
      };

      window.omp_canvasNodeDragEnd = function(e) {
        const state = window.omp_canvasState;
        if (state.draggingNode) {
          const node = document.querySelector(`.omp-canvas-node[data-id="${state.draggingNode}"]`);
          if (node) node.classList.remove('selected');
          // Save position to localStorage
          const kpis = omp_load('kpiInstances');
          const kpi = kpis.find(k => k.id === state.draggingNode);
          if (kpi && node) {
            const newX = parseFloat(node.style.left);
            const newY = parseFloat(node.style.top);
            if (!isNaN(newX) && !isNaN(newY)) {
              kpi.x = newX;
              kpi.y = newY;
            }
            kpi.width = parseFloat(node.style.width) || 170;
            kpi.height = parseFloat(node.style.height) || 100;
            omp_save('kpiInstances', kpis);
          }
        }
        state.draggingNode = null;
        document.removeEventListener('mousemove', window.omp_canvasNodeDragMove);
        document.removeEventListener('mouseup', window.omp_canvasNodeDragEnd);
      };

      window.omp_canvasPanStart = function(e) {
        // Only pan if clicking on canvas background (not a node)
        if (e.target.closest('.omp-canvas-node') || e.target.closest('.omp-canvas-toolbar')) return;
        if (e.button !== 0) return;
        const state = window.omp_canvasState;
        state.isPanning = true;
        state.panStartX = e.clientX;
        state.panStartY = e.clientY;
        e.preventDefault();
        document.addEventListener('mousemove', window.omp_canvasPanMove);
        document.addEventListener('mouseup', window.omp_canvasPanEnd);
      };

      window.omp_canvasPanMove = function(e) {
        const state = window.omp_canvasState;
        if (!state.isPanning) return;
        const dx = e.clientX - state.panStartX;
        const dy = e.clientY - state.panStartY;
        state.offsetX += dx;
        state.offsetY += dy;
        state.panStartX = e.clientX;
        state.panStartY = e.clientY;
        window.omp_canvasApplyTransform();
      };

      window.omp_canvasPanEnd = function(e) {
        window.omp_canvasState.isPanning = false;
        document.removeEventListener('mousemove', window.omp_canvasPanMove);
        document.removeEventListener('mouseup', window.omp_canvasPanEnd);
      };

      window.omp_canvasZoom = function(e) {
        e.preventDefault();
        const state = window.omp_canvasState;
        const delta = e.deltaY > 0 ? -0.1 : 0.1;
        state.scale = Math.max(0.3, Math.min(3, state.scale + delta));
        window.omp_canvasApplyTransform();
      };

      window.omp_canvasZoomIn = function() {
        window.omp_canvasState.scale = Math.min(3, window.omp_canvasState.scale + 0.2);
        window.omp_canvasApplyTransform();
      };

      window.omp_canvasZoomOut = function() {
        window.omp_canvasState.scale = Math.max(0.3, window.omp_canvasState.scale - 0.2);
        window.omp_canvasApplyTransform();
      };

      window.omp_canvasReset = function() {
        window.omp_canvasState.scale = 1;
        window.omp_canvasState.offsetX = 0;
        window.omp_canvasState.offsetY = 0;
        window.omp_canvasApplyTransform();
      };

      window.omp_canvasApplyTransform = function() {
        const state = window.omp_canvasState;
        const inner = document.getElementById('omp-kpi-canvas-inner');
        const zoomLabel = document.getElementById('omp-canvas-zoom');
        if (inner) {
          inner.style.transform = `translate(${state.offsetX}px, ${state.offsetY}px) scale(${state.scale})`;
        }
        if (zoomLabel) {
          zoomLabel.textContent = Math.round(state.scale * 100) + '%';
        }
      };

      window.omp_canvasUpdateLines = function() {
        const svg = document.querySelector('.omp-canvas-svg');
        if (!svg) return;
        const edges = [];
        const kpis = omp_load('kpiInstances');
        const childrenMap = {};
        kpis.forEach(k => { childrenMap[k.id] = []; });
        kpis.forEach(k => {
          if (k.parentId && childrenMap[k.parentId] !== undefined) {
            childrenMap[k.parentId].push(k);
          }
        });
        const expandedIds = window._ompState.kpiExpandedIds;
        kpis.forEach(k => {
          if (childrenMap[k.id] && expandedIds.has(k.id)) {
            childrenMap[k.id].forEach(child => {
              edges.push({ from: k.id, to: child.id });
            });
          }
        });
        const paths = edges.map(edge => {
          const fromNode = document.querySelector(`.omp-canvas-node[data-id="${edge.from}"]`);
          const toNode = document.querySelector(`.omp-canvas-node[data-id="${edge.to}"]`);
          if (!fromNode || !toNode) return '';
          const fromLeft = parseFloat(fromNode.style.left) || 0;
          const fromTop = parseFloat(fromNode.style.top) || 0;
          const toLeft = parseFloat(toNode.style.left) || 0;
          const toTop = parseFloat(toNode.style.top) || 0;
          const x1 = fromLeft + (fromNode.offsetWidth || 170);
          const y1 = fromTop + (fromNode.offsetHeight || 100) / 2;
          const x2 = toLeft;
          const y2 = toTop + (toNode.offsetHeight || 100) / 2;
          const midX = (x1 + x2) / 2;
          return `<path d="M${x1},${y1} C${midX},${y1} ${midX},${y2} ${x2},${y2}" />`;
        }).join('');
        svg.innerHTML = paths;
      };
