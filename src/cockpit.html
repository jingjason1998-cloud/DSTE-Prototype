      window.siSendTopicAiMessage = async function() {
        const input = document.getElementById('topic-ai-chat-input');
        const sendBtn = document.getElementById('topic-ai-chat-send');
        const area = document.getElementById('topic-ai-chat-area');
        if (!input || !area) return;

        const text = input.value.trim();
        if (!text) return;

        if (!window._topicAiKmsPage || !window._topicAiKmsPage.text) {
          showToast('KMS 页面内容尚未加载完成，请稍候', 'warning');
          return;
        }

        appendMessage(area, 'user', text);
        const thinkingId = appendThinking(area);
        hydrateIcons(area);
        input.value = '';
        input.disabled = true;
        if (sendBtn) sendBtn.disabled = true;
        area.scrollTop = area.scrollHeight;

        try {
          const client = getAIClient();
          const session = window._topicAiSession;
          const topic = window._topicAiKmsPage.topic;
          const kmsPage = window._topicAiKmsPage;

          removeThinking(thinkingId);
          const botEl = appendMessage(area, 'bot', '', { streaming: true });
          hydrateIcons(area);
          let fullContent = '';

          const systemPrompt = `你是 DSTE 战略管理平台的 AI 助手，正在回答用户关于某一战略专题的问题。
你必须严格基于以下「专题元数据」和「KMS 页面正文」回答，不确定时明确说明，不要编造。
回答要求：
- 使用中文，简洁专业
- 关键结论后用括号标注数据来源（如「来源：KMS 页面《标题》」、「来源：专题元数据」）
- 如果用户问题超出下面提供的上下文，提示用户查看 KMS 原文`;

          for await (const chunk of client.streamChat(text, {
            session,
            systemPrompt,
            context: {
              topic: {
                id: topic?.id,
                name: topic?.name,
                year: topic?.year,
                owner: topic?.owner,
                status: topic?.status,
                researchObjectives: topic?.researchObjectives,
                deliverables: topic?.deliverables,
                summary: topic?.summary,
              },
              kmsPage: {
                title: kmsPage.title,
                url: kmsPage.url,
                version: kmsPage.version,
                text: kmsPage.text,
              },
            },
          })) {
            if (chunk.done) break;
            fullContent += chunk.content;
            updateStreamingMessage(botEl, fullContent);
            area.scrollTop = area.scrollHeight;
          }

          finalizeMessage(botEl, fullContent);
          hydrateIcons(area);

          if (fullContent.includes('【mock 模式】') || fullContent.includes('当前为 mock')) {
            showToast('当前为 AI mock 模式，未调用真实模型', 'info', 3000);
          }
        } catch (err) {
          removeThinking(thinkingId);
          appendMessage(area, 'bot', `抱歉，AI 服务暂时不可用：${err.message}。请检查网络连接或稍后重试。`);
          hydrateIcons(area);
          console.error('[TopicAI] send message error:', err);
        } finally {
          input.disabled = false;
          if (sendBtn) sendBtn.disabled = !input.value.trim();
          input.focus();
        }
        area.scrollTop = area.scrollHeight;
      };

      function siEnsureDefaultData() {

        if (insights.length === 0) {
          siSaveInsights(siDefaultInsights());
        }
        const topics = siLoadTopics();
        if (topics.length === 0) {
          const defaults = ensureLastModified(siDefaultTopics());
          defaults.forEach(t => { if (t.version === undefined) t.version = 1; });
          siSaveTopics(defaults);
        } else {
          // 合并缺失的默认历史专题
          const defaults = ensureLastModified(siDefaultTopics());
          defaults.forEach(t => { if (t.version === undefined) t.version = 1; });
          const existingIds = new Set(topics.map(t => t.id));
          const missing = defaults.filter(t => !existingIds.has(t.id));
          if (missing.length > 0) {
            const merged = [...topics, ...missing];
            siSaveTopics(merged);
          }
        }
      }

      // 调用一次以确保默认数据存在（幂等）
      siEnsureDefaultData();

              <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
                <div style="width:40px;height:40px;border-radius:8px;background:${v.color}15;display:flex;align-items:center;justify-content:center;font-size:20px;">${v.icon}</div>
                <div>
                  <div style="font-weight:600;font-size:15px;">${v.label}</div>
                  <div style="font-size:12px;color:var(--text-tertiary);">${v.desc}</div>

              </div>
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <span style="font-size:24px;font-weight:700;color:${v.color};">${count}</span>
                <span style="font-size:12px;color:var(--text-tertiary);">条洞察</span>
              </div>
            </div>

        const insightsHtml = filteredInsights.map(i => {
          const linkedTopic = activeTopics.find(t => t.id === i.linkedTopicId);
          return `
            <div class="insight-item" data-insight-id="${i.id}" style="padding:12px;border-radius:6px;background:var(--bg-page);margin-bottom:8px;cursor:pointer;transition:background 0.2s;" onmouseover="this.style.background='var(--bg-secondary)'" onmouseout="this.style.background='var(--bg-page)'">
              <div style="display:flex;justify-content:space-between;align-items:start;gap:12px;">
                <div style="flex:1;">
                  <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                    <span style="font-size:12px;padding:2px 6px;border-radius:4px;background:${impactColor[i.impact]}15;color:${impactColor[i.impact]};font-weight:500;">${impactLabel[i.impact]}影响</span>
                    <span style="font-size:12px;color:var(--text-tertiary);">置信度 ${i.confidence}%</span>
                    <span style="font-size:12px;color:var(--text-tertiary);">${i.createdAt}</span>
                  </div>
                  <div style="font-weight:600;margin-bottom:4px;">${siEscapeHtml(i.title)}</div>
                  <div style="font-size:13px;color:var(--text-secondary);line-height:1.5;">${siEscapeHtml(i.content)}</div>
                  <div style="font-size:12px;color:var(--text-tertiary);margin-top:4px;">来源: ${siEscapeHtml(i.source)}</div>
                  ${linkedTopic ? `<div style="margin-top:6px;">
                    <span style="font-size:12px;padding:2px 8px;border-radius:4px;background:var(--primary);color:var(--text-inverse);">已生成专题: ${siEscapeHtml(linkedTopic.name)}</span>
                  </div>` : ''}
                </div>
                <div style="display:flex;gap:4px;flex-shrink:0;">
                  ${!linkedTopic ? `<button class="btn btn-sm btn-primary generate-topic-btn" data-insight-id="${i.id}" style="padding:4px 12px;font-size:12px;white-space:nowrap;">生成专题</button>` : ''}
                  <button class="btn btn-sm btn-secondary edit-insight-btn" data-insight-id="${i.id}" style="padding:4px 8px;font-size:12px;">编辑</button>
                  <button class="btn btn-sm btn-danger delete-insight-btn" data-insight-id="${i.id}" style="padding:4px 8px;font-size:12px;">删除</button>
                </div>
              </div>
            </div>
          `;
        }).join('');

        window.siFilterInsightsByType = function(type) {
          window._insightsSelectedView = (window._insightsSelectedView === type) ? 'all' : type;
          navigate('sp/insights');
        };

        return `
          ${renderBreadcrumb('战略洞察')}
          <div class="page-header">
            <h1 class="page-title">战略洞察</h1>
            <div class="page-actions">
              <button class="btn btn-primary" id="btn-new-insight">+ 新增洞察</button>
            </div>
          </div>

          <div id="insights-page-container">
            <div style="display:grid;grid-template-columns:repeat(5, 1fr);gap:12px;margin-bottom:20px;" class="five-views-grid">
              ${fiveViewsHtml}
            </div>

            <div class="card">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                <h3 style="margin:0;font-size:16px;">${selectedView === 'all' ? '全部洞察' : fiveViews.find(v => v.type === selectedView)?.label + '洞察'}</h3>
                <span style="font-size:13px;color:var(--text-tertiary);">共 ${filteredInsights.length} 条</span>
              </div>
              ${insightsHtml || '<div style="text-align:center;padding:40px;color:var(--text-tertiary);">暂无洞察，点击"新增洞察"开始记录</div>'}
            </div>
          </div>

          <div class="related-links">
            <div class="related-links-label">关联功能</div>
            <div class="related-links-row">
              <a class="related-link" href="#sp/strategy-topics" data-navigate="sp/strategy-topics"><span class="icon" data-icon="clipboard-text" data-icon-size="14"></span> 战略专题管理</a>
              <a class="related-link" href="#sp/strategy-map" data-navigate="sp/strategy-map"><span class="icon" data-icon="sp/strategy-map" data-icon-size="14"></span> 战略地图</a>
              <a class="related-link" href="#exe/business-topics" data-navigate="exe/business-topics"><span class="icon" data-icon="folders" data-icon-size="14"></span> 业务专题</a>
            </div>
          </div>
        `;
      }

      // ===== 战略专题管理页面辅助函数 =====
      function siGetFilterArray(key) {
        const raw = window[key];
        if (Array.isArray(raw)) return raw;
        if (typeof raw === 'string' && raw) return [raw];
        return [];
      }

      function siTopicMatchesSearch(t, query) {
        if (!query) return true;
        const q = query.toLowerCase();
        const fields = [
          t.name,
          t.researchObjectives,
          Array.isArray(t.deliverables) ? t.deliverables.join(' ') : '',
          siRenderPerson(t.owner)
        ];
        return fields.some(f => String(f || '').toLowerCase().includes(q));
      }

      function siTopicMatchesFilters(t) {
        const statusFilter = siGetFilterArray('_strategyStatusFilter');
        const typeFilter = siGetFilterArray('_strategyTypeFilter');
        const searchQuery = window._strategySearchQuery || '';
        if (!siTopicMatchesSearch(t, searchQuery)) return false;
        if (statusFilter.length > 0 && !statusFilter.includes(t.status)) return false;
        if (typeFilter.length > 0 && !typeFilter.includes(t.type)) return false;
        return true;
      }

      function siApplyTopicSort(topics) {
        const key = window._strategySortKey || 'updatedAt';
        const dir = window._strategySortDir || 'desc';
        const statusOrder = { insight: 0, planning: 1, execution: 2, closed: 3 };
        const typeOrder = { macro: 0, customer: 1, self: 2, competition: 3, breakthrough: 0, incremental: 1, maintenance: 2 };
        const sorted = [...topics];
        sorted.sort((a, b) => {
          let va, vb;
          switch (key) {
            case 'name': va = a.name || ''; vb = b.name || ''; break;
            case 'type': va = typeOrder[a.type] ?? 99; vb = typeOrder[b.type] ?? 99; break;
            case 'owner': va = siRenderPerson(a.owner); vb = siRenderPerson(b.owner); break;
            case 'status': va = statusOrder[a.status] ?? 99; vb = statusOrder[b.status] ?? 99; break;
            case 'startDate': va = a.startDate || ''; vb = b.startDate || ''; break;
            case 'updatedAt': va = a.updatedAt || ''; vb = b.updatedAt || ''; break;
            default: va = a.updatedAt || ''; vb = b.updatedAt || '';
          }
          if (typeof va === 'string') {
            return dir === 'asc' ? va.localeCompare(vb, 'zh-CN') : vb.localeCompare(va, 'zh-CN');
          }
          return dir === 'asc' ? va - vb : vb - va;
        });
        return sorted;
      }

      window.siSetSearch = function(query) {
        window._strategySearchQuery = query;
      };

      window.siCommitSearch = function() {
        navigate('sp/strategy-topics');
      };

      window.siSetFilter = function(kind, value) {
        const key = kind === 'status' ? '_strategyStatusFilter' : kind === 'type' ? '_strategyTypeFilter' : null;
        if (!key) return;
        window[key] = value;
        navigate('sp/strategy-topics');
      };

      window.siSetSort = function(key) {
        const currentKey = window._strategySortKey || 'updatedAt';
        const currentDir = window._strategySortDir || 'desc';
        if (currentKey === key) {
          window._strategySortDir = currentDir === 'asc' ? 'desc' : 'asc';
        } else {
          window._strategySortKey = key;
          window._strategySortDir = 'asc';
        }
        navigate('sp/strategy-topics');
      };

      window.siExportTopics = function() {
        const topics = siGetActiveTopics();
        const blob = new Blob([JSON.stringify(topics, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `strategy-topics-export-${new Date().toISOString().slice(0, 10)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast('已导出战略专题 JSON 备份', 'success');
      };

      // ===== 战略专题管理页面 =====
      function renderStrategyTopicsPage() {
        const allTopics = siGetActiveTopics();
        const currentYear = new Date().getFullYear();
        const selectedYear = window._strategySelectedYear || 'all';

        // 1. 年份筛选
        const yearFiltered = selectedYear === 'all' ? allTopics : allTopics.filter(t => t.year == selectedYear);

        // 2. 搜索 + 状态/类型/维度筛选
        const filteredTopics = yearFiltered.filter(siTopicMatchesFilters);

        // 3. 排序
        const topics = siApplyTopicSort(filteredTopics);

        // 按年份分组（基于筛选+排序后结果）
        const yearGroups = {};
        topics.forEach(t => {
          const y = t.year || currentYear;
          if (!yearGroups[y]) yearGroups[y] = [];
          yearGroups[y].push(t);
        });
        const sortedYears = Object.keys(yearGroups).map(Number).sort((a, b) => b - a);

        const statusClass = { insight: 'status-default', planning: 'status-primary', execution: 'status-warning', closed: 'status-success' };
        const statusLabel = { insight: '洞察阶段', planning: '规划阶段', execution: '执行阶段', closed: '已闭环' };
        const typeLabel = { macro: '看宏观', customer: '看客户', self: '看自己', competition: '看竞争', breakthrough: '看宏观', incremental: '看客户', maintenance: '看自己' };
        const viewMode = window._strategyViewMode || 'list';
        const sortKey = window._strategySortKey || 'updatedAt';
        const sortDir = window._strategySortDir || 'desc';

        window.siFilterTopicsByYear = function(year) {
          window._strategySelectedYear = year === 'all' ? 'all' : parseInt(year, 10);
          navigate('sp/strategy-topics');
        };

        window.siSwitchTopicView = function(mode) {
          window._strategyViewMode = mode;
          navigate('sp/strategy-topics');
        };

        const searchQuery = window._strategySearchQuery || '';
        const statusFilter = siGetFilterArray('_strategyStatusFilter');
        const typeFilter = siGetFilterArray('_strategyTypeFilter');

        const searchHtml = `
          <input type="text" id="strategy-topic-search" value="${siEscapeHtml(searchQuery)}" placeholder="搜索名称、负责人、研究目标、交付件..."
            oninput="siSetSearch(this.value)" onchange="siCommitSearch()"
            style="padding:6px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;min-width:220px;"
          />
        `;

        const statusOptions = [
          { value: 'insight', label: '洞察阶段' },
          { value: 'planning', label: '规划阶段' },
          { value: 'execution', label: '执行阶段' },
          { value: 'closed', label: '已闭环' }
        ];
        const typeOptions = [
          { value: 'macro', label: '看宏观' },
          { value: 'customer', label: '看客户' },
          { value: 'self', label: '看自己' },
          { value: 'competition', label: '看竞争' }
        ];

        function singleSelectHtml(options, selected, kind, allLabel) {
          const current = selected[0] || '';
          const optionsHtml = [
            `<option value="" ${current === '' ? 'selected' : ''}>${allLabel || '全部'}</option>`,
            ...options.map(o => `<option value="${o.value}" ${current === o.value ? 'selected' : ''}>${o.label}</option>`)
          ].join('');
          return `
            <select onchange="siSetFilter('${kind}', this.value ? [this.value] : [])"
              style="padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;min-width:120px;cursor:pointer;"
            >${optionsHtml}</select>
          `;
        }

        const filterBarHtml = `
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            ${searchHtml}
            <div style="display:flex;align-items:center;gap:6px;">
              <span style="font-size:13px;color:var(--text-secondary);">状态</span>
              ${singleSelectHtml(statusOptions, statusFilter, 'status', '全部状态')}
            </div>
            <div style="display:flex;align-items:center;gap:6px;">
              <span style="font-size:13px;color:var(--text-secondary);">类型</span>
              ${singleSelectHtml(typeOptions, typeFilter, 'type', '全部类型')}
            </div>
          </div>
        `;

        const yearSelectorHtml = `
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:13px;color:var(--text-secondary);font-weight:500;">年份:</span>
            <select id="year-selector" class="year-selector" onchange="siFilterTopicsByYear(this.value)" style="padding:6px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;cursor:pointer;">
              <option value="all" ${selectedYear === 'all' ? 'selected' : ''}>全部年份</option>
              ${sortedYears.map(y => `<option value="${y}" ${y == selectedYear ? 'selected' : ''}>${y}年</option>`).join('')}
              <option value="${currentYear + 1}" ${currentYear + 1 == selectedYear ? 'selected' : ''}>${currentYear + 1}年</option>
            </select>
            <span style="font-size:12px;color:var(--text-tertiary);">共 ${topics.length} 个专题</span>
          </div>
        `;

        const viewToggleHtml = `
          <div style="display:flex;gap:0;border:1px solid var(--border-color);border-radius:6px;overflow:hidden;">
            <button class="btn btn-sm ${viewMode === 'list' ? 'btn-primary' : 'btn-secondary'}" onclick="siSwitchTopicView('list')" style="border-radius:0;border:none;padding:6px 14px;font-size:13px;">列表视图</button>
            <button class="btn btn-sm ${viewMode === 'gantt' ? 'btn-primary' : 'btn-secondary'}" onclick="siSwitchTopicView('gantt')" style="border-radius:0;border:none;padding:6px 14px;font-size:13px;">甘特图</button>
          </div>
        `;

        function sortIndicator(key) {
          if (sortKey !== key) return '⇅';
          return sortDir === 'asc' ? '↑' : '↓';
        }

        const topicRows = (yearTopics) => yearTopics.map(t => {
          const hasNext = !!t.nextTopicId;
          const hasPrev = !!t.previousTopicId;
          return `
            <tr data-topic-id="${t.id}" data-year="${t.year}">
              <td>
                <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                  ${hasPrev ? `<span class="chain-badge" data-topic-id="${t.previousTopicId}" style="font-size:11px;padding:1px 5px;border-radius:4px;background:var(--info-bg);color:var(--info);cursor:pointer;" title="查看上一年专题">↰ 承继</span>` : ''}
                  <strong>${siEscapeHtml(t.name)}</strong>
                  ${hasNext ? `<span class="chain-badge" data-topic-id="${t.nextTopicId}" style="font-size:11px;padding:1px 5px;border-radius:4px;background:var(--success-bg);color:var(--success);cursor:pointer;" title="查看下一年专题">↳ 已深化</span>` : ''}
                </div>
              </td>
              <td style="text-align:center;">
                ${t.kmsUrl && t.kmsUrl !== '#' ? `<a href="${siEscapeHtml(t.kmsUrl)}" target="_blank" rel="noopener noreferrer" title="打开 KMS 页面" style="font-size:13px;color:var(--primary);text-decoration:none;display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;background:var(--primary-bg);" onmouseover="this.style.background='var(--primary-light)'" onmouseout="this.style.background='var(--primary-bg)'"><span class="icon" data-icon="link" data-icon-size="14"></span>KMS</a>` : '—'}
              </td>
              <td>${typeLabel[t.type] || t.type}</td>
              <td>${siEscapeHtml(siRenderPerson(t.owner))}</td>
              <td><span class="status-badge ${statusClass[t.status]}">${statusLabel[t.status]}</span></td>
              <td style="white-space:nowrap;">
                <span style="display:inline-flex;align-items:center;gap:2px;"><button class="st-action-link view-topic-btn" data-topic-id="${t.id}" title="查看" aria-label="查看"><span class="icon" data-icon="eye" data-icon-size="15"></span></button><button class="st-action-link edit-topic-btn" data-topic-id="${t.id}" title="编辑" aria-label="编辑"><span class="icon" data-icon="edit" data-icon-size="15"></span></button><button class="st-action-link danger delete-topic-btn" data-topic-id="${t.id}" title="删除" aria-label="删除"><span class="icon" data-icon="delete" data-icon-size="15"></span></button></span>
              </td>
            </tr>
          `;
        }).join('');

        const visibleYears = (selectedYear === 'all' ? sortedYears : sortedYears.filter(y => y == selectedYear));
        const singleYearMode = visibleYears.length === 1;
        const listCardsHtml = visibleYears.map(year => {
          const yearTopics = yearGroups[year];
          const yearActive = yearTopics.filter(t => t.status !== 'closed' && t.status !== 'insight').length;
          const yearCompleted = yearTopics.filter(t => t.status === 'closed').length;
          return `
            <div class="card st-year-card" style="${singleYearMode ? 'grid-column: 1 / -1;' : ''}">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border-color);">
                <div style="display:flex;align-items:center;gap:10px;">
                  <h3 style="margin:0;font-size:16px;">${year}年专题</h3>
                  <span style="font-size:12px;padding:2px 8px;border-radius:4px;background:var(--primary);color:var(--text-inverse);">${yearTopics.length}个</span>
                </div>
                <div style="display:flex;gap:12px;font-size:12px;color:var(--text-secondary);">
                  <span>进行中: ${yearActive}</span>
                  <span>已完成: ${yearCompleted}</span>
                </div>
              </div>
              <div class="table-scroll-wrapper">
                <table class="data-table st-compact-table">
                  <thead>
                    <tr>
                      <th style="cursor:pointer;white-space:nowrap;" onclick="siSetSort('name')">专题名称 ${sortIndicator('name')}</th>
                      <th style="white-space:nowrap;">KMS</th>
                      <th style="cursor:pointer;white-space:nowrap;" onclick="siSetSort('type')">类型 ${sortIndicator('type')}</th>
                      <th style="cursor:pointer;white-space:nowrap;" onclick="siSetSort('owner')">负责人 ${sortIndicator('owner')}</th>
                      <th style="cursor:pointer;white-space:nowrap;" onclick="siSetSort('status')">阶段 ${sortIndicator('status')}</th>
                      <th style="white-space:nowrap;">操作</th>
                    </tr>
                  </thead>
                  <tbody>${topicRows(yearTopics) || '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-tertiary);">暂无专题</td></tr>'}</tbody>
                </table>
              </div>
            </div>
          `;
        }).join('');

        const listHtml = visibleYears.length === 0
          ? '<div class="card" style="text-align:center;padding:40px;color:var(--text-tertiary);">暂无专题</div>'
          : `<div style="display:grid;grid-template-columns:repeat(2, minmax(0, 1fr));gap:16px;align-items:start;">${listCardsHtml}</div>`;

        return `
          ${renderBreadcrumb('战略专题管理')}
          <div class="page-header">
            <h1 class="page-title">战略专题管理</h1>
            <div class="page-actions" style="display:flex;gap:10px;align-items:center;">
              <button class="btn btn-secondary" onclick="siExportTopics()" title="导出 JSON 备份">导出</button>
              ${viewToggleHtml}
              <button class="btn btn-primary" id="btn-new-topic">+ 新建专题</button>
            </div>
          </div>

          <div id="strategy-topics-container">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:12px;">
              ${filterBarHtml}
              ${yearSelectorHtml}
            </div>

            <div id="strategy-topics-content">
              ${viewMode === 'list' ? listHtml : siRenderGanttChart(topics, { year: selectedYear })}
            </div>
          </div>

          <div class="related-links">
            <div class="related-links-label">关联功能</div>
            <div class="related-links-row">
              <a class="related-link" href="#sp/insights" data-navigate="sp/insights"><span class="icon" data-icon="binoculars" data-icon-size="14"></span> 战略洞察</a>
              <a class="related-link" href="#sp/strategy-map" data-navigate="sp/strategy-map"><span class="icon" data-icon="sp/strategy-map" data-icon-size="14"></span> 战略地图</a>
              <a class="related-link" href="#exe/business-topics" data-navigate="exe/business-topics"><span class="icon" data-icon="folders" data-icon-size="14"></span> 业务专题</a>
            </div>
          </div>
        `;
      }

      // 甘特图渲染
      function siRenderGanttChart(topics, options) {
        const { year } = options || {};
        const statusColor = {
          insight: 'var(--primary)',
          planning: '#9ca3af',
          execution: 'var(--warning)',
          closed: 'var(--success)'
        };
        const currentYear = new Date().getFullYear();
        const currentDate = new Date().toISOString().slice(0, 10);

        // 时间范围
        let minDate, maxDate;
        if (topics.length > 0) {
          const startDates = topics.map(t => t.startDate).filter(Boolean);
          const endDates = topics.map(t => t.endDate).filter(Boolean);
          minDate = startDates.length ? startDates.sort()[0] : `${currentYear}-01-01`;
          maxDate = endDates.length ? endDates.sort().reverse()[0] : `${currentYear}-12-31`;
        } else {
          const y = year === 'all' ? currentYear : year;
          minDate = `${y}-01-01`;
          maxDate = `${y}-12-31`;
        }
        const start = new Date(minDate);
        const end = new Date(maxDate);
        const totalDays = Math.max(1, (end - start) / (1000 * 60 * 60 * 24));

        const monthLabels = [];
        const tickDates = [];
        let cursor = new Date(start.getFullYear(), start.getMonth(), 1);
        while (cursor <= end) {
          const label = `${cursor.getFullYear()}-${String(cursor.getMonth() + 1).padStart(2, '0')}`;
          if (!monthLabels.includes(label)) monthLabels.push(label);
          tickDates.push(cursor.toISOString().slice(0, 10));
          cursor.setMonth(cursor.getMonth() + 1);
        }

        function dateToPercent(dateStr) {
          if (!dateStr) return 0;
          const d = new Date(dateStr);
          const days = (d - start) / (1000 * 60 * 60 * 24);
          return Math.max(0, Math.min(100, (days / totalDays) * 100));
        }

        function dateToLeftPx(dateStr, width) {
          return (dateToPercent(dateStr) / 100) * width;
        }

        const chartWidth = Math.max(600, monthLabels.length * 80);

        const rows = topics.map(t => {
          const startPct = dateToPercent(t.startDate || minDate);
          const endPct = dateToPercent(t.endDate || maxDate);
          const widthPct = Math.max(1, endPct - startPct);
          const milestones = (t.milestones || []).filter(m => m.date).map(m => `
            <div class="gantt-milestone" data-topic-id="${t.id}" title="${siEscapeHtml(m.title)} (${m.date})" style="position:absolute;left:${dateToPercent(m.date)}%;top:18px;width:10px;height:10px;background:var(--bg-card);border:2px solid ${statusColor[t.status] || 'var(--primary)'};border-radius:50%;transform:translateX(-50%);cursor:pointer;z-index:3;"></div>
          `).join('');
          return `
            <div style="display:flex;align-items:center;border-bottom:1px solid var(--border-light);min-height:48px;">
              <div style="width:180px;flex-shrink:0;padding:8px 12px;font-size:13px;font-weight:500;" title="${siEscapeHtml(t.name)}">${siEscapeHtml(t.name)}</div>
              <div style="width:80px;flex-shrink:0;padding:8px 12px;font-size:12px;color:var(--text-secondary);">${siEscapeHtml(siRenderPerson(t.owner))}</div>
              <div style="flex:1;position:relative;height:40px;margin:0 12px;">
                <div class="gantt-bar" data-topic-id="${t.id}" style="position:absolute;left:${startPct}%;width:${widthPct}%;top:10px;height:18px;background:${statusColor[t.status] || 'var(--primary)'};border-radius:4px;opacity:0.85;cursor:pointer;" title="${siEscapeHtml(t.name)}: ${t.startDate || '?'} ~ ${t.endDate || '?'}"></div>
                ${milestones}
              </div>
            </div>
          `;
        }).join('');

        const headerTicks = monthLabels.map((label, idx) => `
          <div style="position:absolute;left:${(idx / Math.max(1, monthLabels.length - 1)) * 100}%;top:0;bottom:0;border-left:1px solid var(--border-light);padding-left:6px;font-size:11px;color:var(--text-tertiary);">${label}</div>
        `).join('');

        const todayLeft = dateToPercent(currentDate);

        return `
          <div class="card" style="overflow-x:auto;">
            <div style="min-width:${chartWidth + 300}px;padding:16px;">
              <div style="display:flex;align-items:center;border-bottom:1px solid var(--border-color);padding-bottom:8px;margin-bottom:8px;">
                <div style="width:180px;flex-shrink:0;font-size:12px;color:var(--text-tertiary);font-weight:600;">专题名称</div>
                <div style="width:80px;flex-shrink:0;font-size:12px;color:var(--text-tertiary);font-weight:600;">负责人</div>
                <div style="flex:1;position:relative;height:24px;">
                  ${headerTicks}
                </div>

              <div style="position:relative;">

              </div>
              <div style="margin-top:12px;font-size:12px;color:var(--text-secondary);">
                图例:
                <span style="display:inline-block;width:12px;height:12px;background:var(--primary);border-radius:2px;margin:0 4px;vertical-align:middle;"></span>洞察阶段
                <span style="display:inline-block;width:12px;height:12px;background:#9ca3af;border-radius:2px;margin:0 4px;vertical-align:middle;"></span>规划阶段
                <span style="display:inline-block;width:12px;height:12px;background:var(--warning);border-radius:2px;margin:0 4px;vertical-align:middle;"></span>执行阶段
                <span style="display:inline-block;width:12px;height:12px;background:var(--success);border-radius:2px;margin:0 4px;vertical-align:middle;"></span>已闭环
                <span style="display:inline-block;width:1px;height:12px;background:var(--danger);margin:0 8px;vertical-align:middle;"></span>今天
              </div>
            </div>
          </div>
        `;
      }

      // ===== 全局弹窗与操作函数（战略洞察 & 战略专题管理共用） =====

      // 当前编辑/查看的专题ID
      window._siTopicEditId = null;

      // 查看专题详情

          return `<div style="padding:8px 12px;border-radius:6px;background:var(--bg-page);margin-bottom:6px;font-size:13px;"><strong>${siEscapeHtml(ins.source)}</strong>: ${siEscapeHtml(ins.title)}</div>`;

          ? `<a href="${siEscapeHtml(topic.kmsUrl)}" target="_blank" rel="noopener noreferrer" style="font-size:13px;color:var(--primary);word-break:break-all;">${siEscapeHtml(topic.kmsUrl)}</a>`
          : '<span style="font-size:13px;color:var(--text-tertiary);">—</span>';

        const chainHtml = siRenderTopicChain(topic);

        const showDeepen = (topic.status === 'execution' || topic.status === 'closed') && !topic.nextTopicId;
        const deepenText = `${(topic.year || currentYear) + 1} 年继续深化`;

        const overlay = document.createElement('div');
        overlay.id = 'topic-detail-overlay';
        overlay.className = 'omp-modal-overlay';
        overlay.innerHTML = `
          <div id="topic-detail-modal" class="omp-modal omp-modal-wide" style="background:var(--bg-card);border-radius:12px;max-width:720px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);">

              <h2 style="margin:0;font-size:18px;">专题详情</h2>
              <button onclick="document.getElementById('topic-detail-overlay').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-secondary);">×</button>

            <div style="padding:24px;">
              <div style="font-size:20px;font-weight:700;margin-bottom:4px;">${siEscapeHtml(topic.name)}</div>
              <div style="font-size:13px;color:var(--text-secondary);margin-bottom:20px;">${topic.year}年 · ${typeLabel[topic.type] || topic.type}</div>

              <div style="display:grid;grid-template-columns:repeat(2, 1fr);gap:16px;margin-bottom:20px;">
                <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">负责人</div><div style="font-size:14px;font-weight:500;">${siEscapeHtml(siRenderPerson(topic.owner))}</div></div>
                <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">成员</div><div style="font-size:14px;font-weight:500;">${Array.isArray(topic.members) && topic.members.length > 0 ? topic.members.map(m => siEscapeHtml(siRenderPerson(m))).join('、') : '—'}</div></div>
                <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">阶段</div><div style="font-size:14px;font-weight:500;">${statusLabel[topic.status] || topic.status}</div></div>

                <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">开始日期</div><div style="font-size:14px;font-weight:500;">${siEscapeHtml(topic.startDate)}</div></div>
                <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">结束日期</div><div style="font-size:14px;font-weight:500;">${siEscapeHtml(topic.endDate)}</div></div>

              <div style="margin-bottom:20px;">

                <div style="font-size:13px;color:var(--text-secondary);line-height:1.6;padding:12px;border-radius:8px;background:var(--bg-page);">${topic.researchObjectives ? siEscapeHtml(topic.researchObjectives) : '<span style="color:var(--text-tertiary);">未设定研究目标</span>'}</div>

                <button class="btn btn-primary" onclick="document.getElementById('topic-detail-overlay').remove(); window.siOpenTopicEdit('${topic.id}')">编辑</button>
              </div>
            </div>
          </div>
        `;
        document.body.appendChild(overlay);
        overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
      };

      // 年度深化链渲染
      function siRenderTopicChain(topic) {
        if (!topic.previousTopicId && !topic.nextTopicId) return '';
        const topics = siGetActiveTopics();
        const map = new Map(topics.map(t => [t.id, t]));
        const chain = [];
        let cur = topic;
        while (cur && cur.previousTopicId && map.has(cur.previousTopicId)) {
          cur = map.get(cur.previousTopicId);
          if (chain.includes(cur)) break;
          chain.unshift(cur);
        }
        chain.push(topic);
        cur = topic;
        while (cur && cur.nextTopicId && map.has(cur.nextTopicId)) {
          cur = map.get(cur.nextTopicId);
          if (chain.includes(cur)) break;
          chain.push(cur);
        }
        if (chain.length <= 1) return '';
        return `
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:12px;border-radius:8px;background:var(--bg-page);">
            ${chain.map((t, idx) => `
              <div class="view-chain-topic-btn" data-topic-id="${t.id}" style="cursor:pointer;padding:8px 12px;border-radius:6px;background:${t.id === topic.id ? 'var(--primary)' : 'var(--bg-card)'};color:${t.id === topic.id ? 'var(--text-inverse)' : 'var(--text-primary)'};border:1px solid var(--border-color);font-size:13px;">
                <div style="font-weight:600;">${t.year}年</div>
                <div style="font-size:12px;opacity:0.9;">${siEscapeHtml(t.name)}</div>
              </div>
              ${idx < chain.length - 1 ? '<span style="font-size:16px;color:var(--text-tertiary);">→</span>' : ''}
            `).join('')}
          </div>
        `;
      }

            <button type="button" onclick="this.parentElement.remove()" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px;">×</button>

        overlay.className = 'omp-modal-overlay';
        overlay.innerHTML = `
          <div id="topic-edit-modal" class="omp-modal omp-modal-wide" style="background:var(--bg-card);border-radius:12px;max-width:720px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);">

              <button onclick="document.getElementById('topic-edit-overlay').remove(); window._siTopicEditId = null;" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-secondary);">×</button>
            </div>
            <div style="padding:24px;">
              <div style="display:grid;grid-template-columns:repeat(2, 1fr);gap:16px;margin-bottom:16px;">
                <div>
                  <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">专题名称 <span style="color:var(--danger)">*</span></label>
                  <input type="text" id="edit-topic-name" value="${siEscapeHtml(topic.name)}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
                </div>
                <div>
                  <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">负责人</label>
                  <input type="text" id="edit-topic-owner" value="${siEscapeHtml(typeof topic.owner === 'object' ? (topic.owner.displayName || topic.owner.name || '') : (topic.owner || ''))}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
                </div>
                <div>
                  <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">成员（多人用逗号分隔）</label>

                    <input type="text" id="edit-topic-members" value="${siEscapeHtml(membersValue)}" placeholder="例如：张三, 李四" style="flex:1;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">

                <div>
                  <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">结束日期</label>
                  <input type="date" id="edit-topic-endDate" value="${topic.endDate || ''}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
                </div>
              </div>

              <div style="margin-bottom:16px;">
                <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">年份 (不可修改)</label>

      window.siAddMilestoneRow = function() {
        const container = document.getElementById('edit-topic-milestones');
        if (!container) return;
        const row = document.createElement('div');
        row.className = 'milestone-row';
        row.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px;';

          <input type="text" class="dv-text" placeholder="交付件名称" style="flex:1;padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">

      // 弹出人员选择浮层，选中后将人员姓名追加到成员 input（逗号分隔）
      window.siPickPersonToAddMember = function() {
        const membersInput = document.getElementById('edit-topic-members');
        if (!membersInput) return;
        // 已存在临时选择器则直接聚焦
        if (document.getElementById('si-member-picker-overlay')) return;
        const overlay = document.createElement('div');
        overlay.id = 'si-member-picker-overlay';
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:10001;display:flex;align-items:center;justify-content:center;';
        overlay.innerHTML = `
          <div style="background:var(--bg-card);border-radius:10px;padding:20px;width:320px;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
            <div style="font-size:14px;font-weight:600;margin-bottom:12px;">选择成员</div>
            <input type="text" id="si-member-picker-input" placeholder="搜索姓名、英文名、工号..." style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
            <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px;">
              <button class="btn btn-secondary" onclick="document.getElementById('si-member-picker-overlay').remove();">取消</button>
            </div>
          </div>
        `;
        document.body.appendChild(overlay);
        overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
        const pickerInput = document.getElementById('si-member-picker-input');
        if (window.enhancePersonInput && pickerInput) {
          const api = window.enhancePersonInput(pickerInput, {
            placeholder: '搜索姓名、英文名、工号...',
            allowFreeText: true,
            onChange: (person) => {
              if (!person) return;
              const name = person.displayName || person.name || '';
              if (!name) return;
              const current = membersInput.value.trim();
              const existing = current ? current.split(/,|，/).map(s => s.trim()).filter(Boolean) : [];
              if (!existing.includes(name)) {
                membersInput.value = existing.concat(name).join(', ');
              }
              try { api.destroy(); } catch (e) {}
              overlay.remove();
            }
          });
          pickerInput.focus();
          // 浮层关闭时一并清理临时 person-input，避免 dropdown 残留
          const cleanup = () => { try { api.destroy(); } catch (e) {} };
          overlay.addEventListener('remove', cleanup);
          const cancelBtn = overlay.querySelector('.btn-secondary');
          if (cancelBtn) cancelBtn.addEventListener('click', cleanup);
        } else if (pickerInput) {
          pickerInput.focus();
        }
      };

      window.siToggleBatchDeliverables = function() {
        const area = document.getElementById('batch-deliverables-area');
        if (area) area.style.display = area.style.display === 'none' ? 'block' : 'none';
      };

      window.siSaveTopicEdit = function() {
        const topicId = window._siTopicEditId;
        if (!topicId) return;
        const topics = siLoadTopics();
        const idx = topics.findIndex(t => t.id === topicId);
        if (idx === -1) return;

        const name = document.getElementById('edit-topic-name').value.trim();
        if (!name) {
          showToast('请填写专题名称', 'warning');
          return;
        }
        const researchObjectives = document.getElementById('edit-topic-researchObjectives').value.trim();
        if (!researchObjectives) {
          showToast('请填写研究目标', 'warning');
          return;
        }

        // 收集里程碑
        const milestoneRows = document.querySelectorAll('#edit-topic-milestones .milestone-row');
        const milestones = Array.from(milestoneRows).map(row => ({
          title: row.querySelector('.ms-title').value.trim(),
          date: row.querySelector('.ms-date').value,
          completed: row.querySelector('.ms-completed').checked
        })).filter(m => m.title);

        // 收集交付件
        const batchText = document.getElementById('edit-topic-deliverables-batch')?.value || '';
        const batchItems = siParseDeliverablesBatch(batchText);
        const deliverableRows = document.querySelectorAll('#edit-topic-deliverables .deliverable-row');
        const deliverables = [
          ...Array.from(deliverableRows).map(row => row.querySelector('.dv-text').value.trim()).filter(Boolean),
          ...batchItems
        ];

        // 收集关联洞察
        const insightSelect = document.getElementById('edit-topic-insights');
        const selectedInsights = insightSelect ? Array.from(insightSelect.selectedOptions).map(o => o.value) : [];

        // 成员解析
        const membersRaw = document.getElementById('edit-topic-members').value;
        const members = membersRaw.split(/,|，/).map(s => s.trim()).filter(Boolean);

        topics[idx] = {
          ...topics[idx],
          name,
          type: document.getElementById('edit-topic-type').value,
          owner: (window.getPersonValue ? window.getPersonValue('edit-topic-owner') : null) || document.getElementById('edit-topic-owner').value.trim() || topics[idx].owner,
          members,
          status: document.getElementById('edit-topic-status').value,
          startDate: document.getElementById('edit-topic-startDate').value,
          endDate: document.getElementById('edit-topic-endDate').value,
          kmsUrl: document.getElementById('edit-topic-kmsUrl').value.trim(),
          researchObjectives,
          deliverables,
          milestones,
          insights: selectedInsights,
          summary: document.getElementById('edit-topic-summary').value.trim(),
          updatedAt: new Date().toISOString().slice(0, 10)
        };

        siPersistTopics(topics);

        // 同步关联洞察的 linkedTopicId
        const allInsights = siLoadInsights();
        let insightsChanged = false;
        allInsights.forEach(insight => {
          const inTopic = selectedInsights.includes(insight.id);
          if (inTopic && insight.linkedTopicId !== topicId) {
            insight.linkedTopicId = topicId;
            insightsChanged = true;
          } else if (!inTopic && insight.linkedTopicId === topicId) {
            insight.linkedTopicId = null;
            insightsChanged = true;
          }
        });
        if (insightsChanged) siPersistInsights(allInsights);

        window._siTopicEditId = null;
        const overlay = document.getElementById('topic-edit-overlay');
        if (overlay) overlay.remove();
        navigate('sp/strategy-topics');
      };

      // 删除确认
      window.siConfirmDeleteTopic = function(topicId) {
        if (!siSafeTopicId(topicId)) return;
        const topics = siGetActiveTopics();
        const topic = topics.find(t => t.id === topicId);
        if (!topic) return;

        const overlay = document.createElement('div');
        overlay.id = 'delete-confirm-overlay';
        overlay.className = 'omp-modal-overlay';
        overlay.innerHTML = `
          <div id="delete-confirm-modal" style="background:var(--bg-card);border-radius:12px;max-width:400px;width:100%;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.3);text-align:center;">
            <div style="font-size:48px;margin-bottom:12px;"><span class="icon" data-icon="warning" data-icon-size="14"></span>️</div>
            <h3 style="margin:0 0 8px;font-size:18px;">确认删除专题?</h3>
            <p style="margin:0 0 20px;font-size:14px;color:var(--text-secondary);">「${siEscapeHtml(topic.name)}」将被标记为已删除，数据保留但不再显示。</p>
            <div style="display:flex;gap:10px;justify-content:center;">
              <button class="btn btn-secondary" onclick="document.getElementById('delete-confirm-overlay').remove()">取消</button>
              <button class="btn btn-danger" onclick="window.siExecuteDeleteTopic('${topicId}')">确认删除</button>
            </div>
          </div>
        `;
        document.body.appendChild(overlay);
        overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
      };

      // 执行软删除
      window.siExecuteDeleteTopic = function(topicId) {
        if (!siSafeTopicId(topicId)) return;
        let topics = siLoadTopics();
        const idx = topics.findIndex(t => t.id === topicId);
        if (idx > -1) {
          topics[idx].deleted = true;
          topics[idx].updatedAt = new Date().toISOString().slice(0, 10);

          // 清理链上关联
          if (topics[idx].previousTopicId) {
            const prevIdx = topics.findIndex(t => t.id === topics[idx].previousTopicId);
            if (prevIdx > -1) topics[prevIdx].nextTopicId = null;
          }
          if (topics[idx].nextTopicId) {
            const nextIdx = topics.findIndex(t => t.id === topics[idx].nextTopicId);
            if (nextIdx > -1) topics[nextIdx].previousTopicId = null;
          }
          topics[idx].previousTopicId = null;
          topics[idx].nextTopicId = null;

          siPersistTopics(topics);

          // 清理关联洞察的 linkedTopicId
          const insights = siLoadInsights();
          let insightsChanged = false;
          insights.forEach(insight => {
            if (insight.linkedTopicId === topicId) {
              insight.linkedTopicId = null;
              insightsChanged = true;
            }
          });
          if (insightsChanged) siPersistInsights(insights);
        }
        const overlay = document.getElementById('delete-confirm-overlay');
        if (overlay) overlay.remove();
        navigate('sp/strategy-topics');
      };

              <div style="margin-bottom:16px;">
                <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">结项总结</label>
                <textarea id="edit-topic-summary" rows="3" placeholder="专题闭环后的总结摘要" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);resize:vertical;">${siEscapeHtml(topic.summary)}</textarea>
              </div>

              <div style="margin-bottom:16px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                  <label style="font-size:12px;color:var(--text-tertiary);"><span class="icon" data-icon="push-pin" data-icon-size="14"></span> 里程碑</label>
                  <button type="button" class="btn btn-sm btn-secondary" onclick="window.siAddMilestoneRow()">+ 添加里程碑</button>
                </div>
                <div id="edit-topic-milestones">${milestoneRows}</div>
              </div>

              <div style="margin-bottom:16px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                  <label style="font-size:12px;color:var(--text-tertiary);"><span class="icon" data-icon="package" data-icon-size="14"></span> 交付件</label>
                  <div style="display:flex;gap:6px;">
                    <button type="button" class="btn btn-sm btn-secondary" onclick="window.siAddDeliverableRow()">+ 添加交付件</button>

                  </div>

                  <textarea id="edit-topic-deliverables-batch" rows="4" placeholder="每行一个交付件，保存时将自动拆分" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);resize:vertical;"></textarea>

              <div style="margin-bottom:20px;">
                <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;"><span class="icon" data-icon="link" data-icon-size="14"></span> 关联洞察 (多选)</label>
                <select id="edit-topic-insights" multiple style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);min-height:80px;">${insightOptions}</select>

              <div style="display:flex;gap:10px;justify-content:flex-end;padding-top:16px;border-top:1px solid var(--border-color);">

        overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.remove(); window._siTopicCreateFromInsightId = null; window._siTopicCreateFromChainId = null; } });
        if (window.ensurePersonInput) window.ensurePersonInput('edit-topic-owner', topic.owner || '');
      };

      window.siSaveTopicCreate = function() {
        const name = document.getElementById('edit-topic-name').value.trim();
        if (!name) {
          showToast('请填写专题名称', 'warning');
          return;
        }
        const researchObjectives = document.getElementById('edit-topic-researchObjectives').value.trim();
        if (!researchObjectives) {
          showToast('请填写研究目标', 'warning');
          return;
        }

        const milestoneRows = document.querySelectorAll('#edit-topic-milestones .milestone-row');
        const milestones = Array.from(milestoneRows).map(row => ({
          title: row.querySelector('.ms-title').value.trim(),
          date: row.querySelector('.ms-date').value,
          completed: row.querySelector('.ms-completed').checked
        })).filter(m => m.title);

        const batchText = document.getElementById('edit-topic-deliverables-batch')?.value || '';
        const batchItems = siParseDeliverablesBatch(batchText);
        const deliverableRows = document.querySelectorAll('#edit-topic-deliverables .deliverable-row');
        const deliverables = [
          ...Array.from(deliverableRows).map(row => row.querySelector('.dv-text').value.trim()).filter(Boolean),
          ...batchItems
        ];

        const insightSelect = document.getElementById('edit-topic-insights');
        const selectedInsights = insightSelect ? Array.from(insightSelect.selectedOptions).map(o => o.value) : [];

        const yearSelect = document.getElementById('edit-topic-year');
        const year = yearSelect ? parseInt(yearSelect.value, 10) : new Date().getFullYear();

        const membersRaw = document.getElementById('edit-topic-members').value;
        const members = membersRaw.split(/,|，/).map(s => s.trim()).filter(Boolean);

        const fromInsightId = window._siTopicCreateFromInsightId;
        const fromChainId = window._siTopicCreateFromChainId;
        let summary = document.getElementById('edit-topic-summary').value.trim();
        let previousTopicId = null;
        if (fromInsightId) {
          const insight = siLoadInsights().find(i => i.id === fromInsightId);
          if (insight && !summary) summary = insight.content;
        }
        if (fromChainId) {
          previousTopicId = fromChainId;
        }

        const newTopic = {
          id: siGenerateTopicId(),
          name,
          type: document.getElementById('edit-topic-type').value,
          owner: (window.getPersonValue ? window.getPersonValue('edit-topic-owner') : null) || document.getElementById('edit-topic-owner').value.trim() || '',
          members,
          status: document.getElementById('edit-topic-status').value,
          startDate: document.getElementById('edit-topic-startDate').value,
          endDate: document.getElementById('edit-topic-endDate').value,
          kmsUrl: document.getElementById('edit-topic-kmsUrl').value.trim(),
          researchObjectives,
          deliverables,
          year,
          milestones,
          insights: selectedInsights,
          summary,
          previousTopicId,
          nextTopicId: null,
          deleted: false,
          createdAt: new Date().toISOString().slice(0, 10),
          updatedAt: new Date().toISOString().slice(0, 10)
        };

        let topics = siLoadTopics();
        topics.push(newTopic);

        // 回写下一年深化链
        if (previousTopicId) {
          const prevIdx = topics.findIndex(t => t.id === previousTopicId);
          if (prevIdx > -1) {
            topics[prevIdx].nextTopicId = newTopic.id;
            topics[prevIdx].updatedAt = newTopic.updatedAt;
          }
        }

        siPersistTopics(topics);

        // 回写 linkedTopicId
        selectedInsights.forEach(insightId => {
          const insights = siLoadInsights();
          const idx = insights.findIndex(i => i.id === insightId);
          if (idx > -1) {
            insights[idx].linkedTopicId = newTopic.id;
            siPersistInsights(insights);
          }
        });

        window._siTopicEditId = null;
        window._siTopicCreateFromInsightId = null;
        window._siTopicCreateFromChainId = null;
        const overlay = document.getElementById('topic-edit-overlay');
        if (overlay) overlay.remove();
        navigate('sp/strategy-topics');
      };

      // 下一年深化
      window.siOpenNextYearDeepening = function(topicId) {
        if (!siSafeTopicId(topicId)) return;
        const topics = siGetActiveTopics();
        const topic = topics.find(t => t.id === topicId);
        if (!topic || topic.nextTopicId) return;
        window._siTopicCreateFromChainId = topicId;
        siOpenTopicCreate({
          name: topic.name + `（${topic.year + 1}）`,
          researchObjectives: topic.researchObjectives,
          members: topic.members,
          kmsUrl: topic.kmsUrl,
          type: topic.type,
          year: topic.year + 1,
          status: 'planning',
          previousTopicId: topic.id
        });
      };

      // ===== 洞察 CRUD =====

      window._siInsightEditId = null;

      window.siOpenInsightEdit = function(insightId) {
        const isCreate = !insightId;
        const insights = siLoadInsights();

          type: 'trend',

          content: '',
          source: '',
          confidence: 80,
          impact: 'medium'
        } : insights.find(i => i.id === insightId);

        window._siInsightEditId = isCreate ? null : insightId;

          ['trend', '<span class="icon" data-icon="chart-line-up" data-icon-size="14"></span> 看趋势'],
          ['customer', '<span class="icon" data-icon="users" data-icon-size="14"></span> 看客户'],
          ['competitor', '<span class="icon" data-icon="sword" data-icon-size="14"></span> 看竞争'],

        const impactOptions = [
          ['high', '<span class="icon" data-icon="warning-octagon" data-icon-size="14"></span> 高影响'],

          <div id="insight-edit-modal" class="omp-modal" style="background:var(--bg-card);border-radius:12px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border-color);">
              <h2 style="margin:0;font-size:18px;">${isCreate ? '新增洞察' : '编辑洞察'}</h2>
              <button onclick="document.getElementById('insight-edit-overlay').remove(); window._siInsightEditId = null;" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-secondary);">×</button>
            </div>
            <div style="padding:24px;">
              <div style="margin-bottom:16px;">
                <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">五看类型 <span style="color:var(--danger)">*</span></label>
                <select id="edit-insight-type" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">${typeOptions}</select>
              </div>
              <div style="margin-bottom:16px;">
                <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">标题 <span style="color:var(--danger)">*</span></label>
                <input type="text" id="edit-insight-title" value="${siEscapeHtml(insight.title)}" placeholder="洞察标题" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
              </div>
              <div style="margin-bottom:16px;">
                <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">内容 <span style="color:var(--danger)">*</span></label>
                <textarea id="edit-insight-content" rows="4" placeholder="描述洞察的具体内容" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);resize:vertical;">${siEscapeHtml(insight.content)}</textarea>
              </div>
              <div style="margin-bottom:16px;">
                <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">来源</label>
                <input type="text" id="edit-insight-source" value="${siEscapeHtml(insight.source || '')}" placeholder="如：Gartner 2026" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
              </div>
              <div style="margin-bottom:16px;">
                <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">置信度: <span id="confidence-value">${insight.confidence || 80}</span>%</label>
                <input type="range" id="edit-insight-confidence" value="${insight.confidence || 80}" min="0" max="100" style="width:100%;" oninput="document.getElementById('confidence-value').textContent = this.value">
              </div>
              <div style="margin-bottom:20px;">
                <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:8px;">影响程度 <span style="color:var(--danger)">*</span></label>
                <div style="display:flex;gap:16px;">${impactOptions}</div>
              </div>
              <div style="display:flex;gap:10px;justify-content:flex-end;padding-top:16px;border-top:1px solid var(--border-color);">
                <button class="btn btn-secondary" onclick="document.getElementById('insight-edit-overlay').remove(); window._siInsightEditId = null;">取消</button>
                <button class="btn btn-primary" onclick="window.siSaveInsightEdit()">保存</button>
              </div>
            </div>
          </div>
        `;
        document.body.appendChild(overlay);
        overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.remove(); window._siInsightEditId = null; } });
      };

      window.siSaveInsightEdit = function() {
        const title = document.getElementById('edit-insight-title').value.trim();
        const content = document.getElementById('edit-insight-content').value.trim();
        if (!title || !content) {
          showToast('请填写标题和内容', 'warning');
          return;
        }

        const insights = siLoadInsights();
        const type = document.getElementById('edit-insight-type').value;
        const source = document.getElementById('edit-insight-source').value.trim();
        const confidence = parseInt(document.getElementById('edit-insight-confidence').value, 10) || 80;
        const impactEl = document.querySelector('input[name="edit-insight-impact"]:checked');
        const impact = impactEl ? impactEl.value : 'medium';

        if (window._siInsightEditId) {
          const idx = insights.findIndex(i => i.id === window._siInsightEditId);
          if (idx > -1) {
            insights[idx] = { ...insights[idx], type, title, content, source, confidence, impact };
          }
        } else {
          insights.push({
            id: siGenerateInsightId(),
            type, title, content, source, confidence, impact,
            linkedTopicId: null,
            createdAt: new Date().toISOString().slice(0, 10)
          });
        }

        siPersistInsights(insights);
        window._siInsightEditId = null;
        const overlay = document.getElementById('insight-edit-overlay');
        if (overlay) overlay.remove();
        navigate('sp/insights');
      };

      window.siConfirmDeleteInsight = function(insightId) {
        if (!siSafeInsightId(insightId)) return;
        const insights = siLoadInsights();
        const insight = insights.find(i => i.id === insightId);
        if (!insight) return;

        const linkedTopic = insight.linkedTopicId ? siGetActiveTopics().find(t => t.id === insight.linkedTopicId) : null;
        const warningText = linkedTopic
          ? `该洞察已生成专题「${linkedTopic.name}」，删除后将解除关联。`
          : '删除后不可恢复，是否确认？';

        const overlay = document.createElement('div');
        overlay.id = 'insight-delete-confirm-overlay';
        overlay.className = 'omp-modal-overlay';
        overlay.innerHTML = `
          <div id="insight-delete-confirm-modal" style="background:var(--bg-card);border-radius:12px;max-width:400px;width:100%;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.3);text-align:center;">
            <div style="font-size:48px;margin-bottom:12px;"><span class="icon" data-icon="warning" data-icon-size="14"></span>️</div>
            <h3 style="margin:0 0 8px;font-size:18px;">确认删除洞察?</h3>
            <p style="margin:0 0 20px;font-size:14px;color:var(--text-secondary);">「${siEscapeHtml(insight.title)}」${warningText}</p>
            <div style="display:flex;gap:10px;justify-content:center;">
              <button class="btn btn-secondary" onclick="document.getElementById('insight-delete-confirm-overlay').remove()">取消</button>
              <button class="btn btn-danger" onclick="window.siExecuteDeleteInsight('${insightId}')">确认删除</button>
            </div>
          </div>
        `;
        document.body.appendChild(overlay);
        overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
      };

      window.siExecuteDeleteInsight = function(insightId) {
        if (!siSafeInsightId(insightId)) return;
        let insights = siLoadInsights();
        const insight = insights.find(i => i.id === insightId);
        if (!insight) return;

        // 清理关联专题
        if (insight.linkedTopicId) {
          const topics = siLoadTopics();
          const topicIdx = topics.findIndex(t => t.id === insight.linkedTopicId);
          if (topicIdx > -1) {
            topics[topicIdx].insights = (topics[topicIdx].insights || []).filter(id => id !== insightId);
            topics[topicIdx].updatedAt = new Date().toISOString().slice(0, 10);
            siPersistTopics(topics);
          }
        }

        insights = insights.filter(i => i.id !== insightId);
        siPersistInsights(insights);

        const overlay = document.getElementById('insight-delete-confirm-overlay');
        if (overlay) overlay.remove();
        navigate('sp/insights');
      };

      // 从洞察生成专题
      window.siGenerateTopicFromInsight = function(insightId) {
        if (!siSafeInsightId(insightId)) return;
        const insights = siLoadInsights();
        const insight = insights.find(i => i.id === insightId);
        if (!insight) return;
        window._siTopicCreateFromInsightId = insightId;
        siOpenTopicCreate({
          name: insight.title,
          summary: insight.content,
          researchObjectives: insight.content,
          insights: [insight.id],
          status: 'insight'
        });
      };

      // ===== 事件委托绑定 =====
      function siBindStrategyEvents() {
        document.addEventListener('click', (e) => {
          const target = e.target.closest('[data-insight-id], [data-topic-id], #btn-new-insight, #btn-new-topic');
          if (!target) return;

          // 洞察卡片过滤
          const viewCard = e.target.closest('.insight-card');
          if (viewCard && viewCard.dataset.view) {
            e.preventDefault();
            window.siFilterInsightsByType(viewCard.dataset.view);
            return;
          }

          const insightId = target.dataset.insightId;
          const topicId = target.dataset.topicId;

          if (target.id === 'btn-new-insight') {
            window.siOpenInsightEdit();
          } else if (target.classList.contains('edit-insight-btn')) {
            window.siOpenInsightEdit(insightId);
          } else if (target.classList.contains('delete-insight-btn')) {
            window.siConfirmDeleteInsight(insightId);
          } else if (target.classList.contains('generate-topic-btn')) {
            window.siGenerateTopicFromInsight(insightId);
          } else if (target.id === 'btn-new-topic') {
            window.siOpenTopicCreate();
          } else if (target.classList.contains('view-topic-btn')) {
            window.siViewTopicDetail(topicId);
          } else if (target.classList.contains('edit-topic-btn')) {
            window.siOpenTopicEdit(topicId);
          } else if (target.classList.contains('delete-topic-btn')) {
            window.siConfirmDeleteTopic(topicId);
          } else if (target.classList.contains('next-year-deepening-btn')) {
            window.siOpenNextYearDeepening(topicId);
          } else if (target.classList.contains('view-chain-topic-btn') || target.classList.contains('chain-badge')) {
            window.siViewTopicDetail(topicId);
          } else if (target.classList.contains('gantt-bar') || target.classList.contains('gantt-milestone')) {
            window.siViewTopicDetail(topicId);
          }
        });
      }

      // 初始化事件委托一次
      siBindStrategyEvents();
      // ===== 业务专题管理页面 =====
      function renderBusinessTopics() {
        const topics = [
          { name: 'Q2 大客户攻坚协同', lead: '销售部', partners: ['产品部','交付部'], milestone: '需求对齐完成', progress: 75, risk: '中', status: 'normal' },
          { name: '新品上市跨部门联动', lead: '产品部', partners: ['市场部','销售部','供应链'], milestone: '上市方案评审', progress: 60, risk: '高', status: 'warning' },
          { name: '客户满意度提升专项', lead: '客户成功部', partners: ['产品部','服务部'], milestone: 'NPS调研分析', progress: 45, risk: '低', status: 'normal' },
          { name: '成本优化联合行动', lead: '供应链部', partners: ['财务部','采购部'], milestone: '供应商谈判', progress: 30, risk: '中', status: 'normal' },
          { name: '数字化工具推广', lead: 'IT部', partners: ['HR部','各业务部门'], milestone: '培训计划制定', progress: 20, risk: '低', status: 'default' },
          { name: '海外市场本地化支持', lead: '国际部', partners: ['产品部','法务部'], milestone: '合规审查', progress: 90, risk: '低', status: 'success' }
        ];
        const riskColor = { '高': 'var(--danger)', '中': 'var(--warning)', '低': 'var(--success)' };
        const statusClass = { 'normal': 'status-primary', 'success': 'status-success', 'warning': 'status-warning', 'default': 'status-default' };
        const statusLabel = { 'normal': '推进中', 'success': '即将完成', 'warning': '有风险', 'default': '启动中' };
        const deptColors = ['var(--primary)','var(--success)','var(--warning)','var(--danger)','var(--dim-learning)','var(--info)','var(--accent-pink)'];

        const rows = topics.map((t, i) => {
          const partnerTags = t.partners.map((p, j) => `<span style="display:inline-block;padding:2px 8px;border-radius:4px;background:${deptColors[(i+j)%deptColors.length]}15;color:${deptColors[(i+j)%deptColors.length]};font-size:11px;margin-right:4px;">${p}</span>`).join('');
          return `
            <tr>
              <td><strong>${t.name}</strong></td>
              <td><span style="font-weight:500;color:var(--primary)">${t.lead}</span></td>
              <td>${partnerTags}</td>
              <td>${t.milestone}</td>
              <td><div style="display:flex;align-items:center;gap:8px"><div class="progress-bar" style="width:80px"><div class="progress-bar-fill ${t.progress < 50 && t.progress > 0 ? 'warning' : ''}" style="width:${t.progress}%"></div></div><span style="font-size:12px">${t.progress}%</span></div></td>
              <td><span style="color:${riskColor[t.risk]};font-weight:600;font-size:12px">● ${t.risk}</span></td>
              <td><span class="status-badge ${statusClass[t.status]}">${statusLabel[t.status]}</span></td>
            </tr>
          `;
        }).join('');

        return `
          ${renderBreadcrumb('业务专题管理')}
          <div class="page-header">

      function omp_openMonthlyProgressModal(taskId, month) {

        if (!task) return;
        const year = getCurrentCycle().year;
        const isSummary = omp_isSummaryMonth(month);
        const monthNum = isSummary ? null : parseInt(month.split('-')[1], 10);
        const monthLabel = month === 'H1' ? `${year} 上半年 (H1)` : month === 'YEAR' ? `${year} 年终` : `${year}年${monthNum}月`;
        const existing = omp_getMonthlyRecord(taskId, month);
        window._ompState.editingMonthlyTaskId = taskId;
        window._ompState.editingMonthlyMonth = month;
        window._ompState.editingMonthlyRecordId = existing ? existing.id : null;

        const summaryDefaultDate = month === 'H1' ? `${year}-09-30` : `${year}-12-31`;
        const defaultDate = existing ? existing.date : (isSummary ? summaryDefaultDate : omp_getLastDayOfMonth(year, monthNum));
        const defaultProgress = existing ? existing.progress : (task.progress || 0);
        const defaultContent = existing ? existing.content : '';
        const defaultProblems = existing ? existing.problems : '';
        const defaultNextPlan = existing ? existing.nextPlan : '';
        const defaultReporter = existing ? existing.reporter : (task.owner || '');

        const deleteBtn = existing
          ? `<button class="btn btn-danger" onclick="window.omp_deleteMonthlyProgress('${existing.id}')" style="margin-right:auto;">删除</button>`

      function omp_saveMonthlyProgress() {
        const taskId = window._ompState.editingMonthlyTaskId;
        const month = window._ompState.editingMonthlyMonth;
        const existingId = window._ompState.editingMonthlyRecordId;
        if (!taskId || !month) return;
        const isSummary = omp_isSummaryMonth(month);

        const date = document.getElementById('omp-monthly-date')?.value;
        const progress = parseInt(document.getElementById('omp-monthly-progress')?.value, 10) || 0;
        const content = document.getElementById('omp-monthly-content')?.value?.trim() || '';
        const problems = document.getElementById('omp-monthly-problems')?.value?.trim() || '';
        const nextPlan = document.getElementById('omp-monthly-next-plan')?.value?.trim() || '';
        const reporter = document.getElementById('omp-monthly-reporter')?.value?.trim() || '';

        if (!date || !content) {
          showToast(isSummary ? '请填写总结内容' : '请填写记录日期和关键进展', 'warning');
          return;
        }

        const records = omp_load('progressRecords');
        const recordMonth = isSummary ? month : omp_formatMonth(date);
        const recordId = existingId || `rec_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`;
        const newRecord = {
          id: recordId,
          taskId,
          month: recordMonth,
          date,
          progress: Math.min(100, Math.max(0, progress)),
          content,
          problems,
          nextPlan,
          reporter,
        };

        // 覆盖同 taskId + month 的记录（业务语义：每月/每总结一条）
        const filtered = records.filter(r => !(r.taskId === taskId && r.month === month));
        filtered.push(newRecord);
        omp_save('progressRecords', filtered);

        // 联动更新任务总进度（总结记录不参与聚合）
        omp_syncTaskProgressFromRecords(taskId);

        document.getElementById('omp-active-modal')?.remove();
        showToast(isSummary ? '总结已保存' : '月度进展已保存', 'success');
        navigate('exe/tasks');
      }

      function omp_deleteMonthlyProgress(recordId) {
        if (!confirm('确定要删除这条月度进展记录吗？')) return;
        const records = omp_load('progressRecords');
        const record = records.find(r => r.id === recordId);
        if (!record) return;
        const taskId = record.taskId;
        const filtered = records.filter(r => r.id !== recordId);
        omp_save('progressRecords', filtered);
        omp_syncTaskProgressFromRecords(taskId);
        document.getElementById('omp-active-modal')?.remove();
        showToast('月度进展已删除', 'success');
        navigate('exe/tasks');
      }
