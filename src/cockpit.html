  <style>
    /* ===== cockpit.html 页面级响应式覆盖 ===== */

    /* Tablet (<1024px) */
    @media (max-width: 1024px) {
      #page-content [style*="grid-template-columns: repeat(4, 1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: 2fr 1fr"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(3, 1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: repeat(7, 1fr)"] {
        grid-template-columns: repeat(4, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: repeat(5, 1fr)"] {
        grid-template-columns: repeat(3, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: 280px 1fr"] {
        grid-template-columns: 1fr !important;
      }
      /* Roadmap 时间线节点缩小 */
      #dev-timeline .timeline-node {
        min-width: 90px !important;
        padding: 6px !important;
      }
    }

    /* Mobile (<768px) */
    @media (max-width: 768px) {
      #page-content [style*="grid-template-columns: repeat(4, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(2, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(3, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(7, 1fr)"] {
        grid-template-columns: repeat(3, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: repeat(5, 1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: 280px 1fr"] {
        grid-template-columns: 1fr !important;
      }
      /* Roadmap 时间线节点进一步缩小 */
      #dev-timeline .timeline-node {
        min-width: 80px !important;
        padding: 4px !important;
      }
      #dev-timeline .timeline-node > div:nth-child(2) {
        font-size: 12px !important;
      }
      #dev-timeline .timeline-node > div:nth-child(3),
      #dev-timeline .timeline-node > div:nth-child(4) {
        font-size: 10px !important;
      }
      /* 卡片 padding 缩小 */
      #page-content .card {
        padding: 12px !important;
      }
      /* 看板列从 4 列变为可滚动 */
      #page-content [style*="grid-template-columns: repeat(4, 1fr)"][class*="kanban"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
    }

    /* Small Phone (<480px) */
    @media (max-width: 480px) {
      #page-content [style*="grid-template-columns: repeat(2, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(7, 1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      #page-content [style*="grid-template-columns: repeat(5, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #page-content [style*="grid-template-columns: repeat(4, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      #dev-timeline .timeline-node {
        min-width: 70px !important;
      }
      #page-content .card {
        padding: 10px !important;
      }
      /* 看板单列 */
      #page-content [style*="grid-template-columns: repeat(4, 1fr)"][class*="kanban"] {
        grid-template-columns: 1fr !important;
      }
    }

    /* 表格横向滚动容器 */
    .table-scroll-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .table-scroll-wrapper table {
      min-width: 600px;
    }

    /* 减少动画偏好 */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>

  <script>
    (function() {
      'use strict';

      // ===== 配置 =====
      const API_BASE = (() => {
        const host = window.location.hostname;
        if (host === 'localhost' || host === '127.0.0.1') {
          return localStorage.getItem('dste_api_base') || '';
        }
        return 'https://dste-api.jasonxspace.workers.dev';
      })();

      async function apiSave(endpoint, data) {
        // 无论 API 是否可用，都先保存到 localStorage 作为兜底，防止数据丢失
        if (endpoint === '/api/meetings') {
          try {
            localStorage.setItem('dste_meetings', JSON.stringify(data));
          } catch (e) {
            console.warn('localStorage save failed:', e.message);
          }
        }
        if (!API_BASE) return;
        try {
          const token = localStorage.getItem('dste-token');
          const headers = { 'Content-Type': 'application/json' };
          if (token) headers['Authorization'] = `Bearer ${token}`;
          const resp = await fetch(API_BASE + endpoint, {
            method: 'POST',
            headers,
            body: JSON.stringify(data),
          });
          if (resp.status === 401) {
            redirectToCasLogin();
            return;
          }
        } catch (e) {
          console.warn('API save failed:', e.message);
        }
      }

      // CAS 登录跳转
      function redirectToCasLogin() {
        const service = encodeURIComponent(window.location.origin + window.location.pathname);
        window.location.href = `https://passport.fanruan.com/cas/login?service=${service}`;
      }

      // CAS 回调处理：从 URL 提取 ticket，调用后端换取 token
      async function handleCasCallback() {
        const urlParams = new URLSearchParams(window.location.search);
        const ticket = urlParams.get('ticket');
        if (!ticket) return false;

        const cleanUrl = window.location.pathname + window.location.hash;
        history.replaceState(null, '', cleanUrl);

        try {
          const service = encodeURIComponent(window.location.origin + window.location.pathname);
          const resp = await fetch(`${API_BASE}/api/auth/cas/login?ticket=${encodeURIComponent(ticket)}&service=${service}`);
          const json = await resp.json();
          if (json.success && json.token) {
            localStorage.setItem('dste-token', json.token);
            localStorage.setItem('dste-user', json.user?.name || json.user?.username || '');
            sessionStorage.setItem('dste-user', json.user?.name || json.user?.username || '');
            updateUserUI();
            return true;
          }
        } catch (e) {
          console.error('CAS callback failed:', e);
        }
        return false;
      }

      // 检查登录状态：验证 token 是否有效
      async function checkLoginStatus() {
        const token = localStorage.getItem('dste-token');
        if (!token) return false;

        try {
          const resp = await fetch(`${API_BASE}/api/auth/me`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (resp.ok) {
            const json = await resp.json();
            if (json.success && json.user) {
              localStorage.setItem('dste-user', json.user.name || json.user.username || '');
              sessionStorage.setItem('dste-user', json.user.name || json.user.username || '');
              updateUserUI();
              return true;
            }
          }
        } catch (e) {
          console.warn('Login status check failed:', e);
        }

        localStorage.removeItem('dste-token');
        localStorage.removeItem('dste-user');
        sessionStorage.removeItem('dste-user');
        return false;
      }

      // 更新用户 UI（头像、下拉菜单名）
      function updateUserUI() {
        const user = localStorage.getItem('dste-user') || sessionStorage.getItem('dste-user') || '张';
        const avatar = document.getElementById('user-avatar');
        const dropdownName = document.getElementById('user-dropdown-name');
        if (avatar) avatar.textContent = user.charAt(0);
        if (dropdownName) dropdownName.textContent = user;
      }

      // 登出
      async function logout() {
        const token = localStorage.getItem('dste-token');
        if (token) {
          try {
            await fetch(`${API_BASE}/api/auth/logout`, {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${token}` }
            });
          } catch (e) {
            console.warn('Logout API failed:', e);
          }
        }
        localStorage.removeItem('dste-token');
        localStorage.removeItem('dste-user');
        sessionStorage.removeItem('dste-user');
        window.location.reload();
      }

      async function apiLoad(endpoint) {
        let apiData = null;
        if (API_BASE) {
          try {
            const token = localStorage.getItem('dste-token');
            const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
            const resp = await fetch(API_BASE + endpoint, { headers });
            if (resp.status === 401) {
              redirectToCasLogin();
              return null;
            }
            const json = await resp.json();
            if (json.success && json.data) apiData = json.data;
          } catch (e) {
            console.warn('API load failed:', e.message);
          }
        }
        if (apiData && apiData.length > 0) return apiData;
        // API 无数据或失败时 fallback 到 localStorage
        if (endpoint === '/api/meetings') {
          const local = localStorage.getItem('dste_meetings');
          if (local) {
            try {
              const parsed = JSON.parse(local);
              if (parsed && parsed.length > 0) return parsed;
            } catch (e) {
              console.warn('localStorage parse failed:', e);
            }
          }
        }
        return null;
      }

            if (currentPhase === phase) {

      function navigate(pageId, pushState = true) {
        if (!pageId) pageId = 'dashboard';
        
        // 外部链接直接跳转
        if (EXTERNAL_PAGES[pageId]) {
          window.location.href = EXTERNAL_PAGES[pageId];
          return;
        }
        
        if (!PAGES[pageId]) pageId = 'dashboard';

        // 同步 URL hash（避免和 hashchange 循环触发）
        if (pushState && window.location.hash.slice(1) !== pageId) {
          window.location.hash = pageId;
        }

        currentPage = pageId;

        // 确定当前 phase
        const phase = TOP_NAV.find(n => pageId === n.id || pageId.startsWith(n.id + '/'))?.id || 'dashboard';
        currentPhase = phase;

        // 更新顶部 active
        document.querySelectorAll('.top-nav-item').forEach(link => {
          link.classList.toggle('active', link.dataset.phase === phase);
        });

        // 更新左侧栏
        renderSidebar(phase);

        const contentEl = document.getElementById('page-content');

        contentEl.innerHTML = PAGES[pageId]();
        contentEl.style.animation = '';

      // ===== 事件委托（替代内联 onclick）=====
      function bindPageEvents(container) {
        container.addEventListener('click', (e) => {
          // data-navigate: 面包屑/相关链接导航
          const navLink = e.target.closest('[data-navigate]');
          if (navLink) {
            e.preventDefault();
            navigate(navLink.dataset.navigate);
            return;
          }
          // data-filter-roadmap: 路线图筛选
          const filterBtn = e.target.closest('[data-filter-roadmap]');
          if (filterBtn) {
            filterRoadmap(filterBtn.dataset.filterRoadmap);
            return;
          }
          // data-scroll-to: 平滑滚动到元素
          const scrollTrigger = e.target.closest('[data-scroll-to]');
          if (scrollTrigger) {
            const target = document.getElementById(scrollTrigger.dataset.scrollTo);
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            return;
          }
          // OMP: data-action 事件委托
          const actionBtn = e.target.closest('[data-action]');
          if (actionBtn) {
            const action = actionBtn.dataset.action;
            const id = actionBtn.dataset.id;
            const filter = actionBtn.dataset.filter;
            const tab = actionBtn.dataset.tab;
            switch(action) {
              case 'omp-switch-tab': window.omp_switchTab(tab); break;
              case 'omp-view-kpi': window.omp_viewKpi(id); break;
              case 'omp-edit-kpi': window.omp_editKpi(id); break;
              case 'omp-new-kpi': window.omp_newKpi(); break;
              case 'omp-view-task': window.omp_viewTask(id); break;
              case 'omp-edit-task': window.omp_editTask(id); break;
              case 'omp-new-task': window.omp_newTask(); break;
              case 'omp-export': window.omp_exportData(); break;
              case 'omp-filter-kpi':
                if (filter) { window._ompState.kpiFilter[filter] = actionBtn.value; navigate('exe/tasks'); }
                break;
              case 'omp-filter-task':
                if (filter) { window._ompState.taskFilter[filter] = actionBtn.value; navigate('exe/tasks'); }
                break;
            }
            return;
          }
        });
      }

      // ===== Tab 2: KPI 管理 =====
      function omp_renderKPITab() {
        const kpis = omp_load('kpiInstances');
        const indicators = omp_load('indicators');
        const filter = window._ompState.kpiFilter;
        let filtered = kpis;
        if (filter.dept !== 'all') filtered = filtered.filter(k => k.dept === filter.dept);
        if (filter.status !== 'all') filtered = filtered.filter(k => k.status === filter.status);
        if (filter.category !== 'all') {
          filtered = filtered.filter(k => {
            const ind = indicators.find(i => i.id === k.indicatorId);
            return ind && ind.category === filter.category;
          });
        }
        const depts = ['all', ...new Set(kpis.map(k => k.dept))];
        const statuses = [
          { value: 'all', label: '全部状态' },
          { value: 'achieved', label: '✅ 达成' },
          { value: 'warning', label: '🟡 预警' },
          { value: 'lagging', label: '🔴 落后' },
        ];
        const categories = [
          { value: 'all', label: '全部维度' },
          { value: '财务', label: '💰 财务' },
          { value: '客户', label: '👤 客户' },
          { value: '流程', label: '⚙️ 流程' },
          { value: '学习成长', label: '📚 学习成长' },
        ];
        const statusBadge = {
          achieved: { cls: 'status-success', text: '达成' },
          warning: { cls: 'status-warning', text: '预警' },
          lagging: { cls: 'status-danger', text: '落后' },
        };
        const trendData = {
          kpi_1: [92, 88, 94, 96],
          kpi_2: [95, 90, 85, 87.5],
          kpi_3: [88, 85, 82, 84],
          kpi_4: [98, 96, 95, 97.1],
          kpi_5: [90, 88, 87, 85.7],
          kpi_6: [105, 108, 110, 111.1],
          kpi_7: [92, 90, 89, 95],
          kpi_8: [94, 93, 91, 96.5],
        };
        const miniTrend = (kpiId) => {
          const data = trendData[kpiId] || [80, 82, 85, 88];
          const max = Math.max(...data);
          const min = Math.min(...data);
          const range = max - min || 1;
          return `<div style="display:flex;align-items:flex-end;gap:2px;height:28px;width:40px;">
            ${data.map(v => {
              const h = ((v - min) / range) * 20 + 4;
              const color = v >= 95 ? 'var(--success)' : v >= 80 ? 'var(--warning)' : 'var(--danger)';
              return `<div style="width:6px;height:${h}px;background:${color};border-radius:1px;" title="${v}%"></div>`;
            }).join('')}
          </div>`;
        };
        return `
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <select data-action="omp-filter-kpi" data-filter="dept" style="padding:6px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;cursor:pointer;">
                ${depts.map(d => `<option value="${d}" ${filter.dept === d ? 'selected' : ''}>${d === 'all' ? '全部部门' : d}</option>`).join('')}
              </select>
              <select data-action="omp-filter-kpi" data-filter="status" style="padding:6px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;cursor:pointer;">
                ${statuses.map(s => `<option value="${s.value}" ${filter.status === s.value ? 'selected' : ''}>${s.label}</option>`).join('')}
              </select>
              <select data-action="omp-filter-kpi" data-filter="category" style="padding:6px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;cursor:pointer;">
                ${categories.map(c => `<option value="${c.value}" ${filter.category === c.value ? 'selected' : ''}>${c.label}</option>`).join('')}
              </select>
            </div>
            <button class="btn btn-primary" data-action="omp-new-kpi" style="font-size:13px;">+ 新建 KPI</button>
          </div>
          <div class="card">
            <div style="overflow-x:auto;">
              <table class="data-table">
                <thead>
                  <tr><th>指标名称</th><th>部门</th><th style="text-align:right;">目标值</th><th style="text-align:right;">实际值</th><th style="text-align:center;">达成率</th><th style="text-align:center;">状态</th><th style="text-align:center;">趋势</th><th style="text-align:center;">操作</th></tr>
                </thead>

                  ${!linkedTopic ? `<button class="btn btn-sm btn-primary generate-topic-btn" data-insight-id="${i.id}" style="padding:4px 12px;font-size:12px;white-space:nowrap;">生成专题</button>` : ''}

        // 渲染专题表格
        const topicRows = topics.map(t => `

        // Tab切换脚本 - 使用全局函数避免嵌套script

              t.style.fontWeight = '600';
            } else {
              t.style.borderBottom = '2px solid transparent';
              t.style.color = 'var(--text-secondary)';
              t.style.fontWeight = '500';

          });
          panels.forEach(p => p.style.display = p.id === 'panel-' + tabName ? 'block' : 'none');
        };

        window.filterTopicsByYear = function(year) {

        // ===== 专题 CRUD 全局函数 =====

        // 当前编辑/查看的专题ID
        window._topicEditId = null;

        // 加载专题数据
        function loadTopics() {
          try {
            const data = localStorage.getItem(STORAGE_KEY_TOPICS);
            if (data) return JSON.parse(data);
          } catch(e) {}
          return [];
        }

        // 保存专题数据
        function saveTopics(topics) {
          localStorage.setItem(STORAGE_KEY_TOPICS, JSON.stringify(topics));
        }

        // 获取未删除的专题
        function getActiveTopics() {
          return loadTopics().filter(t => !t.deleted);
        }

        const statusLabel = { insight: '洞察阶段', planning: '规划阶段', execution: '执行阶段', closed: '已闭环' };

          const milestonesHtml = (topic.milestones || []).map((m, idx) => `
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-light);${idx === (topic.milestones || []).length - 1 ? 'border-bottom:none;' : ''}">

          const insightsData = loadInsights();
          const linkedInsightsHtml = (topic.insights || []).map(insightId => {
            const ins = insightsData.find(i => i.id === insightId);
            if (!ins) return '';

          const overlay = document.createElement('div');

              <div style="display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border-color);">
                <h2 style="margin:0;font-size:18px;">专题详情</h2>
                <button onclick="document.getElementById('topic-detail-overlay').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-secondary);">×</button>

                <div style="display:grid;grid-template-columns:repeat(2, 1fr);gap:16px;margin-bottom:20px;">
                  <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">负责人</div><div style="font-size:14px;font-weight:500;">${topic.owner}</div></div>
                  <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">战略维度</div><div style="font-size:14px;font-weight:500;">${topic.dimension}</div></div>
                  <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">阶段</div><div style="font-size:14px;font-weight:500;">${statusLabel[topic.status] || topic.status}</div></div>
                  <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">进度</div><div style="font-size:14px;font-weight:500;">${topic.progress}%</div></div>
                  <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">预算</div><div style="font-size:14px;font-weight:500;">${topic.budget || '未设定'}</div></div>
                  <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">实际成本</div><div style="font-size:14px;font-weight:500;">${topic.actualCost || '未记录'}</div></div>

                  <div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">结束日期</div><div style="font-size:14px;font-weight:500;">${topic.endDate}</div></div>
                </div>

                <div style="margin-bottom:20px;">
                  <div style="font-size:14px;font-weight:600;margin-bottom:10px;">📌 里程碑</div>
                  <div style="border:1px solid var(--border-light);border-radius:8px;padding:0 12px;">${milestonesHtml}</div>
                </div>

                <div style="margin-bottom:20px;">
                  <div style="font-size:14px;font-weight:600;margin-bottom:10px;">🔗 关联洞察</div>

                <div style="display:flex;gap:10px;justify-content:flex-end;padding-top:16px;border-top:1px solid var(--border-color);">

        // 打开编辑弹窗
        window.openTopicEdit = function(topicId) {
          const topics = getActiveTopics();
          const topic = topics.find(t => t.id === topicId);
          if (!topic) return;
          window._topicEditId = topicId;

          const insightsData = loadInsights();
          const typeOptions = [['breakthrough','突破型'],['incremental','增量型'],['maintenance','维持型']].map(([v,l]) => `<option value="${v}" ${topic.type === v ? 'selected' : ''}>${l}</option>`).join('');
          const priorityOptions = [['P0','🔴 P0 - 最高'],['P1','🟡 P1 - 高'],['P2','🟢 P2 - 中']].map(([v,l]) => `<option value="${v}" ${topic.priority === v ? 'selected' : ''}>${l}</option>`).join('');
          const statusOptions = [['insight','洞察阶段'],['planning','规划阶段'],['execution','执行阶段'],['closed','已闭环']].map(([v,l]) => `<option value="${v}" ${topic.status === v ? 'selected' : ''}>${l}</option>`).join('');

          const milestoneRows = (topic.milestones || []).map((m, idx) => `
            <div class="milestone-row" data-idx="${idx}" style="display:flex;gap:8px;align-items:center;margin-bottom:8px;">
              <input type="checkbox" class="ms-completed" ${m.completed ? 'checked' : ''} style="width:16px;height:16px;">
              <input type="text" class="ms-title" value="${m.title}" placeholder="里程碑标题" style="flex:1;padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
              <input type="date" class="ms-date" value="${m.date || ''}" style="padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
              <button type="button" onclick="this.parentElement.remove()" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px;">×</button>
            </div>
          `).join('') || '';

          const insightOptions = insightsData.map(i => `<option value="${i.id}" ${(topic.insights || []).includes(i.id) ? 'selected' : ''}>${i.source}: ${i.title}</option>`).join('');

          const overlay = document.createElement('div');
          overlay.id = 'topic-edit-overlay';
          overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;';
          overlay.innerHTML = `
            <div id="topic-edit-modal" style="background:var(--bg-card);border-radius:12px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
              <div style="display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border-color);">
                <h2 style="margin:0;font-size:18px;">编辑专题</h2>
                <button onclick="document.getElementById('topic-edit-overlay').remove(); window._topicEditId = null;" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-secondary);">×</button>
              </div>
              <div style="padding:24px;">
                <div style="display:grid;grid-template-columns:repeat(2, 1fr);gap:16px;margin-bottom:16px;">
                  <div>
                    <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">专题名称</label>
                    <input type="text" id="edit-topic-name" value="${topic.name}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
                  </div>
                  <div>
                    <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">负责人</label>
                    <input type="text" id="edit-topic-owner" value="${topic.owner}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
                  </div>
                  <div>
                    <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">战略维度</label>
                    <input type="text" id="edit-topic-dimension" value="${topic.dimension}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
                  </div>
                  <div>
                    <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">类型</label>
                    <select id="edit-topic-type" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">${typeOptions}</select>
                  </div>
                  <div>
                    <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">优先级</label>
                    <select id="edit-topic-priority" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">${priorityOptions}</select>
                  </div>
                  <div>
                    <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">阶段</label>
                    <select id="edit-topic-status" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">${statusOptions}</select>
                  </div>
                  <div>
                    <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">开始日期</label>

                  <div>

                  </div>
                  <div>
                    <label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">预算</label>
                    <input type="text" id="edit-topic-budget" value="${topic.budget || ''}" placeholder="例如: 50万" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">

                <div style="margin-bottom:16px;">

                  <input type="text" value="${topic.year}年" disabled style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-page);color:var(--text-tertiary);cursor:not-allowed;">

                  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                    <label style="font-size:12px;color:var(--text-tertiary);">📌 里程碑</label>

                  <select id="edit-topic-insights" multiple style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);min-height:80px;">${insightOptions}</select>

                <div style="display:flex;gap:10px;justify-content:flex-end;padding-top:16px;border-top:1px solid var(--border-color);">

                  <button class="btn btn-primary" onclick="window.saveTopicEdit()">保存</button>
                </div>
              </div>
            </div>
          `;
          document.body.appendChild(overlay);
          overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.remove(); window._topicEditId = null; } });
        };

        // 删除里程碑（inline 调用，此处为测试兼容声明）
        window.removeMilestone = function(rowEl) { if(rowEl) rowEl.remove(); };

        // 添加里程碑行
        window.addMilestoneRow = function() {
          const container = document.getElementById('edit-topic-milestones');
          if (!container) return;
          const row = document.createElement('div');
          row.className = 'milestone-row';
          row.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px;';
          row.innerHTML = `
            <input type="checkbox" class="ms-completed" style="width:16px;height:16px;">
            <input type="text" class="ms-title" placeholder="里程碑标题" style="flex:1;padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
            <input type="date" class="ms-date" style="padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;background:var(--bg-card);color:var(--text-primary);">
            <button type="button" onclick="this.parentElement.remove()" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px;">×</button>
          `;
          container.appendChild(row);
        };

        // 保存编辑
        window.saveTopicEdit = function() {
          const topicId = window._topicEditId;
          if (!topicId) return;
          const topics = loadTopics();
          const idx = topics.findIndex(t => t.id === topicId);
          if (idx === -1) return;

          // 收集里程碑
          const milestoneRows = document.querySelectorAll('#edit-topic-milestones .milestone-row');
          const milestones = Array.from(milestoneRows).map(row => ({
            title: row.querySelector('.ms-title').value.trim(),
            date: row.querySelector('.ms-date').value,
            completed: row.querySelector('.ms-completed').checked
          })).filter(m => m.title);

          // 收集关联洞察
          const insightSelect = document.getElementById('edit-topic-insights');
          const selectedInsights = insightSelect ? Array.from(insightSelect.selectedOptions).map(o => o.value) : [];

          topics[idx] = {
            ...topics[idx],
            name: document.getElementById('edit-topic-name').value.trim() || topics[idx].name,
            dimension: document.getElementById('edit-topic-dimension').value.trim() || topics[idx].dimension,
            type: document.getElementById('edit-topic-type').value,
            priority: document.getElementById('edit-topic-priority').value,
            owner: document.getElementById('edit-topic-owner').value.trim() || topics[idx].owner,
            status: document.getElementById('edit-topic-status').value,

          };

            <div style="grid-column:1 / -1;"><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">描述</label><textarea id="omp-task-desc" rows="2" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;resize:vertical;">${task.description}</textarea></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">类型 *</label><select id="omp-task-type" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"><option value="strategic" ${task.type === 'strategic' ? 'selected' : ''}>🎯 战略举措</option><option value="improvement" ${task.type === 'improvement' ? 'selected' : ''}>🔧 业务改进</option><option value="capability" ${task.type === 'capability' ? 'selected' : ''}>📚 能力建设</option><option value="risk_response" ${task.type === 'risk_response' ? 'selected' : ''}>⚠️ 风险应对</option></select></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">优先级 *</label><select id="omp-task-priority" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"><option value="P0" ${task.priority === 'P0' ? 'selected' : ''}>🔴 P0</option><option value="P1" ${task.priority === 'P1' ? 'selected' : ''}>🟡 P1</option><option value="P2" ${task.priority === 'P2' ? 'selected' : ''}>🟢 P2</option></select></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">负责人 *</label><input type="text" id="omp-task-owner" value="${task.owner}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">部门 *</label><input type="text" id="omp-task-dept" value="${task.dept}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">开始日期</label><input type="date" id="omp-task-start" value="${task.startDate}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">截止日期 *</label><input type="date" id="omp-task-end" value="${task.endDate}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">预算 (万)</label><input type="number" id="omp-task-budget" value="${task.budget}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">实际成本 (万)</label><input type="number" id="omp-task-cost" value="${task.actualCost}" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            <div style="grid-column:1 / -1;"><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">关联 KPI (多选)</label><select id="omp-task-kpis" multiple style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;min-height:80px;">${kpiOptions}</select></div>
          </div>
          <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border-color);">
            <button class="btn btn-secondary" onclick="document.getElementById('omp-active-modal').remove(); window._ompState.editingTaskId = null;">取消</button>
            <button class="btn btn-primary" onclick="window.omp_saveTask()">保存</button>
          </div>`, true);
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      // 开发路线图筛选
      window.filterRoadmap = function(filter) {
        const rows = document.querySelectorAll('[data-module-status]');
        rows.forEach(row => {
          const status = row.dataset.moduleStatus;
          if (filter === 'all' || status === filter) {
            row.style.display = '';
          } else {
            row.style.display = 'none';
          }
        });
      }

      // ===== OMP: 全局事件处理 =====
      window.omp_saveKpi = function() {
        const indicatorId = document.getElementById('omp-kpi-indicator')?.value;
        const dept = document.getElementById('omp-kpi-dept')?.value?.trim();
        const owner = document.getElementById('omp-kpi-owner')?.value?.trim();
        const target = parseFloat(document.getElementById('omp-kpi-target')?.value);
        const challenge = parseFloat(document.getElementById('omp-kpi-challenge')?.value) || 0;
        const actual = parseFloat(document.getElementById('omp-kpi-actual')?.value) || 0;
        const weight = parseFloat(document.getElementById('omp-kpi-weight')?.value) || 20;
        const period = document.getElementById('omp-kpi-period')?.value?.trim() || '2026-Q2';
        if (!dept || !owner || isNaN(target)) { alert('请填写必填项'); return; }
        const kpis = omp_load('kpiInstances');
        const editId = window._ompState.editingKpiId;
        if (editId === 'new') {
          if (!indicatorId) { alert('请选择指标'); return; }
          const achievementRate = target > 0 ? Math.round((actual / target) * 100 * 10) / 10 : 0;
          kpis.push({ id: 'kpi_' + Date.now(), indicatorId, period, targetValue: target, challengeValue: challenge, actualValue: actual, achievementRate, weight, owner, dept, status: omp_getKpiStatus(achievementRate) });
        } else {
          const idx = kpis.findIndex(k => k.id === editId);
          if (idx > -1) {
            const achievementRate = target > 0 ? Math.round((actual / target) * 100 * 10) / 10 : 0;
            kpis[idx] = { ...kpis[idx], dept, owner, period, targetValue: target, challengeValue: challenge, actualValue: actual, achievementRate, weight, status: omp_getKpiStatus(achievementRate) };
          }
        }
        omp_save('kpiInstances', kpis);
        window._ompState.editingKpiId = null;
        document.getElementById('omp-active-modal')?.remove();
        navigate('exe/tasks');
      };

      window.omp_saveTask = function() {
        const name = document.getElementById('omp-task-name')?.value?.trim();
        const description = document.getElementById('omp-task-desc')?.value?.trim();
        const type = document.getElementById('omp-task-type')?.value;
        const priority = document.getElementById('omp-task-priority')?.value;
        const owner = document.getElementById('omp-task-owner')?.value?.trim();
        const dept = document.getElementById('omp-task-dept')?.value?.trim();
        const startDate = document.getElementById('omp-task-start')?.value || '';
        const endDate = document.getElementById('omp-task-end')?.value || '';
        const budget = parseFloat(document.getElementById('omp-task-budget')?.value) || 0;
        const actualCost = parseFloat(document.getElementById('omp-task-cost')?.value) || 0;
        const kpiSelect = document.getElementById('omp-task-kpis');
        const relatedKpiIds = kpiSelect ? Array.from(kpiSelect.selectedOptions).map(o => o.value) : [];
        if (!name || !owner || !dept || !endDate) { alert('请填写必填项（名称、负责人、部门、截止日期）'); return; }
        const tasks = omp_load('tasks');
        const editId = window._ompState.editingTaskId;
        if (editId === 'new') {
          tasks.push({ id: 'task_' + Date.now(), name, description, type, priority, status: 'planning', progress: 0, owner, dept, startDate, endDate, relatedKpiIds, budget, actualCost });
        } else {
          const idx = tasks.findIndex(t => t.id === editId);
          if (idx > -1) tasks[idx] = { ...tasks[idx], name, description, type, priority, owner, dept, startDate, endDate, relatedKpiIds, budget, actualCost };
        }
        omp_save('tasks', tasks);
        window._ompState.editingTaskId = null;
        document.getElementById('omp-active-modal')?.remove();
        navigate('exe/tasks');
      };

      window.omp_switchTab = function(tab) { window._ompState.activeTab = tab; navigate('exe/tasks'); };
      window.omp_viewKpi = function(id) { omp_viewKpiModal(id); };
      window.omp_editKpi = function(id) { omp_editKpiModal(id); };
      window.omp_newKpi = function() { omp_newKpiModal(); };
      window.omp_viewTask = function(id) { omp_viewTaskModal(id); };
      window.omp_editTask = function(id) { omp_editTaskModal(id); };
      window.omp_newTask = function() {
        const kpis = omp_load('kpiInstances');
        const kpiOptions = kpis.map(k => { const name = omp_getIndicatorName(k.indicatorId); return `<option value="${k.id}">${name} (${k.dept})</option>`; }).join('');
        window._ompState.editingTaskId = 'new';
        omp_openModal('新建重点工作', `
          <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px;">
            <div style="grid-column:1 / -1;"><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">工作名称 *</label><input type="text" id="omp-task-name" placeholder="如: 华东区渠道下沉" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            <div style="grid-column:1 / -1;"><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">描述</label><textarea id="omp-task-desc" rows="2" placeholder="简要描述工作目标" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;resize:vertical;"></textarea></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">类型 *</label><select id="omp-task-type" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"><option value="strategic">🎯 战略举措</option><option value="improvement">🔧 业务改进</option><option value="capability">📚 能力建设</option><option value="risk_response">⚠️ 风险应对</option></select></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">优先级 *</label><select id="omp-task-priority" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"><option value="P0">🔴 P0</option><option value="P1">🟡 P1</option><option value="P2">🟢 P2</option></select></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">负责人 *</label><input type="text" id="omp-task-owner" placeholder="如: 李经理" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">部门 *</label><input type="text" id="omp-task-dept" placeholder="如: 销售部" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">开始日期</label><input type="date" id="omp-task-start" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">截止日期 *</label><input type="date" id="omp-task-end" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">预算 (万)</label><input type="number" id="omp-task-budget" placeholder="如: 200" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            <div><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">实际成本 (万)</label><input type="number" id="omp-task-cost" value="0" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;"></div>
            <div style="grid-column:1 / -1;"><label style="display:block;font-size:12px;color:var(--text-tertiary);margin-bottom:4px;">关联 KPI (多选)</label><select id="omp-task-kpis" multiple style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:13px;min-height:80px;">${kpiOptions}</select></div>
          </div>
          <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border-color);"><button class="btn btn-secondary" onclick="document.getElementById('omp-active-modal').remove(); window._ompState.editingTaskId = null;">取消</button><button class="btn btn-primary" onclick="window.omp_saveTask()">保存</button></div>
        `, true);
      };

      window.omp_exportData = function() {
        const data = { indicators: omp_load('indicators'), kpiInstances: omp_load('kpiInstances'), tasks: omp_load('tasks'), milestones: omp_load('milestones'), progressRecords: omp_load('progressRecords'), exportedAt: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `omp-export-${new Date().toISOString().slice(0, 10)}.json`; a.click(); URL.revokeObjectURL(url);
      };

      // 暴露全局 navigate
      window.navigate = navigate;

      // 启动
      init();

      // 显示版本号
      console.log('DSTE Platform v' + (typeof __APP_VERSION__ !== 'undefined' ? __APP_VERSION__ : 'dev'));
    })();
  </script>
  <div id="app-version" style="position:fixed;bottom:4px;right:8px;font-size:11px;color:var(--text-tertiary);opacity:0.6;z-index:9999;pointer-events:none;"></div>
  <script type="module">
    (function() {
      var v = typeof __APP_VERSION__ !== 'undefined' ? __APP_VERSION__ : 'dev';
      var el = document.getElementById('app-version');
      if (el) el.textContent = 'v' + v;
    })();
  </script>
</body>
</html>
