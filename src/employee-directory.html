<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人员与组织管理 - DSTE战略管理平台</title>
  <link rel="stylesheet" href="../assets/css/main.css?v=2">
  <link rel="stylesheet" href="./styles/shell.css">
  <link rel="stylesheet" href="./styles/ai-chat.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="../assets/js/main.js"></script>
  <script>
    (function() {
      const theme = DSTE.Storage.getString('dste-theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);

      // 嵌入模式：在 iframe 中使用时隐藏导航外壳，并向父页面汇报高度
      if (new URLSearchParams(location.search).get('embed') === '1') {
        document.documentElement.setAttribute('data-embed', 'true');

        if (window !== window.top) {
          let lastHeight = 0;
          const reportHeight = () => {
            const h = document.documentElement.scrollHeight || document.body.scrollHeight;
            if (h !== lastHeight) {
              lastHeight = h;
              window.parent.postMessage({ type: 'dste-embed-resize', height: h }, window.location.origin);
            }
          };
          reportHeight();
          let timer;
          window.addEventListener('resize', () => { clearTimeout(timer); timer = setTimeout(reportHeight, 100); });
          if (typeof ResizeObserver !== 'undefined') {
            const ro = new ResizeObserver(() => { clearTimeout(timer); timer = setTimeout(reportHeight, 100); });
            ro.observe(document.body);
          }
        }
      }
    })();
  </script>
  <style>
    .employee-directory-page { padding: 24px; max-width: 1200px; margin: 0 auto; }
    .page-header { margin-bottom: 24px; }
    .page-header h1 { margin: 0 0 8px; font-size: 24px; }
    .page-desc { color: var(--text-muted); margin: 0; }

    .directory-stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 16px; }
    .stat-value { font-size: 28px; font-weight: 600; color: var(--primary); }
    .stat-label { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    .directory-import { margin-bottom: 24px; }
    .import-zone { border: 2px dashed var(--border-color); border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .import-zone:hover, .import-zone.dragover { border-color: var(--primary); background: var(--bg-hover); }
    .import-icon { font-size: 40px; margin-bottom: 12px; }
    .import-text { font-size: 16px; color: var(--text-primary); margin-bottom: 8px; }
    .import-hint { font-size: 13px; color: var(--text-muted); }

    .import-summary { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; margin-top: 16px; }
    .summary-title { font-weight: 600; margin-bottom: 12px; }
    .summary-stats { display: flex; gap: 16px; margin-bottom: 16px; }
    .text-success { color: var(--success, #10b981); }
    .text-error { color: var(--danger, #ef4444); }
    .message-list { margin-bottom: 16px; }
    .message-title { font-weight: 500; margin-bottom: 8px; }
    .message-error { color: var(--danger); }
    .message-warning { color: var(--warning, #f59e0b); }
    .message-list ul { margin: 0; padding-left: 20px; font-size: 13px; }
    .import-actions { display: flex; gap: 12px; }

    .directory-main { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; min-height: 520px; }

    .directory-tree { padding: 16px; overflow-y: auto; }

    .tree-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .tree-header span { font-weight: 600; }
    .btn-link { background: none; border: none; color: var(--primary); cursor: pointer; font-size: 13px; }
    .org-tree { max-height: 700px; overflow-y: auto; }
    .org-row { display: flex; align-items: center; gap: 8px; padding: 6px 8px; cursor: pointer; user-select: none; }
    .org-row:hover { background: var(--bg-hover); border-radius: 6px; }
    .org-toggle { cursor: pointer; width: 16px; font-size: 12px; text-align: center; }
    .org-folder { width: 18px; text-align: center; }
    .org-name { flex: 1; }
    .org-count { font-size: 12px; color: var(--text-muted); }
    .org-children { border-left: 1px dashed var(--border-color); margin-left: 22px; padding-left: 4px; }

    .emp-row { display: flex; align-items: center; gap: 10px; padding: 6px 8px 6px 34px; cursor: default; }
    .emp-row:hover { background: var(--bg-hover); border-radius: 6px; }
    .emp-avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--primary-light, color-mix(in srgb, var(--primary) 15%, transparent)); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
    .emp-info { flex: 1; }
    .emp-name { font-size: 13px; color: var(--text-primary); }
    .emp-meta { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

    .empty-state { color: var(--text-muted); text-align: center; padding: 40px 20px; }
  </style>
</head>
<body>
  <div class="app">
    <!-- 顶部导航 (与 cockpit.html 一致) -->
    <nav class="top-nav">
      <div style="display: flex; align-items: center;">
        <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="打开菜单"><span class="icon" data-icon="menu" data-icon-size="18"></span></button>
        <div class="top-nav-brand">
          <div class="top-nav-logo">D</div>
          <span class="top-nav-title">DSTE 战略管理平台</span>
        </div>
      </div>
      <ul class="top-nav-links" id="top-nav-links"></ul>
      <div class="top-nav-actions">
        <button class="icon-btn" id="theme-toggle" title="切换主题"><span class="icon" data-icon="moon" data-icon-size="18"></span></button>
        <button class="icon-btn" title="通知"><span class="icon" data-icon="notification" data-icon-size="18"></span></button>
        <div class="user-avatar" id="user-avatar" style="width:32px;height:32px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;position:relative;cursor:pointer;">张</div>
        <div class="user-dropdown" id="user-dropdown">
          <div class="user-dropdown-name" id="user-dropdown-name">张总</div>
          <div class="user-dropdown-divider"></div>
          <button class="user-dropdown-item" id="user-logout"><span class="icon" data-icon="logout" data-icon-size="14"></span> 退出登录</button>
        </div>
      </div>
    </nav>

    <div class="app-body">
      <!-- 侧边栏遮罩层 -->
      <div class="sidebar-overlay" id="sidebar-overlay"></div>

      <!-- 左侧边栏 -->
      <aside class="sidebar" id="sidebar"></aside>

      <!-- 内容区 -->
      <main class="content-area">
        <div id="employee-directory-root"></div>
      </main>
    </div>
  </div>

  <script type="module" src="./lib/shell-injector.js"></script>
  <script type="module">
    import { initEmployeeDirectory, clearEmployeeDirectory } from './lib/employee-directory.js';
    import { initEmployeeDirectoryPage } from './pages/admin/employee-directory.js';

    // 暴露测试/调试接口（通过 eval 避免构建时 tree-shaking）
    // eslint-disable-next-line no-eval
    const g = (0, eval)('this');
    g.clearEmployeeDirectory = clearEmployeeDirectory;

    async function bootstrap() {
      try {
        await initEmployeeDirectory();
      } catch (e) {
        console.warn('[employee-directory] init sync failed:', e);
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initEmployeeDirectoryPage);
      } else {
        initEmployeeDirectoryPage();
      }
    }

    bootstrap();
  </script>
</body>
</html>
