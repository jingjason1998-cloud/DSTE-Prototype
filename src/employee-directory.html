<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>人员与组织管理 - DSTE战略管理平台</title>
  <link rel="stylesheet" href="../assets/css/main.css?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="../assets/js/main.js"></script>
  <script>
    (function() {
      const theme = DSTE.Storage.getString('dste-theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <style>
    .employee-directory-page { padding: 24px; max-width: 1200px; margin: 0 auto; }
    .page-header { margin-bottom: 24px; }
    .page-header h1 { margin: 0 0 8px; font-size: 24px; }
    .page-desc { color: var(--text-muted); margin: 0; }

    .directory-stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 16px; }
    .stat-value { font-size: 28px; font-weight: 600; color: var(--primary); }
    .stat-label { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    .directory-import { margin-bottom: 24px; }
    .import-zone { border: 2px dashed var(--border-color); border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .import-zone:hover, .import-zone.dragover { border-color: var(--primary); background: var(--bg-hover); }
    .import-icon { font-size: 40px; margin-bottom: 12px; }
    .import-text { font-size: 16px; color: var(--text-primary); margin-bottom: 8px; }
    .import-hint { font-size: 13px; color: var(--text-muted); }

    .import-summary { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; margin-top: 16px; }
    .summary-title { font-weight: 600; margin-bottom: 12px; }
    .summary-stats { display: flex; gap: 16px; margin-bottom: 16px; }
    .text-success { color: var(--success, #10b981); }
    .text-error { color: var(--danger, #ef4444); }
    .message-list { margin-bottom: 16px; }
    .message-title { font-weight: 500; margin-bottom: 8px; }
    .message-error { color: var(--danger); }
    .message-warning { color: var(--warning, #f59e0b); }
    .message-list ul { margin: 0; padding-left: 20px; font-size: 13px; }
    .import-actions { display: flex; gap: 12px; }

    .directory-main { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media (max-width: 900px) { .directory-main { grid-template-columns: 1fr; } }

    .directory-search, .directory-tree { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; }
    .search-box { display: flex; gap: 8px; margin-bottom: 12px; }
    .search-box input { flex: 1; padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 6px; }
    .employee-list { max-height: 400px; overflow-y: auto; }
    .employee-card { padding: 10px; border-bottom: 1px solid var(--border-color); }
    .employee-card:last-child { border-bottom: none; }
    .employee-name { font-weight: 500; }
    .employee-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .tree-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .tree-header span { font-weight: 600; }
    .btn-link { background: none; border: none; color: var(--primary); cursor: pointer; font-size: 13px; }
    .org-tree { max-height: 500px; overflow-y: auto; }
    .org-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; }
    .org-toggle { cursor: pointer; width: 16px; font-size: 12px; }
    .org-name { flex: 1; }
    .org-count { font-size: 12px; color: var(--text-muted); }
    .org-children { border-left: 1px dashed var(--border-color); margin-left: 8px; padding-left: 4px; }

    .empty-state { color: var(--text-muted); text-align: center; padding: 40px 20px; }
    .result-count { font-size: 12px; color: var(--text-muted); margin-top: 8px; text-align: right; }
  </style>
</head>
<body>
  <div id="employee-directory-root"></div>

  <script type="module" src="./lib/shell-injector.js"></script>
  <script type="module">
    import { initEmployeeDirectoryPage } from './pages/admin/employee-directory.js';
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initEmployeeDirectoryPage);
    } else {
      initEmployeeDirectoryPage();
    }
  </script>
</body>
</html>
