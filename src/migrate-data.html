        function migrate() {
            try {
                const existing = localStorage.getItem(STORAGE_KEY);
                const existingTopics = existing ? JSON.parse(existing) : [];
                
                if (existingTopics.length > 0) {
                    const ok = confirm(`当前端口已有 ${existingTopics.length} 个专题，迁移将覆盖现有数据。确认继续？`);
                    if (!ok) return;
                }
                
                localStorage.setItem(STORAGE_KEY, JSON.stringify(BACKUP_DATA));
                
                const status = document.getElementById('status');
                status.className = 'status success';
                status.innerHTML = `✅ 迁移成功！共写入 ${BACKUP_DATA.length} 个专题到 ${window.location.origin}`;
                
                const list = document.getElementById('topicList');
                list.innerHTML = BACKUP_DATA.map(t => `<li>• [${t.priority}] ${t.name}</li>`).join('');
            } catch (e) {
                const status = document.getElementById('status');
                status.className = 'status error';
                status.textContent = '❌ 迁移失败: ' + e.message;
            }
        }
