<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSTE 战略指挥平台</title>
  <link rel="stylesheet" href="./assets/css/main.css">
  <style>
    /* ===== 基础 ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --war-bg: #0a0e1a;
      --war-panel: rgba(13, 18, 35, 0.85);
      --war-border: rgba(22, 119, 255, 0.18);
      --war-border-bright: rgba(22, 119, 255, 0.35);
      --war-glow: rgba(22, 119, 255, 0.4);
      --war-text: #c8d4e8;
      --war-text-dim: #6b7a94;
      --war-accent: #1677FF;
      --war-success: #00d4aa;
      --war-warning: #ff9f43;
      --war-danger: #ff4757;
      --war-grid: rgba(22, 119, 255, 0.06);
    }

    [data-theme="light"] {
      --war-bg: #f0f4fa;
      --war-panel: rgba(255, 255, 255, 0.92);
      --war-border: rgba(22, 119, 255, 0.15);
      --war-border-bright: rgba(22, 119, 255, 0.3);
      --war-glow: rgba(22, 119, 255, 0.25);
      --war-text: #1a2332;
      --war-text-dim: #5a6a82;
      --war-grid: rgba(22, 119, 255, 0.04);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--war-bg);
      color: var(--war-text);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* ===== 科技背景层 ===== */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* 网格背景 */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--war-grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--war-grid) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
    }

    /* 扫描线 */
    .scan-line {
      position: absolute;
      top: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--war-accent), transparent);
      box-shadow: 0 0 20px var(--war-glow), 0 0 40px var(--war-glow);
      animation: scan 6s linear infinite;
      opacity: 0.6;
    }

    @keyframes scan {
      0% { top: -2px; opacity: 0; }
      5% { opacity: 0.6; }
      95% { opacity: 0.6; }
      100% { top: 100vh; opacity: 0; }
    }

    /* 浮动粒子 */
    .particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--war-accent);
      border-radius: 50%;
      opacity: 0;
      animation: floatParticle linear infinite;
    }

    @keyframes floatParticle {
      0% { opacity: 0; transform: translateY(100vh) scale(0); }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { opacity: 0; transform: translateY(-10vh) scale(1); }
    }

    /* 脉冲光环 */
    .pulse-ring {
      position: absolute;
      top: 50%;
      left: 30%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      border: 1px solid var(--war-border);
      border-radius: 50%;
      animation: pulseExpand 4s ease-out infinite;
      opacity: 0;
    }

    .pulse-ring:nth-child(2) { animation-delay: 1.3s; }
    .pulse-ring:nth-child(3) { animation-delay: 2.6s; }

    @keyframes pulseExpand {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0.6; }
      100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
    }

    /* 角标装饰 */
    .corner-deco {
      position: absolute;
      width: 40px;
      height: 40px;
      border-color: var(--war-border-bright);
      border-style: solid;
      border-width: 0;
    }

    .corner-deco.tl { top: 20px; left: 20px; border-top-width: 2px; border-left-width: 2px; }
    .corner-deco.tr { top: 20px; right: 20px; border-top-width: 2px; border-right-width: 2px; }
    .corner-deco.bl { bottom: 20px; left: 20px; border-bottom-width: 2px; border-left-width: 2px; }
    .corner-deco.br { bottom: 20px; right: 20px; border-bottom-width: 2px; border-right-width: 2px; }

    /* ===== 主布局 ===== */
    .war-room {
      position: relative;
      z-index: 1;
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      gap: 0;
    }

    .war-panel {
      display: flex;
      width: 100%;
      max-width: 1100px;
      min-height: 600px;
      max-height: 720px;
      background: var(--war-panel);
      border: 1px solid var(--war-border);
      border-radius: 4px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(22, 119, 255, 0.05),
        0 20px 60px rgba(0, 0, 0, 0.4),
        0 0 80px rgba(22, 119, 255, 0.06);
    }

    /* ===== 左侧：战略态势 ===== */
    .war-left {
      flex: 1;
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-right: 1px solid var(--war-border);
      position: relative;
      overflow: hidden;
    }

    .war-left::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at 30% 50%, rgba(22, 119, 255, 0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    /* 顶部状态栏 */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 11px;
      color: var(--war-text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      position: relative;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--war-success);
      box-shadow: 0 0 8px var(--war-success);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-divider {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--war-border), transparent);
    }

    /* 品牌区 */
    .war-brand {
      position: relative;
      text-align: center;
    }

    .war-brand-logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--war-accent), #0958D9);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 28px;
      font-weight: 700;
      margin: 0 auto 20px;
      box-shadow: 0 0 30px rgba(22, 119, 255, 0.3), inset 0 1px 0 rgba(255,255,255,0.2);
      position: relative;
    }

    .war-brand-logo::after {
      content: "";
      position: absolute;
      inset: -4px;
      border: 1px solid rgba(22, 119, 255, 0.2);
      border-radius: 16px;
      animation: logoPulse 3s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.02); }
    }

    .war-brand h1 {
      font-size: 26px;
      font-weight: 600;
      color: var(--war-text);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .war-brand .subtitle {
      font-size: 13px;
      color: var(--war-text-dim);
      letter-spacing: 1px;
    }

    /* DSTE 闭环作战流程 */
    .dste-loop-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0;
    }

    .dste-battle-flow {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 20px 0;
    }

    /* 微妙的闭环回流箭头 */
    .phase-loop-back {
      font-size: 13px;
      color: var(--war-border-bright);
      opacity: 0.25;
      margin-left: 6px;
      transition: opacity 0.3s ease;
      cursor: default;
    }

    .dste-loop-container:hover .phase-loop-back {
      opacity: 0.5;
    }

    .dste-phase {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 12px;
      min-width: 100px;
      position: relative;
    }

    .phase-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      position: relative;
      border: 1px solid var(--war-border);
      background: rgba(22, 119, 255, 0.06);
      transition: all 0.3s ease;
    }

    .phase-icon::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--war-accent), transparent);
      opacity: 0;
      transition: opacity 0.3s;
      z-index: -1;
    }

    .dste-phase:hover .phase-icon {
      border-color: var(--war-border-bright);
      box-shadow: 0 0 20px rgba(22, 119, 255, 0.15);
      transform: translateY(-2px);
    }

    .dste-phase:hover .phase-icon::before {
      opacity: 0.3;
    }

    .phase-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--war-text);
      letter-spacing: 0.5px;
    }

    .phase-code {
      font-size: 10px;
      color: var(--war-text-dim);
      font-family: 'SF Mono', monospace;
      letter-spacing: 1px;
    }

    .phase-arrow {
      color: var(--war-border-bright);
      font-size: 14px;
      opacity: 0.6;
      animation: arrowPulse 2s ease-in-out infinite;
    }

    @keyframes arrowPulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }

    /* 态势数据 */
    .battle-metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      position: relative;
    }

    .metric-cell {
      padding: 12px;
      border: 1px solid var(--war-border);
      border-radius: 4px;
      text-align: center;
      background: rgba(22, 119, 255, 0.02);
      transition: all 0.3s ease;
    }

    .metric-cell:hover {
      border-color: var(--war-border-bright);
      background: rgba(22, 119, 255, 0.05);
    }

    .metric-value {
      font-size: 20px;
      font-weight: 700;
      font-family: 'SF Mono', monospace;
      letter-spacing: -0.5px;
    }

    .metric-value.up { color: var(--war-success); text-shadow: 0 0 10px rgba(0, 212, 170, 0.2); }
    .metric-value.down { color: var(--war-danger); text-shadow: 0 0 10px rgba(255, 71, 87, 0.2); }
    .metric-value.warn { color: var(--war-warning); text-shadow: 0 0 10px rgba(255, 159, 67, 0.2); }

    .metric-label {
      font-size: 10px;
      color: var(--war-text-dim);
      margin-top: 4px;
      letter-spacing: 0.5px;
    }

    /* ===== 右侧：登录 ===== */
    .war-right {
      width: 380px;
      padding: 48px 36px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
    }

    .war-right-header {
      margin-bottom: 28px;
    }

    .war-right-header h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--war-text);
      margin-bottom: 4px;
    }

    .war-right-header p {
      font-size: 12px;
      color: var(--war-text-dim);
    }

    /* 表单 */
    .war-form-group {
      margin-bottom: 14px;
    }

    .war-form-label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--war-text-dim);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .war-form-input {
      width: 100%;
      height: 40px;
      padding: 0 14px;
      border: 1px solid var(--war-border);
      border-radius: 4px;
      background: rgba(22, 119, 255, 0.03);
      color: var(--war-text);
      font-size: 13px;
      transition: all 0.2s ease;
      outline: none;
    }

    .war-form-input::placeholder {
      color: var(--war-text-dim);
      opacity: 0.5;
    }

    .war-form-input:hover {
      border-color: var(--war-border-bright);
    }

    .war-form-input:focus {
      border-color: var(--war-accent);
      background: rgba(22, 119, 255, 0.06);
      box-shadow: 0 0 0 3px rgba(22, 119, 255, 0.1), 0 0 20px rgba(22, 119, 255, 0.08);
    }

    .war-form-input.error {
      border-color: var(--war-danger);
      box-shadow: 0 0 0 3px rgba(255, 71, 87, 0.1);
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-5px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-2px); }
      80% { transform: translateX(2px); }
    }

    .war-form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      font-size: 12px;
    }

    .war-form-checkbox {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--war-text-dim);
      cursor: pointer;
      user-select: none;
    }

    .war-form-checkbox input {
      width: 14px;
      height: 14px;
      accent-color: var(--war-accent);
      cursor: pointer;
    }

    .war-form-link {
      color: var(--war-accent);
      text-decoration: none;
      font-size: 12px;
      transition: opacity 0.2s;
    }

    .war-form-link:hover {
      opacity: 0.8;
      text-decoration: underline;
    }

    /* 登录按钮 */
    .btn-war-login {
      width: 100%;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--war-accent), #0958D9);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
    }

    .btn-war-login::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s;
    }

    .btn-war-login:hover:not(:disabled)::before {
      left: 100%;
    }

    .btn-war-login:hover:not(:disabled) {
      box-shadow: 0 4px 20px rgba(22, 119, 255, 0.35);
      transform: translateY(-1px);
    }

    .btn-war-login:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-war-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-war-login .spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .btn-war-login.loading .spinner {
      display: block;
    }

    .btn-war-login.loading .btn-text {
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 分割线 */
    .war-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      font-size: 11px;
      color: var(--war-text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .war-divider::before,
    .war-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--war-border), transparent);
    }

    /* SSO */
    .war-sso {
      display: flex;
      gap: 8px;
    }

    .war-sso-btn {
      flex: 1;
      height: 36px;
      border: 1px solid var(--war-border);
      border-radius: 4px;
      background: rgba(22, 119, 255, 0.03);
      color: var(--war-text-dim);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-weight: 500;
    }

    .war-sso-btn:hover {
      border-color: var(--war-border-bright);
      background: rgba(22, 119, 255, 0.06);
      color: var(--war-text);
    }

    /* 错误提示 */
    .war-error {
      display: none;
      padding: 10px 12px;
      background: rgba(255, 71, 87, 0.08);
      border: 1px solid rgba(255, 71, 87, 0.15);
      border-radius: 4px;
      color: var(--war-danger);
      font-size: 12px;
      margin-bottom: 14px;
      animation: fadeInUp 0.3s ease;
    }

    .war-error.show {
      display: block;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 底部 */
    .war-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 11px;
      color: var(--war-text-dim);
    }

    .war-footer a {
      color: var(--war-accent);
      text-decoration: none;
    }

    .war-footer a:hover {
      text-decoration: underline;
    }

    /* 主题切换 */
    .war-theme-toggle {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      border: 1px solid var(--war-border);
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--war-text-dim);
      transition: all 0.2s ease;
      z-index: 10;
    }

    .war-theme-toggle:hover {
      border-color: var(--war-border-bright);
      color: var(--war-text);
    }

    /* ===== 响应式 ===== */
    @media (max-width: 900px) {
      .war-room { padding: 20px; }
      .war-panel { flex-direction: column; max-height: none; min-height: auto; }
      .war-left { border-right: none; border-bottom: 1px solid var(--war-border); padding: 32px 24px; }
      .war-right { width: 100%; padding: 32px 24px; }
      .battle-metrics { grid-template-columns: repeat(2, 1fr); }
      .pulse-ring { left: 50%; }
    }

    @media (max-width: 480px) {
      .dste-battle-flow { flex-wrap: wrap; gap: 8px; }
      .phase-arrow { display: none; }
      .war-brand h1 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <!-- 科技背景层 -->
  <div class="bg-layer">
    <div class="bg-grid"></div>
    <div class="scan-line"></div>
    <div class="particles" id="particles"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="corner-deco tl"></div>
    <div class="corner-deco tr"></div>
    <div class="corner-deco bl"></div>
    <div class="corner-deco br"></div>
  </div>

  <!-- 主题切换 -->
  <button class="war-theme-toggle" id="theme-toggle" title="切换主题">🌙</button>

  <!-- 主界面 -->
  <div class="war-room">
    <div class="war-panel">
      <!-- 左侧：战略态势 -->
      <div class="war-left">
        <!-- 顶部状态 -->
        <div class="status-bar">
          <span class="status-dot"></span>
          <span>系统运行中</span>
          <span style="opacity:0.4">|</span>
          <span>STRATEGIC COMMAND CENTER</span>
          <div class="status-divider"></div>
          <span id="live-clock">--:--:--</span>
        </div>

        <!-- 品牌 -->
        <div class="war-brand">
          <div class="war-brand-logo">D</div>
          <h1>DSTE 战略指挥平台</h1>
          <div class="subtitle">从战略制定到执行评估的完整作战闭环</div>
        </div>

        <!-- DSTE 闭环作战流程 -->
        <div class="dste-loop-container">
          <div class="dste-battle-flow">
            <div class="dste-phase">
              <div class="phase-icon">🎯</div>
              <div class="phase-label">战略制定</div>
              <div class="phase-code">SP</div>
            </div>
            <div class="phase-arrow">▶</div>
            <div class="dste-phase">
              <div class="phase-icon">🔧</div>
              <div class="phase-label">战略解码</div>
              <div class="phase-code">BP</div>
            </div>
            <div class="phase-arrow">▶</div>
            <div class="dste-phase">
              <div class="phase-icon">🚀</div>
              <div class="phase-label">战略执行</div>
              <div class="phase-code">EXE</div>
            </div>
            <div class="phase-arrow">▶</div>
            <div class="dste-phase">
              <div class="phase-icon">📊</div>
              <div class="phase-label">战略评估</div>
              <div class="phase-code">REV</div>
            </div>
            <!-- 微妙的闭环回流箭头 -->
            <div class="phase-loop-back">↻</div>
          </div>
        </div>

        <!-- 态势数据 -->
        <div class="battle-metrics">
          <div class="metric-cell">
            <div class="metric-value up">92%</div>
            <div class="metric-label">战略达成率</div>
          </div>
          <div class="metric-cell">
            <div class="metric-value warn">3</div>
            <div class="metric-label">预警事项</div>
          </div>
          <div class="metric-cell">
            <div class="metric-value up">18/20</div>
            <div class="metric-label">重点工作</div>
          </div>
          <div class="metric-cell">
            <div class="metric-value down">-8</div>
            <div class="metric-label">NPS偏差</div>
          </div>
        </div>
      </div>

      <!-- 右侧：登录 -->
      <div class="war-right">
        <div class="war-right-header">
          <h2>身份认证</h2>
          <p>请输入作战账号以进入指挥系统</p>
        </div>

        <div class="war-error" id="war-error"></div>

        <form id="war-form" autocomplete="on">
          <div class="war-form-group">
            <label class="war-form-label" for="username">用户名 / 邮箱</label>
            <input class="war-form-input" type="text" id="username" name="username" placeholder="请输入用户名或邮箱" autocomplete="username" required>
          </div>

          <div class="war-form-group">
            <label class="war-form-label" for="password">密码</label>
            <input class="war-form-input" type="password" id="password" name="password" placeholder="请输入密码" autocomplete="current-password" required>
          </div>

          <div class="war-form-options">
            <label class="war-form-checkbox">
              <input type="checkbox" id="remember">
              <span>记住我</span>
            </label>
            <a href="#" class="war-form-link" id="forgot-link">忘记密码？</a>
          </div>

          <button type="submit" class="btn-war-login" id="btn-login">
            <span class="spinner"></span>
            <span class="btn-text">进入指挥系统</span>
          </button>
        </form>

        <div class="war-divider">或通过 SSO 接入</div>

        <div class="war-sso">
          <button class="war-sso-btn" data-sso="wechat">🏢 企微</button>
          <button class="war-sso-btn" data-sso="lark">📧 飞书</button>
          <button class="war-sso-btn" data-sso="dingtalk">🔷 钉钉</button>
        </div>

        <div class="war-footer">
          未获得作战权限？<a href="#" id="apply-link">申请接入</a>
        </div>
      </div>
    </div>
  </div>

  <script src="./assets/js/main.js"></script>
  <script>
    (function() {
      'use strict';

      /* ===== 粒子生成 ===== */
      const particlesContainer = document.getElementById('particles');
      const PARTICLE_COUNT = 30;
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (4 + Math.random() * 8) + 's';
        p.style.animationDelay = (Math.random() * 6) + 's';
        p.style.width = (1 + Math.random() * 2) + 'px';
        p.style.height = p.style.width;
        particlesContainer.appendChild(p);
      }

      /* ===== 实时时钟 ===== */
      function updateClock() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        const el = document.getElementById('live-clock');
        if (el) el.textContent = `${h}:${m}:${s}`;
      }
      updateClock();
      setInterval(updateClock, 1000);

      /* ===== 登录逻辑 ===== */
      const form = document.getElementById('war-form');
      const errorEl = document.getElementById('war-error');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const rememberCheckbox = document.getElementById('remember');
      const btnLogin = document.getElementById('btn-login');

      // 记住的用户名
      const savedUser = DSTE.Storage.getString('dste-remember-user');
      if (savedUser) {
        usernameInput.value = savedUser;
        rememberCheckbox.checked = true;
      }

      // 自动聚焦
      setTimeout(() => usernameInput.focus(), 800);

      // CAS 登录跳转
      function redirectToCasLogin() {
        const service = encodeURIComponent(window.location.origin + '/src/cockpit.html');
        window.location.href = `https://passport.fanruan.com/cas/login?service=${service}`;
      }

      // 本地开发快速登录（仅 localhost）
      function devQuickLogin(username) {
        sessionStorage.setItem('dste-logged-in', 'true');
        sessionStorage.setItem('dste-user', username);
        window.location.href = 'src/cockpit.html';
      }

      // 检查是否已登录（有有效 token）
      async function checkAlreadyLoggedIn() {
        const token = DSTE.Storage.getString('dste-token');
        if (!token) return false;
        const API_BASE = (() => {
          const host = window.location.hostname;
          if (host === 'localhost' || host === '127.0.0.1') {
            return DSTE.Storage.getString('dste_api_base') || '';
          }
          return 'https://dste-api.jasonxspace.workers.dev';
        })();
        try {
          const resp = await fetch(`${API_BASE}/api/auth/me`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (resp.ok) {
            const json = await resp.json();
            if (json.success && json.user) {
              window.location.href = 'src/cockpit.html';
              return true;
            }
          }
        } catch (e) {}
        DSTE.Storage.remove('dste-token');
        DSTE.Storage.remove('dste-user');
        return false;
      }

      // 页面加载时检查是否已有有效登录
      checkAlreadyLoggedIn();

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        hideError();

        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        if (!username) {
          showError('请输入用户名');
          usernameInput.classList.add('error');
          usernameInput.focus();
          return;
        }
        if (!password) {
          showError('请输入密码');
          passwordInput.classList.add('error');
          passwordInput.focus();
          return;
        }

        usernameInput.classList.remove('error');
        passwordInput.classList.remove('error');

        // 生产环境强制走 CAS，本地开发允许快速登录
        const isLocalDev = ['localhost', '127.0.0.1'].includes(window.location.hostname);
        if (!isLocalDev) {
          redirectToCasLogin();
          return;
        }

        // 本地开发快速登录（仅用于开发测试）
        if (rememberCheckbox.checked) {
          DSTE.Storage.setString('dste-remember-user', username);
        } else {
          DSTE.Storage.remove('dste-remember-user');
        }
        setLoading(true);
        setTimeout(() => devQuickLogin(username), 300);
      });

      [usernameInput, passwordInput].forEach(input => {
        input.addEventListener('input', () => {
          input.classList.remove('error');
          hideError();
        });
      });

      // SSO 按钮：全部走 CAS 登录
      document.querySelectorAll('.war-sso-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          setLoading(true);
          redirectToCasLogin();
        });
      });

      // 辅助链接
      document.getElementById('forgot-link').addEventListener('click', (e) => {
        e.preventDefault();
        showToast('请联系管理员重置密码', 'info');
      });
      document.getElementById('apply-link').addEventListener('click', (e) => {
        e.preventDefault();
        showToast('试用申请功能即将上线，请联系管理员开通账号', 'info');
      });

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.classList.add('show');
      }
      function hideError() {
        errorEl.classList.remove('show');
      }
      function setLoading(loading) {
        btnLogin.disabled = loading;
        btnLogin.classList.toggle('loading', loading);
      }

      // 键盘快捷键
      document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          form.dispatchEvent(new Event('submit'));
        }
      });
    })();
  </script>
</body>
</html>
